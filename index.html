                                        </div>
                                        );
                                    })}
                                    <div style={{height:1,background:"var(--border)",margin:"12px 0"}}/>
                                </>}

                                {/* Todos */}
                                <div style={{fontSize:10,color:"var(--text4)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>✅ 待辦事項</div>
                                {todosForDay.length===0 && <div style={{color:"var(--text4)",fontSize:13,padding:"8px 0 14px"}}>尚無待辦，在下方新增</div>}
                                {todosForDay.sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99")).map(t=>(
                                    calEditTodoId===t.id ? (
                                        <div key={t.id} style={{display:"flex",flexDirection:"column",gap:6,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                                            <input
                                                style={{background:"var(--bg)",border:"1px solid var(--gold)",borderRadius:7,padding:"7px 10px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit"}}
                                                value={calEditTodoText}
                                                onChange={e=>setCalEditTodoText(e.target.value)}
                                                onKeyDown={e=>{ if(e.key==="Enter") saveEditCalTodo(); if(e.key==="Escape") cancelEditCalTodo(); }}
                                                autoFocus/>
                                            <div style={{display:"flex",gap:6}}>
                                                <input type="time" style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:7,padding:"7px 10px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit"}}
                                                    value={calEditTodoTime} onChange={e=>setCalEditTodoTime(e.target.value)}/>
                                                <button className="btn btn-sm" onClick={cancelEditCalTodo} style={{marginLeft:"auto"}}>取消</button>
                                                <button className="btn btn-gold btn-sm" onClick={saveEditCalTodo}>💾 儲存</button>
                                            </div>
                                        </div>
                                    ) : (
                                    <div key={t.id} className="cal-todo-item" onClick={()=>toggleCalTodo(t.id)}>
                                        <div className={`cal-todo-check${t.done?" done":""}`}>
                                            {t.done && <span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
                                        </div>
                                        <div style={{flex:1}}>
                                            {t.time && <div style={{fontSize:11,color:"var(--warning)",fontWeight:700,marginBottom:2}}>⏰ {t.time}</div>}
                                            <div style={{color:t.done?"var(--text4)":"var(--text)",textDecoration:t.done?"line-through":"none",fontSize:14}}>{t.text}</div>
                                        </div>
                                        <button className="cal-todo-del" onClick={e=>{e.stopPropagation();startEditCalTodo(t);}} title="編輯">✏️</button>
                                        <button className="cal-todo-del" onClick={e=>{e.stopPropagation();deleteCalTodo(t.id);}} title="刪除">🗑</button>
                                    </div>
                                    )
                                ))}

                                {/* Add new todo */}
                                <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:14}}>
                                    <div style={{display:"flex",gap:8}}>
                                        <input
                                            style={{flex:1,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:9,padding:"10px 13px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit"}}
                                            placeholder="新增待辦事項…"
                                            value={calTodoInput}
                                            onChange={e=>setCalTodoInput(e.target.value)}
                                            onKeyDown={e=>{ if(e.key==="Enter"){ addCalTodo(ds); } }}
                                            autoFocus
                                    />
                                    <button className="btn btn-gold" onClick={()=>addCalTodo(ds)} disabled={!calTodoInput.trim()}>＋ 新增</button>
                                    </div>
                                    <input
                                        type="time"
                                        style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:9,padding:"10px 13px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit",width:"100%"}}
                                        value={calTodoTime}
                                        onChange={e=>setCalTodoTime(e.target.value)}
                                    />
                                </div>
                            </div>
                        </div>
                    );
                })()}

                {/* Mobile cards */}
                {listTab==="list" && <div className="case-cards">
                    {sortedFiltered.length===0 && <div className="empty"><div className="ico">📂</div>查無案件</div>}
                    {sortedFiltered.map(c=>{
                        const nh=(c.hearings||[]).filter(h=>daysUntil(h.date)>=0).sort((a,b)=>a.date.localeCompare(b.date))[0];
                        const pt=(c.todos||[]).filter(t=>!t.done).length;
                        return(
                            <div key={c.id} className="case-card" onClick={()=>openDetail(c.id)}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                                    <div>
                                        <div style={{color:"var(--gold)",fontWeight:700,fontFamily:"monospace",fontSize:12}}>{c.firmCaseNo}</div>
                                        <div style={{fontWeight:700,fontSize:16,color:"var(--text)",marginTop:2}}>{c.clientName}</div>
                                        <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{c.currentAgency||c.court||""}{c.caseReason&&<span style={{color:"var(--text4)",marginLeft:4}}>· {c.caseReason}</span>}</div>
                                    </div>
                                    <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
                                        <Badge label={c.caseType} color={TYPE_COLOR[c.caseType]||"#8A8377"}/>
                                        <Badge label={c.status} color={STATUS_COLOR[c.status]||"#8A8377"}/>
                                    </div>
                                </div>
                                <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:6,fontSize:12}}>
                                    {nh && <span style={{color:daysUntil(nh.date)<=7?"var(--yellow)":"var(--text3)"}}>🗓 {nh.date}</span>}
                                    {pt>0 && <span style={{background:"var(--warning-wash)",color:"var(--warning)",borderRadius:10,padding:"1px 8px",fontWeight:700}}>✅ {pt}項</span>}
                                </div>
                                <div style={{display:"flex",gap:14,marginTop:8,fontSize:12}}>
                                    <div><div style={{color:"var(--text4)",fontSize:10}}>應收</div><div style={{color:"var(--gold)",fontWeight:700}}>{c.totalFee?Number(c.totalFee).toLocaleString():"—"}</div></div>
                                    <div><div style={{color:"var(--text4)",fontSize:10}}>已收</div><div style={{color:"var(--green)",fontWeight:700}}>{getReceived(c)?getReceived(c).toLocaleString():"—"}</div></div>
                                    <div><div style={{color:"var(--text4)",fontSize:10}}>未收</div><div style={{color:getUnpaid(c)>0?"var(--red)":"var(--text3)",fontWeight:700}}>{getUnpaid(c)?getUnpaid(c).toLocaleString():"—"}</div></div>
                                    <div><div style={{color:"var(--text4)",fontSize:10}}>代墊</div><div style={{color:"var(--purple)",fontWeight:700}}>{c.disbursements?Number(c.disbursements).toLocaleString():"—"}</div></div>
                                </div>
                            </div>
                        );
                    })}
                </div>}

                {/* Desktop table */}
                {listTab==="list" && <div className="tbl-wrap">
                    <table>
                        <thead><tr>
                            <th>案件編號</th><th>當事人</th><th>對造</th><th>繫屬機關</th><th>類型</th><th>狀態</th>
                            <th style={{textAlign:"right"}}>已收(元)</th><th style={{textAlign:"right"}}>未收(元)</th><th style={{textAlign:"right"}}>代墊(元)</th>
                            <th>最近開庭</th><th>待辦</th><th></th>
                        </tr></thead>
                        <tbody>
                            {sortedFiltered.length===0 && <tr><td colSpan={12} style={{textAlign:"center",padding:40,color:"var(--text3)"}}>查無案件</td></tr>}
                            {sortedFiltered.map(c=>{
                                const nh=(c.hearings||[]).filter(h=>daysUntil(h.date)>=0).sort((a,b)=>a.date.localeCompare(b.date))[0];
                                const pt=(c.todos||[]).filter(t=>!t.done).length;
                                return(
                                    <tr key={c.id} className="trow" onClick={()=>openDetail(c.id)}>
                                        <td><span style={{color:"var(--gold)",fontWeight:700,fontFamily:"monospace",fontSize:11}}>{c.firmCaseNo}</span></td>
                                        <td><span style={{fontWeight:700,color:"var(--text)"}}>{c.clientName}</span></td>
                                        <td style={{color:"var(--text3)",fontSize:11}}>{c.opposingParty||"—"}</td>
                                        <td style={{color:"var(--text3)",fontSize:11}}>{c.currentAgency||"—"}</td>
                                        <td><Badge label={c.caseType} color={TYPE_COLOR[c.caseType]||"#8A8377"}/></td>
                                        <td><Badge label={c.status} color={STATUS_COLOR[c.status]||"#8A8377"}/></td>
                                        <td style={{textAlign:"right",color:"var(--green)"}}>{getReceived(c)?getReceived(c).toLocaleString():"—"}</td>
                                        <td style={{textAlign:"right",color:getUnpaid(c)>0?"var(--red)":"var(--text3)"}}>{getUnpaid(c)?getUnpaid(c).toLocaleString():"—"}</td>
                                        <td style={{textAlign:"right",color:"var(--purple)"}}>{c.disbursements?Number(c.disbursements).toLocaleString():"—"}</td>
                                        <td style={{color:nh&&daysUntil(nh.date)<=7?"var(--yellow)":"var(--text3)",fontSize:11}}>{nh?nh.date:"—"}</td>
                                        <td>{pt>0?<span style={{background:"var(--warning-wash)",color:"var(--warning)",borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700}}>{pt}</span>:"—"}</td>
                                        <td onClick={e=>e.stopPropagation()}>
                                            <button className="btn btn-outline btn-sm" style={{fontSize:11}} onClick={()=>openEdit(c)}>編輯</button>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>}
            </div>

            <div className="bnav">
                <button className="bnav-btn active"><span className="bnav-icon">📋</span>案件</button>
                <button className="bnav-btn" onClick={openAdd}><span className="bnav-icon">➕</span>新增</button>
                <button className="bnav-btn" onClick={()=>setView("tools")}><span className="bnav-icon">🔧</span>工具</button>
                <button className="bnav-btn" onClick={()=>setView("contacts")}><span className="bnav-icon">👥</span>通訊錄</button>
                <button className="bnav-btn" onClick={()=>setView("stats")}><span className="bnav-icon">📊</span>統計</button>
            </div>
        </div>
    );

    // ══ DETAIL VIEW ══
    if(view==="detail"&&selected) return(
        <div className="app">
            <div className="header">
                <button className="btn btn-outline btn-sm" onClick={()=>setView("list")}>← 返回</button>
                <div style={{fontWeight:700,color:"var(--text)",fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,textAlign:"center"}}>{selected.clientName}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button className="btn btn-outline btn-sm no-print" onClick={()=>copyCase(selected)}>📎 複製上訴</button>
                    <button className="btn btn-outline btn-sm no-print" onClick={printCase}>🖨 列印</button>
                    <button className="btn btn-outline btn-sm no-print" onClick={()=>openEdit(selected)}>✏️ 編輯</button>
                    <button className="btn btn-danger btn-sm no-print" onClick={()=>setDeleteConfirm(true)}>🗑</button>
                </div>
            </div>
            {/* Tab switcher */}
            <div style={{display:"flex",gap:0,padding:"0 16px",background:"var(--bg2)",borderBottom:"1px solid var(--border)"}}>
                {[["info","📋 案件資訊"],["timeline","🕐 時間軸"],["notes","📓 案件筆記"],["ai","🤖 AI 助理"]].map(([t,l])=>(
                    <button key={t} onClick={()=>setDetailTab(t)} style={{
                        padding:"10px 18px",border:"none",background:"transparent",
                        color:detailTab===t?"var(--gold)":"var(--text3)",
                        fontWeight:detailTab===t?700:400,fontSize:13,cursor:"pointer",
                        borderBottom:detailTab===t?"2px solid var(--gold)":"2px solid transparent",
                        fontFamily:"inherit",transition:"all .2s",
                    }}>{l}</button>
                ))}
            </div>

            {deleteConfirm && (
                <div className="overlay">
                    <div className="dialog">
                        <div style={{fontWeight:700,fontSize:16,marginBottom:10}}>確認刪除案件？</div>
                        <div style={{color:"var(--text2)",marginBottom:20}}>「{selected.clientName}」將被永久刪除，無法復原。</div>
                        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                            <button className="btn btn-outline btn-sm" onClick={()=>setDeleteConfirm(false)}>取消</button>
                            <button className="btn btn-sm" style={{background:"var(--red)",color:"#fff"}} onClick={deleteCase}>確認刪除</button>
                        </div>
                    </div>
                </div>
            )}

            <div className="content">
                {/* Print title */}
                <div className="print-title">⚖ 律師案件管理系統 — 案件報告<br/><span style={{fontSize:13,fontWeight:400}}>{selected.clientName} · {selected.firmCaseNo} · 列印日期：{today()}</span></div>

                {/* Badge row */}
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
                    <Badge label={selected.caseType} color={TYPE_COLOR[selected.caseType]||"#8A8377"}/>
                    <Badge label={selected.status} color={STATUS_COLOR[selected.status]||"#8A8377"}/>
                    <Badge label={selected.instance} color="#8A8377"/>
                    {(selected.tags||[]).map(tag=>{
                        const t=allTags.find(x=>x.name===tag);
                        return t?<Badge key={tag} label={tag} color={t.color}/>:null;
                    })}
                </div>
                {/* Tag toggle row */}
                {allTags.length>0 && (
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
                        <span style={{fontSize:10,color:"var(--text4)",fontWeight:700,letterSpacing:".06em",textTransform:"uppercase"}}>標籤：</span>
                        {allTags.map(t=>{
                            const active=(selected.tags||[]).includes(t.name);
                            return(
                                <button key={t.id} className="tag-pill" onClick={()=>toggleCaseTag(selected,t.name)}
                                    style={{background:active?t.color:t.color+"22",color:active?"#fff":t.color,border:`1px solid ${t.color}44`}}>
                                    {active?"✓ ":""}{t.name}
                                </button>
                            );
                        })}
                    </div>
                )}

                {/* ── TIMELINE TAB ── */}
                {detailTab==="timeline" && (()=>{
                    // Build timeline events
                    const events = [];
                    if(selected.retainerDate) events.push({date:selected.retainerDate,type:"milestone",icon:"⚖",label:"案件委任",detail:`委任律師 ${selected.attorney||""}`,color:"var(--gold)"});
                    (selected.hearings||[]).forEach(h=>{
                        const d=daysUntil(h.date);
                        events.push({date:h.date,time:h.time,type:d<0?"past":d===0?"today":"future",icon:"🏛",label:`${h.agency||"開庭"} ${h.note?`· ${h.note}`:""}`,detail:`${h.courtroom||""} ${h.time||""}`.trim(),color:d<0?"var(--text4)":d===0?"var(--red)":d<=7?"var(--yellow)":"var(--gold)"});
                    });
                    (selected.todos||[]).forEach(t=>{
                        if(t.due) events.push({date:t.due,type:"todo",done:t.done,icon:t.done?"✓":"○",label:t.text,detail:t.done?"已完成":"待辦",color:t.done?"var(--green)":"var(--purple)"});
                    });
                    (selected.filings||[]).forEach(f=>{
                        if(f.date) events.push({date:f.date,type:"filing",tag:"遞狀",icon:"📄",label:f.type,detail:f.summary,color:"var(--navy)"});
                    });
                    (selected.payments||[]).forEach(p=>{
                        if(p.date) events.push({date:p.date,type:"payment",tag:"收款",icon:"💰",label:`收款 ${Number(p.amount||0).toLocaleString()} 元`,detail:`${p.method||""}${p.note?` · ${p.note}`:""}`.trim(),color:"var(--positive)"});
                    });
                    events.sort((a,b)=>a.date.localeCompare(b.date));
                    return(<>
                        <div style={{background:"var(--paper-raised)",border:"1px solid var(--rule)",borderRadius:3,padding:"12px 14px",marginBottom:14}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
                                <div style={{fontWeight:700,color:"var(--seal)",fontSize:13}}>🔗 當事人時間軸連結</div>
                                {!selected.shareToken
                                    ? <button className="btn btn-gold btn-sm" onClick={()=>genCaseShare(selected)}>產生連結</button>
                                    : <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                                        <button className="btn btn-outline btn-sm" onClick={()=>copyShareUrl(selected.shareToken)}>📋 複製</button>
                                        <button className="btn btn-outline btn-sm" onClick={()=>refreshCaseShare(selected)}>🔄 更新內容</button>
                                        <button className="btn btn-danger btn-sm" onClick={()=>revokeCaseShare(selected)}>停用</button>
                                      </div>}
                            </div>
                            {selected.shareToken
                                ? <div style={{fontSize:11,color:"var(--text3)",wordBreak:"break-all",background:"var(--paper-sunken)",border:"1px solid var(--rule)",borderRadius:2,padding:"6px 8px",marginTop:8}}>
                                    {shareUrl(selected.shareToken)}
                                    <div style={{marginTop:4,color:"var(--text4)"}}>當事人開啟即可檢視本案的開庭、遞狀、期限等辦案進度（唯讀，不含費用與內部筆記）。編輯案件存檔後會自動更新。</div>
                                  </div>
                                : <div style={{fontSize:11,color:"var(--text4)",marginTop:6}}>產生一組專屬連結傳給當事人，讓其檢視本案的辦案時間軸（開庭、遞狀、期限；不含費用與內部筆記）。</div>}
                        </div>
                        <div className="tl-wrap">
                            {events.length===0 && <div className="empty"><div className="ico">🕐</div>尚無時間軸事件</div>}
                            {events.map((ev,i)=>{
                                const dotClass = ev.type==="todo"?(ev.done?"tl-dot todo done":"tl-dot todo"):ev.type==="milestone"?"tl-dot milestone":`tl-dot ${ev.type}`;
                                const bodyClass = `tl-body ${ev.type==="todo"?"":ev.type}`;
                                const d = daysUntil(ev.date);
                                return(
                                    <div key={i} className="tl-item">
                                        <div className={dotClass}/>
                                        <div className="tl-date">{ev.date}{ev.time&&` ${ev.time}`}</div>
                                        <div className={bodyClass}>
                                            <div className="tl-tag" style={{color:ev.color}}>{ev.icon} {ev.tag || (ev.type==="hearing"||ev.type==="past"||ev.type==="future"||ev.type==="today"?"開庭":ev.type==="todo"?"待辦":ev.type==="milestone"?"里程碑":"")}</div>
                                            <div style={{color:"var(--text)",fontWeight:600,fontSize:14}}>{ev.label}</div>
                                            {ev.detail && <div style={{color:"var(--text3)",fontSize:12,marginTop:3}}>{ev.detail}</div>}
                                            {ev.type==="future"&&<div style={{color:"var(--gold)",fontSize:11,marginTop:4}}>📅 {d===0?"今天":d===1?"明天":`${d}天後`}</div>}
                                            {ev.type==="today"&&<div style={{color:"var(--red)",fontSize:11,fontWeight:700,marginTop:4}}>🔴 今天開庭！</div>}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </>);
                })()}

                {/* ── INFO TAB ── */}

                {/* ── NOTES TAB ── */}
                {detailTab==="notes" && (()=>{
                    const allNotes=(selected.notes_list||[]);
                    const sorted=[...allNotes.filter(n=>n.pinned),...allNotes.filter(n=>!n.pinned)];
                    const tagMap=Object.fromEntries(NOTE_TAGS.map(t=>[t.name,t.color]));
                    return(
                        <div className="notes-wrap">
                            {/* New note editor */}
                            <div className="note-editor">
                                <textarea
                                    placeholder="記錄案件相關事項、法律意見、當事人指示、庭後心得…&#10;&#10;按 Ctrl+Enter 快速儲存"
                                    value={noteInput}
                                    onChange={e=>setNoteInput(e.target.value)}
                                    onKeyDown={e=>{ if(e.key==="Enter"&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); addNote(selected); } }}
                                    autoFocus={false}

                                Claude 思考中…
                            </div>}
                        </div>

                        {/* Input */}
                        {aiApiKey&&!aiKeyEditing&&(
                            <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                                <textarea
                                    style={{flex:1,background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit",lineHeight:1.6,resize:"none",minHeight:60,maxHeight:160}}
                                    placeholder="輸入問題，例如：本案勝訴關鍵是什麼？"
                                    value={aiInput} onChange={e=>setAiInput(e.target.value)}
                                    onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAiMessage(selected);}}}
                                    rows={2}/>
                                <button
                                    style={{padding:"10px 16px",borderRadius:10,fontWeight:700,cursor:"pointer",border:"none",background:aiLoading?"var(--bg4)":"var(--seal)",color:aiLoading?"var(--text3)":"#fff",fontSize:13,fontFamily:"inherit",flexShrink:0,alignSelf:"flex-end"}}
                                    onClick={()=>sendAiMessage(selected)} disabled={aiLoading||!aiInput.trim()}>
                                    {aiLoading?"…":"發送"}
                                </button>
                            </div>
                        )}
                        <div style={{fontSize:11,color:"var(--text4)",marginTop:8,textAlign:"center"}}>Enter 送出 · Shift+Enter 換行 · AI 回答僅供參考，不構成法律意見</div>
                    </div>
                )}
            </div>

            <div className="bnav">
                <button className="bnav-btn" onClick={()=>setView("list")}><span className="bnav-icon">📋</span>案件</button>
                <button className="bnav-btn" onClick={openAdd}><span className="bnav-icon">➕</span>新增</button>
                <button className="bnav-btn" onClick={()=>setView("tools")}><span className="bnav-icon">🔧</span>工具</button>
                <button className="bnav-btn" onClick={()=>setView("contacts")}><span className="bnav-icon">👥</span>通訊錄</button>
                <button className="bnav-btn" onClick={()=>setView("stats")}><span className="bnav-icon">📊</span>統計</button>
            </div>
        </div>
    );

    // ══ STATS VIEW ══
    if(view==="stats"){
        // ── Build year/month options from retainerDate ──
        const allYears=[...new Set(cases.map(c=>(c.retainerDate||"").slice(0,4)).filter(Boolean))].sort((a,b)=>b-a);
        const months=["01","02","03","04","05","06","07","08","09","10","11","12"];

        // ── Filter cases by year/month (based on retainerDate) ──
        const filteredCases=cases.filter(c=>{
            const d=c.retainerDate||"";
            if(statsYear!=="全部" && !d.startsWith(statsYear)) return false;
            if(statsMonth!=="全部" && d.slice(5,7)!==statsMonth) return false;
            return true;
        });

        // ── Filter payments by year/month (based on payment date) ──
        const allPayments=[];
        cases.forEach(c=>{
            (c.payments||[]).forEach(p=>{
                const d=p.date||"";
                const yOk=statsYear==="全部"||d.startsWith(statsYear);
                const mOk=statsMonth==="全部"||d.slice(5,7)===statsMonth;
                if(yOk&&mOk) allPayments.push({...p,caseId:c.id,clientName:c.clientName,firmCaseNo:c.firmCaseNo});
            });
        });

        // ── Aggregates ──
        const byType={}, byStatus={};
        CASE_TYPES.forEach(t=>byType[t]=0); CASE_STATUS.forEach(s=>byStatus[s]=0);
        filteredCases.forEach(c=>{
            byType[c.caseType]=(byType[c.caseType]||0)+1;
            byStatus[c.status]=(byStatus[c.status]||0)+1;
        });
        const totalFee=filteredCases.reduce((s,c)=>s+Number(c.totalFee||0),0);
        const unpaid=filteredCases.reduce((s,c)=>s+getUnpaid(c),0);
        const disb=filteredCases.reduce((s,c)=>s+Number(c.disbursements||0),0);
        // Received = sum of filtered payments
        const recv=allPayments.reduce((s,p)=>s+Number(p.amount||0),0);
        const pct=totalFee>0?Math.min(100,(recv/totalFee*100)).toFixed(1):0;

        // ── Monthly breakdown (for year view) ──
        const monthlyData=statsYear!=="全部"?months.map(m=>{
            const mCases=cases.filter(c=>(c.retainerDate||"").startsWith(statsYear+"-"+m));
            const mPayments=cases.flatMap(c=>(c.payments||[]).filter(p=>(p.date||"").startsWith(statsYear+"-"+m)));
            return {
                month:statsYear+"/"+m,
                caseCount:mCases.length,
                recv:mPayments.reduce((s,p)=>s+Number(p.amount||0),0),
                totalFee:mCases.reduce((s,c)=>s+Number(c.totalFee||0),0),
            };
        }):[];
        const maxRecv=monthlyData.length?Math.max(...monthlyData.map(d=>d.recv),1):1;

        const periodLabel=statsYear==="全部"?"全部期間":statsMonth==="全部"?`${statsYear}年`:
            `${statsYear}年${parseInt(statsMonth)}月`;

        return(
            <div className="app">
                <div className="header">
                    <button className="btn btn-outline btn-sm" onClick={()=>setView("list")}>← 返回</button>
                    <div className="header-title">📊 財務統計</div>
                    <div/>
                </div>
                <div className="content">
                    {/* ── Period selector ── */}
                    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
                        <select className="fsel" value={statsYear} onChange={e=>{setStatsYear(e.target.value);setStatsMonth("全部");}}>
                            <option value="全部">全部年份</option>
                            {allYears.map(y=><option key={y} value={y}>{y}年</option>)}
                        </select>
                        {statsYear!=="全部" && (
                            <select className="fsel" value={statsMonth} onChange={e=>setStatsMonth(e.target.value)}>
                                <option value="全部">全年</option>
                                {months.map(m=><option key={m} value={m}>{parseInt(m)}月</option>)}
                            </select>
                        )}
                        <div style={{
                            background:"var(--seal-wash)",border:"1px solid var(--rule-strong)",
                            borderRadius:8,padding:"6px 14px",fontSize:13,color:"var(--gold)",fontWeight:700,
                        }}>📅 {periodLabel}</div>
                        {(statsYear!=="全部"||statsMonth!=="全部") && (
                            <button className="btn btn-outline btn-sm" onClick={()=>{setStatsYear("全部");setStatsMonth("全部");}}>✕ 清除篩選</button>
                        )}
                    </div>

                    <div className="detail-grid">
                        {/* ── Summary ── */}
                        <div className="card">
                            <div className="card-title">💰 {periodLabel} 律師費總覽</div>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                                {[
                                    ["委任案件數",filteredCases.length+" 件","var(--gold)"],
                                    ["實收款項",recv.toLocaleString()+" 元","var(--green)"],
                                    ["應收律師費",totalFee.toLocaleString()+" 元","var(--text2)"],
                                    ["未收款",unpaid.toLocaleString()+" 元","var(--red)"],
                                    ["代墊款項",disb.toLocaleString()+" 元","var(--purple)"],
                                    ["收款筆數",allPayments.length+" 筆","var(--blue)"],
                                ].map(([l,v,c])=>(
                                    <div key={l} style={{background:"var(--bg)",borderRadius:8,padding:"10px 12px",border:"1px solid var(--border)"}}>
                                        <div style={{fontSize:10,color:"var(--text4)",marginBottom:4,letterSpacing:".04em"}}>{l}</div>
                                        <div style={{fontSize:14,fontWeight:800,color:c}}>{v}</div>
                                    </div>
                                ))}
                            </div>
                            {totalFee>0 && <>
                                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text3)",marginBottom:4}}>
                                    <span>收款進度</span><span>{pct}%</span>
                                </div>
                                <div style={{background:"var(--bg4)",borderRadius:6,height:10,overflow:"hidden"}}>
                                    <div style={{background:"var(--green)",height:"100%",width:`${pct}%`,borderRadius:6,transition:"width .6s"}}/>
                                </div>
                            </>}
                        </div>

                        {/* ── Monthly bar chart (year view only) ── */}
                        {statsYear!=="全部" && statsMonth==="全部" && (
                            <div className="card" style={{gridColumn:"span 1"}}>
                                <div className="card-title">📈 {statsYear}年 逐月收款</div>
                                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                                    {monthlyData.filter(d=>d.recv>0||d.caseCount>0).map(d=>(
                                        <div key={d.month} style={{display:"flex",alignItems:"center",gap:8}}>
                                            <div style={{fontSize:11,color:"var(--text3)",width:32,flexShrink:0}}>{d.month.slice(5)}月</div>
                                            <div style={{flex:1,background:"var(--bg4)",borderRadius:4,height:18,overflow:"hidden",position:"relative"}}>
                                                <div style={{
                                                    background:"var(--positive)",
                                                    height:"100%",borderRadius:4,
                                                    width:`${(d.recv/maxRecv*100).toFixed(1)}%`,
                                                    transition:"width .5s",
                                                    minWidth:d.recv>0?"4px":"0",
                                                }}/>
                                            </div>
                                            <div style={{fontSize:11,color:"var(--green)",fontWeight:700,width:90,textAlign:"right",flexShrink:0}}>
                                                {d.recv>0?d.recv.toLocaleString()+" 元":"—"}
                                            </div>
                                            {d.caseCount>0 && <div style={{fontSize:10,color:"var(--text4)",flexShrink:0}}>{d.caseCount}件</div>}
                                        </div>
                                    ))}
                                    {monthlyData.every(d=>d.recv===0&&d.caseCount===0) && (
                                        <div style={{color:"var(--text4)",fontSize:13,padding:"12px 0"}}>本年度尚無資料</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ── Payment records in period ── */}
                        {allPayments.length>0 && (
                            <div className="card">
                                <div className="card-title">💳 {periodLabel} 收款記錄（{allPayments.length}筆）</div>
                                <div style={{maxHeight:280,overflowY:"auto"}}>
                                    {allPayments.sort((a,b)=>b.date.localeCompare(a.date)).map((p,i)=>(
                                        <div key={i} className="pay-record" style={{cursor:"pointer"}} onClick={()=>openDetail(p.caseId)}>
                                            <div style={{flex:1}}>
                                                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                                                    <span style={{fontWeight:800,color:"var(--green)"}}>{Number(p.amount).toLocaleString()} 元</span>
                                                    <span className={`pay-badge ${METHOD_CLASS[p.method]||"pay-method-other"}`}>{p.method}</span>
                                                </div>
                                                <div style={{fontSize:11,color:"var(--text3)"}}>{p.date} · {p.clientName} {p.note&&`· ${p.note}`}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ── Case type distribution ── */}
                        <div className="card">
                            <div className="card-title">📊 案件類型（委任）</div>
                            {CASE_TYPES.filter(t=>byType[t]>0).map(t=>(
                                <div key={t} className="info-row">
                                    <div><Badge label={t} color={TYPE_COLOR[t]||"#8A8377"}/></div>
                                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                                        <div style={{background:"var(--bg4)",borderRadius:4,height:6,width:80,overflow:"hidden"}}>
                                            <div style={{background:TYPE_COLOR[t]||"#8A8377",height:"100%",width:`${filteredCases.length?((byType[t]/filteredCases.length)*100).toFixed(0):0}%`}}/>
                                        </div>
                                        <div style={{color:"var(--text)",fontWeight:700,minWidth:28,textAlign:"right"}}>{byType[t]}</div>
                                    </div>
                                </div>
                            ))}
                            {Object.values(byType).every(v=>v===0) && <div style={{color:"var(--text4)",fontSize:13,padding:"12px 0"}}>此期間無案件</div>}
                        </div>

                        {/* ── Case status ── */}
                        <div className="card">
                            <div className="card-title">📈 案件狀態</div>
                            {CASE_STATUS.filter(s=>byStatus[s]>0).map(s=>(
                                <div key={s} className="info-row">
                                    <div><Badge label={s} color={STATUS_COLOR[s]||"#8A8377"}/></div>
                                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                                        <div style={{background:"var(--bg4)",borderRadius:4,height:6,width:80,overflow:"hidden"}}>
                                            <div style={{background:STATUS_COLOR[s]||"#8A8377",height:"100%",width:`${filteredCases.length?((byStatus[s]/filteredCases.length)*100).toFixed(0):0}%`}}/>
                                        </div>
                                        <div style={{color:"var(--text)",fontWeight:700,minWidth:28,textAlign:"right"}}>{byStatus[s]}</div>
                                    </div>
                                </div>
                            ))}
                            {Object.values(byStatus).every(v=>v===0) && <div style={{color:"var(--text4)",fontSize:13,padding:"12px 0"}}>此期間無案件</div>}
                        </div>

                        {/* ── Reminders (always full scope) ── */}
                        <div className="card">
                            <div className="card-title">⚠️ 全部案件提醒</div>
                            {[
                                ["未完成待辦",cases.reduce((s,c)=>s+(c.todos||[]).filter(t=>!t.done).length,0)+" 項","var(--red)"],
                                ["本週開庭",upcoming.filter(h=>daysUntil(h.date)<=7).length+" 場","var(--yellow)"],
                                ["本月開庭",upcoming.length+" 場","var(--gold)"],
                                ["未收款案件數",cases.filter(c=>getUnpaid(c)>0).length+" 件","var(--red)"],
                            ].map(([l,v,c])=>(
                                <div key={l} className="info-row">
                                    <div className="info-lbl">{l}</div>
                                    <div className="info-val" style={{color:c,fontWeight:700}}>{v}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
                <div className="bnav">
                    <button className="bnav-btn" onClick={()=>setView("list")}><span className="bnav-icon">📋</span>案件</button>
                    <button className="bnav-btn" onClick={openAdd}><span className="bnav-icon">➕</span>新增</button>
                    <button className="bnav-btn" onClick={()=>setView("tools")}><span className="bnav-icon">🔧</span>工具</button>
                    <button className="bnav-btn" onClick={()=>setView("contacts")}><span className="bnav-icon">👥</span>通訊錄</button>
                    <button className="bnav-btn active"><span className="bnav-icon">📊</span>統計</button>
                </div>
            </div>
        );
    }

    // ══ TOOLS VIEW ══
    if(view==="tools") return(
        <div className="app">
            <div className="header">
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <button className="btn btn-outline btn-sm" onClick={()=>setView("list")}>← 返回</button>
                    <div className="header-title">🔧 常用工具</div>
                </div>
                <button className="btn btn-gold" onClick={openAddTool}>＋ 新增工具</button>
            </div>

            {/* Tool add/edit modal */}
            {toolModal && (
                <div className="tool-modal-overlay" onClick={e=>e.target===e.currentTarget&&setToolModal(false)}>
                    <div className="tool-modal">
                        <div style={{fontWeight:700,fontSize:16,color:"var(--text)",marginBottom:18}}>
                            {editingToolId?"✏️ 編輯工具":"➕ 新增工具"}
                        </div>

                        {/* Emoji picker */}
                        <div className="fg" style={{marginBottom:14}}>
                            <label className="fl">圖示（Emoji）</label>
                            <div style={{display:"flex",gap:8,alignItems:"center"}}>
                                <span style={{fontSize:36}}>{toolForm.emoji}</span>
                                <input className="fi" style={{flex:1}} value={toolForm.emoji}
                                    onChange={e=>setToolForm(f=>({...f,emoji:e.target.value}))}
                                    placeholder="輸入任何 emoji，例如 🤖 ⚖ 📋"/>
                            </div>
                        </div>

                        {/* Name */}
                        <div className="fg" style={{marginBottom:14}}>
                            <label className="fl">工具名稱</label>
                            <input className="fi" value={toolForm.name}
                                onChange={e=>setToolForm(f=>({...f,name:e.target.value}))}
                                placeholder="例如：ChatGPT、司法院查詢、我的試算表"/>
                        </div>

                        {/* URL */}
                        <div className="fg" style={{marginBottom:14}}>
                            <label className="fl">網址連結</label>
                            <input className="fi" type="url" value={toolForm.url}
                                onChange={e=>setToolForm(f=>({...f,url:e.target.value}))}
                                placeholder="https://..."/>
                        </div>

                        {/* Desc */}
                        <div className="fg" style={{marginBottom:14}}>
                            <label className="fl">說明（選填）</label>
                            <input className="fi" value={toolForm.desc}
                                onChange={e=>setToolForm(f=>({...f,desc:e.target.value}))}
                                placeholder="簡短描述用途"/>
                        </div>

                        {/* Color */}
                        <div className="fg" style={{marginBottom:22}}>
                            <label className="fl">主題色</label>
                            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
                                {['#9E2A24', '#A6741C', '#3A6B4F', '#2A3D4F', '#99604F', '#3E6B6B', '#6B6250', '#8A8377'].map(c=>(
                                    <div key={c} className={"color-dot"+(toolForm.color===c?" selected":"")}
                                        style={{background:c}} onClick={()=>setToolForm(f=>({...f,color:c}))}/>
                                ))}
                            </div>
                        </div>

                        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                            <button className="btn btn-outline btn-sm" onClick={()=>setToolModal(false)}>取消</button>
                            {editingToolId && <button className="btn btn-danger btn-sm" onClick={()=>{deleteTool(editingToolId);setToolModal(false);}}>刪除</button>}
                            <button className="btn btn-gold" onClick={saveTool}>💾 儲存</button>
                        </div>
                    </div>
                </div>
            )}

            <div className="content">
                {tools.length===0 && (
                    <div className="empty" style={{marginBottom:20}}>
                        <div className="ico">🔧</div>
                        <div>尚未新增任何工具</div>
                        <div style={{fontSize:12,color:"var(--text4)",marginTop:6}}>點右上角「＋ 新增工具」開始建立您的工具箱</div>
                    </div>
                )}
                <div className="tool-grid">
                    {tools.map(t=>(
                        <div key={t.id} style={{position:"relative"}}>
                            <a className="tool-card" href={t.url} target="_blank" rel="noreferrer"
                                style={{borderTop:`3px solid ${t.color||"var(--gold)"}`,paddingTop:28}}>
                                <div className="tool-emoji">{t.emoji||"🔗"}</div>
                                <div className="tool-name">{t.name}</div>
                                {t.desc && <div className="tool-desc">{t.desc}</div>}
                            </a>
                            <button className="tool-del" onClick={e=>{e.preventDefault();e.stopPropagation();openEditTool(t);}}>✏️ 編輯</button>
                        </div>
                    ))}
                    <div className="tool-add-card" onClick={openAddTool}>
                        <div style={{fontSize:32}}>＋</div>
                        <div style={{fontSize:12,fontWeight:600}}>新增工具</div>
                    </div>
                </div>

                {/* Suggested tools */}
                {tools.length===0 && (
                    <div>
                        <div style={{fontSize:11,color:"var(--text3)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:12}}>推薦常用法律工具</div>
                        <div className="tool-grid">
                            {[
                                {emoji:"⚖",name:"司法院裁判書",url:"https://judgment.judicial.gov.tw",desc:"查詢判決書",color:"#9E2A24"},
                                {emoji:"📋",name:"法院開庭查詢",url:"https://www.judicial.gov.tw/tw/cp-1363-78984-5a3fd-1.html",desc:"查詢開庭進度",color:"#2A3D4F"},
                                {emoji:"🔍",name:"法源法律網",url:"https://www.lawbank.com.tw",desc:"法規與判決查詢",color:"#3E6B6B"},
                                {emoji:"🤖",name:"Claude AI",url:"https://claude.ai",desc:"AI法律助理",color:"#9E2A24"},
                                {emoji:"📊",name:"Google 試算表",url:"https://sheets.google.com",desc:"帳務計算",color:"#3A6B4F"},
                                {emoji:"📁",name:"Google Drive",url:"https://drive.google.com",desc:"雲端卷證",color:"#A6741C"},
                            ].map((t,i)=>(
                                <div key={i} style={{position:"relative"}}>
                                    <a className="tool-card" href={t.url} target="_blank" rel="noreferrer"
                                        style={{borderTop:`3px solid ${t.color}`,opacity:.7}}>
                                        <div className="tool-emoji">{t.emoji}</div>
                                        <div className="tool-name">{t.name}</div>
                                        <div className="tool-desc">{t.desc}</div>
                                    </a>
                                    <button style={{position:"absolute",bottom:8,right:8,background:"var(--bg4)",border:"none",borderRadius:6,padding:"3px 8px",fontSize:10,color:"var(--text3)",cursor:"pointer",fontFamily:"inherit"}}
                                        onClick={()=>{setToolForm({emoji:t.emoji,name:t.name,url:t.url,desc:t.desc,color:t.color});setEditingToolId(null);setToolModal(true);}}>
                                        ＋ 加入
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
            <div className="bnav">
                <button className="bnav-btn" onClick={()=>setView("list")}><span className="bnav-icon">📋</span>案件</button>
                <button className="bnav-btn" onClick={openAdd}><span className="bnav-icon">➕</span>新增</button>
                <button className="bnav-btn active"><span className="bnav-icon">🔧</span>工具</button>
                <button className="bnav-btn" onClick={()=>setView("contacts")}><span className="bnav-icon">👥</span>通訊錄</button>
                <button className="bnav-btn" onClick={()=>setView("stats")}><span className="bnav-icon">📊</span>統計</button>
            </div>
        </div>
    );

    // ══ CONTACTS VIEW ══
    if(view==="contacts") return(
        <div className="app">
            <div className="header">
                <button className="btn btn-outline btn-sm" onClick={()=>setView("list")}>← 返回</button>
                <div className="header-title">👥 當事人通訊錄</div>
                <div/>
            </div>
            <div className="content">
                {/* Search */}
                <div className="filter-row" style={{marginBottom:16}}>
                    <input className="search-inp" placeholder="🔍 搜尋姓名、電話…" value={search} onChange={e=>setSearch(e.target.value)}/>
                </div>
                {(()=>{
                    // Group by each party (name + phone) across all cases（支援複數當事人）
                    const map = {};
                    cases.forEach(c=>{
                        const parties=(Array.isArray(c.clientParties)&&c.clientParties.length)?c.clientParties:[{name:c.clientName,phone:c.phone}];
                        parties.forEach(p=>{
                            const nm=(p.name||"").trim(); if(!nm) return;
                            const key = nm + "|" + (p.phone||"");
                            if(!map[key]) map[key]={name:nm, phone:p.phone||"", cases:[]};
                            map[key].cases.push(c);
                        });
                    });
                    const contacts = Object.values(map)
                        .filter(ct=>{
                            const q=search.toLowerCase();
                            return !q || ct.name.toLowerCase().includes(q) || ct.phone.includes(q);
                        })
                        .sort((a,b)=>a.name.localeCompare(b.name,"zh-TW"));
                    if(contacts.length===0) return <div className="empty"><div className="ico">👤</div>查無當事人</div>;
                    return contacts.map((ct,i)=>(
                        <div key={i} className="contact-card">
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                                <div>
                                    <div className="contact-name">{ct.name}</div>
                                    {ct.phone
                                        ? <a className="contact-phone" href={`tel:${ct.phone}`}>📞 {ct.phone}</a>
                                        : <div style={{color:"var(--text4)",fontSize:13,marginTop:4}}>未填連絡電話</div>
                                    }
                                </div>
                                <div style={{textAlign:"right"}}>
                                    <div style={{fontSize:11,color:"var(--text4)"}}>案件數</div>
                                    <div style={{fontSize:22,fontWeight:800,color:"var(--gold)"}}>{ct.cases.length}</div>
                                </div>
                            </div>
                            <div className="contact-cases">
                                {ct.cases.map(c=>(
                                    <div key={c.id} className="contact-case-row"
                                        onClick={()=>{setSelectedId(c.id);setDetailTab("info");setView("detail");}}>
                                        <span style={{color:"var(--gold)",fontFamily:"monospace",fontSize:12,flexShrink:0}}>{c.firmCaseNo}</span>
                                        <span style={{flex:1,color:"var(--text2)",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.courtCaseNo||(c.courtCaseNos||[])[0]||""}</span>
                                        <Badge label={c.caseType} color={TYPE_COLOR[c.caseType]||"#8A8377"}/>
                                        <Badge label={c.status} color={STATUS_COLOR[c.status]||"#8A8377"}/>
                                    </div>
                                ))}
                            </div>
                            {/* Fee summary across all cases */}
                            {ct.cases.length > 1 && (()=>{
                                const totalRecv = ct.cases.reduce((s,c)=>s+Number(c.feeReceived||0),0);
                                const totalUnpaid = ct.cases.reduce((s,c)=>s+Number(c.feeUnpaid||0),0);
                                return(
                                    <div style={{display:"flex",gap:16,marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)",fontSize:12}}>
                                        <div><span style={{color:"var(--text4)"}}>已收合計 </span><span style={{color:"var(--green)",fontWeight:700}}>{totalRecv.toLocaleString()} 元</span></div>
                                        {totalUnpaid>0 && <div><span style={{color:"var(--text4)"}}>未收合計 </span><span style={{color:"var(--red)",fontWeight:700}}>{totalUnpaid.toLocaleString()} 元</span></div>}
                                    </div>
                                );
                            })()}
                        </div>
                    ));
                })()}
            </div>
            <div className="bnav">
                <button className="bnav-btn" onClick={()=>setView("list")}><span className="bnav-icon">📋</span>案件</button>
                <button className="bnav-btn" onClick={openAdd}><span className="bnav-icon">➕</span>新增</button>
                <button className="bnav-btn" onClick={()=>setView("tools")}><span className="bnav-icon">🔧</span>工具</button>
                <button className="bnav-btn active"><span className="bnav-icon">👥</span>通訊錄</button>
                <button className="bnav-btn" onClick={()=>setView("stats")}><span className="bnav-icon">📊</span>統計</button>
            </div>
        </div>
    );

    // ══ FORM VIEW ══
    const isEdit=!!editId;
    const F=formData;
    return(
        <div className="app">
            <div className="header">
                <button className="btn btn-outline btn-sm" onClick={()=>setView(isEdit?"detail":"list")}>← 取消</button>
                <div style={{fontWeight:700,fontSize:14}}>{isEdit?"編輯案件":"新增案件"}</div>
                <button className="btn btn-gold" onClick={saveCase}>☁️ 儲存</button>
            </div>
            <div className="form-wrap">

                {/* 基本識別 */}
                <div className="section-hdr">📁 案件識別資訊</div>
                <div className="form-grid">
                    {[["firmCaseNo","事務所案件編號","text","113-刑-001"],["retainerDate","委任日期","date",""],["attorney","承辦律師","text",""],["division","股別","text","刑一股"]].map(([k,l,t,p])=>(
                        <div key={k} className="fg">
                            <label className="fl">{l}</label>
                            <input className="fi" type={t} placeholder={p} value={F[k]||""} onChange={e=>sf(k,e.target.value)}/>
                        </div>
                    ))}
                    {[["caseType","案件類型",CASE_TYPES],["status","案件狀態",CASE_STATUS],["instance","審級",INSTANCES],["court","法院/檢察署",COURTS]].map(([k,l,opts])=>(
                        <div key={k} className="fg">
                            <label className="fl">{l}</label>
                            <select className="fi" value={F[k]||""} onChange={e=>{
                                sf(k,e.target.value);
                                if(k==="caseType"){
                                    sf("caseReason",""); // reset reason on type change
                                    // 新增案件：依類型自動產生下一個事務所案件編號（不覆蓋手動輸入的特殊編號）
                                    if(!editId && isAutoCaseNo(F.firmCaseNo)) sf("firmCaseNo",autoCaseNo(e.target.value));
                                }
                            }}>
                                {opts.map(o=><option key={o}>{o}</option>)}
                            </select>
                        </div>
                    ))}
                    {/* Case reason — datalist for flexible input + suggestions */}
                    <div className="fg" style={{gridColumn:"span 2"}}>
                        <label className="fl">案由</label>
                        <div style={{display:"flex",gap:8,flexDirection:"column"}}>
                            <input className="fi" list="reason-list" value={F.caseReason||""}
                                onChange={e=>sf("caseReason",e.target.value)}
                                placeholder="選擇常見案由或自由輸入…"/>
                            <datalist id="reason-list">
                                {(CASE_REASONS[F.caseType]||[]).map(r=><option key={r} value={r}/>)}
                            </datalist>
                            {/* Quick pick chips */}
                            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                                {(CASE_REASONS[F.caseType]||[]).slice(0,-1).map(r=>(
                                    <button key={r} type="button"
                                        onClick={()=>sf("caseReason",r)}
                                        style={{
                                            background:F.caseReason===r?"var(--gold)":"var(--bg4)",
                                            color:F.caseReason===r?"#000":"var(--text3)",
                                            border:`1px solid ${F.caseReason===r?"var(--gold)":"var(--border)"}`,
                                            borderRadius:20,padding:"3px 10px",fontSize:11,
                                            cursor:"pointer",fontFamily:"inherit",fontWeight:F.caseReason===r?700:400,
                                            transition:"all .15s",
                                        }}>{r}</button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>

                {/* 法院案號（多筆） */}
                <div className="section-hdr">
                    法院／地檢署案號
                    <button className="btn btn-outline btn-sm" onClick={addCaseNo}>＋ 新增案號</button>
                </div>
                {(F.courtCaseNos||[""]).map((no,i)=>(
                    <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
                        <input className="fi" style={{flex:1}} value={no} placeholder="113年度訴字第1234號" onChange={e=>updateCaseNo(i,e.target.value)}/>
                        {(F.courtCaseNos||[]).length>1 && <button className="btn btn-danger btn-icon" onClick={()=>removeCaseNo(i)}>✕</button>}
                    </div>
                ))}

                {/* 當事人 */}
                <div className="section-hdr">👤 當事人資訊</div>
                <div className="fg" style={{marginBottom:12}}>
                    <label className="fl" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span>當事人（姓名 · 連絡電話，可多位）</span>
                        <button className="btn btn-outline btn-sm" type="button" onClick={addClientParty}>＋ 新增當事人</button>
                    </label>
                    {(F.clientParties||[{name:"",phone:""}]).map((p,i)=>(
                        <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
                            <input className="fi" style={{flex:2}} placeholder="當事人姓名" value={p.name||""} onChange={e=>updateClientParty(i,"name",e.target.value)}/>
                            <input className="fi" style={{flex:2}} type="tel" placeholder="0912-345-678" value={p.phone||""} onChange={e=>updateClientParty(i,"phone",e.target.value)}/>
                            {(F.clientParties||[]).length>1 && <button className="btn btn-danger btn-icon" type="button" onClick={()=>removeClientParty(i)}>✕</button>}
                        </div>
                    ))}
                </div>
                <div className="fg" style={{marginBottom:12}}>
                    <label className="fl" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span>對造當事人（可多位）</span>
                        <button className="btn btn-outline btn-sm" type="button" onClick={addOpposing}>＋ 新增對造</button>
                    </label>
                    {(F.opposingParties||[""]).map((o,i)=>(
                        <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
                            <input className="fi" style={{flex:1}} placeholder="對造當事人姓名" value={o||""} onChange={e=>updateOpposing(i,e.target.value)}/>
                            {(F.opposingParties||[]).length>1 && <button className="btn btn-danger btn-icon" type="button" onClick={()=>removeOpposing(i)}>✕</button>}
                        </div>
                    ))}
                </div>
                <div className="fg" style={{marginBottom:12}}>
                    <label className="fl" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span>對造律師（可多位）</span>
                        <button className="btn btn-outline btn-sm" type="button" onClick={addOppCounsel}>＋ 新增對造律師</button>
                    </label>
                    {(F.opposingCounsel||[]).map((L,i)=>(
                        <div key={i} style={{border:"1px solid var(--border)",borderRadius:3,padding:10,marginBottom:8,display:"flex",flexDirection:"column",gap:6}}>
                            <div style={{display:"flex",gap:8}}>
                                <input className="fi" style={{flex:1}} placeholder="律師姓名" value={L.name||""} onChange={e=>updateOppCounsel(i,"name",e.target.value)}/>
                                <button className="btn btn-danger btn-icon" type="button" onClick={()=>removeOppCounsel(i)}>✕</button>
                            </div>
                            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                                <input className="fi" style={{flex:"1 1 140px"}} type="tel" placeholder="行動電話" value={L.mobile||""} onChange={e=>updateOppCounsel(i,"mobile",e.target.value)}/>
                                <input className="fi" style={{flex:"1 1 140px"}} type="tel" placeholder="市話" value={L.tel||""} onChange={e=>updateOppCounsel(i,"tel",e.target.value)}/>
                            </div>
                            <input className="fi" placeholder="事務所地址" value={L.office||""} onChange={e=>updateOppCounsel(i,"office",e.target.value)}/>
                        </div>
                    ))}
                    {(F.opposingCounsel||[]).length===0 && <div style={{fontSize:11,color:"var(--text4)",padding:"2px 2px 0"}}>可記錄對造律師姓名、行動電話、市話與事務所地址</div>}
                </div>
                <div className="form-grid">
                    <div className="fg">
                        <label className="fl">現在繫屬機關</label>
                        <input className="fi" type="text" value={F.currentAgency||""} onChange={e=>sf("currentAgency",e.target.value)}/>
                    </div>
                </div>

                {/* 費用 */}
                <div className="section-hdr">💰 費用管理</div>
                <div className="form-grid" style={{marginBottom:16}}>
                    <div className="fg">
                        <label className="fl">本件律師費（元）</label>
                        <input className="fi" type="number" min="0" value={F.totalFee||""} onChange={e=>sf("totalFee",e.target.value)} placeholder="應收律師費總額"/>
                    </div>
                    <div className="fg">
                        <label className="fl">代墊款項（元）</label>
                        <input className="fi" type="number" min="0" value={F.disbursements||""} onChange={e=>sf("disbursements",e.target.value)}/>
                    </div>
                </div>
                {/* Auto-calculated summary */}
                {Number(F.totalFee)>0 && (
                    <div className="fee-summary" style={{marginBottom:16}}>
                        <div className="fee-summary-row">
                            <span style={{fontSize:12,color:"var(--text3)"}}>本件律師費</span>
                            <span style={{fontWeight:700,color:"var(--gold)"}}>{Number(F.totalFee).toLocaleString()} 元</span>
                        </div>
                        <div className="fee-summary-row">
                            <span style={{fontSize:12,color:"var(--text3)"}}>已收款合計</span>
                            <span style={{fontWeight:700,color:"var(--green)"}}>{(F.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0).toLocaleString()} 元</span>
                        </div>
                        <div className="fee-summary-row">
                            <span style={{fontSize:12,color:"var(--text3)"}}>自動計算未收款</span>
                            <span style={{fontWeight:800,color:Math.max(0,Number(F.totalFee)-(F.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0))>0?"var(--red)":"var(--green)"}}>
                                {Math.max(0,Number(F.totalFee)-(F.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0)).toLocaleString()} 元
                            </span>
                        </div>
                        {Number(F.totalFee)>0 && (()=>{
                            const pct=Math.min(100,((F.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0)/Number(F.totalFee)*100)).toFixed(1);
                            return <>
                                <div className="fee-progress"><div className="fee-progress-bar" style={{width:`${pct}%`}}/></div>
                                <div style={{fontSize:10,color:"var(--text4)",textAlign:"right"}}>{pct}% 已收</div>
                            </>;
                        })()}
                    </div>
                )}
                {/* Payment records */}
                <div style={{fontSize:10,color:"var(--text3)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>收款記錄</div>
                {(F.payments||[]).map((p,i)=>(
                    <div key={i} className="item-row">
                        <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                                <span style={{fontWeight:800,color:"var(--green)"}}>{Number(p.amount).toLocaleString()} 元</span>
                                <span className={`pay-badge ${METHOD_CLASS[p.method]||"pay-method-other"}`}>{p.method}</span>
                            </div>
                            <div style={{fontSize:11,color:"var(--text3)"}}>{p.date}{p.note&&` · ${p.note}`}</div>
                        </div>
                        <button className="btn btn-danger btn-icon" onClick={()=>sf("payments",(F.payments||[]).filter((_,idx)=>idx!==i))}>✕</button>
                    </div>
                ))}
                {/* Add payment */}
                <div className="add-row" style={{marginTop:10,alignItems:"flex-end"}}>
                    <div className="fg" style={{flex:"1 1 130px"}}>
                        <label className="fl">金額（元）</label>
                        <input className="fi" type="number" min="0" value={newPay.amount} onChange={e=>setNewPay(p=>({...p,amount:e.target.value}))} placeholder="0"/>
                    </div>
                    <div className="fg" style={{flex:"1 1 130px"}}>
                        <label className="fl">收款日期</label>
                        <input className="fi" type="date" value={newPay.date} onChange={e=>setNewPay(p=>({...p,date:e.target.value}))}/>
                    </div>
                    <div className="fg" style={{flex:"0 0 100px"}}>
                        <label className="fl">付款方式</label>
                        <select className="fi" value={newPay.method} onChange={e=>setNewPay(p=>({...p,method:e.target.value}))}>
                            {PAYMENT_METHODS.map(m=><option key={m}>{m}</option>)}
                        </select>
                    </div>
                    <div className="fg" style={{flex:"1 1 120px"}}>
                        <label className="fl">備註（選填）</label>
                        <input className="fi" value={newPay.note} onChange={e=>setNewPay(p=>({...p,note:e.target.value}))} placeholder="例：第一期款"/>
                    </div>
                    <button className="btn btn-gold btn-sm" onClick={()=>{
                        if(!newPay.amount){ toast("請填收款金額"); return; }
                        sf("payments",[...(F.payments||[]),{...newPay,id:uid()}]);
                        setNewPay({amount:"",date:today(),method:"現金",note:""});
                    }} style={{flexShrink:0}}>＋ 新增</button>
                </div>

                {/* 開庭 */}
                <div className="section-hdr">🏛 開庭日期</div>
                {(F.hearings||[]).map((h,i)=>(
                    <div key={i} className="item-row">
                        <div style={{flex:1}}>
                            <div style={{color:"var(--gold)",fontWeight:700,fontSize:13}}>{h.date} {h.time}</div>
                            <div style={{color:"var(--text2)",fontSize:12}}>{h.agency} {h.courtroom} {h.note&&`· ${h.note}`}</div>
                        </div>
                        <button className="btn btn-danger btn-icon" onClick={()=>removeHearing(i)}>✕</button>
                    </div>
                ))}
                <div className="add-row">
                    <input className="fi" type="date" style={{flex:"1 1 130px"}} value={newH.date} onChange={e=>setNewH(h=>({...h,date:e.target.value}))} placeholder="日期"/>
                    <input className="fi" type="time" style={{flex:"0 0 100px"}} value={newH.time} onChange={e=>setNewH(h=>({...h,time:e.target.value}))}/>
                    <input className="fi" style={{flex:"1 1 120px"}} value={newH.agency} onChange={e=>setNewH(h=>({...h,agency:e.target.value}))} placeholder="機關（台北地院）"/>
                    <input className="fi" style={{flex:"1 1 100px"}} value={newH.courtroom} onChange={e=>setNewH(h=>({...h,courtroom:e.target.value}))} placeholder="法庭（第5庭）"/>
                    <input className="fi" style={{flex:"1 1 100px"}} value={newH.note} onChange={e=>setNewH(h=>({...h,note:e.target.value}))} placeholder="庭期性質"/>
                    <button className="btn btn-gold btn-sm" onClick={addHearing}>＋ 新增</button>
                </div>

                {/* 待辦 */}
                <div className="section-hdr">✅ 待辦事項</div>
                {(F.todos||[]).map((t,i)=>(
                    <div key={i} className="item-row">
                        <div style={{flex:1}}>
                            <div style={{color:"var(--text)",fontSize:13}}>{t.text}</div>
                            {t.due && <div style={{color:"var(--text3)",fontSize:11}}>期限：{t.due}</div>}
                        </div>
                        <button className="btn btn-danger btn-icon" onClick={()=>removeTodo(i)}>✕</button>
                    </div>
                ))}
                <div className="add-row">
                    <input className="fi" style={{flex:"2 1 180px"}} value={newT.text} onChange={e=>setNewT(t=>({...t,text:e.target.value}))} placeholder="待辦事項內容"/>
                    <input className="fi" type="date" style={{flex:"1 1 140px"}} value={newT.due} onChange={e=>setNewT(t=>({...t,due:e.target.value}))}/>
                    <button className="btn btn-gold btn-sm" onClick={addTodo}>＋ 新增</button>
                </div>

                {/* 書狀 */}
                <div className="section-hdr">📄 書狀（遞狀記錄）</div>
                {(F.filings||[]).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map((f)=>{
                    const idx=(F.filings||[]).indexOf(f);
                    return(
                    <div key={f.id||idx} className="item-row">
                        <div style={{flex:1}}>
                            <div style={{color:"var(--text)",fontSize:13,fontWeight:700}}>{f.type} <span style={{color:"var(--navy)",fontWeight:400,fontSize:12}}>· {f.date}</span></div>
                            {f.summary && <div style={{color:"var(--text3)",fontSize:12,marginTop:2}}>{f.summary}</div>}
                        </div>
                        <button className="btn btn-danger btn-icon" onClick={()=>removeFiling(idx)}>✕</button>
                    </div>
                    );
                })}
                <div className="add-row" style={{alignItems:"flex-end"}}>
                    <div className="fg" style={{flex:"0 0 130px"}}>
                        <label className="fl">書狀種類</label>
                        <select className="fi" value={newFiling.type} onChange={e=>setNewFiling(f=>({...f,type:e.target.value}))}>
                            {FILING_TYPES.map(t=><option key={t}>{t}</option>)}
                        </select>
                    </div>
                    <div className="fg" style={{flex:"0 0 140px"}}>
                        <label className="fl">遞狀日期</label>
                        <input className="fi" type="date" value={newFiling.date} onChange={e=>setNewFiling(f=>({...f,date:e.target.value}))}/>
                    </div>
                    <div className="fg" style={{flex:"2 1 200px"}}>
                        <label className="fl">書狀摘要</label>
                        <input className="fi" value={newFiling.summary} onChange={e=>setNewFiling(f=>({...f,summary:e.target.value}))} placeholder="例如：就對造○○抗辯提出反駁…"/>
                    </div>
                    <button className="btn btn-gold btn-sm" onClick={addFiling} style={{flexShrink:0}}>＋ 新增</button>
                </div>

                {/* 電子卷證 */}
                <div className="section-hdr">📁 開庭筆錄 & 電子卷證</div>
                <div className="fg" style={{marginBottom:16}}>
                    <label className="fl">Google Drive 卷證資料夾連結</label>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <input className="fi" type="url" style={{flex:1}} value={F.driveFolderUrl||""} onChange={e=>sf("driveFolderUrl",e.target.value)} placeholder="貼上 Google Drive 資料夾的分享連結…"/>
