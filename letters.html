<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="函件管理">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="shinkai_widget_icon_preview.svg">
<link rel="icon" type="image/svg+xml" href="shinkai_widget_icon_preview.svg">
<title>✉️ 函件與存證管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
    --bg:#020617;--bg2:#0f172a;--bg3:#1e293b;--bg4:#334155;
    --gold:#c8a96e;--text:#f1f5f9;--text2:#cbd5e1;--text3:#94a3b8;--text4:#64748b;
    --green:#10b981;--red:#ef4444;--blue:#3b82f6;--border:#334155;
}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',system-ui,sans-serif;}

/* Header */
.header{background:var(--bg2);padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.header-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
.header-title span{color:var(--gold);}

/* Tabs */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 10px;}
.tab{flex:1;text-align:center;padding:12px 0;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700;}

/* Content */
.content{padding:16px;max-width:600px;margin:0 auto;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);padding:12px;border-radius:12px;}
.stat-val{font-size:18px;font-weight:800;color:var(--gold);}
.stat-lbl{font-size:10px;color:var(--text4);margin-top:2px;}

/* Notice Card */
.notice-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;position:relative;}
.notice-type{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;margin-bottom:8px;display:inline-block;}
.type-legal{background:rgba(59,130,246,0.1);color:var(--blue);border:1px solid rgba(59,130,246,0.2);}
.type-cert{background:rgba(200,169,110,0.1);color:var(--gold);border:1px solid rgba(200,169,110,0.2);}
.notice-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.notice-date{font-size:11px;color:var(--text4);margin-bottom:10px;}
.fee-row{display:flex;gap:15px;font-size:12px;background:var(--bg);padding:8px;border-radius:8px;}
.fee-item span{display:block;font-size:10px;color:var(--text4);}
.fee-item b{color:var(--text2);}
.fee-unpaid{color:var(--red) !important;}

/* Form */
.form-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);margin-bottom:12px;font-size:14px;font-family:inherit;}
.fi:focus{border-color:var(--gold);outline:none;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#a07840);color:#000;border:none;border-radius:8px;padding:12px;font-weight:700;width:100%;cursor:pointer;}

/* Template List */
.tpl-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.tpl-name{font-size:14px;font-weight:500;}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);}

@media (max-width:480px){ .stats-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<div class="header">
    <div class="header-title"><span>✉️</span> 函件管理系統</div>
    <a href="widget.html" style="text-decoration:none;font-size:12px;color:var(--text3);">返回庭期 ➔</a>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('list')">案件記錄</div>
    <div class="tab" onclick="switchTab('templates')">範本庫</div>
    <div class="tab" onclick="switchTab('add')">＋ 新增委託</div>
</div>

<div class="content">
    <div id="view-list">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val" id="stat-total-fee">$0</div>
                <div class="stat-lbl">總約定費用</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-unpaid" style="color:var(--red)">$0</div>
                <div class="stat-lbl">總未收尾款</div>
            </div>
        </div>
        <div id="notice-container"><!-- 案件列表載入處 --></div>
    </div>

    <div id="view-templates" style="display:none;">
        <div style="font-size:12px;color:var(--text4);margin-bottom:12px;">常用函件範本</div>
        <div class="tpl-item"><div class="tpl-name">📄 存證信函-欠款催收</div><button class="btn-sm">複製</button></div>
        <div class="tpl-item"><div class="tpl-name">📄 律師函-侵權行為警告</div><button class="btn-sm">複製</button></div>
        <div class="tpl-item"><div class="tpl-name">📄 律師函-契約終止通知</div><button class="btn-sm">複製</button></div>
    </div>

    <div id="view-add" style="display:none;">
        <div class="form-box">
            <div style="font-size:14px;font-weight:700;margin-bottom:15px;color:var(--gold);">新增函件委託</div>
            <select class="fi" id="f-type">
                <option value="律師函">律師函</option>
                <option value="存證信函">存證信函</option>
            </select>
            <input class="fi" id="f-client" placeholder="委託人 / 對造姓名">
            <input class="fi" id="f-date" type="date">
            <input class="fi" id="f-fee" type="number" placeholder="約定費用">
            <input class="fi" id="f-paid" type="number" placeholder="已收金額">
            <textarea class="fi" id="f-content" rows="4" placeholder="函件摘要或存檔連結"></textarea>
            <button class="btn-gold" onclick="addNotice()">儲存記錄</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",
    authDomain: "legalcasemanageer.firebaseapp.com",
    projectId: "legalcasemanageer",
    storageBucket: "legalcasemanageer.firebasestorage.app",
    messagingSenderId: "559838504556",
    appId: "1:559838504556:web:ba10c071a12650bbd85a49"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// State
let notices = [];

// Tab Switch
window.switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
    ['list', 'templates', 'add'].forEach(v => {
        document.getElementById(`view-${v}`).style.display = (v === tab) ? 'block' : 'none';
    });
};

// Add Notice
window.addNotice = async () => {
    const data = {
        type: document.getElementById('f-type').value,
        client: document.getElementById('f-client').value,
        date: document.getElementById('f-date').value,
        fee: Number(document.getElementById('f-fee').value) || 0,
        paid: Number(document.getElementById('f-paid').value) || 0,
        content: document.getElementById('f-content').value,
        createdAt: new Date().toISOString()
    };
    if(!data.client || !data.date) return alert('請填寫姓名與日期');
    
    try {
        await addDoc(collection(db, "notices"), data);
        alert('儲存成功');
        switchTab('list');
    } catch(e) { alert('儲存失敗'); }
};

// Listen to Data
onSnapshot(query(collection(db, "notices"), orderBy("date", "desc")), (snap) => {
    notices = snap.docs.map(d => ({id:d.id, ...d.data()}));
    renderList();
});

function renderList() {
    const container = document.getElementById('notice-container');
    let totalFee = 0, totalUnpaid = 0;
    
    container.innerHTML = notices.map(n => {
        const unpaid = n.fee - n.paid;
        totalFee += n.fee;
        totalUnpaid += unpaid;
        const typeClass = n.type === '律師函' ? 'type-legal' : 'type-cert';
        
        return `
        <div class="notice-card">
            <div class="notice-type ${typeClass}">${n.type}</div>
            <div class="notice-title">${n.client}</div>
            <div class="notice-date">📅 委託日期：${n.date}</div>
            <div class="fee-row">
                <div class="fee-item"><span>約定費用</span><b>$${n.fee.toLocaleString()}</b></div>
                <div class="fee-item"><span>已收</span><b>$${n.paid.toLocaleString()}</b></div>
                <div class="fee-item"><span>未收</span><b class="${unpaid > 0 ? 'fee-unpaid' : ''}">$${unpaid.toLocaleString()}</b></div>
            </div>
            ${n.content ? `<div style="font-size:11px;color:var(--text3);margin-top:10px;border-top:1px solid var(--border);padding-top:8px;">📝 ${n.content}</div>` : ''}
        </div>
        `;
    }).join('');
    
    document.getElementById('stat-total-fee').textContent = `$${totalFee.toLocaleString()}`;
    document.getElementById('stat-unpaid').textContent = `$${totalUnpaid.toLocaleString()}`;
}

// Set default date to today
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
