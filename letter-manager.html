<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>函件管理系統</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="函件管理">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Firebase SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #eee8d5;
      --surface:      #ffffff;
      --surface-2:    #faf7f0;
      --navy:         #1c2b4a;
      --navy-light:   #2d4070;
      --navy-pale:    #eef1f8;
      --red:          #9b2335;
      --red-light:    #fdf0f2;
      --green:        #1a5c38;
      --green-light:  #edf7f2;
      --gold:         #8a6200;
      --gold-light:   #fdf4dc;
      --blue:         #1a4a7a;
      --blue-light:   #e8f0fa;
      --text:         #1c2b4a;
      --text-muted:   #6b7590;
      --border:       #d0c8b4;
      --border-light: #e4dece;
      --shadow-sm:    0 1px 3px rgba(28,43,74,0.08);
      --shadow:       0 3px 10px rgba(28,43,74,0.12);
      --shadow-lg:    0 8px 28px rgba(28,43,74,0.18);
      --radius:       8px;
      --radius-sm:    4px;
    }

    html, body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Login ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(150deg, #111e36 0%, #1c2b4a 50%, #2d4070 100%);
    }
    .login-card {
      background: white;
      padding: 48px 40px 40px;
      border-radius: 14px;
      width: 360px;
      box-shadow: var(--shadow-lg);
    }
    .login-seal {
      text-align: center;
      font-size: 36px;
      margin-bottom: 12px;
    }
    .login-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: 2px;
    }
    .login-sub {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 32px;
      letter-spacing: 1px;
    }
    .login-field { margin-bottom: 16px; }
    .login-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .login-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      color: var(--text);
      transition: border-color 0.2s;
      background: var(--surface-2);
    }
    .login-input:focus { outline: none; border-color: var(--navy); background: white; }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-btn:hover { background: var(--navy-light); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-err {
      color: var(--red);
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
      background: var(--red-light);
      padding: 8px;
      border-radius: var(--radius-sm);
    }

    /* ── Header ── */
    .header {
      background: var(--navy);
      color: white;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-user { font-size: 12px; color: rgba(255,255,255,0.6); }
    .logout-btn {
      padding: 5px 12px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.22); }

    /* ── Tabs ── */
    .tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      padding: 0 24px;
    }
    .tab-btn {
      padding: 14px 20px;
      border: none;
      background: none;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: all 0.2s;
      margin-bottom: -1px;
      letter-spacing: 0.5px;
    }
    .tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 500; }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Stats Bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 18px 24px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border-light);
    }
    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 14px 18px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
    }
    .stat-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 5px;
    }
    .stat-value {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
    }
    .stat-value.s-count  { color: var(--navy); }
    .stat-value.s-total  { color: var(--navy); }
    .stat-value.s-recv   { color: var(--green); }
    .stat-value.s-out    { color: var(--red); }
    .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 180px;
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--surface-2);
      transition: all 0.2s;
    }
    .search-input:focus { outline: none; border-color: var(--navy); background: white; }
    .filter-select {
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--surface-2);
      cursor: pointer;
    }
    .filter-select:focus { outline: none; border-color: var(--navy); }
    .add-btn {
      padding: 8px 18px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      margin-left: auto;
    }
    .add-btn:hover { background: var(--navy-light); }

    /* ── Content / Cards ── */
    .content { padding: 24px; }
    .records-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 16px;
    }
    .record-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .record-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

    .card-header {
      padding: 14px 16px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--border-light);
    }
    .card-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 3px;
    }
    .card-subject {
      font-size: 12px;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-badges { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .b-存證   { background: var(--gold-light);  color: var(--gold); }
    .b-律師   { background: var(--navy-pale);   color: var(--navy); }
    .b-接受委託 { background: var(--gold-light);  color: var(--gold); }
    .b-撰寫中  { background: var(--blue-light);  color: var(--blue); }
    .b-已完成  { background: var(--green-light); color: var(--green); }
    .b-已寄送  { background: #ede8fa; color: #4a2d9b; }

    .card-body { padding: 12px 16px; }
    .card-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }
    .card-row-label { color: var(--text-muted); }
    .card-row-value { font-weight: 500; color: var(--text); }

    .card-fees {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-top: 1px solid var(--border-light);
    }
    .fee-item {
      text-align: center;
      padding: 10px 6px;
      border-right: 1px solid var(--border-light);
    }
    .fee-item:last-child { border-right: none; }
    .fee-lbl { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
    .fee-amt { font-size: 13px; font-weight: 700; }
    .fa-total { color: var(--navy); }
    .fa-recv  { color: var(--green); }
    .fa-out   { color: var(--red); }
    .fa-zero  { color: var(--green); }

    .card-footer {
      padding: 8px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border-light);
      background: var(--surface-2);
    }
    .card-attach { font-size: 11px; color: var(--text-muted); }
    .card-actions { display: flex; gap: 5px; }
    .btn-icon {
      padding: 4px 9px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: none;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .btn-icon:hover          { border-color: var(--navy);  color: var(--navy);  background: var(--navy-pale); }
    .btn-icon.danger:hover   { border-color: var(--red);   color: var(--red);   background: var(--red-light); }
    .btn-icon.file-dl        { color: var(--blue); border-color: #b8d0ef; background: var(--blue-light); }
    .btn-icon.file-dl:hover  { background: var(--blue); color: white; }

    /* ── Modal shared ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(28,43,74,0.55);
      backdrop-filter: blur(3px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal-header {
      padding: 22px 28px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: white;
      z-index: 1;
      border-bottom: 1px solid var(--border-light);
    }
    .modal-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--navy);
    }
    .modal-close {
      width: 30px; height: 30px;
      border: none; background: var(--surface-2);
      border-radius: 50%; cursor: pointer;
      font-size: 14px; display: flex;
      align-items: center; justify-content: center;
      color: var(--text-muted); transition: all 0.15s;
    }
    .modal-close:hover { background: var(--border-light); color: var(--text); }
    .modal-body { padding: 20px 28px 24px; }
    .modal-footer {
      padding: 14px 28px;
      border-top: 1px solid var(--border-light);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .btn-cancel {
      padding: 9px 20px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: none;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    .btn-save {
      padding: 9px 24px;
      background: var(--navy);
      color: white; border: none;
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-save:hover    { background: var(--navy-light); }
    .btn-save:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Form ── */
    .form-section { margin-bottom: 20px; }
    .form-section-title {
      font-size: 10px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-light);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 5px; }
    .form-label .req { color: var(--red); }
    .form-input, .form-select, .form-textarea {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px; color: var(--text);
      background: white; transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none; border-color: var(--navy);
    }
    .form-input.readonly {
      background: var(--surface-2);
      color: var(--red); font-weight: 700;
      border-color: var(--border-light);
    }
    .form-textarea { resize: vertical; min-height: 70px; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface-2);
    }
    .upload-zone:hover   { border-color: var(--navy); background: var(--navy-pale); }
    .upload-zone.filled  { border-color: var(--green); background: var(--green-light); }
    .upload-zone.busy    { border-color: var(--blue);  background: var(--blue-light); pointer-events: none; }
    .upload-icon { font-size: 22px; margin-bottom: 6px; }
    .upload-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .upload-text strong { color: var(--navy); }
    .upload-hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .progress-bar { width: 100%; height: 4px; background: var(--border-light); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--blue); transition: width 0.3s; border-radius: 2px; }

    /* ── Detail modal ── */
    .det-section { margin-bottom: 18px; }
    .det-section-title {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--border-light);
    }
    .det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .det-item {}
    .det-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
    .det-value { font-size: 14px; color: var(--text); font-weight: 500; }
    .fee-summary-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      background: var(--surface-2);
      padding: 16px; border-radius: var(--radius);
      border: 1px solid var(--border-light);
    }
    .fsgi { text-align: center; }
    .fsgi-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .fsgi-value { font-size: 18px; font-weight: 700; font-family: 'Noto Serif TC', serif; }
    .file-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px;
      background: var(--blue-light); color: var(--blue);
      border: 1px solid #b8d0ef; border-radius: var(--radius-sm);
      text-decoration: none; font-size: 13px; font-weight: 500;
      transition: all 0.2s; cursor: pointer;
    }
    .file-link:hover { background: var(--blue); color: white; }

    /* ── Templates tab ── */
    .template-section { padding: 24px; }
    .tpl-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
    }
    .type-pills { display: flex; gap: 6px; }
    .type-pill {
      padding: 5px 14px; border-radius: 20px;
      border: 1.5px solid var(--border);
      background: none; font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px; cursor: pointer; color: var(--text-muted);
      transition: all 0.2s;
    }
    .type-pill.p-全部 { background: var(--navy);       color: white;         border-color: var(--navy); }
    .type-pill.p-存證 { background: var(--gold-light);  color: var(--gold);   border-color: var(--gold); }
    .type-pill.p-律師 { background: var(--navy-pale);   color: var(--navy);   border-color: var(--navy); }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
    }
    .template-card {
      background: white; border-radius: var(--radius);
      border: 1px solid var(--border-light);
      padding: 16px; box-shadow: var(--shadow-sm);
    }
    .tpl-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .tpl-name { font-weight: 600; font-size: 14px; color: var(--navy); line-height: 1.4; flex: 1; margin-right: 8px; }
    .tpl-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; line-height: 1.6; }
    .tpl-notes { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; font-style: italic; }
    .tpl-actions { display: flex; gap: 6px; }
    .btn-dl {
      flex: 1; padding: 7px 10px;
      background: var(--navy-pale); color: var(--navy);
      border: 1px solid #c8d0e0; border-radius: var(--radius-sm);
      font-size: 12px; cursor: pointer; text-align: center;
      text-decoration: none; transition: all 0.2s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .btn-dl:hover { background: var(--navy); color: white; }
    .btn-del {
      padding: 7px 12px;
      background: var(--red-light); color: var(--red);
      border: 1px solid #f0c0c8; border-radius: var(--radius-sm);
      font-size: 12px; cursor: pointer; transition: all 0.2s;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .btn-del:hover { background: var(--red); color: white; }

    /* ── Misc ── */
    .empty-state { text-align: center; padding: 64px 20px; color: var(--text-muted); }
    .empty-icon  { font-size: 40px; margin-bottom: 12px; }
    .empty-text  { font-size: 14px; }
    .loading     { display: flex; align-items: center; justify-content: center; padding: 72px; color: var(--text-muted); font-size: 14px; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block; flex-shrink: 0;
    }
    .spinner.dark {
      border-color: rgba(28,43,74,0.2);
      border-top-color: var(--navy);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .stats-bar            { grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 16px; }
      .records-grid         { grid-template-columns: 1fr; }
      .form-grid            { grid-template-columns: 1fr; }
      .form-group.full      { grid-column: auto; }
      .det-grid             { grid-template-columns: 1fr; }
      .fee-summary-grid     { grid-template-columns: 1fr; }
      .header               { padding: 0 16px; }
      .content              { padding: 16px; }
      .toolbar              { padding: 10px 16px; }
      .modal-body           { padding: 16px 18px 20px; }
      .modal-header         { padding: 16px 18px 14px; }
      .modal-footer         { padding: 12px 18px; }
      .tab-btn              { padding: 12px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Firebase Config ──────────────────────────────────────────────────────────
// 請填入您的 Firebase 設定（同 legalcasemanageer 專案）
const firebaseConfig = {
  apiKey:            "AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",
  authDomain:        "legalcasemanageer.firebaseapp.com",
  databaseURL:       "https://legalcasemanageer-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "legalcasemanageer",
  storageBucket:     "legalcasemanageer.firebasestorage.app",
  messagingSenderId: "559838504556",
  appId:             "1:559838504556:web:ba10c071a12650bbd85a49",
  measurementId:     "G-N6VEE6ZCHF"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth    = firebase.auth();
const db      = firebase.firestore();
const storage = firebase.storage();

// ─── Constants / Helpers ──────────────────────────────────────────────────────
const TYPES   = ['存證信函', '律師函'];
const STATUSES = ['接受委託', '撰寫中', '已完成', '已寄送'];

const fmtNTD  = n => `NT$ ${Number(n || 0).toLocaleString()}`;
const fmtDate = s => s ? s.replace(/-/g, '/') : '—';
const todayStr = () => new Date().toISOString().split('T')[0];
const fmtSize  = b => {
  if (!b) return '';
  if (b >= 1024*1024) return `${(b/1024/1024).toFixed(1)} MB`;
  return `${Math.round(b/1024)} KB`;
};
const fmtTS = ts => {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
};

const emptyRecord = () => ({
  type:           '存證信函',
  clientName:     '',
  clientPhone:    '',
  clientEmail:    '',
  recipient:      '',
  subject:        '',
  commissionDate: todayStr(),
  sendDate:       '',
  status:         '接受委託',
  totalFee:       '',
  receivedFee:    '',
  notes:          '',
  fileUrl:        '',
  fileName:       '',
});

// ─── Login ────────────────────────────────────────────────────────────────────
function LoginScreen() {
  const [email, setEmail] = useState('');
  const [pw,    setPw]    = useState('');
  const [err,   setErr]   = useState('');
  const [busy,  setBusy]  = useState(false);

  const login = async () => {
    if (!email || !pw) { setErr('請填寫帳號與密碼'); return; }
    setErr(''); setBusy(true);
    try {
      await auth.signInWithEmailAndPassword(email, pw);
    } catch {
      setErr('帳號或密碼錯誤，請重試');
      setBusy(false);
    }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-seal">⚖</div>
        <div className="login-title">函件管理系統</div>
        <div className="login-sub">存證信函 · 律師函</div>
        <div className="login-field">
          <label className="login-label">電子郵件</label>
          <input className="login-input" type="email" value={email}
            onChange={e => setEmail(e.target.value)} placeholder="your@email.com" />
        </div>
        <div className="login-field">
          <label className="login-label">密碼</label>
          <input className="login-input" type="password" value={pw}
            onChange={e => setPw(e.target.value)} placeholder="••••••••"
            onKeyDown={e => e.key === 'Enter' && login()} />
        </div>
        {err && <div className="login-err">{err}</div>}
        <button className="login-btn" onClick={login} disabled={busy}>
          {busy ? <><span className="spinner" /> 登入中...</> : '登入'}
        </button>
      </div>
    </div>
  );
}

// ─── Stats Bar ────────────────────────────────────────────────────────────────
function StatsBar({ records }) {
  const total = records.reduce((s, r) => s + Number(r.totalFee    || 0), 0);
  const recv  = records.reduce((s, r) => s + Number(r.receivedFee || 0), 0);
  const out   = total - recv;
  const unpaid = records.filter(r => (Number(r.totalFee||0) - Number(r.receivedFee||0)) > 0).length;
  return (
    <div className="stats-bar">
      <div className="stat-card">
        <div className="stat-label">函件總數</div>
        <div className="stat-value s-count">{records.length} <span style={{fontSize:13}}>件</span></div>
        <div className="stat-sub">存證 {records.filter(r=>r.type==='存證信函').length} · 律師函 {records.filter(r=>r.type==='律師函').length}</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">費用總計</div>
        <div className="stat-value s-total">{fmtNTD(total)}</div>
        <div className="stat-sub">{records.length} 件委託</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">已收費用</div>
        <div className="stat-value s-recv">{fmtNTD(recv)}</div>
        <div className="stat-sub">{total > 0 ? `${Math.round(recv/total*100)}% 已收款` : '—'}</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">未收費用</div>
        <div className="stat-value s-out">{fmtNTD(out)}</div>
        <div className="stat-sub">{out > 0 ? `${unpaid} 件未結清` : '✓ 全數結清'}</div>
      </div>
    </div>
  );
}

// ─── Record Card ──────────────────────────────────────────────────────────────
function RecordCard({ rec, onView, onEdit, onDelete }) {
  const out = Number(rec.totalFee || 0) - Number(rec.receivedFee || 0);
  return (
    <div className="record-card" onClick={() => onView(rec)}>
      <div className="card-header">
        <div style={{flex:1, minWidth:0}}>
          <div className="card-title">{rec.clientName || '（未填委託人）'}</div>
          <div className="card-subject">{rec.subject || '—'}</div>
        </div>
        <div className="card-badges">
          <span className={`badge ${rec.type === '存證信函' ? 'b-存證' : 'b-律師'}`}>
            {rec.type === '存證信函' ? '存證' : '律師函'}
          </span>
          <span className={`badge b-${rec.status}`}>{rec.status}</span>
        </div>
      </div>
      <div className="card-body">
        <div className="card-row"><span className="card-row-label">受信人</span><span className="card-row-value">{rec.recipient || '—'}</span></div>
        <div className="card-row"><span className="card-row-label">委託日期</span><span className="card-row-value">{fmtDate(rec.commissionDate)}</span></div>
        {rec.sendDate && <div className="card-row"><span className="card-row-label">寄出日期</span><span className="card-row-value">{fmtDate(rec.sendDate)}</span></div>}
      </div>
      <div className="card-fees">
        <div className="fee-item"><div className="fee-lbl">費用總額</div><div className={`fee-amt fa-total`}>{fmtNTD(rec.totalFee)}</div></div>
        <div className="fee-item"><div className="fee-lbl">已收</div><div className="fee-amt fa-recv">{fmtNTD(rec.receivedFee)}</div></div>
        <div className="fee-item"><div className="fee-lbl">未收</div><div className={`fee-amt ${out > 0 ? 'fa-out' : 'fa-zero'}`}>{fmtNTD(out)}</div></div>
      </div>
      <div className="card-footer">
        <span className="card-attach">{rec.fileName ? `📎 ${rec.fileName}` : '無附件'}</span>
        <div className="card-actions" onClick={e => e.stopPropagation()}>
          {rec.fileUrl && (
            <a className="btn-icon file-dl" href={rec.fileUrl} target="_blank" rel="noopener noreferrer" title="下載函件">⬇</a>
          )}
          <button className="btn-icon" onClick={() => onEdit(rec)} title="編輯">✎</button>
          <button className="btn-icon danger" onClick={() => onDelete(rec)} title="刪除">✕</button>
        </div>
      </div>
    </div>
  );
}

// ─── Record Modal (Add / Edit) ────────────────────────────────────────────────
function RecordModal({ init, onClose, onSaved }) {
  const isEdit = !!init.id;
  const [form, setForm]       = useState({ ...emptyRecord(), ...init });
  const [file, setFile]       = useState(null);
  const [progress, setProgress] = useState(0);
  const [busy, setBusy]       = useState(false);
  const fileRef = useRef();

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const outstanding = Number(form.totalFee || 0) - Number(form.receivedFee || 0);

  const handleSave = async () => {
    if (!form.clientName.trim())   { alert('請填寫委託人姓名'); return; }
    if (!form.commissionDate)      { alert('請填寫委託日期'); return; }
    setBusy(true);
    try {
      let fileUrl  = form.fileUrl;
      let fileName = form.fileName;

      if (file) {
        // Use a pre-generated ID as storage folder name
        const folderId = init.id || db.collection('letters').doc().id;
        const ref  = storage.ref(`letters/${folderId}/${file.name}`);
        const task = ref.put(file);
        await new Promise((res, rej) => {
          task.on('state_changed',
            s  => setProgress(Math.round(s.bytesTransferred / s.totalBytes * 100)),
            rej,
            async () => {
              fileUrl  = await task.snapshot.ref.getDownloadURL();
              fileName = file.name;
              res();
            }
          );
        });
      }

      const data = {
        ...form,
        totalFee:    Number(form.totalFee    || 0),
        receivedFee: Number(form.receivedFee || 0),
        fileUrl, fileName,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      };

      if (isEdit) {
        await db.collection('letters').doc(init.id).update(data);
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('letters').add(data);
      }
      onSaved();
      onClose();
    } catch(e) {
      alert('儲存失敗：' + e.message);
      setBusy(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">{isEdit ? '編輯函件記錄' : '新增函件記錄'}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">

          {/* 基本資料 */}
          <div className="form-section">
            <div className="form-section-title">基本資料</div>
            <div className="form-grid">
              <div className="form-group">
                <label className="form-label">函件類型</label>
                <select className="form-select" value={form.type} onChange={e => set('type', e.target.value)}>
                  {TYPES.map(t => <option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">處理狀態</label>
                <select className="form-select" value={form.status} onChange={e => set('status', e.target.value)}>
                  {STATUSES.map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">委託人姓名 <span className="req">*</span></label>
                <input className="form-input" value={form.clientName} onChange={e => set('clientName', e.target.value)} placeholder="委託人姓名" />
              </div>
              <div className="form-group">
                <label className="form-label">委託人電話</label>
                <input className="form-input" value={form.clientPhone} onChange={e => set('clientPhone', e.target.value)} placeholder="0912-345-678" />
              </div>
              <div className="form-group">
                <label className="form-label">委託人 Email</label>
                <input className="form-input" type="email" value={form.clientEmail} onChange={e => set('clientEmail', e.target.value)} placeholder="client@example.com" />
              </div>
              <div className="form-group">
                <label className="form-label">受信人（對造）</label>
                <input className="form-input" value={form.recipient} onChange={e => set('recipient', e.target.value)} placeholder="受信對象姓名" />
              </div>
              <div className="form-group full">
                <label className="form-label">事由摘要</label>
                <textarea className="form-textarea" rows={2} value={form.subject} onChange={e => set('subject', e.target.value)} placeholder="本函件之事由..." />
              </div>
            </div>
          </div>

          {/* 日期 */}
          <div className="form-section">
            <div className="form-section-title">日期</div>
            <div className="form-grid">
              <div className="form-group">
                <label className="form-label">委託日期 <span className="req">*</span></label>
                <input className="form-input" type="date" value={form.commissionDate} onChange={e => set('commissionDate', e.target.value)} />
              </div>
              <div className="form-group">
                <label className="form-label">寄出日期</label>
                <input className="form-input" type="date" value={form.sendDate} onChange={e => set('sendDate', e.target.value)} />
              </div>
            </div>
          </div>

          {/* 費用 */}
          <div className="form-section">
            <div className="form-section-title">費用</div>
            <div className="form-grid">
              <div className="form-group">
                <label className="form-label">費用總額（NT$）</label>
                <input className="form-input" type="number" min="0" value={form.totalFee} onChange={e => set('totalFee', e.target.value)} placeholder="0" />
              </div>
              <div className="form-group">
                <label className="form-label">已收金額（NT$）</label>
                <input className="form-input" type="number" min="0" value={form.receivedFee} onChange={e => set('receivedFee', e.target.value)} placeholder="0" />
              </div>
              <div className="form-group">
                <label className="form-label">未收金額（自動計算）</label>
                <input className="form-input readonly" readOnly value={`NT$ ${outstanding.toLocaleString()}`} />
              </div>
            </div>
          </div>

          {/* 函件附件 */}
          <div className="form-section">
            <div className="form-section-title">函件附件</div>
            <div
              className={`upload-zone ${file ? 'filled' : ''} ${busy && progress > 0 && progress < 100 ? 'busy' : ''}`}
              onClick={() => !busy && fileRef.current?.click()}
            >
              <input ref={fileRef} type="file" style={{display:'none'}} accept=".pdf,.doc,.docx"
                onChange={e => e.target.files[0] && setFile(e.target.files[0])} />
              <div className="upload-icon">{file ? '✅' : form.fileName ? '📎' : '📄'}</div>
              <div className="upload-text">
                {file
                  ? <><strong>{file.name}</strong><br/><span style={{fontSize:11}}>點擊可重新選擇</span></>
                  : form.fileName
                    ? <><strong>{form.fileName}</strong><br/><span style={{fontSize:11}}>點擊可重新上傳</span></>
                    : <><strong>點擊選擇函件檔案</strong><br/><span>PDF、Word 皆可</span></>
                }
              </div>
              <div className="upload-hint">支援 .pdf · .doc · .docx</div>
              {busy && progress > 0 && progress < 100 && (
                <div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}} /></div>
              )}
            </div>
          </div>

          {/* 備註 */}
          <div className="form-section" style={{marginBottom:0}}>
            <div className="form-section-title">備註</div>
            <textarea className="form-textarea" style={{width:'100%'}} rows={3}
              value={form.notes} onChange={e => set('notes', e.target.value)} placeholder="其他備忘事項..." />
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn-cancel" onClick={onClose}>取消</button>
          <button className="btn-save" onClick={handleSave} disabled={busy}>
            {busy ? <><span className="spinner" /> {progress > 0 && progress < 100 ? `上傳中 ${progress}%` : '儲存中...'}</> : (isEdit ? '儲存變更' : '新增記錄')}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Detail Modal ─────────────────────────────────────────────────────────────
function DetailModal({ rec, onClose, onEdit }) {
  const out = Number(rec.totalFee || 0) - Number(rec.receivedFee || 0);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
            <div className="modal-title">{rec.clientName || '—'}</div>
            <span className={`badge ${rec.type === '存證信函' ? 'b-存證' : 'b-律師'}`}>{rec.type}</span>
            <span className={`badge b-${rec.status}`}>{rec.status}</span>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="det-section">
            <div className="det-section-title">委託人資訊</div>
            <div className="det-grid">
              <div className="det-item"><div className="det-label">委託人</div><div className="det-value">{rec.clientName || '—'}</div></div>
              <div className="det-item"><div className="det-label">電話</div><div className="det-value">{rec.clientPhone || '—'}</div></div>
              <div className="det-item"><div className="det-label">Email</div><div className="det-value">{rec.clientEmail || '—'}</div></div>
              <div className="det-item"><div className="det-label">受信人（對造）</div><div className="det-value">{rec.recipient || '—'}</div></div>
            </div>
          </div>

          {rec.subject && (
            <div className="det-section">
              <div className="det-section-title">事由</div>
              <div style={{fontSize:14, color:'var(--text)', lineHeight:1.75, background:'var(--surface-2)', padding:'12px 14px', borderRadius:'var(--radius)', border:'1px solid var(--border-light)'}}>{rec.subject}</div>
            </div>
          )}

          <div className="det-section">
            <div className="det-section-title">日期</div>
            <div className="det-grid">
              <div className="det-item"><div className="det-label">委託日期</div><div className="det-value">{fmtDate(rec.commissionDate)}</div></div>
              <div className="det-item"><div className="det-label">寄出日期</div><div className="det-value">{fmtDate(rec.sendDate)}</div></div>
            </div>
          </div>

          <div className="det-section">
            <div className="det-section-title">費用</div>
            <div className="fee-summary-grid">
              <div className="fsgi"><div className="fsgi-label">費用總額</div><div className="fsgi-value" style={{color:'var(--navy)'}}>{fmtNTD(rec.totalFee)}</div></div>
              <div className="fsgi"><div className="fsgi-label">已收</div><div className="fsgi-value" style={{color:'var(--green)'}}>{fmtNTD(rec.receivedFee)}</div></div>
              <div className="fsgi"><div className="fsgi-label">未收</div><div className="fsgi-value" style={{color: out > 0 ? 'var(--red)' : 'var(--green)'}}>{fmtNTD(out)}</div></div>

          {rec.fileUrl && (

              <div className="det-section-title">函件附件</div>

          {rec.notes && (
            <div className="det-section" style={{marginBottom:0}}>
              <div className="det-section-title">備註</div>

        <div className="modal-footer">
          <button className="btn-cancel" onClick={onClose}>關閉</button>
          <button className="btn-save" onClick={() => { onClose(); onEdit(rec); }}>✎ 編輯</button>
        </div>
      </div>
    </div>
  );
}

// ─── Records Tab ──────────────────────────────────────────────────────────────
function RecordsTab() {
  const [records, setRecords]     = useState([]);
  const [loading, setLoading]     = useState(true);
  const [search, setSearch]       = useState('');
  const [fType,  setFType]        = useState('全部');
  const [fStatus, setFStatus]     = useState('全部');
  const [modal, setModal]         = useState(null); // 'add' | 'edit' | 'view'
  const [sel,   setSel]           = useState(null);

  useEffect(() => {
    return db.collection('letters')
      .orderBy('createdAt', 'desc')
      .onSnapshot(snap => {
        setRecords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        setLoading(false);
      }, err => { console.error(err); setLoading(false); });
  }, []);

  const shown = records.filter(r => {
    if (fType   !== '全部' && r.type   !== fType)   return false;
    if (fStatus !== '全部' && r.status !== fStatus) return false;
    if (search) {
      const q = search.toLowerCase();
      return (r.clientName||'').toLowerCase().includes(q)
          || (r.subject||'').toLowerCase().includes(q)
          || (r.recipient||'').toLowerCase().includes(q);
    }
    return true;
  });

  const handleDelete = async rec => {
    if (!confirm(`確定刪除「${rec.clientName}」的函件記錄？`)) return;
    try {
      await db.collection('letters').doc(rec.id).delete();
      // Note: Storage file not auto-deleted to preserve accidental deletion recovery
    } catch(e) { alert('刪除失敗：' + e.message); }
  };

  const open  = (mode, rec = null) => { setSel(rec); setModal(mode); };
  const close = () => { setSel(null); setModal(null); };

  return (
    <>
      <StatsBar records={records} />
      <div className="toolbar">
        <input className="search-input" placeholder="搜尋委託人、事由、受信人..." value={search} onChange={e => setSearch(e.target.value)} />
        <select className="filter-select" value={fType} onChange={e => setFType(e.target.value)}>
          <option>全部</option>
          {TYPES.map(t => <option key={t}>{t}</option>)}
        </select>
        <select className="filter-select" value={fStatus} onChange={e => setFStatus(e.target.value)}>
          <option>全部</option>
          {STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        <button className="add-btn" onClick={() => open('add')}>＋ 新增函件</button>
      </div>
      <div className="content">
        {loading ? (
          <div className="loading"><span className="spinner dark" style={{marginRight:10}}/> 載入中...</div>
        ) : shown.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">📭</div>
            <div className="empty-text">
              {(search || fType !== '全部' || fStatus !== '全部')
                ? '找不到符合條件的記錄'
                : '尚無函件記錄，點擊「新增函件」開始建立'}
            </div>
          </div>
        ) : (
          <div className="records-grid">
            {shown.map(r => (
              <RecordCard key={r.id} rec={r}
                onView={r => open('view', r)}
                onEdit={r => open('edit', r)}
                onDelete={handleDelete}
              />
            ))}
          </div>
        )}
      </div>

      {modal === 'add' && <RecordModal init={emptyRecord()} onClose={close} onSaved={() => {}} />}
      {modal === 'edit' && sel && <RecordModal init={sel} onClose={close} onSaved={() => {}} />}
      {modal === 'view' && sel && (
        <DetailModal rec={sel} onClose={close} onEdit={r => { close(); setTimeout(() => open('edit', r), 50); }} />
      )}
    </>
  );
}

// ─── Template Upload Modal ────────────────────────────────────────────────────
function TemplateUploadModal({ onClose }) {
  const [name,  setName]  = useState('');
  const [type,  setType]  = useState('存證信函');
  const [notes, setNotes] = useState('');
  const [file,  setFile]  = useState(null);
  const [progress, setProgress] = useState(0);
  const [busy,  setBusy]  = useState(false);
  const fileRef = useRef();

  const handleSave = async () => {
    if (!name.trim()) { alert('請填寫範本名稱'); return; }
    if (!file)        { alert('請選擇範本檔案'); return; }
    setBusy(true);
    try {
      const docId = db.collection('templates').doc().id;
      const ref   = storage.ref(`templates/${type}/${docId}_${file.name}`);
      const task  = ref.put(file);
      await new Promise((res, rej) => {
        task.on('state_changed',
          s  => setProgress(Math.round(s.bytesTransferred / s.totalBytes * 100)),
          rej,
          async () => {
            const url = await task.snapshot.ref.getDownloadURL();
            await db.collection('templates').doc(docId).set({
              name:       name.trim(),
              type,
              notes,
              fileUrl:    url,
              fileName:   file.name,
              fileSize:   file.size,
              uploadedAt: firebase.firestore.FieldValue.serverTimestamp(),
            });
            res();
          }
        );
      });
      onClose();
    } catch(e) {
      alert('上傳失敗：' + e.message);
      setBusy(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:480}} onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">上傳範本</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group full">
              <label className="form-label">範本名稱 <span className="req">*</span></label>
              <input className="form-input" value={name} onChange={e => setName(e.target.value)} placeholder="例：租賃爭議存證信函範本" />
            </div>
            <div className="form-group">
              <label className="form-label">函件類型</label>
              <select className="form-select" value={type} onChange={e => setType(e.target.value)}>
                {TYPES.map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group full">
              <label className="form-label">備註說明</label>
              <textarea className="form-textarea" rows={2} value={notes} onChange={e => setNotes(e.target.value)} placeholder="適用情境、使用說明..." />
            </div>
            <div className="form-group full">
              <label className="form-label">範本檔案 <span className="req">*</span></label>
              <div
                className={`upload-zone ${file ? 'filled' : ''} ${busy ? 'busy' : ''}`}
                onClick={() => !busy && fileRef.current?.click()}
              >
                <input ref={fileRef} type="file" style={{display:'none'}} accept=".pdf,.doc,.docx"
                  onChange={e => e.target.files[0] && setFile(e.target.files[0])} />
                <div className="upload-icon">{file ? '✅' : '📄'}</div>
                <div className="upload-text">
                  {file ? <strong>{file.name}</strong> : <><strong>點擊選擇範本檔案</strong><br/><span>PDF、Word 皆可</span></>}
                </div>
                <div className="upload-hint">支援 .pdf · .doc · .docx</div>
                {busy && progress > 0 && progress < 100 && (
                  <div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}} /></div>
                )}
              </div>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn-cancel" onClick={onClose}>取消</button>
          <button className="btn-save" onClick={handleSave} disabled={busy}>
            {busy ? <><span className="spinner" /> {progress > 0 && progress < 100 ? `上傳中 ${progress}%` : '處理中...'}</> : '⬆ 上傳範本'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Templates Tab ────────────────────────────────────────────────────────────
function TemplatesTab() {
  const [templates, setTemplates] = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [filter,    setFilter]    = useState('全部');
  const [showUp,    setShowUp]    = useState(false);

  useEffect(() => {
    return db.collection('templates')
      .orderBy('uploadedAt', 'desc')
      .onSnapshot(snap => {
        setTemplates(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        setLoading(false);
      }, err => { console.error(err); setLoading(false); });
  }, []);

  const shown = templates.filter(t => filter === '全部' || t.type === filter);

  const handleDelete = async t => {
    if (!confirm(`確定刪除範本「${t.name}」？\n（Storage 中的檔案也會一併刪除）`)) return;
    try {
      if (t.fileUrl) {
        try { await storage.refFromURL(t.fileUrl).delete(); } catch {}
      }
      await db.collection('templates').doc(t.id).delete();
    } catch(e) { alert('刪除失敗：' + e.message); }
  };

  return (
    <div className="template-section">
      <div className="tpl-top">
        <div className="type-pills">
          {['全部','存證信函','律師函'].map(v => (
            <button key={v}
              className={`type-pill ${filter === v ? `p-${v === '存證信函' ? '存證' : v === '律師函' ? '律師' : '全部'}` : ''}`}
              onClick={() => setFilter(v)}
            >{v}</button>
          ))}
        </div>
        <button className="add-btn" onClick={() => setShowUp(true)}>⬆ 上傳範本</button>
      </div>

      {loading ? (
        <div className="loading"><span className="spinner dark" style={{marginRight:10}}/> 載入中...</div>
      ) : shown.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">📂</div>
          <div className="empty-text">尚無{filter !== '全部' ? filter : ''}範本，點擊「上傳範本」新增</div>
        </div>
      ) : (
        <div className="template-grid">
          {shown.map(t => (
            <div className="template-card" key={t.id}>
              <div className="tpl-card-header">
                <div className="tpl-name">{t.name}</div>
                <span className={`badge ${t.type === '存證信函' ? 'b-存證' : 'b-律師'}`}>
                  {t.type === '存證信函' ? '存證' : '律師函'}
                </span>
              </div>
              <div className="tpl-meta">
                📄 {t.fileName}{t.fileSize ? ` · ${fmtSize(t.fileSize)}` : ''}{t.uploadedAt ? ` · ${fmtTS(t.uploadedAt)}` : ''}
              </div>
              {t.notes && <div className="tpl-notes">{t.notes}</div>}
              <div className="tpl-actions">
                <a className="btn-dl" href={t.fileUrl} target="_blank" rel="noopener noreferrer">⬇ 下載</a>
                <button className="btn-del" onClick={() => handleDelete(t)}>刪除</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {showUp && <TemplateUploadModal onClose={() => setShowUp(false)} />}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(undefined);
  const [tab,  setTab]  = useState('records');

  useEffect(() => auth.onAuthStateChanged(u => setUser(u)), []);

  if (user === undefined) {
    return <div className="loading" style={{minHeight:'100vh', background:'var(--bg)'}}>
      <span className="spinner dark" style={{marginRight:10}} /> 載入中...
    </div>;
  }
  if (!user) return <LoginScreen />;

  return (
    <div style={{minHeight:'100vh'}}>
      <div className="header">
        <div className="header-brand">
          <span style={{fontSize:20}}>⚖</span>
          <span className="header-title">函件管理系統</span>
        </div>
        <div className="header-right">
          <span className="header-user">{user.email}</span>
          <button className="logout-btn" onClick={() => auth.signOut()}>登出</button>
        </div>
      </div>
      <div className="tabs">
        <button className={`tab-btn ${tab === 'records' ? 'active' : ''}`} onClick={() => setTab('records')}>
          📋 函件記錄
        </button>
        <button className={`tab-btn ${tab === 'templates' ? 'active' : ''}`} onClick={() => setTab('templates')}>
          📁 範本管理
        </button>
      </div>
      {tab === 'records'   ? <RecordsTab />   : <TemplatesTab />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
