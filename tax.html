<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="稅務管理">
<meta name="theme-color" content="#FAF7F0">
<title>💰 律師事務所稅務管理系統</title>
<link rel="apple-touch-icon" href="icons/icon-tax.png">
<link rel="icon" type="image/png" href="icons/icon-tax.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* ── legal-design-tw 權杖 ── */
  --paper:#FAF7F0;--paper-raised:#FFFFFF;--paper-sunken:#F1ECE1;
  --ink:#211E1A;--ink-soft:#5B554D;--ink-faint:#8A8377;
  --seal:#9E2A24;--seal-bright:#C0392B;--seal-wash:#F3E3DF;
  --positive:#3A6B4F;--negative:#9E2A24;--warning:#A6741C;--navy:#2A3D4F;
  --positive-wash:#E7EFE9;--warning-wash:#F3EBDA;
  --rule:#DDD5C7;--rule-strong:#C4BAA6;
  --font-kai:"BiauKai","DFKai-SB","標楷體","KaiTi","STKaiti","Kaiti TC","Noto Serif TC",serif;
  --font-song:"Noto Serif TC","Source Han Serif TC","PMingLiU","新細明體","Songti TC",serif;
  --shadow-raised:0 2px 10px rgba(33,30,26,.10);
  /* ── 舊變數別名 → 權杖（既有 inline var(--…) 自動換色）── */
  --bg:var(--paper);--bg2:var(--paper-raised);--bg3:var(--paper-raised);--bg4:var(--paper-sunken);--bg5:var(--paper-sunken);
  --green:var(--positive);--green2:var(--positive);--green3:var(--positive);
  --gold:var(--warning);--gold2:var(--warning);--gold3:var(--warning);
  --text:var(--ink);--text2:var(--ink-soft);--text3:var(--ink-soft);--text4:var(--ink-faint);
  --red:var(--negative);--blue:var(--navy);--purple:var(--seal);--orange:var(--warning);
  --border:var(--rule);--border2:var(--rule-strong);--shadow:none;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--paper);color:var(--ink);font-family:var(--font-song);line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--paper);}
::-webkit-scrollbar-thumb{background:var(--rule-strong);border-radius:2px;}

.sys-nav{position:fixed;top:0;left:0;right:0;z-index:9999;background:var(--paper-raised);border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:2px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;}
.sys-nav::-webkit-scrollbar{display:none;}
.sys-nav-item{display:inline-flex;align-items:center;padding:6px 13px;border-radius:2px;font-size:12px;font-weight:700;white-space:nowrap;transition:all .15s;text-decoration:none;border:1px solid transparent;font-family:var(--font-kai);}
.sys-nav-item.active{background:var(--seal);color:var(--paper-raised);border-color:var(--seal);cursor:default;}
a.sys-nav-item{color:var(--ink-soft);}
a.sys-nav-item:hover{background:var(--paper-sunken);color:var(--seal);}
.sys-nav-logo{font-size:14px;color:var(--seal);margin-right:6px;flex-shrink:0;border-right:1px solid var(--rule);padding-right:10px;}

.app{min-height:100vh;padding-top:41px;}
.hdr{background:var(--paper-raised);border-bottom:2px solid var(--seal);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:41px;z-index:200;}
.hdr-title{font-family:var(--font-kai);font-size:1.05rem;letter-spacing:.05em;color:var(--ink);}
.hdr-sub{font-size:9px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase;}
.hdr-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}

.tab-bar{background:var(--paper-raised);border-bottom:1px solid var(--rule);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:93px;z-index:150;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:10px 16px;border:none;background:transparent;color:var(--ink-soft);font-weight:500;font-size:12px;cursor:pointer;font-family:var(--font-kai);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--seal);font-weight:700;border-bottom-color:var(--seal);}

.btn{padding:8px 14px;border-radius:2px;font-weight:700;cursor:pointer;border:1px solid var(--rule-strong);display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:var(--font-kai);letter-spacing:.03em;background:var(--paper-raised);color:var(--ink);transition:all .15s;white-space:nowrap;}
.btn:active{opacity:.8;}
.btn-green{background:var(--seal);border-color:var(--seal);color:var(--paper-raised);}
.btn-green:hover{background:var(--seal-bright);border-color:var(--seal-bright);}
.btn-outline{background:transparent;border:1px solid var(--rule-strong);color:var(--ink-soft);}
.btn-outline:hover{border-color:var(--seal);color:var(--seal);}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid transparent;}
.btn-ghost:hover{color:var(--seal);background:var(--paper-sunken);}
.btn-danger{background:transparent;color:var(--seal);border:1px solid var(--seal);}
.btn-danger:hover{background:var(--seal-wash);}
.btn-sm{padding:6px 11px;font-size:11px;}
.btn-xs{padding:4px 8px;font-size:10px;}

.content{padding:16px 18px;max-width:1000px;margin:0 auto;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:12px 14px;}
.stat-val{font-family:var(--font-kai);font-size:20px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;color:var(--ink);}
.stat-lbl{font-size:9px;color:var(--ink-faint);margin-top:4px;letter-spacing:.04em;text-transform:uppercase;}

.card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:14px 16px;margin-bottom:12px;}
.card-hdr{font-family:var(--font-kai);font-size:9px;font-weight:700;color:var(--ink-soft);letter-spacing:.1em;text-transform:uppercase;padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--rule);}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--rule);}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:11px;color:var(--ink-faint);min-width:100px;}
.info-val{font-size:12px;color:var(--ink);text-align:right;font-weight:700;}

.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}

.fi{background:var(--paper-raised);border:1px solid var(--rule);border-radius:2px;padding:8px 11px;color:var(--ink);font-size:12px;outline:none;font-family:var(--font-song);transition:border-color .15s,box-shadow .15s;width:100%;}
.fi:focus{border-color:var(--seal);box-shadow:0 0 0 3px var(--seal-wash);}
select.fi{width:auto;}
textarea.fi{resize:vertical;font-size:12px;line-height:1.7;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:9px;color:var(--ink-soft);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.form-section{font-family:var(--font-kai);font-size:10px;font-weight:700;color:var(--seal);border-left:4px solid var(--seal);padding-left:10px;margin:18px 0 10px;letter-spacing:.06em;}

/* deadline cards */
.deadline-card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:14px;}
.deadline-icon{width:44px;height:44px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.deadline-urgent{border-color:var(--seal);border-left:4px solid var(--seal);background:var(--seal-wash);}
.deadline-soon{border-color:var(--warning);border-left:4px solid var(--warning);background:var(--warning-wash);}
.deadline-ok{border-color:var(--rule);border-left:4px solid var(--positive);}

/* progress bar */
.prog-bar{height:8px;background:var(--paper-sunken);border-radius:2px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;border-radius:2px;transition:width .6s;}

/* tax rate table */
.tax-table{width:100%;border-collapse:collapse;font-size:12px;}
.tax-table th{background:var(--paper-sunken);color:var(--ink-soft);padding:8px 12px;text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-kai);border-bottom:1px solid var(--rule);}
.tax-table td{padding:8px 12px;border-bottom:1px solid var(--rule);color:var(--ink-soft);font-variant-numeric:tabular-nums;}
.tax-table tr.active-bracket td{background:var(--seal-wash);color:var(--ink);font-weight:700;}

/* record cards */
.rec-card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}

.badge{display:inline-flex;align-items:center;gap:3px;border-radius:2px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid currentColor;background:transparent;}

.overlay{position:fixed;inset:0;background:rgba(33,30,26,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.dialog{background:var(--paper-raised);border:1px solid var(--rule-strong);border-radius:4px;padding:24px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-raised);}
.dialog-title{font-family:var(--font-kai);font-size:15px;font-weight:700;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

.empty{text-align:center;padding:50px 20px;color:var(--ink-faint);}
.empty-ico{font-size:44px;margin-bottom:12px;opacity:.35;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--ink-soft);}
.spinner{width:36px;height:36px;border:3px solid var(--paper-sunken);border-top-color:var(--seal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--paper-raised);border:1px solid var(--rule-strong);border-top:3px solid var(--seal);border-radius:4px;padding:40px 36px;width:100%;max-width:380px;box-shadow:var(--shadow-raised);}
.login-err{background:var(--seal-wash);border:1px solid transparent;color:var(--seal);border-radius:2px;padding:10px 14px;font-size:13px;margin-bottom:14px;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);border:1px solid var(--ink);color:var(--paper);padding:10px 22px;border-radius:2px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

.bnav{display:none;}
@media(max-width:640px){
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:200;}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;font-size:9px;color:var(--text3);cursor:pointer;gap:2px;border:none;background:transparent;font-family:inherit;}
  .bnav-btn.active{color:var(--green);}
  .bnav-icon{font-size:18px;}
  .app{padding-bottom:72px;}
  .content{padding:12px 14px;}
}
a{color:var(--blue);}

/* ios-no-autozoom */@media(max-width:768px){input,select,textarea{font-size:16px!important}}
</style>

<body>
<script src="shared/sys-nav.js" data-active="tax"></script>
<div id="root"></div>
<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
const cfg={apiKey:"AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",authDomain:"legalcasemanageer.firebaseapp.com",projectId:"legalcasemanageer",storageBucket:"legalcasemanageer.firebasestorage.app",messagingSenderId:"559838504556",appId:"1:559838504556:web:ba10c071a12650bbd85a49"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const auth=getAuth(app);

// ══════════════════════════════════════════
// 台灣稅務常數
// ══════════════════════════════════════════
// 綜合所得稅稅率級距（2024）
const TAX_BRACKETS=[
  {min:0,      max:590000,  rate:.05,  deduct:0},
  {min:590000, max:1330000, rate:.12,  deduct:41300},
  {min:1330000,max:2660000, rate:.20,  deduct:147700},
  {min:2660000,max:4980000, rate:.30,  deduct:413700},
  {min:4980000,max:Infinity,rate:.40,  deduct:911700},
];
// 執行業務費用率：律師 30%
const LAWYER_EXPENSE_RATE=0.30;
// 二代健保補充保費率
const SUPP_PREMIUM_RATE=0.0211;
const SUPP_PREMIUM_THRESHOLD=20000;
// 免稅額（2024）
const EXEMPTION=97000;
// 標準扣除額（單身）
const STD_DEDUCTION=131000;
// 特別扣除額（薪資）—執行業務者適用「其他扣除」
const SPECIAL_DEDUCTION=0;

const EXPENSE_CATS=["辦公室租金","律師公會費","電話/網路","辦公設備","書籍資料","交通費","訴訟費用代墊","保險費","水電費","其他費用"];
const INCOME_TYPES=["律師費","顧問費","出庭費","文件費","其他收入"];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
function twToday(){return new Date(new Date().getTime()+8*3600000).toISOString().split("T")[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmt(n,dec=0){return n===undefined||n===null?"—":"NT$ "+Math.round(n).toLocaleString("zh-TW");}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function toast(msg){const t=document.getElementById("toast");if(!t)return;t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400);}
function applyTheme(m){const eff=m==="auto"?(new Date().getHours()>=6&&new Date().getHours()<20?"light":"dark"):m;document.documentElement.classList.toggle("light",eff==="light");}

let S={
  user:null,authChecked:false,
  incomes:[],expenses:[],cases:[],loading:true,
  tab:"dashboard",
  year:new Date().getFullYear(),
  month:new Date().getMonth()+1,
  themeMode:localStorage.getItem("taxTheme")||"dark",
  // forms
  showIncomeForm:false,showExpenseForm:false,
  editIncomeId:null,editExpenseId:null,
  incomeForm:{date:twToday(),type:"律師費",amount:"",client:"",note:"",hasSuppPremium:false},
  expenseForm:{date:twToday(),category:"辦公室租金",amount:"",note:"",receipt:false},
  delConfirm:null,
};

applyTheme(S.themeMode);

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
onAuthStateChanged(auth,u=>{
  u = (u && !u.isAnonymous) ? u : null; // 忽略匿名登入（僅帳號密碼登入者為管理員）
  S.user=u;S.authChecked=true;
  if(u){
    try{const c=localStorage.getItem("tax_income_cache");if(c)S.incomes=JSON.parse(c);}catch(_){}
    try{const c=localStorage.getItem("tax_expense_cache");if(c)S.expenses=JSON.parse(c);}catch(_){}
    S.loading=false;render();
    onSnapshot(collection(db,"taxIncomes"),snap=>{
      S.incomes=snap.docs.map(d=>({...d.data(),id:d.id}));
      try{localStorage.setItem("tax_income_cache",JSON.stringify(S.incomes));}catch(_){}
      render();
    });
    onSnapshot(collection(db,"taxExpenses"),snap=>{
      S.expenses=snap.docs.map(d=>({...d.data(),id:d.id}));
      try{localStorage.setItem("tax_expense_cache",JSON.stringify(S.expenses));}catch(_){}
      render();
    });
    // 讀取案件管理系統的收款（收入），與本系統手動收入合併
    try{const c=localStorage.getItem("tax_cases_cache");if(c)S.cases=JSON.parse(c);}catch(_){}
    onSnapshot(collection(db,"cases"),snap=>{
      S.cases=snap.docs.map(d=>({...d.data(),id:d.id}));
      try{localStorage.setItem("tax_cases_cache",JSON.stringify(S.cases));}catch(_){}
      render();
    },err=>{ console.warn("cases 同步失敗：",err.code||err.message); });
  }else{S.loading=false;render();}
});

async function saveIncome(){
  const f=S.incomeForm;
  if(!f.amount||!f.date){toast("⚠️ 請填寫日期和金額");return;}
  const id=S.editIncomeId||uid();
  const amt=parseFloat(f.amount)||0;
  const supp=amt>=SUPP_PREMIUM_THRESHOLD?Math.round(amt*SUPP_PREMIUM_RATE):0;
  try{
    await setDoc(doc(db,"taxIncomes",id),{...f,amount:amt,suppPremium:f.hasSuppPremium?supp:0,id,updatedAt:new Date().toISOString()});
  }catch(e){ console.error(e); toast("⚠️ 儲存失敗，請檢查網路後重試"); return; }
  toast("✅ 收入已記錄");S.showIncomeForm=false;S.editIncomeId=null;
  S.incomeForm={date:twToday(),type:"律師費",amount:"",client:"",note:"",hasSuppPremium:false};render();
}
async function saveExpense(){
  const f=S.expenseForm;
  if(!f.amount||!f.date){toast("⚠️ 請填寫日期和金額");return;}
  const id=S.editExpenseId||uid();
  try{
    await setDoc(doc(db,"taxExpenses",id),{...f,amount:parseFloat(f.amount)||0,id,updatedAt:new Date().toISOString()});
  }catch(e){ console.error(e); toast("⚠️ 儲存失敗，請檢查網路後重試"); return; }
  toast("✅ 支出已記錄");S.showExpenseForm=false;S.editExpenseId=null;
  S.expenseForm={date:twToday(),category:"辦公室租金",amount:"",note:"",receipt:false};render();
}
async function delRecord(col,id){
  try{
    await deleteDoc(doc(db,col,id));
  }catch(e){ console.error(e); toast("⚠️ 儲存失敗，請檢查網路後重試"); return; }
  toast("🗑 已刪除");S.delConfirm=null;render();
}

// ══════════════════════════════════════════
// 稅務計算函數
// ══════════════════════════════════════════
// 案件系統收款 → 收入記錄（唯讀，於案件系統管理）
function caseIncomes(){
  const out=[];
  (S.cases||[]).forEach(c=>{
    (c.payments||[]).forEach((p,idx)=>{
      if(!p.date||!(Number(p.amount)>0))return;
      out.push({
        id:`case:${c.id}:${idx}`, date:p.date, amount:Number(p.amount||0),
        type:"律師費", client:c.clientName||"", firmCaseNo:c.firmCaseNo||"",
        note:[p.method,p.note].filter(Boolean).join(" · "),
        source:"case", suppPremium:0,
      });
    });
  });
  return out;
}
// 全部收入 = 案件收款 + 手動收入
function allIncomes(){ return [...caseIncomes(), ...S.incomes]; }

function getYearIncomes(y){return allIncomes().filter(i=>i.date?.startsWith(y));}
function getYearExpenses(y){return S.expenses.filter(e=>e.date?.startsWith(y));}

function calcIncomeTax(y){
  const incomes=getYearIncomes(y);
  const expenses=getYearExpenses(y);
  const grossIncome=incomes.reduce((s,i)=>s+Number(i.amount||0),0);
  const actualExpense=expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const standardExpense=Math.round(grossIncome*LAWYER_EXPENSE_RATE);
  const useActual=actualExpense>standardExpense;
  const netIncome=grossIncome-(useActual?actualExpense:standardExpense);
  const taxableIncome=Math.max(0,netIncome-EXEMPTION-STD_DEDUCTION);
  let tax=0,bracket=null;
  for(const b of TAX_BRACKETS){
    if(taxableIncome>b.min){
      tax=Math.round(taxableIncome*b.rate-b.deduct);
      bracket=b;
    }
  }
  const suppPremiums=incomes.reduce((s,i)=>s+Number(i.suppPremium||0),0);
  return{grossIncome,actualExpense,standardExpense,useActual,netIncome,taxableIncome,tax:Math.max(0,tax),bracket,suppPremiums};
}


function getMonthSummary(y,m){
  const ms=String(m).padStart(2,"0");
  const incomes=allIncomes().filter(i=>i.date?.startsWith(`${y}-${ms}`));
  const expenses=S.expenses.filter(e=>e.date?.startsWith(`${y}-${ms}`));
  return{
    income:incomes.reduce((s,i)=>s+Number(i.amount||0),0),
    expense:expenses.reduce((s,e)=>s+Number(e.amount||0),0),
    suppPremium:incomes.reduce((s,i)=>s+Number(i.suppPremium||0),0),
    count:incomes.length,
  };
}

// 申報期限計算
function getDeadlines(){
  const now=new Date(new Date().getTime()+8*3600000);
  const y=now.getFullYear();const m=now.getMonth()+1;
  const deadlines=[];
  // 綜合所得稅（5月31日）
  const itDeadline=new Date(y,4,31);
  const itDiff=Math.ceil((itDeadline-now)/(1000*60*60*24));
  if(itDiff>-30&&itDiff<365){
    deadlines.push({label:`${y}年綜合所得稅申報`,date:`${y}/5/31`,days:itDiff,type:"income",note:`申報${y-1}年度執行業務所得`});
  }
  // 二代健保年度申報（1月31日）
  const nhDeadline=new Date(y,0,31);
  const nhDiff=Math.ceil((nhDeadline-now)/(1000*60*60*24));
  if(nhDiff>-10){
    deadlines.push({label:`${y}年二代健保年度申報`,date:`${y}/1/31`,days:nhDiff,type:"health",note:"申報單次給付超過2萬元之補充保費"});
  }
  return deadlines.sort((a,b)=>a.days-b.days);
}

      <div>• 例：收到律師費 NT$ 100,000 → 補充保費 NT$ ${Math.round(100000*SUPP_PREMIUM_RATE).toLocaleString()}</div>
      <div>• 委託人應於次月底前繳納，並於隔年1月底前申報</div>
    </div>
  </div>

  <div class="stat-grid" style="margin-bottom:16px">
    <div class="stat-card"><div class="stat-val" style="color:var(--blue)">${fmt(totalSupp)}</div><div class="stat-lbl">${y}年補充保費合計</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${suppList.length}筆</div><div class="stat-lbl">已記錄筆數</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${pending.length>0?"var(--orange)":"var(--green)"};">${pending.length}筆</div><div class="stat-lbl">待確認是否扣繳</div></div>
  </div>

  ${pending.length>0?`<div class="card" style="border-color:rgba(249,115,22,.4);background:rgba(249,115,22,.03);margin-bottom:14px">
    <div class="card-hdr" style="color:var(--orange)">⚠️ 以下收入超過2萬元，請確認委託人是否已代扣補充保費</div>
    ${pending.map(i=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(249,115,22,.1)">
      <div><div style="font-size:13px;font-weight:700">${fmt(Number(i.amount))}</div><div style="font-size:11px;color:var(--text3)">${i.date}${i.client?" · "+esc(i.client):""}</div></div>
      <div style="font-size:12px;color:var(--orange)">應扣 ${fmt(Math.round(Number(i.amount)*SUPP_PREMIUM_RATE))}</div>
    </div>`).join("")}
  </div>`:""}

  ${suppList.length>0?`<div class="card">
    <div class="card-hdr">✅ 已記錄補充保費</div>
    ${suppList.map(i=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
      <div><div style="font-size:13px;font-weight:700">${fmt(Number(i.amount))}<span style="font-size:11px;color:var(--text3);font-weight:400"> 收入</span></div><div style="font-size:11px;color:var(--text3)">${i.date}${i.client?" · "+esc(i.client):""}</div></div>
      <div style="text-align:right"><div style="font-size:12px;font-weight:700;color:var(--blue)">扣 ${fmt(Number(i.suppPremium))}</div><div style="font-size:10px;color:var(--text4)">2.11%</div></div>
    </div>`).join("")}
    <div style="margin-top:10px;padding:8px 10px;background:var(--bg);border-radius:6px;display:flex;justify-content:space-between">
      <span style="font-size:12px;color:var(--text3)">合計補充保費</span>
      <span style="font-size:14px;font-weight:800;color:var(--blue)">${fmt(totalSupp)}</span>
    </div>
  </div>`:""}`;}

// ── 申報期限 ──
function renderDeadlines(){
  const deadlines=getDeadlines();
  const getUrgency=d=>{
    if(d.days<=0)return{cls:"deadline-urgent",ico:"🚨",col:"var(--red)",label:"已逾期"};
    if(d.days<=14)return{cls:"deadline-urgent",ico:"⚠️",col:"var(--red)",label:`${d.days}天後`};
    if(d.days<=30)return{cls:"deadline-soon",ico:"⏰",col:"var(--orange)",label:`${d.days}天後`};
    return{cls:"deadline-ok",ico:"📅",col:"var(--green)",label:`${d.days}天後`};
  };
  const typeIco={"vat":"🧾","income":"📊","health":"🏥"};
  const typeColor={"vat":"var(--gold)","income":"var(--purple)","health":"var(--blue)"};
  return`
  <div style="font-size:12px;color:var(--text3);margin-bottom:14px">系統自動計算未來60天及已逾期的申報期限</div>
  ${deadlines.length===0?`<div class="empty"><div class="empty-ico">✅</div><div>近期無待申報項目</div></div>`:""}
  ${deadlines.map(d=>{
    const u=getUrgency(d);
    return`<div class="deadline-card ${u.cls}">
      <div class="deadline-icon" style="background:${typeColor[d.type]}22;border:1px solid ${typeColor[d.type]}44">
        <span style="font-size:22px">${typeIco[d.type]}</span>
      </div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px">${d.label}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:5px">${d.note}</div>
        <div style="font-size:12px;color:var(--text2)">截止日期：<strong>${d.date}</strong></div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:20px;font-weight:800;color:${u.col}">${u.ico}</div>
        <div style="font-size:12px;font-weight:700;color:${u.col};margin-top:2px">${u.label}</div>
      </div>
    </div>`;
  }).join("")}

  <div class="card" style="margin-top:20px;border-color:rgba(167,139,250,.3)">
    <div class="card-hdr" style="color:var(--purple)">📋 年度申報行事曆</div>
    ${[
      ["1月","二代健保年度補報（1/31）"],
      ["5月","🌟 綜合所得稅申報（5/31）—申報上年度執行業務所得"],
      ["隨時","單次給付逾 2 萬元之二代健保補充保費，由給付方於次月底前扣繳"],
    ].map(([m,note])=>`<div style="display:flex;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span style="color:var(--purple);font-weight:700;min-width:30px">${m}</span>
      <span style="color:var(--text2)">${note}</span>
    </div>`).join("")}
    <div style="margin-top:12px;font-size:11px;color:var(--text3);line-height:1.7">※ 律師執行業務收入屬勞務報酬，<strong>免徵營業稅</strong>，故本系統不列營業稅申報。</div>
  </div>`;}

// ── Income Form ──
function renderIncomeForm(){
  const f=S.incomeForm;
  const amt=parseFloat(f.amount)||0;
  const supp=amt>=SUPP_PREMIUM_THRESHOLD?Math.round(amt*SUPP_PREMIUM_RATE):0;
  return`<div class="overlay"><div class="dialog">
  <div class="dialog-title">💵 ${S.editIncomeId?"編輯收入":"新增收入"}</div>
  <div class="form-grid">
    <div class="fg"><label class="fl">日期</label><input class="fi" type="date" id="if-date" value="${f.date}"></div>
    <div class="fg"><label class="fl">類型</label><select class="fi fi-full" id="if-type">${INCOME_TYPES.map(t=>`<option${f.type===t?" selected":""}>${t}</option>`).join("")}</select></div>
    <div class="fg"><label class="fl">金額（元）</label><input class="fi" type="number" min="0" id="if-amount" value="${f.amount}" placeholder="0"></div>
    <div class="fg"><label class="fl">委託人</label><input class="fi" id="if-client" value="${esc(f.client||"")}" placeholder="當事人姓名"></div>
  </div>
  <div class="fg" style="margin-bottom:12px"><label class="fl">備註</label><input class="fi" id="if-note" value="${esc(f.note||"")}" placeholder="案號、摘要…"></div>
  ${amt>=SUPP_PREMIUM_THRESHOLD?`
  <div style="background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.3);border-radius:8px;padding:10px 14px;margin-bottom:12px">
    <div style="font-size:12px;color:var(--blue);font-weight:700;margin-bottom:6px">🏥 二代健保補充保費（此筆超過2萬元）</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">應扣補充保費：<strong style="color:var(--blue)">${fmt(supp)}</strong>（${(SUPP_PREMIUM_RATE*100)}%）</div>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--text2)">
      <input type="checkbox" id="if-supp" ${f.hasSuppPremium?"checked":""}>
      委託人已代扣補充保費，記錄此筆
    </label>
  </div>`:`<div style="font-size:11px;color:var(--text4);margin-bottom:12px">金額未達2萬元，無需扣繳二代健保補充保費</div>`}
  <div style="display:flex;gap:10px;justify-content:flex-end">
    <button class="btn btn-outline btn-sm" id="if-cancel">取消</button>
    <button class="btn btn-green btn-sm" id="if-save">💾 儲存</button>
  </div>
</div></div>`;}

// ── Expense Form ──
function renderExpenseForm(){
  const f=S.expenseForm;
  return`<div class="overlay"><div class="dialog">
  <div class="dialog-title">📤 ${S.editExpenseId?"編輯支出":"新增支出"}</div>
  <div class="form-grid">
    <div class="fg"><label class="fl">日期</label><input class="fi" type="date" id="ef-date" value="${f.date}"></div>
    <div class="fg"><label class="fl">類別</label><select class="fi fi-full" id="ef-cat">${EXPENSE_CATS.map(c=>`<option${f.category===c?" selected":""}>${c}</option>`).join("")}</select></div>
    <div class="fg"><label class="fl">金額（元）</label><input class="fi" type="number" min="0" id="ef-amount" value="${f.amount}" placeholder="0"></div>
  </div>
  <div class="fg" style="margin-bottom:12px"><label class="fl">備註</label><input class="fi" id="ef-note" value="${esc(f.note||"")}" placeholder="供應商、說明…"></div>
  <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--text2);margin-bottom:16px">
    <input type="checkbox" id="ef-receipt" ${f.receipt?"checked":""}>
    此筆有憑證（統一發票／收據，可列報為執行業務費用）
  </label>
  <div style="display:flex;gap:10px;justify-content:flex-end">
    <button class="btn btn-outline btn-sm" id="ef-cancel">取消</button>
    <button class="btn btn-green btn-sm" id="ef-save">💾 儲存</button>
  </div>
</div></div>`;}

function renderDelDialog(){return`<div class="overlay"><div class="dialog">
  <div class="dialog-title">確認刪除此記錄？</div>
  <div style="color:var(--text3);margin-bottom:20px;font-size:13px">此操作無法復原。</div>
  <div style="display:flex;gap:10px;justify-content:flex-end">
    <button class="btn btn-outline btn-sm" id="dc">取消</button>
    <button class="btn btn-sm" style="background:var(--red);color:#fff" id="dd">確認刪除</button>
  </div>
</div></div>`;}

// ══════════════════════════════════════════
// BIND
// ══════════════════════════════════════════
function bindApp(){
  document.getElementById("btn-theme")?.addEventListener("click",()=>{S.themeMode=S.themeMode==="dark"?"light":S.themeMode==="light"?"auto":"dark";localStorage.setItem("taxTheme",S.themeMode);applyTheme(S.themeMode);render();});
  document.getElementById("btn-logout")?.addEventListener("click",async()=>{if(confirm("確認登出？"))await signOut(auth);});
  document.getElementById("sel-year")?.addEventListener("change",e=>{S.year=parseInt(e.target.value);render();});
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.tab;render();}));
  document.getElementById("btn-add-income")?.addEventListener("click",()=>{S.incomeForm={date:twToday(),type:"律師費",amount:"",client:"",note:"",hasSuppPremium:false};S.editIncomeId=null;S.showIncomeForm=true;render();});
  document.getElementById("btn-add-expense")?.addEventListener("click",()=>{S.expenseForm={date:twToday(),category:"辦公室租金",amount:"",note:"",receipt:false};S.editExpenseId=null;S.showExpenseForm=true;render();});

  // Income form
  const ifAmt=document.getElementById("if-amount");
  ifAmt?.addEventListener("input",e=>{S.incomeForm.amount=e.target.value;render();});
  document.getElementById("if-supp")?.addEventListener("change",e=>{S.incomeForm.hasSuppPremium=e.target.checked;});
  document.getElementById("if-cancel")?.addEventListener("click",()=>{S.showIncomeForm=false;S.editIncomeId=null;render();});
  document.getElementById("if-save")?.addEventListener("click",()=>{
    S.incomeForm.date=document.getElementById("if-date")?.value||S.incomeForm.date;
    S.incomeForm.type=document.getElementById("if-type")?.value||S.incomeForm.type;
    S.incomeForm.amount=document.getElementById("if-amount")?.value||S.incomeForm.amount;
    S.incomeForm.client=document.getElementById("if-client")?.value||"";
    S.incomeForm.note=document.getElementById("if-note")?.value||"";
    S.incomeForm.hasSuppPremium=document.getElementById("if-supp")?.checked||false;
    saveIncome();
  });

  // Expense form
  document.getElementById("ef-cancel")?.addEventListener("click",()=>{S.showExpenseForm=false;S.editExpenseId=null;render();});
  document.getElementById("ef-save")?.addEventListener("click",()=>{
    S.expenseForm.date=document.getElementById("ef-date")?.value||S.expenseForm.date;
    S.expenseForm.category=document.getElementById("ef-cat")?.value||S.expenseForm.category;
    S.expenseForm.amount=document.getElementById("ef-amount")?.value||S.expenseForm.amount;
    S.expenseForm.note=document.getElementById("ef-note")?.value||"";
    S.expenseForm.receipt=document.getElementById("ef-receipt")?.checked||false;
    saveExpense();
  });

  // Edit income
  document.querySelectorAll("[data-edit-income]").forEach(b=>b.addEventListener("click",()=>{
    const inc=S.incomes.find(i=>i.id===b.dataset.editIncome);
    if(inc){S.incomeForm={...inc,amount:String(inc.amount)};S.editIncomeId=inc.id;S.showIncomeForm=true;render();}
  }));
  // Edit expense
  document.querySelectorAll("[data-edit-expense]").forEach(b=>b.addEventListener("click",()=>{
    const exp=S.expenses.find(e=>e.id===b.dataset.editExpense);
    if(exp){S.expenseForm={...exp,amount:String(exp.amount)};S.editExpenseId=exp.id;S.showExpenseForm=true;render();}
  }));
  // Delete
  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{S.delConfirm=b.dataset.del;render();}));
  document.getElementById("dc")?.addEventListener("click",()=>{S.delConfirm=null;render();});
  document.getElementById("dd")?.addEventListener("click",()=>{
    const[col,id]=S.delConfirm.split("|");delRecord(col,id);
  });
}

render();
</script>
</body>
</html>
