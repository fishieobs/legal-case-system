<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#FAF7F0">
<title>當事人資料填寫 · 禹河法律事務所</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📝%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'ChenYuluoyan';src:url('https://cdn.jsdelivr.net/gh/Chenyu-otf/chenyuluoyan_thin@6e36815b0bec9f4f948298698d00b27a5f0b65c1/ChenYuluoyan-2.0-Thin.ttf') format('truetype');font-weight:400;font-display:swap;}
:root{
  --paper:#FAF7F0;--paper-raised:#FFFFFF;--paper-sunken:#F1ECE1;
  --ink:#211E1A;--ink-soft:#5B554D;--ink-faint:#8A8377;
  --seal:#9E2A24;--seal-bright:#C0392B;--seal-wash:#F3E3DF;
  --rule:#DDD5C7;--rule-strong:#C4BAA6;
  --font-kai:"BiauKai","DFKai-SB","標楷體","KaiTi","STKaiti","Kaiti TC","Noto Serif TC",serif;
  --font-song:"Noto Serif TC","Source Han Serif TC","PMingLiU","新細明體","Songti TC",serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--paper);color:var(--ink);font-family:var(--font-song);line-height:1.7;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
.wrap{max-width:560px;margin:0 auto;padding:28px 18px 60px;}
.brand{text-align:center;margin:10px 0 22px;padding-bottom:18px;border-bottom:2px solid var(--seal);}
.brand-name{font-family:'ChenYuluoyan',var(--font-kai);font-size:34px;font-weight:400;color:var(--ink);letter-spacing:.06em;}
.brand-sub{font-family:var(--font-kai);font-size:11px;color:var(--ink-faint);letter-spacing:.22em;margin-top:8px;}
.card{background:var(--paper-raised);border:1px solid var(--rule-strong);border-radius:4px;padding:24px 22px;box-shadow:0 2px 10px rgba(33,30,26,.06);}
.title{font-family:var(--font-kai);font-size:19px;font-weight:700;letter-spacing:.04em;margin-bottom:8px;color:var(--ink);}
.lead{font-size:14px;color:var(--ink-soft);margin-bottom:4px;line-height:1.8;}
.sec{font-family:var(--font-kai);font-size:13px;font-weight:700;color:var(--seal);border-left:4px solid var(--seal);padding-left:10px;margin:22px 0 12px;letter-spacing:.06em;}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.fl{font-size:12px;color:var(--ink-soft);letter-spacing:.03em;}
.fl .req{color:var(--seal);}
.fi{background:var(--paper-raised);border:1px solid var(--rule);border-radius:2px;padding:11px 13px;color:var(--ink);font-size:16px;outline:none;font-family:var(--font-song);width:100%;transition:border-color .2s,box-shadow .2s;}
.fi:focus{border-color:var(--seal);box-shadow:0 0 0 3px var(--seal-wash);}
textarea.fi{resize:vertical;line-height:1.7;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:440px){.grid2{grid-template-columns:1fr;}}
.btn{width:100%;padding:14px;border-radius:2px;font-weight:700;cursor:pointer;border:1px solid var(--seal);font-size:16px;font-family:var(--font-kai);letter-spacing:.1em;background:var(--seal);color:var(--paper-raised);margin-top:10px;transition:background .15s;}
.btn:hover{background:var(--seal-bright);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.note{display:flex;gap:8px;align-items:flex-start;background:var(--paper-sunken);border:1px solid var(--rule);border-radius:3px;padding:12px 14px;font-size:12px;color:var(--ink-soft);margin-top:18px;line-height:1.7;}
.state{text-align:center;padding:40px 20px;}
.state-ico{font-size:52px;margin-bottom:16px;}
.state-title{font-family:var(--font-kai);font-size:19px;font-weight:700;letter-spacing:.04em;margin-bottom:8px;color:var(--ink);}
.state-msg{font-size:14px;color:var(--ink-soft);line-height:1.8;}
.spinner{width:34px;height:34px;border:3px solid var(--paper-sunken);border-top-color:var(--seal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--seal-wash);border:1px solid transparent;color:var(--seal);border-radius:2px;padding:10px 13px;font-size:13px;margin-top:10px;}
.footer{text-align:center;font-family:var(--font-kai);font-size:11px;color:var(--ink-faint);margin-top:24px;letter-spacing:.16em;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">禹河法律事務所</div>
    <div class="brand-sub">Client Intake · 當事人資料填寫</div>
  </div>
  <div id="root"></div>
  <div class="footer">🔒 本頁採加密傳輸，資料僅提供承辦律師使用</div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getFirestore,doc,getDoc,updateDoc}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const cfg={apiKey:"AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",authDomain:"legalcasemanageer.firebaseapp.com",projectId:"legalcasemanageer",storageBucket:"legalcasemanageer.firebasestorage.app",messagingSenderId:"559838504556",appId:"1:559838504556:web:ba10c071a12650bbd85a49"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const auth=getAuth(app);

const root=document.getElementById("root");
const params=new URLSearchParams(location.search);
const token=(params.get("t")||"").trim();

const CLIENT_TYPES=["個人","公司/法人","政府機關","其他"];
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function stateView(ico,title,msg){
  root.innerHTML=`<div class="card"><div class="state"><div class="state-ico">${ico}</div><div class="state-title">${title}</div><div class="state-msg">${msg}</div></div></div>`;
}
function loadingView(msg){
  root.innerHTML=`<div class="card"><div class="state"><div class="spinner"></div><div class="state-msg">${msg||"載入中…"}</div></div></div>`;
}

let intakeDoc=null;

function formView(){
  const name=intakeDoc.clientName||"";
  root.innerHTML=`<div class="card">
    <div class="title">📝 委任資料填寫</div>
    <div class="lead">${name?`${esc(name)} 您好，`:"您好，"}煩請填寫以下基本資料，完成後送出即可，資料將直接傳送給承辦律師。</div>

    <div class="sec">基本資料</div>
    <div class="fg"><label class="fl">姓名 / 名稱 <span class="req">*</span></label><input class="fi" id="i-name" value="${esc(name)}" placeholder="請填寫真實姓名或公司全名"></div>
    <div class="grid2">
      <div class="fg"><label class="fl">類型</label>
        <select class="fi" id="i-type">${CLIENT_TYPES.map(t=>`<option${t===(intakeDoc.clientType||"個人")?" selected":""}>${t}</option>`).join("")}</select></div>
      <div class="fg"><label class="fl">身分證字號 / 統一編號</label><input class="fi" id="i-id" placeholder="選填"></div>
    </div>

    <div class="sec">聯絡方式</div>
    <div class="grid2">
      <div class="fg"><label class="fl">手機 <span class="req">*</span></label><input class="fi" id="i-mobile" type="tel" inputmode="tel" placeholder="0912-345-678"></div>
      <div class="fg"><label class="fl">市話</label><input class="fi" id="i-phone" type="tel" inputmode="tel" placeholder="02-1234-5678"></div>
    </div>
    <div class="fg"><label class="fl">Email</label><input class="fi" id="i-email" type="email" inputmode="email" placeholder="選填"></div>
    <div class="fg"><label class="fl">通訊地址</label><input class="fi" id="i-address" placeholder="選填"></div>
    <div class="fg"><label class="fl">聯絡人（公司 / 法人適用）</label><input class="fi" id="i-contact" placeholder="選填"></div>

    <div class="sec">補充說明</div>
    <div class="fg"><label class="fl">想補充給律師的說明</label><textarea class="fi" id="i-note" rows="3" placeholder="選填，例如案件概況、方便聯絡的時間等"></textarea></div>

    <div id="i-err"></div>
    <button class="btn" id="i-submit">送出資料</button>

    <div class="note">🔒 <div>本連結為您專屬，請勿轉發他人。資料以加密方式傳送，僅承辦律師可於後台檢視；沒有連結者無法存取任何資料。</div></div>
  </div>`;

  document.getElementById("i-submit").addEventListener("click",submit);
}

async function submit(){
  const btn=document.getElementById("i-submit");
  const errEl=document.getElementById("i-err");
  const val=id=>(document.getElementById(id)?.value||"").trim();
  const data={
    name:val("i-name"), type:val("i-type"), idNumber:val("i-id"),
    mobile:val("i-mobile"), phone:val("i-phone"), email:val("i-email"),
    address:val("i-address"), contactPerson:val("i-contact"), note:val("i-note"),
  };
  if(!data.name){ errEl.innerHTML=`<div class="err">請填寫姓名 / 名稱</div>`; return; }
  if(!data.mobile){ errEl.innerHTML=`<div class="err">請填寫手機號碼</div>`; return; }
  errEl.innerHTML="";
  btn.disabled=true; btn.textContent="送出中…";
  try{
    await updateDoc(doc(db,"intakeForms",token),{
      status:"submitted",
      data,
      submittedAt:new Date().toISOString(),
    });
    stateView("✅","已送出，感謝您！","您的資料已安全送達承辦律師，如需修改請與律師聯繫。您可以關閉此頁面。");
  }catch(e){
    console.warn("submit failed:",e.code||e.message);
    btn.disabled=false; btn.textContent="送出資料";
    errEl.innerHTML=`<div class="err">送出失敗，請稍後再試，或與律師聯繫。（${esc(e.code||"error")}）</div>`;
  }
}

async function start(){
  if(!token){ stateView("🔗","連結無效","此填寫連結不完整，請向承辦律師索取正確的連結。"); return; }
  loadingView("驗證連結中…");
  try{
    await signInAnonymously(auth);
  }catch(e){
    stateView("⚠️","暫時無法連線","系統暫時無法驗證，請稍後再試。若持續發生，請與律師聯繫。");
    return;
  }
  try{
    const snap=await getDoc(doc(db,"intakeForms",token));
    if(!snap.exists()){ stateView("❌","連結無效或已失效","找不到對應的填寫表單，請向承辦律師索取新的連結。"); return; }
    intakeDoc=snap.data();
    if(intakeDoc.status==="submitted"){ stateView("✅","已完成填寫","此表單已送出，感謝您的配合。如需修改，請與承辦律師聯繫。"); return; }
    if(intakeDoc.status==="imported"){ stateView("✅","已完成填寫","此表單已由律師處理完成，感謝您的配合。"); return; }
    if(intakeDoc.status!=="pending"){ stateView("❌","連結無效","此連結目前無法使用，請向承辦律師索取新的連結。"); return; }
    formView();
  }catch(e){
    console.warn("load failed:",e.code||e.message);
    stateView("⚠️","無法讀取表單","請確認連結是否正確，或稍後再試。");
  }
}

onAuthStateChanged(auth,()=>{});
start();
</script>
</body>
</html>
