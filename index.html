    <title>⚖ 律師案件管理系統</title>

<style>
/* ── DARK THEME (default) ── */
:root {
    --bg:#020817; --bg2:#0a1628; --bg3:#0f172a; --bg4:#1e293b;
    --gold:#c8a96e; --gold2:#a07840;
    --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b; --text4:#475569;
    --green:#22c55e; --red:#ef4444; --yellow:#f59e0b; --purple:#8b5cf6; --blue:#3b82f6;
    --border:#1e293b;
    --shadow:0 2px 8px rgba(0,0,0,.4);
}
/* ── LIGHT THEME ── */
:root.light {
    --bg:#f0f4f8; --bg2:#ffffff; --bg3:#ffffff; --bg4:#e2e8f0;
    --gold:#9a6f2e; --gold2:#7a5520;
    --text:#1a2744; --text2:#374151; --text3:#6b7280; --text4:#9ca3af;
    --green:#16a34a; --red:#dc2626; --yellow:#d97706; --purple:#7c3aed; --blue:#2563eb;
    --border:#e2e8f0;
    --shadow:0 2px 8px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{padding-top:40px;height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;line-height:1.5;transition:background .3s,color .3s;}

/* ── LAYOUT ── */
.app{min-height:100vh;padding-bottom:80px;}
.header{background:var(--bg2);padding:12px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;gap:10px;flex-wrap:wrap;}
.header-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;color:var(--gold);display:flex;align-items:center;gap:8px;}
.content{padding:16px;max-width:960px;margin:0 auto;}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border-radius:8px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-family:inherit;transition:opacity .15s;white-space:nowrap;}
.btn:active{opacity:.8;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0a;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.4);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:50%;font-size:16px;flex-shrink:0;}

/* ── STATS ── */
.stats-row{display:flex;gap:10px;overflow-x:auto;padding:14px 16px;scrollbar-width:none;}
.stats-row::-webkit-scrollbar{display:none;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 18px;min-width:105px;flex-shrink:0;}
.stat-val{font-size:22px;font-weight:800;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums;}
.stat-unit{font-size:12px;font-weight:500;margin-left:2px;}
.stat-lbl{font-size:11px;color:var(--text4);margin-top:5px;}

/* ── UPCOMING ── */
.upcoming{margin:0 16px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;}
.sec-title{font-size:10px;color:var(--text3);letter-spacing:.1em;font-weight:700;margin-bottom:10px;text-transform:uppercase;}
.chip-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;min-width:150px;flex-shrink:0;}
.chip:active{opacity:.8;}

/* ── FILTERS ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.search-inp{flex:1;min-width:160px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-size:13px;outline:none;font-family:inherit;}
.search-inp:focus{border-color:var(--gold);}
.fsel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;cursor:pointer;outline:none;font-family:inherit;}

/* ── CASE CARDS (mobile) ── */
.case-cards{display:flex;flex-direction:column;gap:10px;}
.case-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:border-color .2s,box-shadow .2s;box-shadow:var(--shadow);}
.case-card:active{border-color:var(--gold);}

/* ── DESKTOP TABLE ── */
@media(min-width:860px){.case-cards{display:none;}.tbl-wrap{display:block;}}
@media(max-width:859px){.tbl-wrap{display:none;}}
.tbl-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:10px 12px;color:var(--text4);font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;}
.trow{border-bottom:1px solid var(--bg);cursor:pointer;}
.trow:hover{background:var(--bg4);}
.trow:active{background:var(--bg4);}
td{padding:11px 12px;color:var(--text2);vertical-align:middle;white-space:nowrap;}

/* ── BADGE ── */
.badge{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:.04em;white-space:nowrap;}

/* ── DETAIL ── */
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);}
.card-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:10px;}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;gap:10px;border-bottom:1px solid #0a0f1e;}
.info-lbl{font-size:11px;color:var(--text4);white-space:nowrap;min-width:80px;padding-top:1px;}
.info-val{font-size:13px;color:var(--text);text-align:right;word-break:break-all;}
.hearing-item{border-left:3px solid var(--border);padding-left:12px;margin-bottom:12px;}
.todo-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;cursor:pointer;border-bottom:1px solid var(--border);}
.todo-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--bg4);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s;}
.todo-check.done{background:var(--green);border-color:var(--green);}

/* ── FORM ── */
.form-wrap{padding:16px;max-width:960px;margin:0 auto;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:4px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;width:100%;}
.fi:focus{border-color:var(--gold);}
textarea.fi{resize:vertical;min-height:80px;}
.section-hdr{font-size:11px;color:var(--gold);font-weight:700;border-left:3px solid var(--gold);padding-left:10px;margin:22px 0 12px;display:flex;justify-content:space-between;align-items:center;}
.item-row{background:rgba(255,255,255,.03);padding:11px 14px;border-radius:8px;margin-bottom:8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.add-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.add-row .fi{flex:1;min-width:100px;}

/* ── BOTTOM NAV ── */
.bnav{display:none;}
@media(max-width:600px){
    .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:100;}
    .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;font-size:10px;color:var(--text3);cursor:pointer;gap:3px;border:none;background:transparent;font-family:inherit;}
    .bnav-btn.active{color:var(--gold);}
    .bnav-icon{font-size:18px;}
    .app{padding-bottom:80px;}
}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:#000000aa;display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.dialog{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:380px;width:100%;}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--text3);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--gold);color:var(--gold);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}











/* ── CAL TODO ── */
.cal-todo-dot{display:flex;align-items:center;gap:3px;padding:2px 5px;border-radius:4px;font-size:9px;font-weight:700;margin-bottom:2px;cursor:pointer;background:rgba(139,92,246,.15);color:#8b5cf6;border:1px solid rgba(139,92,246,.3);}
.cal-todo-dot.done{opacity:.45;text-decoration:line-through;}
.cal-todo-modal{position:fixed;inset:0;background:#00000099;display:flex;align-items:flex-end;justify-content:center;z-index:600;padding:0;}
@media(min-width:600px){.cal-todo-modal{align-items:center;padding:20px;}}
.cal-todo-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:24px 20px 32px;max-height:80vh;overflow-y:auto;}
@media(min-width:600px){.cal-todo-sheet{border-radius:16px;}}
.cal-todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.cal-todo-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;}
.cal-todo-check.done{background:var(--green);border-color:var(--green);}
.cal-todo-del{background:none;border:none;color:var(--text4);cursor:pointer;padding:2px 6px;font-size:13px;border-radius:4px;margin-left:auto;flex-shrink:0;}
.cal-todo-del:hover{color:var(--red);}

/* ── CASE NOTES ── */
.notes-wrap{display:flex;flex-direction:column;gap:14px;}
.note-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;box-shadow:var(--shadow);}
.note-card.pinned{border-color:var(--gold)44;background:rgba(200,169,110,.04);}
.note-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.note-meta{font-size:11px;color:var(--text4);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.note-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.note-body{font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.note-body.collapsed{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.note-actions{display:flex;gap:6px;flex-shrink:0;}
.note-action-btn{background:none;border:none;color:var(--text4);cursor:pointer;padding:3px 6px;border-radius:5px;font-size:13px;font-family:inherit;transition:background .15s;}
.note-action-btn:hover{background:var(--bg4);color:var(--text2);}
.note-editor{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);}
.note-editor textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;line-height:1.75;resize:none;min-height:120px;}
.note-toolbar{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.note-tag-sel{display:flex;gap:6px;flex-wrap:wrap;}
.note-tag-opt{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s;}
.note-tag-opt:not(.sel){opacity:.5;}
.notes-empty{text-align:center;padding:40px 20px;color:var(--text4);}
.notes-empty .ico{font-size:40px;margin-bottom:10px;opacity:.5;}

/* ── FEE PAYMENTS ── */
.fee-summary{background:var(--bg);border-radius:10px;padding:14px;margin-bottom:12px;}
.fee-summary-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;gap:8px;}
.fee-progress{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin:10px 0 4px;}
.fee-progress-bar{height:100%;background:linear-gradient(90deg,var(--green),#16a34a);border-radius:4px;transition:width .5s ease;}
.pay-record{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;}
.pay-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.pay-method-cash{background:rgba(34,197,94,.15);color:var(--green);}
.pay-method-transfer{background:rgba(59,130,246,.15);color:var(--blue);}
.pay-method-check{background:rgba(245,158,11,.15);color:var(--yellow);}
.pay-method-other{background:rgba(100,116,139,.15);color:var(--text3);}

/* ── PRINT ── */
@media print {
    .header,.bnav,.btn,.theme-btn,.filter-row,.stats-row,.upcoming,.tab-bar,.no-print{display:none!important;}
    .app{padding:0;}
    .content{padding:0;}
    body{background:#fff;color:#000;}
    :root{--bg:#fff;--bg2:#f8f8f8;--bg3:#fff;--bg4:#eee;--text:#000;--text2:#333;--text3:#555;--text4:#777;--border:#ddd;--gold:#a07840;}
    .card{border:1px solid #ddd;break-inside:avoid;margin-bottom:12px;}
    .detail-grid{grid-template-columns:1fr 1fr;}
    .badge{border:1px solid #ccc!important;}
    .print-title{display:block!important;}
}
.print-title{display:none;font-size:18px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #a07840;}

/* ── CALENDAR ── */
.cal-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg2);}
.cal-nav{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;padding:6px 14px;font-size:15px;font-family:inherit;}
.cal-nav:hover{background:var(--bg4);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--text4);padding:10px 4px;letter-spacing:.04em;text-transform:uppercase;}
.cal-dow.sun{color:#ef4444;}
.cal-dow.sat{color:#3b82f6;}
.cal-day{min-height:70px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 5px;cursor:default;transition:background .15s;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day.other-month{opacity:.35;}
.cal-day.today-cell{background:rgba(200,169,110,.08);}
.cal-day.is-sun{background:rgba(239,68,68,.03);}
.cal-day.is-sat{background:rgba(59,130,246,.03);}
.cal-day.is-holiday{background:rgba(239,68,68,.05);}
.cal-day-num{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cal-day.today-cell .cal-day-num{background:var(--gold);color:#000;font-weight:800;}
.cal-day.is-sun:not(.other-month) .cal-day-num{color:#ef4444;}
.cal-day.is-sat:not(.other-month) .cal-day-num{color:#3b82f6;}
.cal-day.is-holiday:not(.other-month) .cal-day-num{color:#ef4444;font-weight:800;}
.cal-holiday-label{font-size:9px;color:#ef4444;font-weight:700;margin-bottom:2px;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-event{font-size:10px;border-radius:4px;padding:2px 5px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;line-height:1.4;}
.cal-event:hover{opacity:.8;}
.cal-legend{display:flex;gap:12px;flex-wrap:wrap;padding:12px 18px;border-top:1px solid var(--border);}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}

/* ── TAGS ── */
.tag-pill{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:none;font-family:inherit;}
.tag-input-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-top:8px;}
.tag-color-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.tag-color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
.tag-color-swatch.sel{border-color:var(--text);transform:scale(1.25);}

/* ── EXCEL EXPORT ── */
.export-section{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}

/* ── TIMELINE ── */
.tl-wrap{position:relative;padding-left:28px;}
.tl-wrap::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:2px;background:var(--border);}
.tl-item{position:relative;margin-bottom:20px;}
.tl-dot{position:absolute;left:-24px;top:3px;width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;}
.tl-dot.past{background:var(--bg4);border-color:var(--text4);}
.tl-dot.future{background:var(--gold);border-color:var(--gold);box-shadow:0 0 6px var(--gold)44;}
.tl-dot.today{background:var(--red);border-color:var(--red);box-shadow:0 0 8px var(--red)66;}
.tl-dot.todo{background:var(--bg3);border-color:var(--purple);}
.tl-dot.todo.done{background:var(--green);border-color:var(--green);}
.tl-dot.milestone{background:var(--bg3);border-color:var(--gold);border-width:2px;}
.tl-date{font-size:11px;color:var(--text4);margin-bottom:3px;font-family:monospace;}
.tl-body{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.tl-body.future{border-color:var(--gold)33;}
.tl-body.today{border-color:var(--red)55;background:rgba(239,68,68,.05);}
.tl-body.past{opacity:.7;}
.tl-tag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}


/* ── TOOLS ── */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.tool-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:18px 14px;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s;box-shadow:var(--shadow);position:relative;}
.tool-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2);border-color:var(--gold)44;}
.tool-card:active{transform:translateY(0);}
.tool-emoji{font-size:36px;line-height:1;}
.tool-name{font-weight:700;font-size:13px;color:var(--text);text-align:center;word-break:break-all;}
.tool-desc{font-size:11px;color:var(--text3);text-align:center;line-height:1.4;}
.tool-del{position:absolute;top:7px;right:7px;background:var(--bg4);border:1px solid var(--border);color:var(--text3);cursor:pointer;font-size:12px;padding:3px 7px;border-radius:6px;font-family:inherit;transition:background .15s;}
.tool-del:hover{background:var(--gold);color:#000;}
.tool-add-card{background:transparent;border:2px dashed var(--border);border-radius:14px;padding:18px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:border-color .2s;color:var(--text4);}
.tool-add-card:hover{border-color:var(--gold);color:var(--gold);}
.tool-modal-overlay{position:fixed;inset:0;background:#00000099;display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.tool-modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:420px;}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;flex-shrink:0;}
.color-dot.selected{border-color:var(--text);transform:scale(1.2);}

/* ── CONTACTS ── */
.contact-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);}
.contact-name{font-size:17px;font-weight:700;color:var(--text);}
.contact-phone{color:var(--blue);font-size:14px;text-decoration:none;display:inline-flex;align-items:center;gap:5px;margin-top:4px;}
.contact-phone:hover{text-decoration:underline;}
.contact-cases{display:flex;flex-direction:column;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.contact-case-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px;cursor:pointer;border:1px solid var(--border);transition:border-color .2s;}
.contact-case-row:hover{border-color:var(--gold);}

/* ── THEME TOGGLE ── */
.theme-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;color:var(--text2);font-family:inherit;transition:all .2s;white-space:nowrap;}
.theme-btn:hover{border-color:var(--gold);color:var(--gold);}
.theme-mode-badge{font-size:10px;color:var(--text4);padding:2px 6px;background:var(--bg4);border-radius:10px;}

/* ── DRIVE ── */
.drive-btn{display:flex;align-items:center;gap:10px;background:rgba(66,133,244,.1);border:1px solid rgba(66,133,244,.35);border-radius:10px;padding:13px 16px;cursor:pointer;text-decoration:none;transition:background .2s;width:100%;}
.drive-btn:hover{background:rgba(66,133,244,.2);}
.drive-icon{font-size:26px;flex-shrink:0;}
.drive-doc-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);gap:8px;}
.drive-doc-row a{color:var(--blue);text-decoration:none;font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.drive-doc-row a:hover{text-decoration:underline;}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px #000a;}
.login-logo{font-size:52px;text-align:center;margin-bottom:8px;filter:drop-shadow(0 0 20px #c8a96e66);}
.login-title{font-family:'Noto Serif TC',serif;font-size:1.3rem;color:var(--gold);text-align:center;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text4);text-align:center;letter-spacing:.06em;margin-bottom:32px;}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;text-align:center;}

/* ── MISC ── */
.divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty .ico{font-size:40px;margin-bottom:12px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
a{color:var(--blue);}
@media(max-width:600px){.header{padding:10px 12px;}.content{padding:12px;}}
</style>
</head>

// ── Helpers ──
function today(){
    // 使用台灣時區 UTC+8，避免跨日誤差
    const tw = new Date(new Date().getTime() + 8*60*60*1000);
    return tw.toISOString().split("T")[0];
}
function daysUntil(d){
    // 兩端都用台灣時間的「當日零時」比較，避免時區造成的差一天問題
    const todayMs = new Date(today()+"T00:00:00+08:00").getTime();
    const targetMs = new Date(d+"T00:00:00+08:00").getTime();
    return Math.round((targetMs - todayMs) / 86400000);
}
function fmt(n){ return n ? Number(n).toLocaleString("zh-TW")+" 元" : "—"; }
function fmtK(n){ return (Number(n||0)/10000).toFixed(1); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg; t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2200);
}

function Badge({label,color}){
    return <span className="badge" style={{background:color+"22",color,border:`1px solid ${color}44`}}>{label}</span>;
}

function Login({onLogin}){
    const [email, setEmail] = React.useState("");
    const [password, setPassword] = React.useState("");
    const [loading, setLoading] = React.useState(false);
    const [error, setError] = React.useState("");
    const [showPw, setShowPw] = React.useState(false);

    const handleLogin = async(e)=>{
        e && e.preventDefault();
        if(!email.trim()||!password){ setError("請輸入帳號和密碼"); return; }
        setLoading(true); setError("");
        try{
            await window.fbAuth.signInWithEmailAndPassword(window.auth, email.trim(), password);
            // onAuthStateChanged 會自動觸發 onLogin
        }catch(err){
            console.error(err);
            const msg = {
                "auth/invalid-email":"Email 格式錯誤",
                "auth/user-not-found":"帳號不存在",
                "auth/wrong-password":"密碼錯誤，請重新輸入",
                "auth/invalid-credential":"帳號或密碼錯誤，請重新輸入",
                "auth/too-many-requests":"嘗試次數過多，請稍後再試",
            }[err.code] || ("登入失敗："+err.message);
            setError(msg);
            setLoading(false);
        }
    };

    return(
        <div className="login-wrap">
            <div className="login-box">
                <div className="login-logo">⚖</div>
                <div className="login-title">律師案件管理系統</div>
                <div className="login-sub">LEGAL CASE MANAGER</div>
                {error && <div className="login-err">⚠️ {error}</div>}
                <div className="fg" style={{marginBottom:14}}>
                    <label className="fl">帳號（Email）</label>
                    <input className="fi" type="email" autoComplete="username"
                        placeholder="office@yourfirm.com"
                        value={email} onChange={e=>setEmail(e.target.value)}
                        onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                        disabled={loading}/>
                </div>
                <div className="fg" style={{marginBottom:24}}>
                    <label className="fl">密碼</label>
                    <div style={{position:"relative"}}>
                        <input className="fi" type={showPw?"text":"password"} autoComplete="current-password"
                            placeholder="••••••••"
                            value={password} onChange={e=>setPassword(e.target.value)}
                            onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                            disabled={loading}
                            style={{paddingRight:44}}/>
                        <button onClick={()=>setShowPw(s=>!s)}
                            style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:16,padding:4}}>
                            {showPw?"🙈":"👁"}
                        </button>
                    </div>
                </div>
                <button className="btn btn-gold" onClick={handleLogin} disabled={loading}
                    style={{width:"100%",justifyContent:"center",fontSize:15,padding:"12px"}}>
                    {loading ? "登入中…" : "🔐 登入"}
                </button>
            </div>
        </div>
    );
}

function Root(){
    const [user, setUser] = React.useState(undefined); // undefined=checking, null=no user

    React.useEffect(()=>{
        const wait = setInterval(()=>{
            if(!window.auth) return;
            clearInterval(wait);
            window.fbAuth.onAuthStateChanged(window.auth, u=>setUser(u||null));
        },100);
        return ()=>clearInterval(wait);
    },[]);

    if(user===undefined) return(
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,color:"var(--text3)"}}>
                <div className="spinner"/>
                <div>載入中…</div>
            </div>
        </div>
    );
    if(!user) return <Login/>;
    return <App user={user}/>;
}

//  THEME HOOK
// ══════════════════════════════════════════
function useTheme(){
    // Determine auto theme: light 06:00-20:00, dark otherwise
    function getAutoTheme(){
        const h = new Date().getHours();
        return (h >= 6 && h < 20) ? "light" : "dark";
    }

    const [mode, setMode] = useState(()=>{
        return localStorage.getItem("themeMode") || "auto";
    });
    const [autoTheme, setAutoTheme] = useState(getAutoTheme);

    // Update auto theme every minute
    useEffect(()=>{
        const timer = setInterval(()=>setAutoTheme(getAutoTheme()), 60000);
        return ()=>clearInterval(timer);
    },[]);

    // Apply theme to <html>
    useEffect(()=>{
        const effective = mode === "auto" ? autoTheme : mode;
        if(effective === "light"){
            document.documentElement.classList.add("light");
        } else {
            document.documentElement.classList.remove("light");
        }
    },[mode, autoTheme]);

    // Persist preference
    useEffect(()=>{
        localStorage.setItem("themeMode", mode);
    },[mode]);

    const effective = mode === "auto" ? autoTheme : mode;
    const cycleMode = ()=>{
        setMode(m => m === "auto" ? "light" : m === "light" ? "dark" : "auto");
    };

    return { mode, effective, cycleMode };
}

    // ── Fee helpers ──

    // ── Copy case ──

    // ── AI Chat ──
    const saveApiKey=()=>{

        setAiKeyInput("");

    };
    const clearApiKey=()=>{
        setAiApiKey("");
        localStorage.removeItem("aiApiKey");
        setAiKeyEditing(false);
        toast("已清除 API Key");
    };
    const getCaseMsgs=(caseId)=>aiMessages[caseId]||[];
    const addMsg=(caseId,msg)=>setAiMessages(prev=>({...prev,[caseId]:[...(prev[caseId]||[]),msg]}));
    const clearChat=(caseId)=>setAiMessages(prev=>({...prev,[caseId]:[]}));

    const sendAiMessage=async(c)=>{
        const text=aiInput.trim();
        if(!text||aiLoading) return;
        if(!aiApiKey){ toast("請先設定 Gemini API Key"); setAiKeyEditing(true); return; }
        const userMsg={role:"user",content:text};
        addMsg(c.id, userMsg);
        setAiInput("");
        setAiLoading(true);

        const systemPrompt=`你是一位專業的台灣法律助理，正在協助律師處理以下案件：

【案件資訊】
事務所案件編號：${c.firmCaseNo||""}
當事人：${c.clientName||""}
對造：${c.opposingParty||""}
法院案號：${(c.courtCaseNos||[]).filter(Boolean).join("、")||""}
股別：${c.division||""}
法院：${c.court||""} ${c.instance||""}
案件類型：${c.caseType||""}
案件狀態：${c.status||""}
承辦律師：${c.attorney||""}
備註：${c.notes||""}

請根據上述案件背景，以繁體中文回答律師的問題。回答要專業、精準、具有實務參考價值。`;

        // Build Gemini contents — inject system as first user/model turn
        const history=getCaseMsgs(c.id);
        const contents=[];
        // System prompt as first turn
        contents.push({role:"user",parts:[{text:systemPrompt}]});
        contents.push({role:"model",parts:[{text:"了解，我已掌握本案資訊，請問有什麼需要協助的？"}]});
        // History
        history.forEach(m=>{
            if(m.role==="user") contents.push({role:"user",parts:[{text:m.content}]});
            else if(m.role==="ai") contents.push({role:"model",parts:[{text:m.content}]});
        });
        // Current message
        contents.push({role:"user",parts:[{text}]});

        try{
            const model="gemini-2.0-flash";
            const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${aiApiKey}`;
            let res;
            try{
                res=await fetch(url,{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({
                        contents,
                        generationConfig:{maxOutputTokens:1500,temperature:0.7}
                    })
                });
            }catch(networkErr){
                // fetch 本身失敗：通常是 CORS 或網路問題
                throw new Error("網路連線失敗，請確認網路狀態（"+networkErr.message+"）");
            }
            if(!res.ok){
                let errBody={};
                try{ errBody=await res.json(); }catch(_){}
                const msg=errBody?.error?.message||"";
                if(res.status===400) throw new Error("請求格式錯誤："+(msg||"請確認 API Key 是否正確"));
                if(res.status===401||res.status===403) throw new Error("API Key 無效，請至 Google AI Studio 確認");
                if(res.status===429){
                    const retry=res.headers.get("Retry-After");
                    throw new Error("Gemini 免費額度達上限，請稍後再試"+(retry?`（${retry}秒後）`:""));
                }
                if(res.status===500||res.status===503) throw new Error("Gemini 伺服器暫時無法回應，請稍後再試");
                throw new Error(msg||`HTTP ${res.status}`);
            }
            const data=await res.json();
            // Check for safety block
            const candidate=data.candidates?.[0];
            if(!candidate) throw new Error("Gemini 未回傳結果，可能觸發安全過濾");
            if(candidate.finishReason==="SAFETY") throw new Error("此問題觸發 Gemini 安全過濾，請換個方式提問");
            const reply=candidate.content?.parts?.[0]?.text||"（無回應）";
            addMsg(c.id,{role:"ai",content:reply});
        }catch(e){
            console.error("Gemini error:",e);
            addMsg(c.id,{role:"ai",content:"⚠️ "+e.message});
            if(e.message.includes("API Key")||e.message.includes("無效")) setAiKeyEditing(true);
        }finally{
            setAiLoading(false);
        }
    };

        const rows=cases.map(c=>[
            c.firmCaseNo||"", c.clientName||"", c.phone||"", c.opposingParty||"",
            (c.courtCaseNos||[]).filter(Boolean).join("、"), c.division||"", c.court||"", c.instance||"",
            c.caseType||"", c.status||"", c.attorney||"", c.retainerDate||"",
            Number(c.totalFee||0), getReceived(c), getUnpaid(c), Number(c.disbursements||0), c.caseReason||"",
            (c.tags||[]).join("、"), (c.notes||"").replace(/\n/g," "),

        // Build CSV with BOM for Excel UTF-8
        const bom="﻿";
        const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
        const csv=bom+[headers,...rows].map(r=>r.map(esc).join(",")).join("\n");

    // ── Google Calendar ──
    const openGoogleCalendar=(h, c)=>{
        // 日期格式轉換：2025-04-22 → 20250422
        const dateStr = (h.date||"").replace(/-/g,"");
        // 時間格式：09:30 → 093000，無時間則用全天
        const hasTime = !!(h.time);
        let start, end;
        if(hasTime){
            const timeStr = (h.time||"0900").replace(":","")+"00";
            start = `${dateStr}T${timeStr}`;
            // 預設結束時間 = 開始 + 1小時
            const [hh, mm] = (h.time||"09:00").split(":").map(Number);
            const endHH = String(hh+1).padStart(2,"0");
            end = `${dateStr}T${endHH}${String(mm).padStart(2,"0")}00`;
        } else {
            // 全天事件
            const nextDay = new Date(h.date);
            nextDay.setDate(nextDay.getDate()+1);
            start = dateStr;
            end = nextDay.toISOString().split("T")[0].replace(/-/g,"");
