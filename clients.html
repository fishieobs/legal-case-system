<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="客戶管理">
<meta name="theme-color" content="#0a0612">
<title>👥 律師事務所客戶管理系統</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E👥%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0612;--bg2:#120b1e;--bg3:#190f29;--bg4:#221536;--bg5:#2c1c45;
  --violet:#8b5cf6;--violet2:#7c3aed;--violet3:#a78bfa;
  --gold:#f59e0b;--gold2:#d97706;--gold3:#fbbf24;
  --text:#e9e0f5;--text2:#b3a0cc;--text3:#7a6699;--text4:#4d3d66;
  --red:#ef4444;--blue:#38bdf8;--green:#22c55e;--orange:#f97316;
  --border:#221536;--border2:#2c1c45;
  --shadow:0 4px 20px rgba(0,0,0,.6);
}
:root.light{
  --bg:#f6f3fc;--bg2:#fff;--bg3:#fff;--bg4:#f0eafa;--bg5:#e6dcf5;
  --violet:#7c3aed;--violet2:#6d28d9;--violet3:#8b5cf6;
  --gold:#b45309;--gold2:#92400e;--gold3:#d97706;
  --text:#1a0f2e;--text2:#3a2a52;--text3:#7a6699;--text4:#a08cc0;
  --border:#e2d8f0;--border2:#d0c2e8;--shadow:0 2px 10px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;line-height:1.6;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px;}

.app{min-height:100vh;padding-top:41px;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:41px;z-index:200;}
.hdr-title{font-family:'Noto Serif TC',serif;font-size:1.05rem;color:var(--violet);}
.hdr-sub{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.hdr-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}

.tab-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:93px;z-index:150;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:10px 16px;border:none;background:transparent;color:var(--text3);font-weight:500;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--violet);font-weight:700;border-bottom-color:var(--violet);}

.btn{padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn:active{opacity:.8;}
.btn-violet{background:linear-gradient(135deg,var(--violet),var(--violet2));color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-outline:hover{border-color:var(--violet);color:var(--violet);}
.btn-ghost{background:transparent;color:var(--text3);border:none;}
.btn-ghost:hover{color:var(--text);background:var(--bg4);}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-sm{padding:6px 11px;font-size:11px;}
.btn-xs{padding:4px 8px;font-size:10px;}

.content{padding:16px 18px;max-width:1000px;margin:0 auto;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow);}
.stat-val{font-size:20px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.stat-lbl{font-size:9px;color:var(--text4);margin-top:4px;letter-spacing:.04em;text-transform:uppercase;}

.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:12px;}
.card-hdr{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--border);}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);gap:10px;}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:11px;color:var(--text4);min-width:84px;flex-shrink:0;}
.info-val{font-size:12px;color:var(--text);text-align:right;font-weight:700;word-break:break-all;}
.tel-link{color:var(--blue);text-decoration:none;}
.tel-link:hover{text-decoration:underline;}

.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}

.fi{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border-color .2s;width:100%;}
.fi:focus{border-color:var(--violet);}
select.fi{width:auto;}
textarea.fi{resize:vertical;font-size:12px;line-height:1.7;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}

.search-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.search-inp{flex:1;min-width:180px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;font-family:inherit;}
.search-inp:focus{border-color:var(--violet);}

.client-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px;}
.client-card:hover{border-color:var(--violet);transform:translateX(2px);}
.avatar{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;font-weight:800;color:#fff;}

.badge{display:inline-flex;align-items:center;gap:3px;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid transparent;}
.tag-chip{display:inline-flex;align-items:center;background:rgba(139,92,246,.13);color:var(--violet3);border:1px solid rgba(139,92,246,.25);border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;margin:2px 3px 0 0;}

.comm-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.comm-dot{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--bg5);}

.overlay{position:fixed;inset:0;background:#00000099;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.dialog{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;}
.dialog-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.form-section{font-size:10px;font-weight:700;color:var(--violet);border-left:3px solid var(--violet);padding-left:10px;margin:18px 0 10px;letter-spacing:.06em;}

.empty{text-align:center;padding:50px 20px;color:var(--text4);}
.empty-ico{font-size:44px;margin-bottom:12px;opacity:.35;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--text3);}
.spinner{width:36px;height:36px;border:3px solid var(--bg5);border-top-color:var(--violet);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.7);}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--violet);color:var(--violet3);padding:10px 22px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

.bnav{display:none;}
@media(max-width:640px){
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:200;}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;font-size:9px;color:var(--text3);cursor:pointer;gap:2px;border:none;background:transparent;font-family:inherit;}
  .bnav-btn.active{color:var(--violet);}
  .bnav-icon{font-size:18px;}
  .app{padding-bottom:72px;}
  .content{padding:12px 14px;}
}
a{color:var(--blue);}
</style>
</head>
<body>
<script src="shared/sys-nav.js" data-active="clients"></script>
<div id="root"></div>
<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
const cfg={apiKey:"AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",authDomain:"legalcasemanageer.firebaseapp.com",projectId:"legalcasemanageer",storageBucket:"legalcasemanageer.firebasestorage.app",messagingSenderId:"559838504556",appId:"1:559838504556:web:ba10c071a12650bbd85a49"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const auth=getAuth(app);

// ══════════════════════════════════════════
// 常數
// ══════════════════════════════════════════
const CLIENT_TYPES=["個人","公司/法人","政府機關","其他"];
const CLIENT_SOURCES=["親友介紹","舊客戶","同業轉介","網路搜尋","社群媒體","廣告","公會指派","其他"];
const CLIENT_STATUS=[
  {k:"active",  label:"往來中", color:"var(--green)"},
  {k:"potential",label:"潛在客戶",color:"var(--gold)"},
  {k:"closed",  label:"已結案", color:"var(--text3)"},
];
const COMM_TYPES=[
  {k:"phone",  ico:"📞",label:"電話"},
  {k:"meeting",ico:"🤝",label:"會議"},
  {k:"email",  ico:"✉️",label:"Email"},
  {k:"line",   ico:"💬",label:"Line/通訊"},
  {k:"court",  ico:"⚖",label:"開庭"},
  {k:"other",  ico:"📝",label:"其他"},
];
const AVATAR_COLORS=["#8b5cf6","#ec4899","#38bdf8","#22c55e","#f59e0b","#f97316","#ef4444","#14b8a6","#6366f1","#a855f7"];

// ══════════════════════════════════════════
// 工具
// ══════════════════════════════════════════
function twToday(){return new Date(new Date().getTime()+8*3600000).toISOString().split("T")[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function genToken(){const a=new Uint8Array(18);crypto.getRandomValues(a);return Array.from(a,b=>b.toString(16).padStart(2,"0")).join("");}
function intakeUrl(token){return new URL("intake.html?t="+token,location.href).href;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function toast(msg){const t=document.getElementById("toast");if(!t)return;t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400);}
function avatarColor(name){let h=0;for(let i=0;i<String(name).length;i++)h=String(name).charCodeAt(i)+((h<<5)-h);return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];}
function statusOf(k){return CLIENT_STATUS.find(s=>s.k===k)||CLIENT_STATUS[0];}
function commTypeOf(k){return COMM_TYPES.find(c=>c.k===k)||COMM_TYPES[COMM_TYPES.length-1];}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S={
  user:null,authChecked:false,
  clients:[],cases:[],loading:true,
  tab:"dashboard",
  search:"",filterStatus:"all",
  // 詳情
  viewId:null,
  // 表單
  showForm:false,editId:null,
  form:newForm(),
  // 溝通記錄
  showCommForm:false,commForm:{date:twToday(),type:"phone",content:""},
  delConfirm:null,delComm:null,
  // 當事人自填連結
  intakes:[],
  showIntakeGen:false,intakeGenName:"",intakeGenType:"個人",
  linkModal:null,previewIntake:null,delIntake:null,
};
function newForm(){return{name:"",type:"個人",idNumber:"",phone:"",mobile:"",email:"",address:"",contactPerson:"",source:"親友介紹",status:"active",tags:"",note:""};}

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
onAuthStateChanged(auth,u=>{
  S.user=u;S.authChecked=true;
  if(u){
    try{const c=localStorage.getItem("clients_cache");if(c)S.clients=JSON.parse(c);}catch(_){}
    try{const c=localStorage.getItem("clients_cases_cache");if(c)S.cases=JSON.parse(c);}catch(_){}
    S.loading=false;render();
    onSnapshot(collection(db,"clients"),snap=>{
      S.clients=snap.docs.map(d=>({...d.data(),id:d.id}));
      try{localStorage.setItem("clients_cache",JSON.stringify(S.clients));}catch(_){}
      render();
    });
    onSnapshot(collection(db,"cases"),snap=>{
      S.cases=snap.docs.map(d=>({...d.data(),id:d.id}));
      try{localStorage.setItem("clients_cases_cache",JSON.stringify(S.cases));}catch(_){}
      render();
    });
    onSnapshot(collection(db,"intakeForms"),snap=>{
      S.intakes=snap.docs.map(d=>({...d.data(),id:d.id}));
      render();
    },err=>{ console.warn("intakeForms 同步失敗：",err.code||err.message); });
  }else{S.loading=false;render();}
});

async function saveClient(){
  const f=S.form;
  if(!f.name||!f.name.trim()){toast("⚠️ 請輸入客戶名稱");return;}
  const id=S.editId||uid();
  const existing=S.clients.find(c=>c.id===id);
  await setDoc(doc(db,"clients",id),{
    ...f,name:f.name.trim(),id,
    comms:existing?.comms||[],
    createdAt:existing?.createdAt||new Date().toISOString(),
    updatedAt:new Date().toISOString(),
  });
  toast(S.editId?"✅ 客戶已更新":"✅ 客戶已新增");
  S.showForm=false;S.editId=null;S.form=newForm();render();
}
async function delClient(id){
  await deleteDoc(doc(db,"clients",id));
  toast("🗑 已刪除客戶");S.delConfirm=null;if(S.viewId===id){S.viewId=null;S.tab="clients";}render();
}
async function saveComm(){
  const c=S.clients.find(x=>x.id===S.viewId);if(!c)return;
  const f=S.commForm;
  if(!f.content||!f.content.trim()){toast("⚠️ 請輸入溝通內容");return;}
  const comms=[...(c.comms||[]),{id:uid(),date:f.date,type:f.type,content:f.content.trim()}];
  await setDoc(doc(db,"clients",c.id),{...c,comms,updatedAt:new Date().toISOString()});
  toast("✅ 已記錄溝通");S.showCommForm=false;S.commForm={date:twToday(),type:"phone",content:""};render();
}
async function delCommItem(commId){
  const c=S.clients.find(x=>x.id===S.viewId);if(!c)return;
  const comms=(c.comms||[]).filter(x=>x.id!==commId);
  await setDoc(doc(db,"clients",c.id),{...c,comms,updatedAt:new Date().toISOString()});
  toast("🗑 已刪除記錄");S.delComm=null;render();
}

// ══════════════════════════════════════════
// 當事人自填連結（Intake）
// ══════════════════════════════════════════
async function genIntakeLink(){
  const token=genToken();
  try{
    await setDoc(doc(db,"intakeForms",token),{
      status:"pending",
      clientName:(S.intakeGenName||"").trim(),
      clientType:S.intakeGenType||"個人",
      data:null, submittedAt:null,
      createdAt:new Date().toISOString(),
    });
    S.showIntakeGen=false;S.intakeGenName="";S.intakeGenType="個人";
    S.linkModal=token;render();
  }catch(e){
    console.warn("建立連結失敗：",e.code||e.message);
    toast(e.code==="permission-denied"?"❌ 權限不足，請確認 Firestore 規則已更新":"❌ 建立連結失敗");
  }
}
async function importIntake(token){
  const rec=S.intakes.find(x=>x.id===token);
  if(!rec||!rec.data){toast("⚠️ 尚無回填資料");return;}
  const d=rec.data;const id=uid();
  try{
    await setDoc(doc(db,"clients",id),{
      name:((d.name||rec.clientName||"").trim())||"未命名",
      type:d.type||"個人", idNumber:d.idNumber||"",
      phone:d.phone||"", mobile:d.mobile||"", email:d.email||"",
      address:d.address||"", contactPerson:d.contactPerson||"",
      source:"當事人自填", status:"active", tags:"", note:d.note||"",
      id, comms:[],
      createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(),
    });
    const {id:_ignore,...rest}=rec;
    await setDoc(doc(db,"intakeForms",token),{...rest,status:"imported",importedAt:new Date().toISOString()});
    toast("✅ 已匯入為客戶");
    S.previewIntake=null;render();
  }catch(e){
    console.warn("匯入失敗：",e.code||e.message);
    toast("❌ 匯入失敗");
  }
}
async function deleteIntake(token){
  try{ await deleteDoc(doc(db,"intakeForms",token)); toast("🗑 已刪除連結"); }
  catch(e){ toast("❌ 刪除失敗"); }
  S.delIntake=null;render();
}
async function copyIntakeLink(token){
  const url=intakeUrl(token);
  try{ await navigator.clipboard.writeText(url); toast("📋 已複製連結"); }
  catch(_){
    const ta=document.createElement("textarea");ta.value=url;document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");toast("📋 已複製連結");}catch(__){toast("⚠️ 請手動複製");}
    document.body.removeChild(ta);
  }
}

// ══════════════════════════════════════════
// 關聯資料
// ══════════════════════════════════════════
function casesOfClient(c){
  if(!c)return[];
  const name=(c.name||"").trim();
  if(!name)return[];
  return S.cases.filter(cs=>(cs.clientName||"").trim()===name);
}
function feeStats(cases){
  let totalFee=0,received=0;
  cases.forEach(cs=>{
    totalFee+=Number(cs.totalFee||0);
    received+=(cs.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0);
  });
  return{totalFee,received,outstanding:Math.max(0,totalFee-received)};
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  if(!root)return;
  if(!S.authChecked){root.innerHTML=`<div class="loading"><div class="spinner"></div><div>連線中…</div></div>`;return;}
  if(!S.user){root.innerHTML=renderLogin();bindLogin();return;}
  if(S.loading){root.innerHTML=`<div class="app"><div class="loading"><div class="spinner"></div><div>載入中…</div></div></div>`;return;}
  root.innerHTML=renderApp();
  bindApp();
}

// ── Login ──
function renderLogin(){return`
<div class="login-wrap"><div class="login-box">
  <div style="font-size:48px;text-align:center;margin-bottom:8px">👥</div>
  <div style="font-family:'Noto Serif TC',serif;font-size:1.2rem;color:var(--violet);text-align:center;margin-bottom:3px">客戶管理系統</div>
  <div style="font-size:10px;color:var(--text3);text-align:center;letter-spacing:.1em;margin-bottom:24px;text-transform:uppercase">Client Management</div>
  <div id="lerr" style="display:none" class="login-err"></div>
  <div class="fg" style="margin-bottom:12px"><label class="fl">帳號</label><input class="fi" id="lem" type="email" placeholder="office@yourfirm.com" autocomplete="email"></div>
  <div class="fg" style="margin-bottom:22px"><label class="fl">密碼</label>
    <div style="position:relative"><input class="fi" id="lpw" type="password" placeholder="••••••••" style="padding-right:40px">
    <button id="spw" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px">👁</button></div>
  </div>
  <button id="lbtn" class="btn btn-violet" style="width:100%;justify-content:center;font-size:14px;padding:12px">🔐 登入</button>
</div></div>`;}
function bindLogin(){
  const go=async()=>{
    const em=document.getElementById("lem")?.value.trim();
    const pw=document.getElementById("lpw")?.value;
    const err=document.getElementById("lerr");
    if(!em||!pw){if(err){err.style.display="block";err.textContent="請輸入帳號密碼";}return;}
    document.getElementById("lbtn").textContent="登入中…";
    try{await signInWithEmailAndPassword(auth,em,pw);}
    catch(e){if(err){err.style.display="block";err.textContent={"auth/invalid-credential":"帳號或密碼錯誤","auth/too-many-requests":"嘗試次數過多","auth/user-disabled":"此帳號已停用","auth/unauthorized-domain":"此網域未獲 Firebase 授權","auth/network-request-failed":"網路連線問題，請確認網路後再試"}[e.code]||("登入失敗（"+e.code+"）");}document.getElementById("lbtn").textContent="🔐 登入";}
  };
  document.getElementById("lbtn")?.addEventListener("click",go);
  document.getElementById("lpw")?.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  document.getElementById("spw")?.addEventListener("click",()=>{const i=document.getElementById("lpw");i.type=i.type==="password"?"text":"password";});
}

// ── 案源分析 ──
function renderSource(){
  const bySource={};
  S.clients.forEach(c=>{
    const s=c.source||"其他";
    if(!bySource[s])bySource[s]={count:0,cases:0,fee:0,clients:[]};
    bySource[s].count++;
    bySource[s].clients.push(c);
    const cs=casesOfClient(c);
    bySource[s].cases+=cs.length;
    bySource[s].fee+=feeStats(cs).totalFee;
  });
  const entries=Object.entries(bySource).sort((a,b)=>b[1].count-a[1].count);
  const maxFee=Math.max(...entries.map(e=>e[1].fee),1);
  if(!S.clients.length)return`<div class="empty"><div class="empty-ico">📊</div><div>尚無客戶資料可供分析</div></div>`;
  return`
  <div style="font-size:12px;color:var(--text3);margin-bottom:14px">依案源統計客戶數、承接案件數與委任費用，協助評估行銷與轉介成效</div>
  ${entries.map(([s,d])=>`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:15px;font-weight:800;color:var(--violet3)">${esc(s)}</span>
      <span style="font-size:11px;color:var(--text3)">${d.count} 位客戶 · ${d.cases} 件案件</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:var(--text3)">委任費用貢獻</span><span style="color:var(--gold3);font-weight:700">NT$ ${Math.round(d.fee).toLocaleString("zh-TW")}</span></div>
    <div style="height:8px;background:var(--bg5);border-radius:4px;overflow:hidden;margin-bottom:10px"><div style="height:100%;border-radius:4px;width:${Math.round(d.fee/maxFee*100)}%;background:linear-gradient(90deg,var(--gold2),var(--gold3))"></div></div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">
      ${d.clients.slice(0,20).map(c=>`<button class="tag-chip" style="cursor:pointer" data-view="${c.id}">${esc(c.name)}</button>`).join("")}
    </div>
  </div>`).join("")}`;}

}
function renderIntake(){
  const list=[...S.intakes].sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
  const order={submitted:0,pending:1,imported:2};
  list.sort((a,b)=>(order[a.status]??9)-(order[b.status]??9));
  const fmtDate=s=>s?String(s).slice(0,10):"";
  return`
  <div class="card" style="border-color:var(--border2)">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--text)">🔗 當事人自填連結</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">產生專屬連結傳給當事人，由其自行填寫基本資料後回傳，審核後一鍵匯入客戶名單。</div>
      </div>
      <button class="btn btn-violet btn-sm" id="btn-gen-intake">＋ 產生填寫連結</button>
    </div>
    <div style="display:flex;gap:8px;align-items:flex-start;background:var(--bg4);border-radius:10px;padding:10px 13px;font-size:11px;color:var(--text3);margin-top:14px;line-height:1.7">
      🔒 <div>每個連結皆為隨機專屬網址，僅持有連結者可填寫；沒有連結或未登入管理後台者，無法檢視或存取任何資料。</div>
    </div>
  </div>
  ${list.length===0?`<div class="empty"><div class="empty-ico">🔗</div><div>尚無填寫連結，點擊「產生填寫連結」開始</div></div>`:
  list.map(rec=>{
    const m=intakeStatusMeta(rec.status);
    const url=intakeUrl(rec.id);
    const nm=rec.clientName||(rec.data&&rec.data.name)||"（未命名）";
    return`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;min-width:0">
          <span style="font-size:14px;font-weight:800;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(nm)}</span>
          <span class="badge" style="background:${m.bg};color:${m.color};border-color:${m.bd}">${m.label}</span>
        </div>
        <span style="font-size:11px;color:var(--text4)">建立 ${fmtDate(rec.createdAt)}</span>
      </div>
      ${rec.status==="pending"?`
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <input class="fi" style="flex:1;min-width:180px;font-size:11px;color:var(--text3)" value="${esc(url)}" readonly onclick="this.select()">
          <button class="btn btn-violet btn-sm" data-copy-intake="${rec.id}">📋 複製</button>
          <button class="btn btn-danger btn-sm" data-del-intake="${rec.id}">刪除</button>
        </div>
        <div style="font-size:11px;color:var(--text4);margin-top:8px">尚未回填，可將上方連結傳給當事人。</div>
      `:rec.status==="submitted"?`
        <div style="font-size:12px;color:var(--text2);margin-bottom:10px">
          📱 ${esc(rec.data?.mobile||"—")}　·　回填 ${fmtDate(rec.submittedAt)}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-violet btn-sm" data-preview-intake="${rec.id}">👁 檢視 / 匯入</button>
          <button class="btn btn-danger btn-sm" data-del-intake="${rec.id}">刪除</button>
        </div>
      `:`
        <div style="font-size:12px;color:var(--text3)">已於 ${fmtDate(rec.importedAt)} 匯入客戶名單。</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
          <button class="btn btn-danger btn-sm" data-del-intake="${rec.id}">刪除記錄</button>
        </div>
      `}
    </div>`;
  }).join("")}
  `;
}

  return`<div class="overlay"><div class="dialog" style="max-width:420px">
  <div class="dialog-title">🔗 產生填寫連結</div>
  <div style="font-size:12px;color:var(--text2);margin-bottom:16px">為當事人建立一個專屬填寫連結。可先填入稱呼方便辨識（選填）。</div>
  <div class="fg" style="margin-bottom:12px"><label class="fl">當事人稱呼 / 標記（選填）</label><input class="fi" id="ig-name" value="${esc(S.intakeGenName)}" placeholder="例如：王先生、○○公司"></div>
  <div class="fg" style="margin-bottom:18px"><label class="fl">預設類型</label><select class="fi" id="ig-type" style="width:100%">${CLIENT_TYPES.map(t=>`<option${t===S.intakeGenType?" selected":""}>${t}</option>`).join("")}</select></div>
  <div style="display:flex;gap:10px;justify-content:flex-end">

  <input class="fi" style="width:100%;font-size:12px;margin-bottom:12px" value="${esc(url)}" readonly onclick="this.select()">

function renderIntakePreview(){
  const rec=S.intakes.find(x=>x.id===S.previewIntake);
  if(!rec)return"";
  const d=rec.data||{};
  const rows=[["姓名 / 名稱",d.name],["類型",d.type],["身分證 / 統編",d.idNumber],["手機",d.mobile],["市話",d.phone],["Email",d.email],["地址",d.address],["聯絡人",d.contactPerson],["補充說明",d.note]];
  return`<div class="overlay"><div class="dialog" style="max-width:480px">
  <div class="dialog-title">👁 當事人回填資料</div>
  <div class="card" style="box-shadow:none;margin-bottom:16px">
    ${rows.map(([l,v])=>`<div class="info-row"><div class="info-lbl">${l}</div><div class="info-val" style="text-align:right">${v?esc(v):"—"}</div></div>`).join("")}
  </div>
  <div style="font-size:11px;color:var(--text4);margin-bottom:16px">匯入後將於客戶名單新增一筆資料（案源標記為「當事人自填」），可再自行編輯調整。</div>
  <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap">
    <button class="btn btn-outline btn-sm" id="ip-close">關閉</button>
    <button class="btn btn-danger btn-sm" data-del-intake="${rec.id}">刪除</button>
    <button class="btn btn-violet btn-sm" id="ip-import">⬇ 匯入為客戶</button>
  </div>
</div></div>`;}

  const f=S.form;

  <div class="dialog-title">👤 ${S.editId?"編輯客戶":"新增客戶"}</div>
  <div class="form-section">基本資料</div>
  <div class="form-grid">
    <div class="fg"><label class="fl">客戶名稱 *</label><input class="fi" id="f-name" value="${esc(f.name)}" placeholder="姓名 / 公司名稱"></div>
    <div class="fg"><label class="fl">類型</label><select class="fi" id="f-type" style="width:100%">${CLIENT_TYPES.map(t=>`<option${f.type===t?" selected":""}>${t}</option>`).join("")}</select></div>
    <div class="fg"><label class="fl">身分證 / 統一編號</label><input class="fi" id="f-id" value="${esc(f.idNumber)}" placeholder="選填"></div>
    <div class="fg"><label class="fl">狀態</label><select class="fi" id="f-status" style="width:100%">${CLIENT_STATUS.map(s=>`<option value="${s.k}"${f.status===s.k?" selected":""}>${s.label}</option>`).join("")}</select></div>
  </div>
  <div class="form-section">聯絡方式</div>
  <div class="form-grid">
    <div class="fg"><label class="fl">手機</label><input class="fi" id="f-mobile" value="${esc(f.mobile)}" placeholder="0912-345-678"></div>
    <div class="fg"><label class="fl">市話</label><input class="fi" id="f-phone" value="${esc(f.phone)}" placeholder="02-1234-5678"></div>
    <div class="fg"><label class="fl">Email</label><input class="fi" id="f-email" value="${esc(f.email)}" placeholder="選填"></div>
    <div class="fg"><label class="fl">聯絡人</label><input class="fi" id="f-contact" value="${esc(f.contactPerson)}" placeholder="公司聯絡窗口"></div>
  </div>
  <div class="fg" style="margin-top:10px"><label class="fl">地址</label><input class="fi" id="f-address" value="${esc(f.address)}" placeholder="選填"></div>
  <div class="form-section">分類與備註</div>
  <div class="form-grid">
    <div class="fg"><label class="fl">案源</label><select class="fi" id="f-source" style="width:100%">${CLIENT_SOURCES.map(s=>`<option${f.source===s?" selected":""}>${s}</option>`).join("")}</select></div>
    <div class="fg"><label class="fl">標籤（逗號分隔）</label><input class="fi" id="f-tags" value="${esc(f.tags)}" placeholder="VIP, 企業法務, 長期"></div>
  </div>
  <div class="fg" style="margin-top:10px;margin-bottom:18px"><label class="fl">備註</label><textarea class="fi" id="f-note" rows="2" placeholder="客戶偏好、注意事項…">${esc(f.note)}</textarea></div>
  <div style="display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap">
    ${S.editId?"<span></span>":`<button class="btn btn-outline btn-sm" id="f-gen-intake" title="產生專屬連結傳給當事人，由其自行填寫資料">🔗 改由當事人自填</button>`}
    <div style="display:flex;gap:10px">
      <button class="btn btn-outline btn-sm" id="f-cancel">取消</button>
      <button class="btn btn-violet btn-sm" id="f-save">💾 儲存</button>
    </div>
  </div>
</div></div>`;}

// ── 溝通記錄表單 ──
function renderCommForm(){
  const f=S.commForm;
  return`<div class="overlay"><div class="dialog" style="max-width:420px">
  <div class="dialog-title">💬 新增溝通記錄</div>
  <div class="form-grid">
    <div class="fg"><label class="fl">日期</label><input class="fi" type="date" id="cf-date" value="${f.date}"></div>
    <div class="fg"><label class="fl">方式</label><select class="fi" id="cf-type" style="width:100%">${COMM_TYPES.map(c=>`<option value="${c.k}"${f.type===c.k?" selected":""}>${c.ico} ${c.label}</option>`).join("")}</select></div>
  </div>
  <div class="fg" style="margin-top:10px;margin-bottom:18px"><label class="fl">內容</label><textarea class="fi" id="cf-content" rows="4" placeholder="溝通要點、當事人指示、後續待辦…">${esc(f.content)}</textarea></div>

// ══════════════════════════════════════════
// BIND
// ══════════════════════════════════════════
function bindApp(){
  document.getElementById("btn-logout")?.addEventListener("click",async()=>{if(confirm("確認登出？"))await signOut(auth);});
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.tab;S.viewId=null;render();}));
  document.getElementById("btn-add")?.addEventListener("click",()=>{S.form=newForm();S.editId=null;S.showForm=true;render();});

  // 檢視詳情
  document.querySelectorAll("[data-view]").forEach(b=>b.addEventListener("click",()=>{S.viewId=b.dataset.view;render();window.scrollTo(0,0);}));

  // 電話連結：點擊撥號，不要連動觸發父層的「檢視詳情」
  document.querySelectorAll(".tel-link").forEach(a=>a.addEventListener("click",e=>e.stopPropagation()));

  // 篩選 / 搜尋
  document.querySelectorAll("[data-filter]").forEach(b=>b.addEventListener("click",()=>{S.filterStatus=b.dataset.filter;render();}));
  const sb=document.getElementById("search");
  if(sb)sb.addEventListener("input",e=>{S.search=e.target.value;const pos=e.target.selectionStart;render();const n=document.getElementById("search");if(n){n.focus();try{n.setSelectionRange(pos,pos);}catch(_){}}});

  // 快速建檔（從未連結當事人）
  document.querySelectorAll("[data-quick-add]").forEach(b=>b.addEventListener("click",()=>{S.form={...newForm(),name:b.dataset.quickAdd};S.editId=null;S.showForm=true;render();}));

  // 詳情頁
  document.getElementById("btn-back")?.addEventListener("click",()=>{S.viewId=null;S.tab="clients";render();});
  document.getElementById("btn-edit")?.addEventListener("click",()=>{const c=S.clients.find(x=>x.id===S.viewId);if(c){S.form={...newForm(),...c};S.editId=c.id;S.showForm=true;render();}});
  document.getElementById("btn-del")?.addEventListener("click",()=>{S.delConfirm=S.viewId;render();});
  document.getElementById("btn-add-comm")?.addEventListener("click",()=>{S.commForm={date:twToday(),type:"phone",content:""};S.showCommForm=true;render();});
  document.querySelectorAll("[data-del-comm]").forEach(b=>b.addEventListener("click",()=>{S.delComm=b.dataset.delComm;render();}));

  // 客戶表單
  document.getElementById("f-cancel")?.addEventListener("click",()=>{S.showForm=false;S.editId=null;render();});
  // 新增客戶 → 改由當事人自填（帶入已輸入的名稱與類型）
  document.getElementById("f-gen-intake")?.addEventListener("click",()=>{
    S.intakeGenName=document.getElementById("f-name")?.value.trim()||"";
    S.intakeGenType=document.getElementById("f-type")?.value||"個人";
    S.showForm=false;S.editId=null;S.showIntakeGen=true;S.tab="intake";render();
  });
  document.getElementById("f-save")?.addEventListener("click",()=>{
    S.form={
      name:document.getElementById("f-name")?.value||"",
      type:document.getElementById("f-type")?.value||"個人",
      idNumber:document.getElementById("f-id")?.value||"",
      status:document.getElementById("f-status")?.value||"active",
      mobile:document.getElementById("f-mobile")?.value||"",
      phone:document.getElementById("f-phone")?.value||"",
      email:document.getElementById("f-email")?.value||"",
      contactPerson:document.getElementById("f-contact")?.value||"",
      address:document.getElementById("f-address")?.value||"",
      source:document.getElementById("f-source")?.value||"其他",
      tags:document.getElementById("f-tags")?.value||"",
      note:document.getElementById("f-note")?.value||"",
    };
    saveClient();
  });

  // 溝通記錄表單
  document.getElementById("cf-cancel")?.addEventListener("click",()=>{S.showCommForm=false;render();});
  document.getElementById("cf-save")?.addEventListener("click",()=>{
    S.commForm={
      date:document.getElementById("cf-date")?.value||twToday(),
      type:document.getElementById("cf-type")?.value||"phone",
      content:document.getElementById("cf-content")?.value||"",
    };
    saveComm();
  });

  // 刪除確認
  document.getElementById("dc-client-cancel")?.addEventListener("click",()=>{S.delConfirm=null;render();});
  document.getElementById("dc-client-ok")?.addEventListener("click",()=>delClient(S.delConfirm));
  document.getElementById("dc-comm-cancel")?.addEventListener("click",()=>{S.delComm=null;render();});
  document.getElementById("dc-comm-ok")?.addEventListener("click",()=>delCommItem(S.delComm));

  // 當事人自填連結
  document.getElementById("btn-gen-intake")?.addEventListener("click",()=>{S.showIntakeGen=true;render();});
  document.getElementById("ig-cancel")?.addEventListener("click",()=>{S.showIntakeGen=false;render();});
  document.getElementById("ig-create")?.addEventListener("click",()=>{
    S.intakeGenName=document.getElementById("ig-name")?.value||"";
    S.intakeGenType=document.getElementById("ig-type")?.value||"個人";
    genIntakeLink();
  });
  document.getElementById("lm-close")?.addEventListener("click",()=>{S.linkModal=null;render();});
  document.querySelectorAll("[data-copy-intake]").forEach(b=>b.addEventListener("click",()=>copyIntakeLink(b.dataset.copyIntake)));
  document.querySelectorAll("[data-preview-intake]").forEach(b=>b.addEventListener("click",()=>{S.previewIntake=b.dataset.previewIntake;render();}));
  document.getElementById("ip-close")?.addEventListener("click",()=>{S.previewIntake=null;render();});
  document.getElementById("ip-import")?.addEventListener("click",()=>importIntake(S.previewIntake));
  document.querySelectorAll("[data-del-intake]").forEach(b=>b.addEventListener("click",()=>{S.delIntake=b.dataset.delIntake;render();}));
  document.getElementById("dc-intake-cancel")?.addEventListener("click",()=>{S.delIntake=null;render();});
  document.getElementById("dc-intake-ok")?.addEventListener("click",()=>deleteIntake(S.delIntake));
}

render();
</script>
</body>
</html>
