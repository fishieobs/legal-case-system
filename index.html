                    // Build hearing map: date -> [{clientName, caseType, note, caseId}]
                    const hearingMap={};
                    cases.forEach(c=>{
                        (c.hearings||[]).forEach(h=>{
                            if(!hearingMap[h.date]) hearingMap[h.date]=[];
                            hearingMap[h.date].push({clientName:c.clientName,caseType:c.caseType,note:h.note||h.agency||"開庭",caseId:c.id,time:h.time||""});
                        });
                    });
                    const cells=[];
                    // Previous month padding
                    const prevDays=new Date(y,m,0).getDate();
                    for(let i=firstDay-1;i>=0;i--) cells.push({day:prevDays-i,cur:false});
                    for(let d=1;d<=daysInMonth;d++) cells.push({day:d,cur:true});
                    while(cells.length%7!==0) cells.push({day:cells.length-daysInMonth-firstDay+1,cur:false});
                    const monthStr=`${y}年${m+1}月`;
                    return(
                        <div className="cal-wrap">
                            <div className="cal-header">
                                <button className="cal-nav" onClick={()=>setCalDate(new Date(y,m-1,1))}>‹</button>
                                <div style={{fontWeight:700,fontSize:16,color:"var(--text)"}}>{monthStr}</div>
                                <button className="cal-nav" onClick={()=>setCalDate(new Date(y,m+1,1))}>›</button>
                            </div>
                            <div className="cal-grid">
                                {[["日","sun"],["一",""],["二",""],["三",""],["四",""],["五",""],["六","sat"]].map(([d,cls])=>(
                                    <div key={d} className={`cal-dow${cls?" "+cls:""}`}>{d}</div>
                                ))}
                                {cells.map((cell,i)=>{
                                    const dow=i%7; // 0=日,6=六
                                    const dateStr=cell.cur?`${y}-${String(m+1).padStart(2,"0")}-${String(cell.day).padStart(2,"0")}`:"";
                                    const events=dateStr?hearingMap[dateStr]||[]:[];
                                    const isToday=dateStr===todayStr;
                                    const isSun=dow===0;
                                    const isSat=dow===6;
                                    const holidayName=dateStr?TW_HOLIDAYS[dateStr]:"";
                                    const isHoliday=!!holidayName&&!isSun&&!isSat; // non-weekend public holiday
                                    const cls=[
                                        "cal-day",
                                        !cell.cur?"other-month":"",
                                        isToday?"today-cell":"",
                                        isSun?"is-sun":"",
                                        isSat?"is-sat":"",
                                        isHoliday?"is-holiday":"",
                                    ].filter(Boolean).join(" ");
                                    const dateTodos=dateStr?calTodos.filter(t=>t.date===dateStr):[];
                                    return(
                                        <div key={i} className={cls} style={{cursor:cell.cur?"pointer":"default"}}
                                            onClick={()=>cell.cur&&setCalTodoModal(dateStr)}>
                                            <div className="cal-day-num">{cell.day}</div>
                                            {holidayName && cell.cur && (
                                                <div className="cal-holiday-label" title={holidayName}>
                                                    {holidayName==="彈性放假"?"補假":holidayName}
                                                </div>
                                            )}
                                            {events.slice(0,2).map((ev,ei)=>(
                                                <div key={ei} className="cal-event"
                                                    style={{background:(TYPE_COLOR[ev.caseType]||"#64748b")+"33",color:TYPE_COLOR[ev.caseType]||"#64748b"}}
                                                    onClick={e=>{e.stopPropagation();openDetail(ev.caseId);}}
                                                    title={`${ev.clientName} ${ev.time} ${ev.note}`}>
                                                    {ev.time&&`${ev.time} `}{ev.clientName}
                                                </div>
                                            ))}
                                            {events.length>2 && <div style={{fontSize:9,color:"var(--text4)",paddingLeft:3}}>+{events.length-2}庭</div>}
                                            {dateTodos.slice(0,2).map((t,ti)=>(
                                                <div key={ti} className={`cal-todo-dot${t.done?" done":""}`}
                                                    onClick={e=>{e.stopPropagation();toggleCalTodo(t.id);}}>
                                                    {t.done?"✓":""} {t.text}
                                                </div>
                                            ))}
                                            {dateTodos.length>2 && <div style={{fontSize:9,color:"#8b5cf6",paddingLeft:3}}>+{dateTodos.length-2}項</div>}
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="cal-legend">
                                <div className="cal-legend-item"><div style={{width:10,height:10,borderRadius:50,background:"#ef4444"}}/><span style={{color:"#ef4444",fontWeight:700}}>日/假日</span></div>
                                <div className="cal-legend-item"><div style={{width:10,height:10,borderRadius:50,background:"#3b82f6"}}/><span style={{color:"#3b82f6",fontWeight:700}}>六</span></div>
                                <div className="cal-legend-item"><div style={{width:10,height:10,borderRadius:4,background:"rgba(139,92,246,.4)"}}/><span style={{color:"#8b5cf6",fontWeight:700}}>待辦</span></div>
                                <div style={{width:1,height:14,background:"var(--border)",margin:"0 4px"}}/>
                                {CASE_TYPES.map(t=><div key={t} className="cal-legend-item"><div style={{width:10,height:10,borderRadius:2,background:TYPE_COLOR[t]||"#64748b"}}/>{t}</div>)}
                            </div>
                            <div style={{fontSize:10,color:"var(--text4)",padding:"6px 18px 0",textAlign:"right"}}>點選日期可新增待辦事項</div>
                        </div>
                    );
                })()}

                {/* Calendar Todo Modal */}
                {calTodoModal && (()=>{
                    const ds=calTodoModal;
                    const d=new Date(ds+"T00:00:00+08:00");
                    const wd=["日","一","二","三","四","五","六"][d.getDay()];
                    const label=`${d.getMonth()+1}月${d.getDate()}日（${wd}）`;
                    const todosForDay=calTodos.filter(t=>t.date===ds).sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
                    const hearingsForDay=(()=>{
                        const hm={};
                        cases.forEach(c=>(c.hearings||[]).forEach(h=>{if(!hm[h.date])hm[h.date]=[];hm[h.date].push({...h,clientName:c.clientName,firmCaseNo:c.firmCaseNo,caseType:c.caseType,caseId:c.id});}));
                        return hm[ds]||[];
                    })();
                    return(
                        <div className="cal-todo-modal" onClick={()=>setCalTodoModal(null)}>
                            <div className="cal-todo-sheet" onClick={e=>e.stopPropagation()}>
                                {/* Header */}
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                                    <div>
                                        <div style={{fontWeight:800,fontSize:17,color:"var(--text)"}}>{label}</div>
                                        {TW_HOLIDAYS[ds] && <div style={{fontSize:12,color:"var(--red)",marginTop:2}}>🎌 {TW_HOLIDAYS[ds]}</div>}
                                    </div>
                                    <button onClick={()=>setCalTodoModal(null)} style={{background:"var(--bg4)",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",color:"var(--text2)",fontSize:16}}>✕</button>
                                </div>

                                {/* Hearings on this day */}
                                {hearingsForDay.length>0 && <>
                                    <div style={{fontSize:10,color:"var(--text4)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>🏛 當日庭期</div>
                                    {hearingsForDay.map((h,i)=>(
                                        <div key={i} onClick={()=>{openDetail(h.caseId);setCalTodoModal(null);}}
                                            style={{background:"var(--bg3)",border:`1px solid ${TYPE_COLOR[h.caseType]||"#64748b"}33`,borderRadius:10,padding:"10px 12px",marginBottom:8,cursor:"pointer",display:"flex",gap:10,alignItems:"center"}}>
                                            <span style={{fontSize:15,color:TYPE_COLOR[h.caseType]||"#64748b"}}>🏛</span>
                                            <div style={{flex:1}}>
                                                <div style={{fontWeight:700,color:"var(--text)",fontSize:13}}>{h.clientName}</div>
                                                <div style={{fontSize:11,color:"var(--text3)"}}>{h.time&&`${h.time} · `}{h.note||h.agency||""}</div>
                                            </div>
                                            <Badge label={h.caseType} color={TYPE_COLOR[h.caseType]||"#64748b"}/>
                                        </div>
                                    ))}
                                    <div style={{height:1,background:"var(--border)",margin:"12px 0"}}/>
                                </>}

                                {/* Todos */}
                                <div style={{fontSize:10,color:"var(--text4)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>✅ 待辦事項</div>
                                {todosForDay.length===0 && <div style={{color:"var(--text4)",fontSize:13,padding:"8px 0 14px"}}>尚無待辦，在下方新增</div>}
                                {todosForDay.map(t=>(
                                    <div key={t.id} className="cal-todo-item" onClick={()=>toggleCalTodo(t.id)}>
                                        <div className={`cal-todo-check${t.done?" done":""}`}>
                                            {t.done && <span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
                                        </div>
                                        <div style={{flex:1,color:t.done?"var(--text4)":"var(--text)",textDecoration:t.done?"line-through":"none",fontSize:14}}>{t.text}</div>
                                        <button className="cal-todo-del" onClick={e=>{e.stopPropagation();deleteCalTodo(t.id);}}>🗑</button>
                                    </div>
                                ))}

                                {/* Add new todo */}
                                <div style={{display:"flex",gap:8,marginTop:14}}>
                                    <input
                                        style={{flex:1,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:9,padding:"10px 13px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit"}}
                                        placeholder="新增待辦事項…"
                                        value={calTodoInput}
                                        onChange={e=>setCalTodoInput(e.target.value)}
                                        onKeyDown={e=>{ if(e.key==="Enter"){ addCalTodo(ds); } }}
                                        autoFocus
                                    />
                                    <button className="btn btn-gold" onClick={()=>addCalTodo(ds)} disabled={!calTodoInput.trim()}>＋ 新增</button>
                                </div>
                            </div>
                        </div>
                    );
                })()}

                {/* Mobile cards */}
                {listTab==="list" && <div className="case-cards">
                    {sortedFiltered.length===0 && <div className="empty"><div className="ico">📂</div>查無案件</div>}
                    {sortedFiltered.map(c=>{
                        const nh=(c.hearings||[]).filter(h=>daysUntil(h.date)>=0).sort((a,b)=>a.date.localeCompare(b.date))[0];
                        const pt=(c.todos||[]).filter(t=>!t.done).length;
                        return(
                            <div key={c.id} className="case-card" onClick={()=>openDetail(c.id)}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                                    <div>
                                        <div style={{color:"var(--gold)",fontWeight:700,fontFamily:"monospace",fontSize:12}}>{c.firmCaseNo}</div>
                                        <div style={{fontWeight:700,fontSize:16,color:"var(--text)",marginTop:2}}>{c.clientName}</div>
                                        <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{c.currentAgency||c.court||""}{c.caseReason&&<span style={{color:"var(--text4)",marginLeft:4}}>· {c.caseReason}</span>}</div>
                                    </div>
                                    <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
                                        <Badge label={c.caseType} color={TYPE_COLOR[c.caseType]||"#64748b"}/>
                                        <Badge label={c.status} color={STATUS_COLOR[c.status]||"#64748b"}/>
                                    </div>
                                </div>
                                <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:6,fontSize:12}}>
                                    {nh && <span style={{color:daysUntil(nh.date)<=7?"var(--yellow)":"var(--text3)"}}>🗓 {nh.date}</span>}
                                    {pt>0 && <span style={{background:"#ef444422",color:"var(--red)",borderRadius:10,padding:"1px 8px",fontWeight:700}}>✅ {pt}項</span>}
                                </div>
                                <div style={{display:"flex",gap:14,marginTop:8,fontSize:12}}>
                                    <div><div style={{color:"var(--text4)",fontSize:10}}>應收</div><div style={{color:"var(--gold)",fontWeight:700}}>{c.totalFee?Number(c.totalFee).toLocaleString():"—"}</div></div>
                                    <div><div style={{color:"var(--text4)",fontSize:10}}>已收</div><div style={{color:"var(--green)",fontWeight:700}}>{getReceived(c)?getReceived(c).toLocaleString():"—"}</div></div>
                                    <div><div style={{color:"var(--text4)",fontSize:10}}>未收</div><div style={{color:getUnpaid(c)>0?"var(--red)":"var(--text3)",fontWeight:700}}>{getUnpaid(c)?getUnpaid(c).toLocaleString():"—"}</div></div>
                                    <div><div style={{color:"var(--text4)",fontSize:10}}>代墊</div><div style={{color:"var(--purple)",fontWeight:700}}>{c.disbursements?Number(c.disbursements).toLocaleString():"—"}</div></div>
                                </div>
                            </div>
                        );
                    })}
                </div>}

                {/* Desktop table */}
                {listTab==="list" && <div className="tbl-wrap">
                    <table>
                        <thead><tr>
                            <th>案件編號</th><th>當事人</th><th>對造</th><th>繫屬機關</th><th>類型</th><th>狀態</th>
                            <th style={{textAlign:"right"}}>已收(元)</th><th style={{textAlign:"right"}}>未收(元)</th><th style={{textAlign:"right"}}>代墊(元)</th>
                            <th>最近開庭</th><th>待辦</th><th></th>
                        </tr></thead>
                        <tbody>
                            {sortedFiltered.length===0 && <tr><td colSpan={12} style={{textAlign:"center",padding:40,color:"var(--text3)"}}>查無案件</td></tr>}
                            {sortedFiltered.map(c=>{
                                const nh=(c.hearings||[]).filter(h=>daysUntil(h.date)>=0).sort((a,b)=>a.date.localeCompare(b.date))[0];
                                const pt=(c.todos||[]).filter(t=>!t.done).length;
                                return(
                                    <tr key={c.id} className="trow" onClick={()=>openDetail(c.id)}>
                                        <td><span style={{color:"var(--gold)",fontWeight:700,fontFamily:"monospace",fontSize:11}}>{c.firmCaseNo}</span></td>
                                        <td><span style={{fontWeight:700,color:"var(--text)"}}>{c.clientName}</span></td>
                                        <td style={{color:"var(--text3)",fontSize:11}}>{c.opposingParty||"—"}</td>
                                        <td style={{color:"var(--text3)",fontSize:11}}>{c.currentAgency||"—"}</td>
                                        <td><Badge label={c.caseType} color={TYPE_COLOR[c.caseType]||"#64748b"}/></td>
                                        <td><Badge label={c.status} color={STATUS_COLOR[c.status]||"#64748b"}/></td>
                                        <td style={{textAlign:"right",color:"var(--green)"}}>{getReceived(c)?getReceived(c).toLocaleString():"—"}</td>
                                        <td style={{textAlign:"right",color:getUnpaid(c)>0?"var(--red)":"var(--text3)"}}>{getUnpaid(c)?getUnpaid(c).toLocaleString():"—"}</td>
                                        <td style={{textAlign:"right",color:"var(--purple)"}}>{c.disbursements?Number(c.disbursements).toLocaleString():"—"}</td>
                                        <td style={{color:nh&&daysUntil(nh.date)<=7?"var(--yellow)":"var(--text3)",fontSize:11}}>{nh?nh.date:"—"}</td>
                                        <td>{pt>0?<span style={{background:"#ef444422",color:"var(--red)",borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700}}>{pt}</span>:"—"}</td>
                                        <td onClick={e=>e.stopPropagation()}>
                                            <button className="btn btn-outline btn-sm" style={{fontSize:11}} onClick={()=>openEdit(c)}>編輯</button>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>}
            </div>

            <div className="bnav">
                <button className="bnav-btn active"><span className="bnav-icon">📋</span>案件</button>
                <button className="bnav-btn" onClick={openAdd}><span className="bnav-icon">➕</span>新增</button>
                <button className="bnav-btn" onClick={()=>setView("tools")}><span className="bnav-icon">🔧</span>工具</button>
                <button className="bnav-btn" onClick={()=>setView("contacts")}><span className="bnav-icon">👥</span>通訊錄</button>
                <button className="bnav-btn" onClick={()=>setView("stats")}><span className="bnav-icon">📊</span>統計</button>
            </div>
        </div>
    );

    // ══ DETAIL VIEW ══
    if(view==="detail"&&selected) return(
        <div className="app">
            <div className="header">
                <button className="btn btn-outline btn-sm" onClick={()=>setView("list")}>← 返回</button>
                <div style={{fontWeight:700,color:"var(--text)",fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,textAlign:"center"}}>{selected.clientName}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button className="btn btn-outline btn-sm no-print" onClick={()=>copyCase(selected)}>📎 複製上訴</button>
                    <button className="btn btn-outline btn-sm no-print" onClick={printCase}>🖨 列印</button>
                    <button className="btn btn-outline btn-sm no-print" onClick={()=>openEdit(selected)}>✏️ 編輯</button>
                    <button className="btn btn-danger btn-sm no-print" onClick={()=>setDeleteConfirm(true)}>🗑</button>
                </div>
            </div>
            {/* Tab switcher */}
            <div style={{display:"flex",gap:0,padding:"0 16px",background:"var(--bg2)",borderBottom:"1px solid var(--border)"}}>
                {[["info","📋 案件資訊"],["timeline","🕐 時間軸"],["notes","📓 案件筆記"]].map(([t,l])=>(
                    <button key={t} onClick={()=>setDetailTab(t)} style={{
                        padding:"10px 18px",border:"none",background:"transparent",
                        color:detailTab===t?"var(--gold)":"var(--text3)",
                        fontWeight:detailTab===t?700:400,fontSize:13,cursor:"pointer",
                        borderBottom:detailTab===t?"2px solid var(--gold)":"2px solid transparent",
                        fontFamily:"inherit",transition:"all .2s",
                    }}>{l}</button>
                ))}
            </div>

            {deleteConfirm && (
                <div className="overlay">
                    <div className="dialog">
                        <div style={{fontWeight:700,fontSize:16,marginBottom:10}}>確認刪除案件？</div>
                        <div style={{color:"var(--text2)",marginBottom:20}}>「{selected.clientName}」將被永久刪除，無法復原。</div>
                        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                            <button className="btn btn-outline btn-sm" onClick={()=>setDeleteConfirm(false)}>取消</button>
                            <button className="btn btn-sm" style={{background:"var(--red)",color:"#fff"}} onClick={deleteCase}>確認刪除</button>
                        </div>
                    </div>
                </div>
            )}

            <div className="content">
                {/* Print title */}
                <div className="print-title">⚖ 律師案件管理系統 — 案件報告<br/><span style={{fontSize:13,fontWeight:400}}>{selected.clientName} · {selected.firmCaseNo} · 列印日期：{today()}</span></div>

                {/* Badge row */}
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
                    <Badge label={selected.caseType} color={TYPE_COLOR[selected.caseType]||"#64748b"}/>
                    <Badge label={selected.status} color={STATUS_COLOR[selected.status]||"#64748b"}/>
                    <Badge label={selected.instance} color="#64748b"/>
                    {(selected.tags||[]).map(tag=>{
                        const t=allTags.find(x=>x.name===tag);
                        return t?<Badge key={tag} label={tag} color={t.color}/>:null;
                    })}
                </div>
                {/* Tag toggle row */}
                {allTags.length>0 && (
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
                        <span style={{fontSize:10,color:"var(--text4)",fontWeight:700,letterSpacing:".06em",textTransform:"uppercase"}}>標籤：</span>
                        {allTags.map(t=>{
                            const active=(selected.tags||[]).includes(t.name);
                            return(
                                <button key={t.id} className="tag-pill" onClick={()=>toggleCaseTag(selected,t.name)}
                                    style={{background:active?t.color:t.color+"22",color:active?"#fff":t.color,border:`1px solid ${t.color}44`}}>
                                    {active?"✓ ":""}{t.name}
                                </button>
                            );
                        })}
                    </div>
                )}

                {/* ── TIMELINE TAB ── */}
                {detailTab==="timeline" && (()=>{
                    // Build timeline events
                    const events = [];
                    if(selected.retainerDate) events.push({date:selected.retainerDate,type:"milestone",icon:"⚖",label:"案件委任",detail:`委任律師 ${selected.attorney||""}`,color:"var(--gold)"});
                    (selected.hearings||[]).forEach(h=>{
                        const d=daysUntil(h.date);
                        events.push({date:h.date,time:h.time,type:d<0?"past":d===0?"today":"future",icon:"🏛",label:`${h.agency||"開庭"} ${h.note?`· ${h.note}`:""}`,detail:`${h.courtroom||""} ${h.time||""}`.trim(),color:d<0?"var(--text4)":d===0?"var(--red)":d<=7?"var(--yellow)":"var(--gold)"});
                    });
                    (selected.todos||[]).forEach(t=>{
                        if(t.due) events.push({date:t.due,type:"todo",done:t.done,icon:t.done?"✓":"○",label:t.text,detail:t.done?"已完成":"待辦",color:t.done?"var(--green)":"var(--purple)"});
                    });
                    events.sort((a,b)=>a.date.localeCompare(b.date));
                    return(
                        <div className="tl-wrap">
                            {events.length===0 && <div className="empty"><div className="ico">🕐</div>尚無時間軸事件</div>}
                            {events.map((ev,i)=>{
                                const dotClass = ev.type==="todo"?(ev.done?"tl-dot todo done":"tl-dot todo"):ev.type==="milestone"?"tl-dot milestone":`tl-dot ${ev.type}`;
                                const bodyClass = `tl-body ${ev.type==="todo"?"":ev.type}`;
                                const d = daysUntil(ev.date);
                                return(
                                    <div key={i} className="tl-item">
                                        <div className={dotClass}/>
                                        <div className="tl-date">{ev.date}{ev.time&&` ${ev.time}`}</div>
                                        <div className={bodyClass}>
                                            <div className="tl-tag" style={{color:ev.color}}>{ev.icon} {ev.type==="hearing"||ev.type==="past"||ev.type==="future"||ev.type==="today"?"開庭":ev.type==="todo"?"待辦":ev.type==="milestone"?"里程碑":""}</div>
                                            <div style={{color:"var(--text)",fontWeight:600,fontSize:14}}>{ev.label}</div>
                                            {ev.detail && <div style={{color:"var(--text3)",fontSize:12,marginTop:3}}>{ev.detail}</div>}
                                            {ev.type==="future"&&<div style={{color:"var(--gold)",fontSize:11,marginTop:4}}>📅 {d===0?"今天":d===1?"明天":`${d}天後`}</div>}
                                            {ev.type==="today"&&<div style={{color:"var(--red)",fontSize:11,fontWeight:700,marginTop:4}}>🔴 今天開庭！</div>}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    );
                })()}

                {/* ── INFO TAB ── */}

                {/* ── NOTES TAB ── */}
                {detailTab==="notes" && (()=>{
                    const allNotes=(selected.notes_list||[]);
                    const sorted=[...allNotes.filter(n=>n.pinned),...allNotes.filter(n=>!n.pinned)];
                    const tagMap=Object.fromEntries(NOTE_TAGS.map(t=>[t.name,t.color]));
                    return(
                        <div className="notes-wrap">
                            {/* New note editor */}
                            <div className="note-editor">
                                <textarea
                                    placeholder="記錄案件相關事項、法律意見、當事人指示、庭後心得…&#10;&#10;按 Ctrl+Enter 快速儲存"
                                    value={noteInput}
                                    onChange={e=>setNoteInput(e.target.value)}
                                    onKeyDown={e=>{ if(e.key==="Enter"&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); addNote(selected); } }}
                                    autoFocus={false}
                                />
                                <div className="note-toolbar">
                                    <div className="note-tag-sel">
                                        {NOTE_TAGS.map(t=>(
                                            <button key={t.name} className={"note-tag-opt"+(noteTag===t.name?" sel":"")}
                                                style={{background:t.color+"22",color:t.color,border:`1px solid ${t.color}44`}}
                                                onClick={()=>setNoteTag(t.name)}>{t.name}</button>
                                        ))}
                                    </div>
                                    <button className="btn btn-gold btn-sm" onClick={()=>addNote(selected)}
                                        disabled={!noteInput.trim()} style={{flexShrink:0}}>
                                        💾 儲存筆記
                                    </button>
                                </div>
                            </div>

                            {/* Notes list */}
                            {sorted.length===0 && (
                                <div className="notes-empty">
                                    <div className="ico">📓</div>
                                    <div>尚無筆記</div>
                                    <div style={{fontSize:12,marginTop:6}}>在上方輸入框記錄案件相關事項</div>
                                </div>
                            )}
                            {sorted.map(n=>{
                                const isEditing=editingNote?.id===n.id;
                                const isExpanded=expandedNotes[n.id];
                                const isLong=n.text.length>200||n.text.split("\n").length>4;
                                const tagColor=tagMap[n.tag]||"#64748b";
                                return(
                                    <div key={n.id} className={"note-card"+(n.pinned?" pinned":"")}>
                                        <div className="note-header">
                                            <div className="note-meta">
                                                {n.pinned && <span style={{color:"var(--gold)",fontSize:13}}>📌</span>}
                                                <span className="note-tag" style={{background:tagColor+"22",color:tagColor,border:`1px solid ${tagColor}44`}}>{n.tag}</span>
                                                <span>{fmtNoteDate(n.createdAt)}</span>
                                                {n.updatedAt!==n.createdAt && <span style={{color:"var(--text4)"}}>（已編輯）</span>}
                                            </div>
                                            <div className="note-actions">
                                                <button className="note-action-btn" title={n.pinned?"取消置頂":"置頂"} onClick={()=>togglePin(selected,n.id)}>{n.pinned?"📌":"📍"}</button>
                                                <button className="note-action-btn" title="編輯" onClick={()=>setEditingNote({id:n.id,text:n.text,tag:n.tag})}>✏️</button>
                                                <button className="note-action-btn" title="刪除" onClick={()=>deleteNote(selected,n.id)}>🗑</button>
                                            </div>
                                        </div>
                                        {isEditing?(
                                            <div>
                                                <textarea
                                                    style={{width:"100%",background:"var(--bg)",border:"1px solid var(--gold)44",borderRadius:8,padding:"10px 12px",color:"var(--text)",fontSize:13,fontFamily:"inherit",lineHeight:1.75,resize:"vertical",minHeight:100,outline:"none"}}
                                                    value={editingNote.text}
                                                    onChange={e=>setEditingNote(v=>({...v,text:e.target.value}))}
                                                    autoFocus
                                                />
                                                <div style={{display:"flex",gap:6,flexWrap:"wrap",margin:"10px 0 8px"}}>
                                                    {NOTE_TAGS.map(t=>(
                                                        <button key={t.name} className={"note-tag-opt"+(editingNote.tag===t.name?" sel":"")}
                                                            style={{background:t.color+"22",color:t.color,border:`1px solid ${t.color}44`}}
                                                            onClick={()=>setEditingNote(v=>({...v,tag:t.name}))}>{t.name}</button>
                                                    ))}
                                                </div>
                                                <div style={{display:"flex",gap:8}}>
                                                    <button className="btn btn-outline btn-sm" onClick={()=>setEditingNote(null)}>取消</button>
                                                    <button className="btn btn-gold btn-sm" onClick={()=>saveEditNote(selected)}>儲存</button>
                                                </div>
                                            </div>
                                        ):(
                                            <>
                                                <div className={"note-body"+(isLong&&!isExpanded?" collapsed":"")}>{n.text}</div>
                                                {isLong && (
                                                    <button onClick={()=>setExpandedNotes(v=>({...v,[n.id]:!v[n.id]}))}
                                                        style={{background:"none",border:"none",color:"var(--gold)",fontSize:12,cursor:"pointer",marginTop:6,padding:0,fontFamily:"inherit"}}>
                                                        {isExpanded?"▲ 收起":"▼ 展開全文"}
                                                    </button>
                                                )}
                                            </>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    );
                })()}

                {detailTab==="info" && <div className="detail-grid">
                    {/* 基本資料 */}
                    <div className="card">
                        <div className="card-title">📋 案件基本資料</div>
                        {[
                            ["事務所案件編號", selected.firmCaseNo],
                            ["法院／地檢案號", (selected.courtCaseNos||[]).filter(Boolean).join("、")],
                            ["股別", selected.division],
                            ["現在繫屬機關", selected.currentAgency],
                            ["法院", selected.court],
                            ["審級", selected.instance],
                            ["案件類型", selected.caseType],
                            ["案件狀態", selected.status],
                            ["委任日期", selected.retainerDate],
                            ["承辦律師", selected.attorney],
                        ].map(([l,v])=>(
                            <div key={l} className="info-row">
                                <div className="info-lbl">{l}</div>
                                <div className="info-val">{v||"—"}</div>
                            </div>
                        ))}
                    </div>

                    {/* 當事人 & 費用 */}
                    <div className="card">
                        <div className="card-title">👤 當事人 & 費用</div>
                        <div className="info-row"><div className="info-lbl">當事人姓名</div><div className="info-val">{selected.clientName||"—"}</div></div>
                        <div className="info-row">
                            <div className="info-lbl">連絡電話</div>
                            <div className="info-val">
                                {selected.phone?<a href={`tel:${selected.phone}`}>{selected.phone}</a>:"—"}
                            </div>
                        </div>
                        <div className="info-row"><div className="info-lbl">對造當事人</div><div className="info-val">{selected.opposingParty||"—"}</div></div>
                        <hr className="divider"/>
                        {/* Fee summary */}
                        <div className="fee-summary">
                            <div className="fee-summary-row">
                                <span style={{fontSize:12,color:"var(--text3)"}}>本件律師費</span>
                                <span style={{fontWeight:800,fontSize:15,color:"var(--gold)"}}>{fmt(selected.totalFee)}</span>
                            </div>
                            <div className="fee-summary-row">
                                <span style={{fontSize:12,color:"var(--text3)"}}>已收款合計</span>
                                <span style={{fontWeight:700,color:"var(--green)"}}>{fmt(getReceived(selected))}</span>
                            </div>
                            <div className="fee-summary-row">
                                <span style={{fontSize:12,color:"var(--text3)"}}>尚未收款</span>
                                <span style={{fontWeight:700,color:getUnpaid(selected)>0?"var(--red)":"var(--text3)"}}>{fmt(getUnpaid(selected))}</span>
                            </div>
                            {Number(selected.totalFee)>0 && <>
                                <div className="fee-progress">
                                    <div className="fee-progress-bar" style={{width:`${Math.min(100,(getReceived(selected)/Number(selected.totalFee)*100)).toFixed(1)}%`}}/>
                                </div>
                                <div style={{fontSize:10,color:"var(--text4)",textAlign:"right"}}>{(getReceived(selected)/Number(selected.totalFee)*100).toFixed(1)}% 已收</div>
                            </>}
                        </div>
                        {/* Payment records */}
                        {(selected.payments||[]).length>0 && <>
                            <div style={{fontSize:10,color:"var(--text3)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>收款記錄</div>
                            {(selected.payments||[]).map((p,i)=>(
                                <div key={i} className="pay-record">
                                    <div style={{flex:1}}>
                                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                                            <span style={{fontWeight:800,fontSize:15,color:"var(--green)"}}>{Number(p.amount).toLocaleString()} 元</span>
                                            <span className={`pay-badge ${METHOD_CLASS[p.method]||"pay-method-other"}`}>{p.method}</span>
                                        </div>
                                        <div style={{fontSize:12,color:"var(--text3)"}}>{p.date}{p.note&&` · ${p.note}`}</div>
                                    </div>
                                </div>
                            ))}
                        </>}
                        <div className="info-row">
                            <div className="info-lbl">代墊款項</div>
                            <div className="info-val" style={{color:"var(--purple)",fontWeight:700}}>{fmt(selected.disbursements)}</div>
                        </div>
                        <hr className="divider"/>
                        {selected.judgementLink && (
                            <div className="info-row">
                                <div className="info-lbl">判決連結</div>
                                <div className="info-val"><a href={selected.judgementLink} target="_blank" rel="noreferrer">開啟 🔗</a></div>
                            </div>
                        )}
                        <div className="info-row" style={{alignItems:"flex-start"}}>
                            <div className="info-lbl">備註</div>
                            <div className="info-val" style={{color:"var(--text2)",whiteSpace:"pre-wrap",textAlign:"left"}}>{selected.notes||"—"}</div>
                        </div>
                    </div>

                    {/* 開庭 */}
                    <div className="card">
                        <div className="card-title">🏛 開庭日期（{(selected.hearings||[]).length}場）</div>
                        {(selected.hearings||[]).length===0 && <div style={{color:"var(--text3)",padding:"12px 0"}}>尚無開庭記錄</div>}
                        {(selected.hearings||[]).sort((a,b)=>a.date.localeCompare(b.date)).map((h,i)=>{
                            const d=daysUntil(h.date);
                            const isPast = d < 0;
                            return(
                                <div key={i} className="hearing-item" style={{borderLeftColor:d>=0&&d<=3?"var(--red)":d>=0&&d<=7?"var(--yellow)":"var(--border)",marginBottom:14}}>
                                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                                        <div style={{flex:1}}>
                                            <div style={{color:"var(--gold)",fontWeight:700}}>{h.date} {h.time&&h.time}</div>
                                            <div style={{color:"var(--text)",fontSize:13,marginTop:2}}>{h.agency} {h.note&&`· ${h.note}`}</div>
                                            <div style={{color:"var(--text3)",fontSize:11,marginTop:2}}>
                                                {h.courtroom}
                                                {" "}
                                                {isPast
                                                    ? <span style={{color:"var(--text4)"}}>（已過）</span>
                                                    : <span style={{color:d<=3?"var(--red)":d<=7?"var(--yellow)":"var(--text3)"}}>
                                                        （{d===0?"今天！":d===1?"明天":`${d}天後`}）
                                                      </span>
                                                }
                                            </div>
                                        </div>
                                        {!isPast && (
                                            <button
                                                onClick={()=>openGoogleCalendar(h, selected)}
                                                title="加入 Google 日曆"
                                                style={{
                                                    background:"rgba(66,133,244,.15)",
                                                    border:"1px solid rgba(66,133,244,.4)",
                                                    borderRadius:8,
                                                    color:"#4285f4",
                                                    padding:"6px 10px",
                                                    fontSize:11,
                                                    fontWeight:700,
                                                    cursor:"pointer",
                                                    display:"flex",
                                                    alignItems:"center",
                                                    gap:4,
                                                    whiteSpace:"nowrap",
                                                    flexShrink:0,
                                                    fontFamily:"inherit",
                                                }}>
                                                📅 加入日曆
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* 待辦 */}
                    <div className="card">
                        <div className="card-title">✅ 待辦事項（{(selected.todos||[]).filter(t=>!t.done).length}項未完成）</div>
                        {(selected.todos||[]).length===0 && <div style={{color:"var(--text3)",padding:"12px 0"}}>尚無待辦事項</div>}
                        {(selected.todos||[]).map(t=>(
                            <div key={t.id} className="todo-row" onClick={()=>toggleTodo(selected,t.id)}>
                                <div className={`todo-check${t.done?" done":""}`}>
                                    {t.done && <span style={{color:"#000",fontSize:10,fontWeight:900}}>✓</span>}
                                </div>
                                <div style={{flex:1}}>
                                    <div style={{color:t.done?"var(--text3)":"var(--text)",textDecoration:t.done?"line-through":"none"}}>{t.text}</div>
                                    {t.due && <div style={{color:"var(--text4)",fontSize:11}}>期限：{t.due}</div>}
                                </div>
                            </div>
                        ))}
                    </div>
                    {/* 電子卷證 */}
                    <div className="card">
                        <div className="card-title">📁 開庭筆錄 & 電子卷證</div>

                        {/* Drive 資料夾 */}
                        {selected.driveFolderUrl ? (
                            <a className="drive-btn" href={selected.driveFolderUrl} target="_blank" rel="noreferrer" style={{marginBottom:16,display:"flex"}}>
                                <span className="drive-icon">📂</span>
                                <div>
                                    <div style={{color:"#4285f4",fontWeight:700,fontSize:14}}>開啟 Google Drive 卷證資料夾</div>
                                    <div style={{color:"var(--text3)",fontSize:11,marginTop:2}}>點擊開啟雲端資料夾</div>
                                </div>
                                <span style={{marginLeft:"auto",fontSize:18,color:"#4285f4"}}>→</span>
                            </a>
                        ) : (
                            <div style={{color:"var(--text4)",fontSize:13,padding:"12px 0",borderBottom:"1px solid var(--border)",marginBottom:12}}>
                                尚未設定 Drive 資料夾，請編輯案件填入連結
                            </div>
                        )}

                        {/* 個別文件連結 */}
                        {(selected.docs||[]).length > 0 && <>
                            <div style={{fontSize:11,color:"var(--text3)",fontWeight:700,letterSpacing:".06em",marginBottom:8,textTransform:"uppercase"}}>個別文件連結</div>
                            {(selected.docs||[]).map((d,i)=>(
                                <div key={i} className="drive-doc-row">
                                    <span style={{fontSize:16,flexShrink:0}}>{d.type==="筆錄"?"📝":d.type==="書狀"?"📄":d.type==="證物"?"🗂":"🔗"}</span>
                                    <a href={d.url} target="_blank" rel="noreferrer">{d.label||d.url}</a>
                                    <span style={{color:"var(--text4)",fontSize:11,flexShrink:0}}>{d.type||""}</span>
                                </div>
                            ))}
                        </>}

                        {(selected.docs||[]).length === 0 && !selected.driveFolderUrl && null}
                        {(selected.docs||[]).length === 0 && selected.driveFolderUrl && (
                            <div style={{color:"var(--text4)",fontSize:12,marginTop:8}}>可在編輯頁面新增個別文件連結</div>
                        )}
                    </div>

                </div>}
            </div>

            <div className="bnav">
                <button className="bnav-btn" onClick={()=>setView("list")}><span className="bnav-icon">📋</span>案件</button>
                <button className="bnav-btn" onClick={openAdd}><span className="bnav-icon">➕</span>新增</button>
                <button className="bnav-btn" onClick={()=>setView("tools")}><span className="bnav-icon">🔧</span>工具</button>
                <button className="bnav-btn" onClick={()=>setView("contacts")}><span className="bnav-icon">👥</span>通訊錄</button>
                <button className="bnav-btn" onClick={()=>setView("stats")}><span className="bnav-icon">📊</span>統計</button>
            </div>
        </div>
    );

    // ══ STATS VIEW ══
    if(view==="stats"){
        // ── Build year/month options from retainerDate ──
        const allYears=[...new Set(cases.map(c=>(c.retainerDate||"").slice(0,4)).filter(Boolean))].sort((a,b)=>b-a);
        const months=["01","02","03","04","05","06","07","08","09","10","11","12"];

        // ── Filter cases by year/month (based on retainerDate) ──
        const filteredCases=cases.filter(c=>{
            const d=c.retainerDate||"";
            if(statsYear!=="全部" && !d.startsWith(statsYear)) return false;
            if(statsMonth!=="全部" && d.slice(5,7)!==statsMonth) return false;
            return true;
        });

        // ── Filter payments by year/month (based on payment date) ──
        const allPayments=[];
        cases.forEach(c=>{
            (c.payments||[]).forEach(p=>{
                const d=p.date||"";
                const yOk=statsYear==="全部"||d.startsWith(statsYear);
                const mOk=statsMonth==="全部"||d.slice(5,7)===statsMonth;
                if(yOk&&mOk) allPayments.push({...p,caseId:c.id,clientName:c.clientName,firmCaseNo:c.firmCaseNo});
            });
        });

        // ── Aggregates ──
        const byType={}, byStatus={};
        CASE_TYPES.forEach(t=>byType[t]=0); CASE_STATUS.forEach(s=>byStatus[s]=0);
        filteredCases.forEach(c=>{
            byType[c.caseType]=(byType[c.caseType]||0)+1;
            byStatus[c.status]=(byStatus[c.status]||0)+1;
        });
        const totalFee=filteredCases.reduce((s,c)=>s+Number(c.totalFee||0),0);
        const unpaid=filteredCases.reduce((s,c)=>s+getUnpaid(c),0);
        const disb=filteredCases.reduce((s,c)=>s+Number(c.disbursements||0),0);
        // Received = sum of filtered payments
        const recv=allPayments.reduce((s,p)=>s+Number(p.amount||0),0);
        const pct=totalFee>0?Math.min(100,(recv/totalFee*100)).toFixed(1):0;

        // ── Monthly breakdown (for year view) ──
        const monthlyData=statsYear!=="全部"?months.map(m=>{
            const mCases=cases.filter(c=>(c.retainerDate||"").startsWith(statsYear+"-"+m));
            const mPayments=cases.flatMap(c=>(c.payments||[]).filter(p=>(p.date||"").startsWith(statsYear+"-"+m)));
            return {
                month:statsYear+"/"+m,
                caseCount:mCases.length,
                recv:mPayments.reduce((s,p)=>s+Number(p.amount||0),0),
                totalFee:mCases.reduce((s,c)=>s+Number(c.totalFee||0),0),
            };
        }):[];
        const maxRecv=monthlyData.length?Math.max(...monthlyData.map(d=>d.recv),1):1;

        const periodLabel=statsYear==="全部"?"全部期間":statsMonth==="全部"?`${statsYear}年`:
            `${statsYear}年${parseInt(statsMonth)}月`;

        return(
            <div className="app">
                <div className="header">
                    <button className="btn btn-outline btn-sm" onClick={()=>setView("list")}>← 返回</button>
                    <div className="header-title">📊 財務統計</div>
                    <div/>
                </div>
                <div className="content">
                    {/* ── Period selector ── */}
                    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
                        <select className="fsel" value={statsYear} onChange={e=>{setStatsYear(e.target.value);setStatsMonth("全部");}}>
                            <option value="全部">全部年份</option>
                            {allYears.map(y=><option key={y} value={y}>{y}年</option>)}
                        </select>
                        {statsYear!=="全部" && (
                            <select className="fsel" value={statsMonth} onChange={e=>setStatsMonth(e.target.value)}>
                                <option value="全部">全年</option>
                                {months.map(m=><option key={m} value={m}>{parseInt(m)}月</option>)}
                            </select>
                        )}
                        <div style={{
                            background:"rgba(200,169,110,.1)",border:"1px solid rgba(200,169,110,.3)",
                            borderRadius:8,padding:"6px 14px",fontSize:13,color:"var(--gold)",fontWeight:700,
                        }}>📅 {periodLabel}</div>
                        {(statsYear!=="全部"||statsMonth!=="全部") && (
                            <button className="btn btn-outline btn-sm" onClick={()=>{setStatsYear("全部");setStatsMonth("全部");}}>✕ 清除篩選</button>
                        )}
                    </div>

                    <div className="detail-grid">
                        {/* ── Summary ── */}
                        <div className="card">
                            <div className="card-title">💰 {periodLabel} 律師費總覽</div>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                                {[
                                    ["委任案件數",filteredCases.length+" 件","var(--gold)"],
                                    ["實收款項",recv.toLocaleString()+" 元","var(--green)"],
                                    ["應收律師費",totalFee.toLocaleString()+" 元","var(--text2)"],
                                    ["未收款",unpaid.toLocaleString()+" 元","var(--red)"],
                                    ["代墊款項",disb.toLocaleString()+" 元","var(--purple)"],
                                    ["收款筆數",allPayments.length+" 筆","var(--blue)"],
                                ].map(([l,v,c])=>(
                                    <div key={l} style={{background:"var(--bg)",borderRadius:8,padding:"10px 12px",border:"1px solid var(--border)"}}>
                                        <div style={{fontSize:10,color:"var(--text4)",marginBottom:4,letterSpacing:".04em"}}>{l}</div>
                                        <div style={{fontSize:14,fontWeight:800,color:c}}>{v}</div>
                                    </div>
                                ))}
                            </div>
                            {totalFee>0 && <>
                                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text3)",marginBottom:4}}>
                                    <span>收款進度</span><span>{pct}%</span>
                                </div>
                                <div style={{background:"var(--bg4)",borderRadius:6,height:10,overflow:"hidden"}}>
                                    <div style={{background:"var(--green)",height:"100%",width:`${pct}%`,borderRadius:6,transition:"width .6s"}}/>
                                </div>
                            </>}
                        </div>

                        {/* ── Monthly bar chart (year view only) ── */}
                        {statsYear!=="全部" && statsMonth==="全部" && (
                            <div className="card" style={{gridColumn:"span 1"}}>
                                <div className="card-title">📈 {statsYear}年 逐月收款</div>
                                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                                    {monthlyData.filter(d=>d.recv>0||d.caseCount>0).map(d=>(
                                        <div key={d.month} style={{display:"flex",alignItems:"center",gap:8}}>
                                            <div style={{fontSize:11,color:"var(--text3)",width:32,flexShrink:0}}>{d.month.slice(5)}月</div>
                                            <div style={{flex:1,background:"var(--bg4)",borderRadius:4,height:18,overflow:"hidden",position:"relative"}}>
                                                <div style={{
                                                    background:"linear-gradient(90deg,var(--green),#16a34a)",
                                                    height:"100%",borderRadius:4,
                                                    width:`${(d.recv/maxRecv*100).toFixed(1)}%`,
                                                    transition:"width .5s",

                            {[

                                {emoji:"🔍",name:"法源法律網",url:"https://www.lawbank.com.tw",desc:"法規與判決查詢",color:"#8b5cf6"},
                                {emoji:"🤖",name:"Claude AI",url:"https://claude.ai",desc:"AI法律助理",color:"#f97316"},

                    const map = {};

                    });
                    const contacts = Object.values(map)
                        .filter(ct=>{
                            const q=search.toLowerCase();
                            return !q || ct.name.toLowerCase().includes(q) || ct.phone.includes(q);
                        })
                        .sort((a,b)=>a.name.localeCompare(b.name,"zh-TW"));

                                    <div style={{fontSize:11,color:"var(--text4)"}}>案件數</div>

                    <div className="fee-summary" style={{marginBottom:16}}>
                        <div className="fee-summary-row">
                            <span style={{fontSize:12,color:"var(--text3)"}}>本件律師費</span>
                            <span style={{fontWeight:700,color:"var(--gold)"}}>{Number(F.totalFee).toLocaleString()} 元</span>
                        </div>
                        <div className="fee-summary-row">
                            <span style={{fontSize:12,color:"var(--text3)"}}>已收款合計</span>
                            <span style={{fontWeight:700,color:"var(--green)"}}>{(F.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0).toLocaleString()} 元</span>
                        </div>
                        <div className="fee-summary-row">
                            <span style={{fontSize:12,color:"var(--text3)"}}>自動計算未收款</span>
                            <span style={{fontWeight:800,color:Math.max(0,Number(F.totalFee)-(F.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0))>0?"var(--red)":"var(--green)"}}>
                                {Math.max(0,Number(F.totalFee)-(F.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0)).toLocaleString()} 元
                            </span>
                        </div>
                        {Number(F.totalFee)>0 && (()=>{
                            const pct=Math.min(100,((F.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0)/Number(F.totalFee)*100)).toFixed(1);
                            return <>
                                <div className="fee-progress"><div className="fee-progress-bar" style={{width:`${pct}%`}}/></div>
                                <div style={{fontSize:10,color:"var(--text4)",textAlign:"right"}}>{pct}% 已收</div>
                            </>;
                        })()}
                    </div>
                )}
                {/* Payment records */}
                <div style={{fontSize:10,color:"var(--text3)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>收款記錄</div>
                {(F.payments||[]).map((p,i)=>(
                    <div key={i} className="item-row">
                        <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                                <span style={{fontWeight:800,color:"var(--green)"}}>{Number(p.amount).toLocaleString()} 元</span>
                                <span className={`pay-badge ${METHOD_CLASS[p.method]||"pay-method-other"}`}>{p.method}</span>
                            </div>
                            <div style={{fontSize:11,color:"var(--text3)"}}>{p.date}{p.note&&` · ${p.note}`}</div>
                        </div>
                        <button className="btn btn-danger btn-icon" onClick={()=>sf("payments",(F.payments||[]).filter((_,idx)=>idx!==i))}>✕</button>
                    </div>
                ))}
                {/* Add payment */}
                <div className="add-row" style={{marginTop:10,alignItems:"flex-end"}}>
                    <div className="fg" style={{flex:"1 1 130px"}}>
                        <label className="fl">金額（元）</label>
                        <input className="fi" type="number" min="0" value={newPay.amount} onChange={e=>setNewPay(p=>({...p,amount:e.target.value}))} placeholder="0"/>
                    </div>
                    <div className="fg" style={{flex:"1 1 130px"}}>
                        <label className="fl">收款日期</label>
                        <input className="fi" type="date" value={newPay.date} onChange={e=>setNewPay(p=>({...p,date:e.target.value}))}/>
                    </div>
                    <div className="fg" style={{flex:"0 0 100px"}}>
                        <label className="fl">付款方式</label>
                        <select className="fi" value={newPay.method} onChange={e=>setNewPay(p=>({...p,method:e.target.value}))}>
                            {PAYMENT_METHODS.map(m=><option key={m}>{m}</option>)}
                        </select>
                    </div>
                    <div className="fg" style={{flex:"1 1 120px"}}>
                        <label className="fl">備註（選填）</label>
                        <input className="fi" value={newPay.note} onChange={e=>setNewPay(p=>({...p,note:e.target.value}))} placeholder="例：第一期款"/>
                    </div>
                    <button className="btn btn-gold btn-sm" onClick={()=>{
                        if(!newPay.amount){ toast("請填收款金額"); return; }
                        sf("payments",[...(F.payments||[]),{...newPay,id:uid()}]);
                        setNewPay({amount:"",date:today(),method:"現金",note:""});
                    }} style={{flexShrink:0}}>＋ 新增</button>
                </div>

                {/* 開庭 */}
                <div className="section-hdr">🏛 開庭日期</div>
                {(F.hearings||[]).map((h,i)=>(
                    <div key={i} className="item-row">
                        <div style={{flex:1}}>
                            <div style={{color:"var(--gold)",fontWeight:700,fontSize:13}}>{h.date} {h.time}</div>
                            <div style={{color:"var(--text2)",fontSize:12}}>{h.agency} {h.courtroom} {h.note&&`· ${h.note}`}</div>
                        </div>
                        <button className="btn btn-danger btn-icon" onClick={()=>removeHearing(i)}>✕</button>
                    </div>
                ))}
                <div className="add-row">
                    <input className="fi" type="date" style={{flex:"1 1 130px"}} value={newH.date} onChange={e=>setNewH(h=>({...h,date:e.target.value}))} placeholder="日期"/>
                    <input className="fi" type="time" style={{flex:"0 0 100px"}} value={newH.time} onChange={e=>setNewH(h=>({...h,time:e.target.value}))}/>
                    <input className="fi" style={{flex:"1 1 120px"}} value={newH.agency} onChange={e=>setNewH(h=>({...h,agency:e.target.value}))} placeholder="機關（台北地院）"/>
                    <input className="fi" style={{flex:"1 1 100px"}} value={newH.courtroom} onChange={e=>setNewH(h=>({...h,courtroom:e.target.value}))} placeholder="法庭（第5庭）"/>
                    <input className="fi" style={{flex:"1 1 100px"}} value={newH.note} onChange={e=>setNewH(h=>({...h,note:e.target.value}))} placeholder="庭期性質"/>
                    <button className="btn btn-gold btn-sm" onClick={addHearing}>＋ 新增</button>
                </div>

                {/* 待辦 */}
                <div className="section-hdr">✅ 待辦事項</div>
                {(F.todos||[]).map((t,i)=>(
                    <div key={i} className="item-row">
                        <div style={{flex:1}}>
                            <div style={{color:"var(--text)",fontSize:13}}>{t.text}</div>
                            {t.due && <div style={{color:"var(--text3)",fontSize:11}}>期限：{t.due}</div>}
                        </div>
                        <button className="btn btn-danger btn-icon" onClick={()=>removeTodo(i)}>✕</button>
                    </div>
                ))}
                <div className="add-row">
                    <input className="fi" style={{flex:"2 1 180px"}} value={newT.text} onChange={e=>setNewT(t=>({...t,text:e.target.value}))} placeholder="待辦事項內容"/>
                    <input className="fi" type="date" style={{flex:"1 1 140px"}} value={newT.due} onChange={e=>setNewT(t=>({...t,due:e.target.value}))}/>
                    <button className="btn btn-gold btn-sm" onClick={addTodo}>＋ 新增</button>
                </div>

                {/* 電子卷證 */}
                <div className="section-hdr">📁 開庭筆錄 & 電子卷證</div>
                <div className="fg" style={{marginBottom:16}}>
                    <label className="fl">Google Drive 卷證資料夾連結</label>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <input className="fi" type="url" style={{flex:1}} value={F.driveFolderUrl||""} onChange={e=>sf("driveFolderUrl",e.target.value)} placeholder="貼上 Google Drive 資料夾的分享連結…"/>
                        {F.driveFolderUrl && <a href={F.driveFolderUrl} target="_blank" rel="noreferrer" className="btn btn-outline btn-sm" style={{flexShrink:0,textDecoration:"none"}}>開啟 →</a>}
                    </div>
                    <div style={{color:"var(--text4)",fontSize:11,marginTop:5}}>
                        💡 在 Google Drive 資料夾按右鍵 →「共用」→「複製連結」貼上即可
                    </div>
                </div>

                {/* 個別文件連結 */}
                <div style={{marginBottom:8,fontSize:11,color:"var(--text3)",fontWeight:700,letterSpacing:".06em",textTransform:"uppercase"}}>個別文件連結（筆錄、書狀、證物…）</div>
                {(F.docs||[]).map((d,i)=>(
                    <div key={i} className="item-row">
                        <span style={{fontSize:15,flexShrink:0}}>{d.type==="筆錄"?"📝":d.type==="書狀"?"📄":d.type==="證物"?"🗂":"🔗"}</span>
                        <div style={{flex:1,minWidth:0}}>
                            <div style={{color:"var(--text)",fontSize:13}}>{d.label||"（未命名）"}</div>
                            <div style={{color:"var(--text3)",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.url}</div>
                        </div>
                        <span style={{color:"var(--text4)",fontSize:11,flexShrink:0}}>{d.type}</span>
                        <button className="btn btn-danger btn-icon" onClick={()=>removeDoc(i)}>✕</button>
                    </div>
                ))}
                <div className="add-row" style={{alignItems:"flex-end"}}>
                    <div className="fg" style={{flex:"1 1 150px"}}>
                        <label className="fl">文件名稱</label>
                        <input className="fi" value={newDoc.label} onChange={e=>setNewDoc(d=>({...d,label:e.target.value}))} placeholder="113年4月22日準備程序筆錄"/>
                    </div>
                    <div className="fg" style={{flex:"2 1 200px"}}>
                        <label className="fl">文件連結（Drive/雲端連結）</label>
                        <input className="fi" type="url" value={newDoc.url} onChange={e=>setNewDoc(d=>({...d,url:e.target.value}))} placeholder="https://drive.google.com/..."/>
                    </div>
                    <div className="fg" style={{flex:"0 0 100px"}}>
                        <label className="fl">類型</label>
                        <select className="fi" value={newDoc.type} onChange={e=>setNewDoc(d=>({...d,type:e.target.value}))}>
                            {["筆錄","書狀","證物","判決","其他"].map(t=><option key={t}>{t}</option>)}
                        </select>
                    </div>
                    <button className="btn btn-gold btn-sm" onClick={addDoc} style={{flexShrink:0}}>＋ 新增</button>
                </div>

                {/* 判決連結 & 備註 */}
                <div className="section-hdr" style={{marginTop:24}}>📝 其他資訊</div>
                <div className="fg" style={{marginBottom:12}}>
                    <label className="fl">判決書連結（可貼司法院裁判書網址）</label>
                    <input className="fi" type="url" value={F.judgementLink||""} onChange={e=>sf("judgementLink",e.target.value)} placeholder="https://..."/>
                </div>
                {/* Tags in form */}
                {allTags.length>0 && (
                    <div className="fg" style={{marginBottom:12}}>
                        <label className="fl">標籤</label>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
                            {allTags.map(t=>{
                                const active=(F.tags||[]).includes(t.name);
                                return(
                                    <button key={t.id} type="button" className="tag-pill"
                                        onClick={()=>{
                                            const cur=F.tags||[];
                                            sf("tags",active?cur.filter(x=>x!==t.name):[...cur,t.name]);
                                        }}
                                        style={{background:active?t.color:t.color+"22",color:active?"#fff":t.color,border:`1px solid ${t.color}44`}}>
                                        {active?"✓ ":""}{t.name}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                )}

                <div className="fg">
                    <label className="fl">備註</label>
                    <textarea className="fi" value={F.notes||""} onChange={e=>sf("notes",e.target.value)} placeholder="案件備忘、特殊注意事項…"/>
                </div>

                <div style={{height:20}}/>
            </div>

            <div className="bnav">
                <button className="bnav-btn" onClick={()=>setView("list")}><span className="bnav-icon">📋</span>案件</button>
                <button className="bnav-btn active"><span className="bnav-icon">➕</span>新增</button>
                <button className="bnav-btn" onClick={()=>setView("tools")}><span className="bnav-icon">🔧</span>工具</button>
                <button className="bnav-btn" onClick={()=>setView("contacts")}><span className="bnav-icon">👥</span>通訊錄</button>
                <button className="bnav-btn" onClick={()=>setView("stats")}><span className="bnav-icon">📊</span>統計</button>
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root/>);
</script>
<script>
// Register Service Worker for offline support
if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
        navigator.serviceWorker.register("sw.js", {scope: "./"})
            .then(r=>{ console.log("SW registered, scope:", r.scope); })
            .catch(e=>{ console.warn("SW registration failed (offline support disabled):", e); });
    });
}
</script>
</body>
</html>
