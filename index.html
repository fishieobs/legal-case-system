<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="案件管理">
    <title>⚖ 律師案件管理系統 - 完整功能版</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg: #020817; --bg2: #0a1628; --bg3: #0f172a; --bg4: #1e293b;
            --gold: #c8a96e; --gold2: #a07840;
            --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
            --link: #3b82f6; --success: #22c55e; --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; line-height: 1.5; }
        .app-container { min-height: 100vh; padding-bottom: 80px; }
        header { background: var(--bg2); padding: 16px 20px; border-bottom: 1px solid var(--bg4); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-title { font-family: 'Noto Serif TC', serif; font-size: 1.25rem; color: var(--gold); }
        
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; padding: 20px; }
        .case-card { background: var(--bg3); border: 1px solid var(--bg4); border-radius: 12px; padding: 16px; cursor: pointer; transition: transform 0.2s; position: relative; }
        .case-card:active { transform: scale(0.98); }
        
        .form-container { padding: 20px; max-width: 900px; margin: 0 auto; }
        .section-title { font-size: 0.9rem; color: var(--gold); margin: 24px 0 12px 0; font-weight: bold; border-left: 3px solid var(--gold); padding-left: 10px; display: flex; justify-content: space-between; align-items: center; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.75rem; color: var(--text2); margin-bottom: 6px; }
        input, textarea, select { width: 100%; background: var(--bg4); border: 1px solid transparent; border-radius: 8px; padding: 12px; color: #fff; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--gold); }
        
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-size: 14px; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: var(--bg); }
        .btn-outline { background: transparent; border: 1px solid var(--bg4); color: var(--text); }
        .btn-circle { width: 28px; height: 28px; padding: 0; justify-content: center; border-radius: 50%; font-size: 18px; flex-shrink: 0; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        
        .item-row { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; position: relative; display: flex; justify-content: space-between; align-items: center; }
        .item-info { flex-grow: 1; margin-right: 10px; }
        .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: var(--bg4); color: var(--text2); }

        .multi-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }

        @media (max-width: 600px) { .grid-layout { grid-template-columns: 1fr; padding: 12px; } .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",
            authDomain: "legalcasemanageer.firebaseapp.com",
            projectId: "legalcasemanageer",
            storageBucket: "legalcasemanageer.firebasestorage.app",
            messagingSenderId: "559838504556",
            appId: "1:559838504556:web:ba10c071a12650bbd85a49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.fbMethods = { collection, onSnapshot, doc, setDoc, deleteDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INSTANCES = ["地院", "高院", "最高院", "地檢署", "高檢署"];

        const emptyCase = {
            id: "", firmCaseNo: "", courtCaseNos: [""], division: "",
            clientName: "", phone: "", feeReceived: 0, feeUnpaid: 0, disbursements: 0,
            caseType: "民事", status: "進行中", instance: "地院", currentAgency: "",
            attorney: "", retainerDate: "", opposingParty: "",
            judgementLink: "", notes: "", hearings: [], todos: []
        };

        function App() {
            const [cases, setCases] = useState([]);
            const [view, setView] = useState("list");
            const [selectedId, setSelectedId] = useState(null);
            const [formData, setFormData] = useState(emptyCase);
            const [search, setSearch] = useState("");

            useEffect(() => {
                if (!window.db) return;
                const { collection, onSnapshot } = window.fbMethods;
                return onSnapshot(collection(window.db, "cases"), (snapshot) => {
                    setCases(snapshot.docs.map(doc => ({ ...doc.data(), id: doc.id })));
                });
            }, []);

            const selected = cases.find(c => c.id === selectedId);
            const filtered = cases.filter(c => (c.clientName || "").includes(search) || (c.firmCaseNo || "").includes(search));

            const saveToCloud = async () => {
                const id = view === "add" ? Date.now().toString() : formData.id;
                await window.fbMethods.setDoc(window.fbMethods.doc(window.db, "cases", id), { ...formData, id });
                setView("list");
            };

            const addCaseNoField = () => {
                setFormData({...formData, courtCaseNos: [...(formData.courtCaseNos || [""]), ""]});
            };

            const updateCaseNo = (index, value) => {
                const newNos = [...formData.courtCaseNos];
                newNos[index] = value;
                setFormData({...formData, courtCaseNos: newNos});
            };

            const removeCaseNo = (index) => {
                if (formData.courtCaseNos.length > 1) {
                    const newNos = formData.courtCaseNos.filter((_, i) => i !== index);
                    setFormData({...formData, courtCaseNos: newNos});
                }
            };

            // Dynamic Lists Logic
            const addHearing = () => {
                const date = prompt("開庭日期 (例如: 2026-05-20)");
                if (date) {
                    const time = prompt("開庭時間 (例如: 09:30)") || "";
                    const location = prompt("地點 (例如: 第 5 法庭)") || "";
                    setFormData({...formData, hearings: [...(formData.hearings || []), { date, time, location, note: "" }]});
                }
            };

            const removeHearing = (index) => {
                const newHearings = [...formData.hearings];
                newHearings.splice(index, 1);
                setFormData({...formData, hearings: newHearings});
            };

            const addTodo = () => {
                const text = prompt("待辦事項內容");
                if (text) {
                    setFormData({...formData, todos: [...(formData.todos || []), { text, done: false, id: Date.now() }]});
                }
            };

            const removeTodo = (index) => {
                const newTodos = [...formData.todos];
                newTodos.splice(index, 1);
                setFormData({...formData, todos: newTodos});
            };

            if (view === "list") return (
                <div className="app-container">
                    <header>
                        <div className="header-title">⚖ 案件管理系統</div>
                        <button className="btn btn-gold" onClick={() => { setFormData(emptyCase); setView("add"); }}>＋ 新增案件</button>
                    </header>
                    <div style={{padding: "16px 20px"}}><input placeholder="🔍 搜尋當事人或案號..." value={search} onChange={e => setSearch(e.target.value)} /></div>
                    <div className="grid-layout">
                        {filtered.map(c => (
                            <div key={c.id} className="case-card" onClick={() => { setSelectedId(c.id); setView("detail"); }}>
                                <div style={{display: "flex", justifyContent: "space-between", marginBottom: 8}}>
                                    <span style={{color: "var(--gold)", fontWeight: "bold", fontSize: "0.8rem"}}>{c.firmCaseNo}</span>
                                    <span className="badge">{c.status}</span>
                                </div>
                                <div style={{fontSize: "1.2rem", fontWeight: "bold"}}>{c.clientName}</div>
                                <div style={{fontSize: "0.8rem", color: "var(--text3)", margin: "4px 0"}}>{c.currentAgency || "未填寫機關"}</div>
                                <div style={{fontSize: "0.75rem", color: "var(--text2)"}}>
                                    案號: {(c.courtCaseNos && c.courtCaseNos[0]) || "無"} {c.courtCaseNos?.length > 1 ? "..." : ""}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === "detail" && selected) return (
                <div className="app-container">
                    <header>
                        <button className="btn btn-outline" onClick={() => setView("list")}>← 返回</button>
                        <div style={{fontWeight: "bold"}}>{selected.clientName}</div>
                        <button className="btn btn-gold" onClick={() => { setFormData(selected); setView("edit"); }}>編輯</button>
                    </header>
                    <div className="form-container">
                        <div className="form-grid">
                            <div className="case-card">
                                <div className="section-title">基本資訊</div>
                                <p>事務所案號: {selected.firmCaseNo}</p>
                                <p>委任日期: {selected.retainerDate}</p>
                                <p>承辦律師: {selected.attorney}</p>
                                <p>聯絡電話: <a href={`tel:${selected.phone}`} style={{color: "var(--gold)"}}>{selected.phone}</a></p>
                            </div>
                            <div className="case-card">
                                <div className="section-title">訴訟詳情</div>
                                <p>現在繫屬機關: {selected.currentAgency}</p>
                                <p>審級: {selected.instance}</p>
                                <p>股別: {selected.division}</p>
                                <div style={{marginTop: 8}}>
                                    <div style={{fontSize: "0.75rem", color: "var(--text2)"}}>法院或地檢署案號:</div>
                                    {selected.courtCaseNos?.map((no, i) => (
                                        <div key={i} className="item-row" style={{margin: "4px 0", fontSize: "0.8rem"}}>{no}</div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="section-title">開庭紀錄 ({selected.hearings?.length || 0})</div>
                        {selected.hearings?.map((h, i) => (
                            <div key={i} className="item-row">📅 {h.date} {h.time} | 📍 {h.location}</div>
                        ))}

                        <div className="section-title">待辦事項 ({selected.todos?.length || 0})</div>
                        {selected.todos?.map((t, i) => (
                            <div key={i} className="item-row">{t.text}</div>
                        ))}

                        <div className="section-title">備註</div>
                        <div className="case-card" style={{whiteSpace: "pre-wrap"}}>{selected.notes || "無"}</div>
                    </div>
                </div>
            );

            return (
                <div className="app-container">
                    <header>
                        <button className="btn btn-outline" onClick={() => setView("list")}>取消</button>
                        <div style={{fontWeight: "bold"}}>{view === "add" ? "新增案件" : "修改案件"}</div>
                        <button className="btn btn-gold" onClick={saveToCloud}>儲存雲端</button>
                    </header>
                    <div className="form-container">
                        <div className="section-title">基本資訊</div>
                        <div className="form-grid">
                            <div className="form-group"><label className="form-label">當事人姓名</label><input value={formData.clientName} onChange={e=>setFormData({...formData, clientName: e.target.value})} /></div>
                            <div className="form-group"><label className="form-label">電話</label><input type="tel" value={formData.phone} onChange={e=>setFormData({...formData, phone: e.target.value})} /></div>
                            <div className="form-group"><label className="form-label">事務所案號</label><input value={formData.firmCaseNo} onChange={e=>setFormData({...formData, firmCaseNo: e.target.value})} /></div>
                        </div>

                        <div className="section-title">
                            訴訟詳情
                            <button className="btn btn-gold btn-circle" onClick={addCaseNoField} title="增加案號">+</button>
                        </div>
                        <div className="form-group">
                            <label className="form-label">法院或地檢署案號</label>
                            {formData.courtCaseNos?.map((no, index) => (
                                <div key={index} className="multi-input-row">
                                    <input value={no} onChange={e => updateCaseNo(index, e.target.value)} placeholder={`案號 ${index + 1}`} />
                                    {formData.courtCaseNos.length > 1 && (
                                        <button className="btn btn-danger btn-circle" onClick={() => removeCaseNo(index)}>−</button>
                                    )}
                                </div>
                            ))}
                        </div>
                        <div className="form-grid">
                            <div className="form-group"><label className="form-label">現在繫屬機關</label><input value={formData.currentAgency} onChange={e=>setFormData({...formData, currentAgency: e.target.value})} /></div>
                            <div className="form-group"><label className="form-label">審級</label>
                                <select value={formData.instance} onChange={e=>setFormData({...formData, instance: e.target.value})}>
                                    {INSTANCES.map(i => <option key={i} value={i}>{i}</option>)}
                                </select>
                            </div>
                            <div className="form-group"><label className="form-label">股別</label><input value={formData.division} onChange={e=>setFormData({...formData, division: e.target.value})} /></div>
                        </div>
                        
                        <div className="section-title">
                            開庭紀錄
                            <button className="btn btn-outline btn-circle" onClick={addHearing}>+</button>
                        </div>
                        {formData.hearings?.map((h, i) => (
                            <div key={i} className="item-row">
                                <div className="item-info">📅 {h.date} {h.time} - {h.location}</div>
                                <button className="btn btn-danger btn-circle" onClick={() => removeHearing(i)}>×</button>
                            </div>
                        ))}

                        <div className="section-title">
                            待辦事項
                            <button className="btn btn-outline btn-circle" onClick={addTodo}>+</button>
                        </div>
                        {formData.todos?.map((t, i) => (
                            <div key={i} className="item-row">
                                <div className="item-info">{t.text}</div>
                                <button className="btn btn-danger btn-circle" onClick={() => removeTodo(i)}>×</button>
                            </div>
                        ))}

                        <div className="section-title">備註事項</div>
                        <textarea rows="4" value={formData.notes} onChange={e=>setFormData({...formData, notes: e.target.value})} />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
