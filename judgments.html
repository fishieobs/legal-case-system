/* ── SYS-NAV ── */
.sys-nav{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(2,8,16,.96);backdrop-filter:blur(10px);border-bottom:1px solid rgba(200,169,110,.2);display:flex;align-items:center;gap:2px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;}
.sys-nav::-webkit-scrollbar{display:none;}
.sys-nav-item{display:inline-flex;align-items:center;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap;transition:all .15s;text-decoration:none;border:1px solid transparent;}
.sys-nav-item.active{background:rgba(200,169,110,.15);color:#c8a96e;border-color:rgba(200,169,110,.3);cursor:default;}
a.sys-nav-item{color:#506080;}
a.sys-nav-item:hover{background:rgba(200,169,110,.08);color:#c8a96e;}
.sys-nav-logo{font-size:14px;color:rgba(200,169,110,.45);margin-right:6px;flex-shrink:0;border-right:1px solid rgba(200,169,110,.18);padding-right:10px;}

/* ── LAYOUT ── */
.app{min-height:100vh;padding-top:41px;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:41px;z-index:200;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-title{font-family:'Noto Serif TC',serif;font-size:1.05rem;color:var(--gold);}
.hdr-sub{font-size:9px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;}
.hdr-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}

/* ── TABS ── */
.tab-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:93px;z-index:150;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:10px 18px;border:none;background:transparent;color:var(--text3);font-weight:500;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--gold);font-weight:700;border-bottom-color:var(--gold);}

/* ── BUTTONS ── */
.btn{padding:8px 15px;border-radius:8px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn:active{opacity:.8;transform:translateY(1px);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0a;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-ghost{background:transparent;color:var(--text3);border:none;}
.btn-ghost:hover{color:var(--text);background:var(--bg4);}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-xs{padding:4px 8px;font-size:10px;}

/* ── CONTENT ── */
.content{padding:18px 20px;max-width:1100px;margin:0 auto;}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;box-shadow:var(--shadow);}
.stat-val{font-size:22px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.stat-lbl{font-size:9px;color:var(--text4);margin-top:4px;letter-spacing:.05em;text-transform:uppercase;}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.search-wrap{flex:1;min-width:200px;position:relative;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none;}
.fi{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border-color .2s;width:100%;}
.fi:focus{border-color:var(--gold);}
.fi-search{padding-left:34px;}
select.fi{width:auto;}
textarea.fi{resize:vertical;font-size:13px;line-height:1.7;}

/* ── JUDGMENT CARDS ── */
.jcard{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.jcard:hover{border-color:var(--gold)44;transform:translateY(-1px);}
.jcard:active{transform:translateY(0);opacity:.9;}
.jcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.jcard-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.4;}
.jcard-meta{font-size:11px;color:var(--text4);margin-top:3px;}
.jcard-badges{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.jcard-row{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--text3);margin-top:6px;}
.jcard-result{font-size:12px;font-weight:700;margin-top:8px;padding:6px 10px;border-radius:6px;border-left:3px solid;}
.jcard-result.win{background:rgba(34,197,94,.08);border-color:var(--green);color:var(--green);}
.jcard-result.lose{background:rgba(239,68,68,.08);border-color:var(--red);color:var(--red);}
.jcard-result.partial{background:rgba(245,158,11,.08);border-color:var(--yellow);color:var(--yellow);}
.jcard-result.neutral{background:rgba(100,116,139,.08);border-color:var(--text3);color:var(--text3);}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:3px;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid transparent;}

/* ── DETAIL ── */
.detail-hdr{background:var(--bg2);padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:41px;z-index:200;}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);}
.card-title{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--border);}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;gap:10px;border-bottom:1px solid rgba(255,255,255,.03);}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:11px;color:var(--text4);white-space:nowrap;min-width:90px;}
.info-val{font-size:12px;color:var(--text);text-align:right;word-break:break-all;line-height:1.5;}

/* ── FORM ── */
.form-section{font-size:10px;font-weight:700;color:var(--gold);border-left:3px solid var(--gold);padding-left:10px;margin:20px 0 12px;letter-spacing:.06em;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:4px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}

/* ── QUICK TAGS ── */
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg4);color:var(--text3);transition:all .15s;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip.on{background:rgba(200,169,110,.14);border-color:var(--gold);color:var(--gold);}

/* ── KEY POINTS ── */
.kp-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--text2);line-height:1.7;position:relative;}
.kp-del{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text4);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;}
.kp-del:hover{color:var(--red);background:rgba(239,68,68,.1);}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:24px;}
.timeline::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:linear-gradient(to bottom,var(--gold),transparent);}
.tl-item{position:relative;margin-bottom:16px;}
.tl-dot{position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid var(--gold);background:var(--bg3);}
.tl-date{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:.05em;}
.tl-text{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.6;}

/* ── AI PANEL ── */
.ai-panel{background:linear-gradient(135deg,rgba(200,169,110,.06),rgba(139,92,246,.06));border:1px solid rgba(200,169,110,.2);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:13px;}
.ai-spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
.ai-result{font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-wrap;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:#00000099;z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.dialog{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:26px;max-width:400px;width:100%;}

/* ── EMPTY / LOADING / LOGIN ── */
.empty{text-align:center;padding:60px 20px;color:var(--text4);}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.35;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--text3);}
.spinner{width:36px;height:36px;border:3px solid var(--bg5);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.7);}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold);color:var(--gold);padding:10px 22px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── BOTTOM NAV ── */
.bnav{display:none;}
@media(max-width:640px){
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:200;}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;font-size:9px;color:var(--text3);cursor:pointer;gap:2px;border:none;background:transparent;font-family:inherit;}
  .bnav-btn.active{color:var(--gold);}
  .bnav-icon{font-size:19px;}
  .app{padding-bottom:72px;}
  .content{padding:12px 14px;}
  .tab-bar{top:93px;}
  .form-grid{grid-template-columns:1fr;}
}
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}
</style>
</head>
<body>
<!-- SYS-NAV -->
<div class="sys-nav">
  <span class="sys-nav-logo">⚖</span>
  <a class="sys-nav-item" href="index.html">⚖ 案件系統</a>
  <a class="sys-nav-item" href="widget.html">📅 庭期 Widget</a>
  <a class="sys-nav-item" href="letters.html">📮 信函管理</a>
  <a class="sys-nav-item" href="templates.html">📚 文書範本</a>
  <span class="sys-nav-item active">🔨 判決書管理</span>
</div>

<div id="root"></div>
<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc,query,orderBy}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
const cfg={apiKey:"AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",authDomain:"legalcasemanageer.firebaseapp.com",projectId:"legalcasemanageer",storageBucket:"legalcasemanageer.firebasestorage.app",messagingSenderId:"559838504556",appId:"1:559838504556:web:ba10c071a12650bbd85a49"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const auth=getAuth(app);

// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const CASE_TYPES=[
  {key:"civil",    label:"民事", color:"#38bdf8"},
  {key:"criminal", label:"刑事", color:"#ef4444"},
  {key:"admin",    label:"行政", color:"#f59e0b"},
  {key:"family",   label:"家事", color:"#ec4899"},
  {key:"labor",    label:"勞動", color:"#22c55e"},
  {key:"ip",       label:"智財", color:"#8b5cf6"},
  {key:"other",    label:"其他", color:"#64748b"},
];
const RESULTS=[
  {key:"win",     label:"勝訴",   color:"#22c55e"},
  {key:"partial", label:"部分勝訴",color:"#f59e0b"},
  {key:"lose",    label:"敗訴",   color:"#ef4444"},
  {key:"settle",  label:"和解",   color:"#38bdf8"},
  {key:"withdraw",label:"撤訴",   color:"#64748b"},
  {key:"pending", label:"審理中", color:"#8b5cf6"},
];
const COURTS=["臺灣臺北地方法院","臺灣新北地方法院","臺灣桃園地方法院","臺灣臺中地方法院","臺灣臺南地方法院","臺灣高雄地方法院","臺灣高等法院","最高法院","最高行政法院","臺北高等行政法院","其他"];
const INSTANCE_MAP={"地院":"第一審","高院":"第二審","最高":"第三審"};
const CTMAP=Object.fromEntries(CASE_TYPES.map(t=>[t.key,t]));
const RMAP=Object.fromEntries(RESULTS.map(r=>[r.key,r]));

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const today=()=>{const d=new Date(new Date().getTime()+8*3600000);return d.toISOString().split("T")[0];};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

let S={
  user:null, authChecked:false,
  judgments:[], loading:true,
  view:"list",   // list|detail|form
  tab:"list",    // list|stats|search
  selectedId:null,
  editId:null,
  search:"", filterType:"全部", filterResult:"全部", filterYear:"全部",
  form:emptyForm(),
  newKp:"",
  newLink:{label:"",url:""},
  newTag:"",
  delConfirm:null,
  aiLoading:false, aiResult:"",
  themeMode:localStorage.getItem("jTheme")||"dark",
};

function emptyForm(){
  return{
    title:"",caseType:"civil",caseNo:"",court:"",judge:"",
    judgmentDate:today(),instance:"地院",
    result:"pending",resultNote:"",
    parties:{plaintiff:"",defendant:"",clientRole:"原告"},
    keyPoints:[],links:[],tags:[],
    relatedCaseId:"",notes:"",
    createdAt:"",
  };
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function toast(msg){const t=document.getElementById("toast");if(!t)return;t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400);}
function applyTheme(m){
  const eff=m==="auto"?(new Date().getHours()>=6&&new Date().getHours()<20?"light":"dark"):m;
  document.documentElement.classList.toggle("light",eff==="light");
}
applyTheme(S.themeMode);
function sfv(k,v){S.form={...S.form,[k]:v};}
function sfp(k,v){S.form={...S.form,parties:{...S.form.parties,[k]:v}};}

function Badge(label,color){return`<span class="badge" style="background:${color}22;color:${color};border-color:${color}44">${label}</span>`;}

function getYears(){return[...new Set(S.judgments.map(j=>j.judgmentDate?.slice(0,4)).filter(Boolean))].sort().reverse();}

function filtered(){
  let list=[...S.judgments];
  if(S.filterType!=="全部")list=list.filter(j=>j.caseType===S.filterType);
  if(S.filterResult!=="全部")list=list.filter(j=>j.result===S.filterResult);
  if(S.filterYear!=="全部")list=list.filter(j=>j.judgmentDate?.startsWith(S.filterYear));
  if(S.search.trim()){
    const q=S.search.toLowerCase();
    list=list.filter(j=>[j.title,j.caseNo,j.court,j.judge,j.parties?.plaintiff,j.parties?.defendant,j.resultNote,j.notes,...(j.keyPoints||[]),...(j.tags||[])].some(x=>(x||"").toLowerCase().includes(q)));
  }
  return list.sort((a,b)=>(b.judgmentDate||"").localeCompare(a.judgmentDate||""));
}

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
onAuthStateChanged(auth,u=>{
  S.user=u; S.authChecked=true;
  if(u){
    try{const c=localStorage.getItem("judgments_cache");if(c){S.judgments=JSON.parse(c);S.loading=false;render();}}catch(_){}
    onSnapshot(collection(db,"judgments"),snap=>{
      S.judgments=snap.docs.map(d=>({...d.data(),id:d.id}));
      S.loading=false;
      try{localStorage.setItem("judgments_cache",JSON.stringify(S.judgments));}catch(_){}
      render();
    },()=>{S.loading=false;render();});
  } else {S.loading=false;render();}
});

async function saveJudgment(){
  const f=S.form;
  if(!f.title.trim()){toast("⚠️ 請填寫案件名稱");return;}
  if(!f.caseNo.trim()){toast("⚠️ 請填寫案號");return;}
  const id=S.editId||uid();
  const data={...f,id,updatedAt:new Date().toISOString(),createdAt:f.createdAt||new Date().toISOString()};
  try{
    await setDoc(doc(db,"judgments",id),data);
    toast("✅ 已儲存");
    S.selectedId=id; S.editId=null; S.view="detail"; render();
  }catch(e){toast("❌ 儲存失敗："+e.code);}
}

async function deleteJudgment(){
  try{
    await deleteDoc(doc(db,"judgments",S.delConfirm));
    toast("🗑 已刪除");
    S.delConfirm=null; S.view="list"; S.selectedId=null; render();
  }catch(e){toast("❌ 刪除失敗");}
}

// ══════════════════════════════════════════
// AI ANALYSIS (Claude API)
// ══════════════════════════════════════════
async function aiAnalyze(judgment){
  S.aiLoading=true; S.aiResult=""; render();
  const prompt=`以下是一份判決書的基本資料，請分析並提供：
1. 判決要旨（2-3句）
2. 重要法律爭點（條列3-5點）
3. 對未來類似案件的啟示

案件名稱：${judgment.title}
案號：${judgment.caseNo}
法院：${judgment.court}
類型：${CTMAP[judgment.caseType]?.label||""}
結果：${RMAP[judgment.result]?.label||""} ${judgment.resultNote||""}
當事人：${judgment.parties?.plaintiff||""}（原告）vs ${judgment.parties?.defendant||""}（被告）
本方角色：${judgment.parties?.clientRole||""}
已記錄爭點：${(judgment.keyPoints||[]).join("；")||"無"}
備註：${judgment.notes||"無"}`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        messages:[{role:"user",content:prompt}]
      })
    });
    const data=await res.json();
    S.aiResult=data.content?.[0]?.text||"（無回應）";
  }catch(e){
    S.aiResult="AI 分析失敗："+e.message;
  }
  S.aiLoading=false; render();
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  if(!root)return;
  applyTheme(S.themeMode);
  if(!S.authChecked){root.innerHTML=`<div class="loading"><div class="spinner"></div><div>連線中…</div></div>`;return;}
  if(!S.user){root.innerHTML=renderLogin();bindLogin();return;}
  if(S.loading){root.innerHTML=`<div class="app"><div class="loading"><div class="spinner"></div><div>載入判決書資料…</div></div></div>`;return;}
  if(S.view==="form"){root.innerHTML=renderForm();bindForm();return;}
  if(S.view==="detail"){root.innerHTML=renderDetail();bindDetail();return;}
  root.innerHTML=renderList();
  bindList();
}

// ══════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════
function renderLogin(){return`
<div class="login-wrap">
  <div class="login-box">
    <div style="font-size:50px;text-align:center;margin-bottom:8px">🔨</div>

function bindLogin(){
  const go=async()=>{
    const em=document.getElementById("lemail")?.value.trim();
    const pw=document.getElementById("lpw")?.value;
    const err=document.getElementById("lerr");
    if(!em||!pw){if(err){err.style.display="block";err.textContent="請輸入帳號密碼";}return;}
    document.getElementById("lbtn").textContent="登入中…";
    try{await signInWithEmailAndPassword(auth,em,pw);}
    catch(e){if(err){err.style.display="block";err.textContent={"auth/invalid-credential":"帳號或密碼錯誤","auth/too-many-requests":"嘗試次數過多"}[e.code]||"登入失敗";}document.getElementById("lbtn").textContent="🔐 登入";}
  };
  document.getElementById("lbtn")?.addEventListener("click",go);
  document.getElementById("lpw")?.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  document.getElementById("spw")?.addEventListener("click",()=>{const i=document.getElementById("lpw");i.type=i.type==="password"?"text":"password";});
}

      <div class="card">
        <div class="card-title">📝 備註</div>
        <div style="font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.8">${esc(j.notes)}</div>
      </div>`:""}
    </div>
  </div>
</div>`;
}
function bindDetail(){
  const j=S.judgments.find(x=>x.id===S.selectedId);
  document.getElementById("d-back")?.addEventListener("click",()=>{S.view="list";S.aiResult="";render();});
  document.getElementById("d-edit")?.addEventListener("click",()=>{
    if(j){S.form=JSON.parse(JSON.stringify(j));S.form.fillValues=undefined;S.editId=j.id;S.view="form";render();}
  });
  document.getElementById("d-del")?.addEventListener("click",()=>{S.delConfirm=S.selectedId;render();});
  document.getElementById("del-cancel")?.addEventListener("click",()=>{S.delConfirm=null;render();});
  document.getElementById("del-confirm")?.addEventListener("click",deleteJudgment);
  document.getElementById("btn-ai")?.addEventListener("click",()=>{if(j)aiAnalyze(j);});
}

// ══════════════════════════════════════════
// FORM VIEW
// ══════════════════════════════════════════
function renderForm(){
  const f=S.form;
  const isNew=!S.editId;
  const totalFee=0;
  return`
<div class="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn btn-outline btn-sm" id="f-back">← 取消</button>
      <div style="font-weight:700;font-size:14px">${isNew?"新增判決書記錄":"編輯判決書記錄"}</div>
    </div>
    <button class="btn btn-gold" id="f-save">☁️ 儲存</button>
  </div>

  <div class="content">
    <!-- 基本資料 -->
    <div class="form-section">📋 基本資料</div>
    <div class="form-grid" style="grid-template-columns:1fr;margin-bottom:12px">
      <div class="fg">
        <label class="fl">案件名稱</label>
        <input class="fi" id="ff-title" value="${esc(f.title)}" placeholder="例：王小明vs李大華損害賠償案">
      </div>
    </div>
    <div class="form-grid">
      <div class="fg">
        <label class="fl">案件類型</label>
        <select class="fi" id="ff-type">
          ${CASE_TYPES.map(t=>`<option value="${t.key}"${f.caseType===t.key?" selected":""}>${t.label}</option>`).join("")}
        </select>
      </div>
      <div class="fg">
        <label class="fl">案號</label>
        <input class="fi" id="ff-caseno" value="${esc(f.caseNo)}" placeholder="例：113年度訴字第1234號">
      </div>
      <div class="fg">
        <label class="fl">法院</label>
        <input class="fi" id="ff-court" value="${esc(f.court)}" list="courts-list" placeholder="選擇或輸入法院">
        <datalist id="courts-list">${COURTS.map(c=>`<option value="${c}">`).join("")}</datalist>
      </div>
      <div class="fg">
        <label class="fl">主審法官</label>
        <input class="fi" id="ff-judge" value="${esc(f.judge)}" placeholder="法官姓名">
      </div>
      <div class="fg">
        <label class="fl">判決日期</label>
        <input class="fi" type="date" id="ff-date" value="${f.judgmentDate||""}">
      </div>
      <div class="fg">
        <label class="fl">審級</label>
        <select class="fi" id="ff-inst">
          ${["地院","高院","最高","行政高院","最高行政"].map(i=>`<option${f.instance===i?" selected":""}>${i}</option>`).join("")}
        </select>
      </div>
    </div>

    <!-- 當事人 -->
    <div class="form-section">👤 當事人</div>
    <div class="form-grid">
      <div class="fg">
        <label class="fl">原告（聲請人）</label>
        <input class="fi" id="ff-plaintiff" value="${esc(f.parties?.plaintiff||"")}" placeholder="">
      </div>
      <div class="fg">
        <label class="fl">被告（相對人）</label>
        <input class="fi" id="ff-defendant" value="${esc(f.parties?.defendant||"")}" placeholder="">
      </div>
      <div class="fg">
        <label class="fl">本方當事人角色</label>
        <select class="fi" id="ff-role">
          ${["原告","被告","第三人","聲請人","相對人"].map(r=>`<option${f.parties?.clientRole===r?" selected":""}>${r}</option>`).join("")}
        </select>
      </div>
    </div>

    <!-- 訴訟結果 -->
    <div class="form-section">⚖ 訴訟結果</div>
    <div class="form-grid">
      <div class="fg">
        <label class="fl">結果</label>
        <select class="fi" id="ff-result">
          ${RESULTS.map(r=>`<option value="${r.key}"${f.result===r.key?" selected":""}>${r.label}</option>`).join("")}
        </select>
      </div>
      <div class="fg" style="grid-column:span 2">
        <label class="fl">判決主文摘要</label>
        <input class="fi" id="ff-resultnote" value="${esc(f.resultNote||"")}" placeholder="例：被告應給付原告新臺幣100萬元及利息">
      </div>
    </div>

    <!-- 重要爭點 -->
    <div class="form-section" style="display:flex;justify-content:space-between;align-items:center">
      <span>📌 重要爭點</span>
      <span style="font-size:10px;color:var(--text4);font-weight:400">${(f.keyPoints||[]).length}則</span>
    </div>
    ${(f.keyPoints||[]).map((kp,i)=>`
    <div class="kp-item">${esc(kp)}
      <button class="kp-del" data-del-kp="${i}">✕</button>
    </div>`).join("")}
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start">
      <textarea class="fi" id="new-kp" style="flex:1;min-height:60px" placeholder="輸入爭點、判決理由重點、重要見解…">${esc(S.newKp)}</textarea>
      <button class="btn btn-gold" id="add-kp" style="margin-top:0;flex-shrink:0">＋ 加入</button>
    </div>

    <!-- 文件連結 -->
    <div class="form-section">🔗 判決書連結</div>
    ${(f.links||[]).map((l,i)=>`
    <div class="kp-item" style="display:flex;align-items:center;gap:10px">
      <span style="flex:1;font-size:12px"><strong>${esc(l.label||"未命名")}</strong><br><span style="color:var(--text4);font-size:11px">${esc(l.url)}</span></span>
      <button class="kp-del" style="position:static" data-del-link="${i}">✕</button>
    </div>`).join("")}
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px">
      <div class="fg" style="flex:1 1 150px"><label class="fl">文件名稱</label><input class="fi" id="nl-label" value="${esc(S.newLink.label)}" placeholder="例：一審判決書"></div>
      <div class="fg" style="flex:2 1 200px"><label class="fl">連結網址</label><input class="fi" type="url" id="nl-url" value="${esc(S.newLink.url)}" placeholder="https://…"></div>
      <button class="btn btn-gold btn-sm" id="add-link">＋</button>
    </div>

    <!-- 標籤 -->
    <div class="form-section">🏷 標籤</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
      ${(f.tags||[]).map(t=>`<span style="background:var(--bg5);color:var(--text2);border-radius:20px;padding:3px 10px;font-size:11px;display:flex;align-items:center;gap:5px;border:1px solid var(--border2)">${esc(t)}<span data-del-tag="${esc(t)}" style="cursor:pointer;color:var(--text4)">✕</span></span>`).join("")}
      <input class="fi" id="tag-inp" style="width:140px;padding:4px 10px;font-size:12px" placeholder="新增標籤後按 Enter" value="${esc(S.newTag)}">
    </div>

    <!-- 備註 -->
    <div class="form-section">📝 備註</div>
    <textarea class="fi" id="ff-notes" style="width:100%;min-height:100px" placeholder="案件背景、心得、注意事項…">${esc(f.notes||"")}</textarea>
    <div style="height:24px"></div>
  </div>
</div>`;}

function bindForm(){
  const collect=()=>{
    sfv("title",document.getElementById("ff-title")?.value||"");
    sfv("caseType",document.getElementById("ff-type")?.value||"civil");
    sfv("caseNo",document.getElementById("ff-caseno")?.value||"");
    sfv("court",document.getElementById("ff-court")?.value||"");
    sfv("judge",document.getElementById("ff-judge")?.value||"");
    sfv("judgmentDate",document.getElementById("ff-date")?.value||"");
    sfv("instance",document.getElementById("ff-inst")?.value||"地院");
    sfv("result",document.getElementById("ff-result")?.value||"pending");
    sfv("resultNote",document.getElementById("ff-resultnote")?.value||"");
    sfp("plaintiff",document.getElementById("ff-plaintiff")?.value||"");
    sfp("defendant",document.getElementById("ff-defendant")?.value||"");
    sfp("clientRole",document.getElementById("ff-role")?.value||"原告");
    sfv("notes",document.getElementById("ff-notes")?.value||"");
  };
  document.getElementById("f-back")?.addEventListener("click",()=>{collect();S.view=S.editId?"detail":"list";render();});
  document.getElementById("f-save")?.addEventListener("click",()=>{collect();saveJudgment();});

  // Add key point
  document.getElementById("add-kp")?.addEventListener("click",()=>{
    collect();
    const v=document.getElementById("new-kp")?.value.trim();
    if(!v){toast("請輸入爭點內容");return;}
    S.form.keyPoints=[...(S.form.keyPoints||[]),v];
    S.newKp=""; render();
  });
  document.querySelectorAll("[data-del-kp]").forEach(b=>{
    b.addEventListener("click",()=>{collect();S.form.keyPoints=(S.form.keyPoints||[]).filter((_,i)=>i!==parseInt(b.dataset.delKp));render();});
  });

  // Add link
  document.getElementById("add-link")?.addEventListener("click",()=>{
    collect();
    const url=document.getElementById("nl-url")?.value.trim();
    const label=document.getElementById("nl-label")?.value.trim();
    if(!url){toast("請填寫連結網址");return;}
    S.form.links=[...(S.form.links||[]),{label,url,id:uid()}];
    S.newLink={label:"",url:""}; render();
  });
  document.querySelectorAll("[data-del-link]").forEach(b=>{
    b.addEventListener("click",()=>{collect();S.form.links=(S.form.links||[]).filter((_,i)=>i!==parseInt(b.dataset.delLink));render();});
  });

  // Tags
  document.getElementById("tag-inp")?.addEventListener("keydown",e=>{
    if(e.key==="Enter"||e.key===","){
      e.preventDefault();collect();
      const v=e.target.value.trim().replace(/,$/,"");
      if(v&&!(S.form.tags||[]).includes(v)){S.form.tags=[...(S.form.tags||[]),v];}
      S.newTag=""; render();
    } else {S.newTag=e.target.value;}
  });
  document.querySelectorAll("[data-del-tag]").forEach(b=>{
    b.addEventListener("click",()=>{collect();S.form.tags=(S.form.tags||[]).filter(t=>t!==b.dataset.delTag);render();});
  });
}

render();
</script>
</body>
</html>
