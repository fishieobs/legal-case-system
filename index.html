<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="案件管理">
    <meta name="theme-color" content="#FAF7F0">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-cases.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-cases.png">
    <meta name="mobile-web-app-capable" content="yes">
    <title>⚖ 律師案件管理系統</title>
    <link rel="manifest" href="manifest.json">
    <script src="shared/tw-dates.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

<style>
/* ── legal-design-tw 權杖 + 舊變數別名（單一紙本主題） ── */
:root{
  --paper:#FAF7F0;--paper-raised:#FFFFFF;--paper-sunken:#F1ECE1;
  --ink:#211E1A;--ink-soft:#5B554D;--ink-faint:#8A8377;
  --seal:#9E2A24;--seal-bright:#C0392B;--seal-wash:#F3E3DF;
  --positive:#3A6B4F;--negative:#9E2A24;--warning:#A6741C;--navy:#2A3D4F;
  --positive-wash:#E7EFE9;--warning-wash:#F3EBDA;
  --rule:#DDD5C7;--rule-strong:#C4BAA6;
  --font-kai:"BiauKai","DFKai-SB","標楷體","KaiTi","STKaiti","Kaiti TC","Noto Serif TC",serif;
  --font-song:"Noto Serif TC","Source Han Serif TC","PMingLiU","新細明體","Songti TC",serif;
  --shadow-raised:0 2px 10px rgba(33,30,26,.10);
  --bg:var(--paper);--bg2:var(--paper-raised);--bg3:var(--paper-raised);--bg4:var(--paper-sunken);
  --gold:var(--seal);--gold2:var(--seal-bright);
  --text:var(--ink);--text2:var(--ink-soft);--text3:var(--ink-soft);--text4:var(--ink-faint);
  --green:var(--positive);--red:var(--negative);--yellow:var(--warning);--purple:var(--seal);--blue:var(--navy);
  --border:var(--rule);--shadow:none;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{padding-top:40px;height:100%;background:var(--paper);color:var(--ink);font-family:var(--font-song);line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

/* ── LAYOUT ── */
.app{min-height:100vh;padding-bottom:80px;}
.header{background:var(--paper-raised);padding:12px 18px;border-bottom:2px solid var(--seal);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;gap:10px;flex-wrap:wrap;}
.header-title{font-family:var(--font-kai);font-size:1.25rem;letter-spacing:.06em;color:var(--ink);display:flex;align-items:center;gap:8px;}
.content{padding:16px;max-width:960px;margin:0 auto;}

/* ── BUTTONS ── */
.btn{padding:9px 18px;border-radius:2px;font-weight:700;cursor:pointer;border:1.5px solid var(--rule-strong);display:inline-flex;align-items:center;gap:6px;font-size:13px;font-family:var(--font-kai);letter-spacing:.04em;background:var(--paper-raised);color:var(--ink);transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--ink-soft);}
.btn:active{opacity:.85;}
.btn-gold{background:var(--seal);border-color:var(--seal);color:var(--paper-raised);}
.btn-gold:hover{background:var(--seal-bright);border-color:var(--seal-bright);}
.btn-outline{background:transparent;border:1.5px solid var(--rule-strong);color:var(--ink-soft);}
.btn-outline:hover{border-color:var(--seal);color:var(--seal);}
.btn-danger{background:transparent;color:var(--seal);border:1.5px solid var(--seal);}
.btn-danger:hover{background:var(--seal-wash);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:2px;font-size:16px;flex-shrink:0;}

/* ── STATS ── */
.stats-row{display:flex;gap:10px;overflow-x:auto;padding:14px 16px;scrollbar-width:none;}
.stats-row::-webkit-scrollbar{display:none;}
.stat-card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:12px 18px;min-width:105px;flex-shrink:0;}
.stat-val{font-family:var(--font-kai);font-size:22px;font-weight:700;color:var(--seal);line-height:1;font-variant-numeric:tabular-nums;}
.stat-unit{font-size:12px;font-weight:500;margin-left:2px;}
.stat-lbl{font-size:11px;color:var(--ink-soft);margin-top:5px;}

/* ── UPCOMING ── */
.upcoming{margin:0 16px 14px;background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:14px;}
.sec-title{font-family:var(--font-kai);font-size:12px;color:var(--seal);letter-spacing:.08em;font-weight:700;margin-bottom:10px;padding-left:8px;border-left:3px solid var(--seal);}
.chip-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{background:var(--paper);border:1px solid var(--rule);border-radius:3px;padding:10px 14px;cursor:pointer;min-width:150px;flex-shrink:0;}
.chip:active{opacity:.85;}

/* ── FILTERS ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.search-inp{flex:1;min-width:160px;background:var(--paper-raised);border:1px solid var(--rule);border-radius:2px;padding:9px 13px;color:var(--ink);font-size:14px;outline:none;font-family:var(--font-song);}
.search-inp:focus{border-color:var(--seal);box-shadow:0 0 0 3px var(--seal-wash);}
.fsel{background:var(--paper-raised);border:1px solid var(--rule);border-radius:2px;padding:9px 12px;color:var(--ink);font-size:14px;cursor:pointer;outline:none;font-family:var(--font-song);}

/* ── CASE CARDS (mobile) ── */
.case-cards{display:flex;flex-direction:column;gap:10px;}
.case-card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:14px 16px;cursor:pointer;transition:border-color .2s;}
.case-card:active{border-color:var(--seal);}

/* ── DESKTOP TABLE ── */
@media(min-width:860px){.case-cards{display:none;}.tbl-wrap{display:block;}}
@media(max-width:859px){.tbl-wrap{display:none;}}
.tbl-wrap{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 12px;color:var(--ink-soft);font-family:var(--font-kai);font-weight:700;font-size:11px;letter-spacing:.04em;border-bottom:1.5px solid var(--rule-strong);background:var(--paper-sunken);white-space:nowrap;}
.trow{border-bottom:1px solid var(--rule);cursor:pointer;}
.trow:hover{background:var(--paper-sunken);}
.trow:active{background:var(--paper-sunken);}
td{padding:11px 12px;color:var(--ink-soft);vertical-align:middle;white-space:nowrap;font-variant-numeric:tabular-nums;}

/* ── BADGE ── */
.badge{display:inline-block;border-radius:2px;padding:1px 7px;font-size:11px;font-weight:400;letter-spacing:.02em;white-space:nowrap;border:1px solid currentColor;}

/* ── DETAIL ── */
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:18px 20px;}
.card-title{font-family:var(--font-kai);font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.05em;margin-bottom:14px;padding-left:10px;border-left:4px solid var(--seal);}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;gap:10px;border-bottom:1px dotted var(--rule);}
.info-lbl{font-size:12px;color:var(--ink-faint);white-space:nowrap;min-width:80px;padding-top:1px;}
.info-val{font-size:13px;color:var(--ink);text-align:right;word-break:break-all;font-variant-numeric:tabular-nums;}
.hearing-item{border-left:3px solid var(--rule-strong);padding-left:12px;margin-bottom:12px;}
.todo-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;cursor:pointer;border-bottom:1px dotted var(--rule);}
.todo-check{width:18px;height:18px;border-radius:2px;border:2px solid var(--rule-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .2s;}
.todo-check.done{background:var(--positive);border-color:var(--positive);}

/* ── FORM ── */
.form-wrap{padding:16px;max-width:960px;margin:0 auto;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:4px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:11px;color:var(--ink-soft);font-weight:700;letter-spacing:.04em;}
.fi{background:var(--paper-raised);border:1px solid var(--rule);border-radius:2px;padding:9px 12px;color:var(--ink);font-size:14px;outline:none;font-family:var(--font-song);width:100%;}
.fi:focus{border-color:var(--seal);box-shadow:0 0 0 3px var(--seal-wash);}
textarea.fi{resize:vertical;min-height:80px;}
.section-hdr{font-family:var(--font-kai);font-size:13px;color:var(--seal);font-weight:700;border-left:4px solid var(--seal);padding-left:10px;margin:22px 0 12px;display:flex;justify-content:space-between;align-items:center;letter-spacing:.05em;}
.item-row{background:var(--paper-sunken);padding:11px 14px;border-radius:3px;margin-bottom:8px;border:1px solid var(--rule);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.add-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.add-row .fi{flex:1;min-width:100px;}

/* ── BOTTOM NAV ── */
.bnav{display:none;}
@media(max-width:600px){
    .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--paper-raised);border-top:2px solid var(--seal);z-index:100;}
    .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;font-size:10px;font-family:var(--font-kai);color:var(--ink-soft);cursor:pointer;gap:3px;border:none;background:transparent;}
    .bnav-btn.active{color:var(--seal);}
    .bnav-icon{font-size:18px;}
    .app{padding-bottom:80px;}
}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(33,30,26,.45);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.dialog{background:var(--paper-raised);border:1px solid var(--rule-strong);border-radius:4px;padding:24px;max-width:380px;width:100%;box-shadow:var(--shadow-raised);}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--ink-soft);}
.spinner{width:34px;height:34px;border:3px solid var(--paper-sunken);border-top-color:var(--seal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);border:1px solid var(--ink);color:var(--paper);padding:10px 20px;border-radius:2px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── CAL TODO ── */
.cal-todo-dot{display:flex;align-items:center;gap:3px;padding:1px 4px;border-radius:2px;font-size:8px;font-weight:700;margin-bottom:1px;cursor:pointer;background:var(--warning-wash);color:var(--warning);border:1px solid transparent;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-todo-dot.done{opacity:.45;text-decoration:line-through;}
.cal-todo-modal{position:fixed;inset:0;background:rgba(33,30,26,.45);display:flex;align-items:flex-end;justify-content:center;z-index:600;padding:0;}
@media(min-width:600px){.cal-todo-modal{align-items:center;padding:20px;}}
.cal-todo-sheet{background:var(--paper-raised);border:1px solid var(--rule-strong);border-radius:4px 4px 0 0;width:100%;max-width:520px;padding:24px 20px 32px;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-raised);}
@media(min-width:600px){.cal-todo-sheet{border-radius:4px;}}
.cal-todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px dotted var(--rule);cursor:pointer;}
.cal-todo-check{width:20px;height:20px;border-radius:2px;border:2px solid var(--rule-strong);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;}
.cal-todo-check.done{background:var(--positive);border-color:var(--positive);}
.cal-todo-del{background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:2px 6px;font-size:13px;border-radius:2px;margin-left:auto;flex-shrink:0;}
.cal-todo-del:hover{color:var(--seal);}

/* ── CASE NOTES ── */
.notes-wrap{display:flex;flex-direction:column;gap:14px;}
.note-card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:16px 18px;position:relative;}
.note-card.pinned{border-color:var(--seal);background:var(--seal-wash);}
.note-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.note-meta{font-size:11px;color:var(--ink-faint);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.note-tag{padding:2px 8px;border-radius:2px;font-size:10px;font-weight:700;}
.note-body{font-size:14px;color:var(--ink);line-height:1.8;white-space:pre-wrap;word-break:break-word;}
.note-body.collapsed{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.note-actions{display:flex;gap:6px;flex-shrink:0;}
.note-action-btn{background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:3px 6px;border-radius:2px;font-size:13px;font-family:inherit;transition:background .15s;}
.note-action-btn:hover{background:var(--paper-sunken);color:var(--ink-soft);}
.note-editor{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:16px 18px;}
.note-editor textarea{width:100%;background:transparent;border:none;outline:none;color:var(--ink);font-size:14px;font-family:var(--font-song);line-height:1.8;resize:none;min-height:120px;}
.note-toolbar{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--rule);gap:8px;flex-wrap:wrap;}
.note-tag-sel{display:flex;gap:6px;flex-wrap:wrap;}
.note-tag-opt{padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s;}
.note-tag-opt:not(.sel){opacity:.5;}
.notes-empty{text-align:center;padding:40px 20px;color:var(--ink-faint);}
.notes-empty .ico{font-size:40px;margin-bottom:10px;opacity:.5;}

/* ── FEE PAYMENTS ── */
.fee-summary{background:var(--paper-sunken);border:1px solid var(--rule);border-radius:3px;padding:14px;margin-bottom:12px;}
.fee-summary-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;gap:8px;}
.fee-progress{height:8px;background:var(--paper);border:1px solid var(--rule);border-radius:2px;overflow:hidden;margin:10px 0 4px;}
.fee-progress-bar{height:100%;background:var(--positive);border-radius:0;transition:width .5s ease;}
.pay-record{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;}
.pay-badge{padding:2px 9px;border-radius:2px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;border:1px solid currentColor;}
.pay-method-cash{background:var(--positive-wash);color:var(--positive);border-color:transparent;}
.pay-method-transfer{background:transparent;color:var(--navy);}
.pay-method-check{background:var(--warning-wash);color:var(--warning);border-color:transparent;}
.pay-method-other{background:transparent;color:var(--ink-faint);}

/* ── PRINT ── */
@media print {
    .header,.bnav,.btn,.theme-btn,.filter-row,.stats-row,.upcoming,.tab-bar,.no-print{display:none!important;}
    .app{padding:0;}
    .content{padding:0;}
    body{background:#fff;color:#000;}
    :root{--bg:#fff;--bg2:#fff;--bg3:#fff;--bg4:#f2f2f2;--text:#000;--text2:#333;--text3:#555;--text4:#777;--border:#ccc;--gold:#9E2A24;--seal:#9E2A24;}
    .card{border:1px solid #ccc;break-inside:avoid;margin-bottom:12px;}
    .detail-grid{grid-template-columns:1fr 1fr;}
    .badge{border:1px solid #ccc!important;}
    .print-title{display:block!important;}
}
.print-title{display:none;font-family:var(--font-kai);font-size:18px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--seal);}

/* ── CALENDAR ── */
.cal-wrap{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;overflow:hidden;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--rule);background:var(--paper-sunken);}
.cal-nav{background:var(--paper-raised);border:1px solid var(--rule-strong);border-radius:2px;color:var(--ink-soft);cursor:pointer;padding:6px 14px;font-size:15px;font-family:inherit;}
.cal-nav:hover{background:var(--paper-sunken);border-color:var(--seal);color:var(--seal);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:96px;}
.cal-dow{text-align:center;font-family:var(--font-kai);font-size:11px;font-weight:700;color:var(--ink-soft);padding:10px 4px;letter-spacing:.04em;}
.cal-dow.sun{color:var(--seal);}
.cal-dow.sat{color:var(--navy);}
.cal-day{height:96px;overflow:hidden;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:5px 4px;cursor:default;transition:background .15s;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day.other-month{opacity:.4;}
.cal-day.today-cell{background:var(--seal-wash);}
.cal-day.is-sun{background:rgba(158,42,36,.03);}
.cal-day.is-sat{background:rgba(42,61,79,.03);}
.cal-day.is-holiday{background:rgba(158,42,36,.05);}
.cal-day-num{font-family:var(--font-kai);font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:2px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cal-day.today-cell .cal-day-num{background:var(--seal);color:var(--paper-raised);font-weight:700;}
.cal-day.is-sun:not(.other-month) .cal-day-num{color:var(--seal);}
.cal-day.is-sat:not(.other-month) .cal-day-num{color:var(--navy);}
.cal-day.is-holiday:not(.other-month) .cal-day-num{color:var(--seal);font-weight:800;}
.cal-holiday-label{font-size:8px;color:var(--seal);font-weight:700;margin-bottom:1px;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;}
.cal-school-label{font-size:8px;color:var(--navy);font-weight:700;margin-bottom:1px;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;background:rgba(42,61,79,.08);border-radius:2px;padding:0 2px;}
.cal-event{font-size:9px;border-radius:2px;padding:1px 4px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;line-height:1.5;}
.cal-event:hover{opacity:.8;}
.cal-legend{display:flex;gap:12px;flex-wrap:wrap;padding:12px 18px;border-top:1px solid var(--rule);}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-soft);}
/* 期限標記（上訴/抗告末日、收判） */
.cal-deadline-label{font-size:8px;color:var(--seal);background:var(--seal-wash);font-weight:700;border-radius:2px;padding:0 2px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5;cursor:pointer;}
/* 換月滑動動畫 */
@keyframes calSlideL{from{transform:translateX(26px);opacity:.25}to{transform:none;opacity:1}}
@keyframes calSlideR{from{transform:translateX(-26px);opacity:.25}to{transform:none;opacity:1}}
.cal-grid.slide-l{animation:calSlideL .22s ease;}
.cal-grid.slide-r{animation:calSlideR .22s ease;}
/* 年月快速選擇 */
.cal-pick{padding:12px 18px;border-bottom:1px solid var(--rule);background:var(--paper-raised);display:flex;flex-direction:column;gap:10px;}
.cal-pick-months{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.cal-pick-m{padding:7px 4px;border:1px solid var(--rule-strong);border-radius:2px;background:var(--paper-raised);font-family:var(--font-kai);font-size:13px;cursor:pointer;color:var(--ink-soft);}
.cal-pick-m.on{background:var(--seal);border-color:var(--seal);color:var(--paper-raised);}
/* 議程檢視 */

function today(){
    // 使用台灣時區 UTC+8，避免跨日誤差
    const tw = new Date(new Date().getTime() + 8*60*60*1000);
    return tw.toISOString().split("T")[0];
}
function daysUntil(d){
    // 兩端都用台灣時間的「當日零時」比較，避免時區造成的差一天問題
    const todayMs = new Date(today()+"T00:00:00+08:00").getTime();
    const targetMs = new Date(d+"T00:00:00+08:00").getTime();
    return Math.round((targetMs - todayMs) / 86400000);
}

function Login({onLogin}){
    const [email, setEmail] = React.useState("");

    const [error, setError] = React.useState("");

    const handleLogin = async(e)=>{
        e && e.preventDefault();
        if(!email.trim()||!password){ setError("請輸入帳號和密碼"); return; }
        setLoading(true); setError("");
        try{
            await window.fbAuth.signInWithEmailAndPassword(window.auth, email.trim(), password);

        }catch(err){

                "auth/too-many-requests":"嘗試次數過多，請稍後再試",
            }[err.code] || ("登入失敗："+err.message);
            setError(msg);
            setLoading(false);

    };

                        placeholder="office@yourfirm.com"
                        value={email} onChange={e=>setEmail(e.target.value)}

                        disabled={loading}/>
                </div>
                <div className="fg" style={{marginBottom:24}}>
                    <label className="fl">密碼</label>
                    <div style={{position:"relative"}}>
                        <input className="fi" type={showPw?"text":"password"} autoComplete="current-password"
                            placeholder="••••••••"

                    {loading ? "登入中…" : "🔐 登入"}
                </button>
            </div>
        </div>
    );
}

function Root(){
    const [user, setUser] = React.useState(undefined); // undefined=checking, null=no user

    React.useEffect(()=>{
        const wait = setInterval(()=>{
            if(!window.auth) return;
            clearInterval(wait);
            window.fbAuth.onAuthStateChanged(window.auth, u=>setUser(u||null));
        },100);
        return ()=>clearInterval(wait);
    },[]);

    if(user===undefined) return(
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,color:"var(--text3)"}}>
                <div className="spinner"/>
                <div>載入中…</div>
            </div>
        </div>
    );
    if(!user) return <Login/>;
    return <App user={user}/>;
}

//  THEME HOOK
// ══════════════════════════════════════════
function useTheme(){
    // Determine auto theme: light 06:00-20:00, dark otherwise
    function getAutoTheme(){
        const h = new Date().getHours();
        return (h >= 6 && h < 20) ? "light" : "dark";
    }

    const [mode, setMode] = useState(()=>{
        return localStorage.getItem("themeMode") || "auto";
    });
    const [autoTheme, setAutoTheme] = useState(getAutoTheme);

    // Update auto theme every minute
    useEffect(()=>{
        const timer = setInterval(()=>setAutoTheme(getAutoTheme()), 60000);
        return ()=>clearInterval(timer);
    },[]);

    // Apply theme to <html>
    useEffect(()=>{
        const effective = mode === "auto" ? autoTheme : mode;
        if(effective === "light"){
            document.documentElement.classList.add("light");
        } else {
            document.documentElement.classList.remove("light");
        }
    },[mode, autoTheme]);

    // Persist preference
    useEffect(()=>{
        localStorage.setItem("themeMode", mode);
    },[mode]);

    const effective = mode === "auto" ? autoTheme : mode;
    const cycleMode = ()=>{
        setMode(m => m === "auto" ? "light" : m === "light" ? "dark" : "auto");
    };

    return { mode, effective, cycleMode };
}

// ══════════════════════════════════════════
//  APP
// ══════════════════════════════════════════
function App({user}){
    const [cases, setCases] = useState([]);
    const [loading, setLoading] = useState(true);
    const [view, setView] = useState("list"); // list | detail | form | stats
    const [selectedId, setSelectedId] = useState(null);
    const [formData, setFormData] = useState(emptyCase);
    const [editId, setEditId] = useState(null);
    const [search, setSearch] = useState("");
    const [filterStatus, setFilterStatus] = useState("全部");
    const [filterType, setFilterType] = useState("全部");
    const [deleteConfirm, setDeleteConfirm] = useState(false);
    const [detailTab, setDetailTab] = useState("info"); // info | timeline | notes
    const [noteInput, setNoteInput] = useState("");
    const [noteTag, setNoteTag] = useState("一般");
    const [editingNote, setEditingNote] = useState(null); // {id, text, tag}
    const [expandedNotes, setExpandedNotes] = useState({});
    const [listTab, setListTab] = useState("list"); // list | calendar
    const [statsYear, setStatsYear] = useState("全部");
    const [statsMonth, setStatsMonth] = useState("全部");
    const [calDate, setCalDate] = useState(new Date());
    const [calTodos, setCalTodos] = useState(()=>{ try{ return JSON.parse(localStorage.getItem("calTodos")||"[]"); }catch(e){ return []; } });
    const [widgetHearings, setWidgetHearings] = useState(()=>{ try{ return JSON.parse(localStorage.getItem("widgetHearings")||"[]"); }catch(e){ return []; } });
    const [calTodoModal, setCalTodoModal] = useState(null); // null | dateStr
    const [calView, setCalView] = useState("grid"); // grid | agenda（月曆/議程檢視）
    const [calPicker, setCalPicker] = useState(false); // 年月快速選擇面板
    const [calTodoInput, setCalTodoInput] = useState("");
    const [calTodoTime, setCalTodoTime] = useState("");
    const [calEditHearing, setCalEditHearing] = useState(null); // {id, caseId, isWidget, clientName, date, time, agency, courtroom, note}
    const [calEditTodoId, setCalEditTodoId] = useState(null);
    const [calEditTodoText, setCalEditTodoText] = useState("");
    const [calEditTodoTime, setCalEditTodoTime] = useState("");
    const [filterTag, setFilterTag] = useState("全部");
    const [sortBy, setSortBy] = useState("nextHearing"); // retainerDate | feeReceived | feeUnpaid | nextHearing | todoCount
    const [sortDir, setSortDir] = useState("asc");
    const [upcomingDays, setUpcomingDays] = useState(()=>{const v=parseInt(localStorage.getItem("caseUpcomingDays"));return [30,60,120].includes(v)?v:30;});
    const [allTags, setAllTags] = useState(()=>{ try{ return JSON.parse(localStorage.getItem("caseTags")||"[]"); }catch(e){ return []; } });
    const [tagModal, setTagModal] = useState(false);
    const [tagForm, setTagForm] = useState({name:"",color:"#9E2A24"});
    // inline add forms
    const [newH, setNewH] = useState({date:"",time:"",agency:"",courtroom:"",note:""});
    const [newT, setNewT] = useState({text:"",due:""});
    const [newDoc, setNewDoc] = useState({label:"",url:"",type:"筆錄"});
    const [newFiling, setNewFiling] = useState({type:"起訴狀",date:today(),summary:""});
    const [newPay, setNewPay] = useState({amount:"",date:today(),method:"現金",note:""});
    const [tools, setTools] = useState(()=>{
        try{ return JSON.parse(localStorage.getItem("quickTools")||"[]"); }catch(e){ return []; }
    });
    const [toolModal, setToolModal] = useState(false);
    const [toolForm, setToolForm] = useState({emoji:"🔗",name:"",url:"",desc:"",color:"#9E2A24"});
    const [editingToolId, setEditingToolId] = useState(null);
    const [aiApiKey, setAiApiKey] = useState(()=>localStorage.getItem("claudeApiKey")||"");
    const [aiKeyEditing, setAiKeyEditing] = useState(false);
    const [aiKeyInput, setAiKeyInput] = useState("");
    const [aiMessages, setAiMessages] = useState({});
    const [aiInput, setAiInput] = useState("");
    const [aiLoading, setAiLoading] = useState(false);
    const { mode, effective, cycleMode } = useTheme();

    // ── Firebase listener ──
    useEffect(()=>{
        // 先從 localStorage 快取立即顯示，避免白畫面
        try{
            const cached = localStorage.getItem("cases_cache");
            if(cached){ setCases(JSON.parse(cached)); setLoading(false); }
        }catch(e){}

        const wait = setInterval(()=>{
            if(!window.db) return;
            clearInterval(wait);
            const {collection,onSnapshot,doc,getDoc} = window.fbMethods;
            // Load calTodos from Firebase (realtime)
            onSnapshot(window.fbMethods.doc(window.db,"calTodos","shared"), snap=>{
                if(snap.exists()){
                    const items=snap.data().items||[];
                    setCalTodos(items);
                    try{ localStorage.setItem("calTodos",JSON.stringify(items)); }catch(_){}
                }
            }, e=>console.warn("calTodos listen failed:",e));
            // Load widgetHearings from Firebase (realtime)
            onSnapshot(window.fbMethods.doc(window.db,"widgetHearings","shared"), snap=>{
                if(snap.exists()){
                    const items=snap.data().items||[];
                    setWidgetHearings(items);
                    try{ localStorage.setItem("widgetHearings",JSON.stringify(items)); }catch(_){}
                }
            }, e=>console.warn("widgetHearings listen failed:",e));
            onSnapshot(
                collection(window.db,"cases"),
                snap=>{
                    const data = snap.docs.map(d=>({...d.data(),id:d.id}));
                    setCases(data);
                    setLoading(false);
                    try{ localStorage.setItem("cases_cache", JSON.stringify(data)); }catch(e){}
                },
                err=>{
                    console.error("Firestore 錯誤：", err.code, err.message);
                    setLoading(false);
                    if(err.code==="permission-denied"){
                        toast("❌ 權限不足：請至 Firebase Console 修改 Firestore 安全規則");
                    } else {
                        toast("⚠️ 雲端連線失敗，顯示本機快取");
                    }
                }
            );
        },200);

        const timeout = setTimeout(()=>{
            setLoading(f=>{ if(f) toast("⚠️ 連線逾時，請確認 Firestore 規則"); return false; });
        },6000);

        return ()=>{ clearInterval(wait); clearTimeout(timeout); };
    },[]);

    const selected = cases.find(c=>c.id===selectedId);

    // ── Fee helpers（需在排序前定義，排序會用到 getReceived/getUnpaid）──
    const calcReceived=(c)=>(c.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0);
    const calcUnpaid=(c)=>Math.max(0,Number(c.totalFee||0)-calcReceived(c));
    // backward compat: if old feeReceived exists, treat as received
    const getReceived=(c)=>c.payments?calcReceived(c):Number(c.feeReceived||0);
    const getUnpaid=(c)=>c.payments?calcUnpaid(c):Number(c.feeUnpaid||0);

    const filtered = cases.filter(c=>{
        const q=search.toLowerCase();
        const searchFields=[
            c.clientName, c.firmCaseNo, c.opposingParty, c.attorney,
            ...(c.clientParties||[]).flatMap(p=>[p.name,p.phone]),
            ...(c.opposingCounsel||[]).flatMap(L=>[L.name,L.mobile,L.tel,L.office]),
            c.currentAgency, c.court, c.division, c.notes, c.judgementLink, ...(c.judgementLinks||[]), c.caseReason||"",
            ...(c.courtCaseNos||[]),
            ...(c.hearings||[]).map(h=>[h.agency,h.note,h.courtroom].filter(Boolean).join(" ")),
            ...(c.todos||[]).map(t=>t.text),
            ...(c.docs||[]).map(d=>d.label),
            ...(c.tags||[]),
        ];
        const ms=!q||searchFields.some(x=>(x||"").toLowerCase().includes(q));
        const mst=filterStatus==="全部"||c.status===filterStatus;
        const mt=filterType==="全部"||c.caseType===filterType;
        const mTag=filterTag==="全部"||(c.tags||[]).includes(filterTag);
        return ms&&mst&&mt&&mTag;
    });

    // Sort
    const sortedFiltered = [...filtered].sort((a,b)=>{
        let va, vb;
        if(sortBy==="retainerDate"){ va=a.retainerDate||""; vb=b.retainerDate||""; }
        else if(sortBy==="feeReceived"){ va=getReceived(a); vb=getReceived(b); }
        else if(sortBy==="feeUnpaid"){ va=getUnpaid(a); vb=getUnpaid(b); }
        else if(sortBy==="nextHearing"){
            va=(a.hearings||[]).filter(h=>daysUntil(h.date)>=0).sort((x,y)=>x.date.localeCompare(y.date))[0]?.date||"9999";
            vb=(b.hearings||[]).filter(h=>daysUntil(h.date)>=0).sort((x,y)=>x.date.localeCompare(y.date))[0]?.date||"9999";
        }
        else if(sortBy==="todoCount"){
            va=(a.todos||[]).filter(t=>!t.done).length;
            vb=(b.todos||[]).filter(t=>!t.done).length;
        }
        if(va<vb) return sortDir==="asc"?-1:1;
        if(va>vb) return sortDir==="asc"?1:-1;
        return 0;
    });

    const upcoming = [];
    cases.forEach(c=>{
        (c.hearings||[]).forEach(h=>{
            const d=daysUntil(h.date);
            if(d>=0&&d<=upcomingDays) upcoming.push({...h,caseId:c.id,clientName:c.clientName,firmCaseNo:c.firmCaseNo,appealDeadline:c.appealDeadline});
        });
    });
    upcoming.sort((a,b)=>a.date.localeCompare(b.date));
    const hasFutureHearing = cases.some(c=>(c.hearings||[]).some(h=>daysUntil(h.date)>=0));
    const pickUpcomingDays = v=>{ setUpcomingDays(v); try{localStorage.setItem("caseUpcomingDays",String(v));}catch(_){} };

    // ── Save to Firebase ──
    const saveCase = async()=>{
        const parties=(formData.clientParties||[]).map(p=>({name:(p.name||"").trim(),phone:(p.phone||"").trim()})).filter(p=>p.name||p.phone);
        const opp=(formData.opposingParties||[]).map(s=>(s||"").trim()).filter(Boolean);
        const oppCounsel=(formData.opposingCounsel||[]).map(L=>({name:(L.name||"").trim(),mobile:(L.mobile||"").trim(),office:(L.office||"").trim(),tel:(L.tel||"").trim()})).filter(L=>L.name||L.mobile||L.office||L.tel);
        if(!parties.some(p=>p.name)){ toast("⚠️ 請輸入當事人姓名"); return; }
        if(!formData.firmCaseNo.trim()){ toast("⚠️ 請輸入事務所案件編號"); return; }
        try{
            const id = editId || uid();
            // 陣列為主，同步回寫舊版單一字串欄位以相容其他系統（客戶關聯、庭期、匯出…）
            const data = {...formData, id,
                clientParties: parties,
                opposingParties: opp,
                opposingCounsel: oppCounsel,
                clientName: parties.map(p=>p.name).filter(Boolean).join("、"),
                phone: (parties.find(p=>p.phone)||{}).phone || "",
                opposingParty: opp.join("、"),
            };
            toast("⏳ 儲存中…");
            await window.fbMethods.setDoc(window.fbMethods.doc(window.db,"cases",id), data);
            // 若此案件已開啟當事人連結，同步更新其可見的時間軸快照
            if(data.shareToken){ try{ await writeShareSnap(data, data.shareToken); }catch(err){ console.warn("share snapshot refresh failed:",err); } }
            toast("✅ 已儲存至雲端");
            setSelectedId(id);
            setView(editId?"detail":"list");
        }catch(e){
            console.error("儲存失敗：", e.code, e.message);
            if(e.code==="permission-denied"){
                toast("❌ 儲存失敗：請至 Firebase 修改 Firestore 安全規則為允許讀寫");
            } else {
                toast("❌ 儲存失敗："+e.message);
            }
        }
    };

    const deleteCase = async()=>{
        try{
            // 一併清除已發出的當事人連結，避免刪案後連結仍可讀
            const cur=cases.find(c=>c.id===selectedId);
            if(cur&&cur.shareToken){ try{ await window.fbMethods.deleteDoc(window.fbMethods.doc(window.db,"caseShares",cur.shareToken)); }catch(_){} }
            await window.fbMethods.deleteDoc(window.fbMethods.doc(window.db,"cases",selectedId));
            toast("🗑 案件已刪除");
            setDeleteConfirm(false); setView("list");
        }catch(e){ toast("❌ 刪除失敗"); }
    };

    // ── 當事人時間軸分享連結 ──
    const genShareToken=()=>{const a=new Uint8Array(18);crypto.getRandomValues(a);return Array.from(a,b=>b.toString(16).padStart(2,"0")).join("");};
    const shareUrl=token=>new URL("case-view.html?t="+token,location.href).href;
    const buildShareSnapshot=(c,token)=>{
        const tl=[];
        (c.hearings||[]).forEach(h=>{ if(h.date) tl.push({date:h.date,time:h.time||"",kind:"開庭",title:(h.agency||"開庭")+(h.courtroom?(" "+h.courtroom):""),detail:h.note||""}); });
        (c.filings||[]).forEach(f=>{ if(f.date) tl.push({date:f.date,time:"",kind:"遞狀",title:f.type||"書狀",detail:f.summary||""}); });
        if(c.judgmentReceivedDate) tl.push({date:c.judgmentReceivedDate,time:"",kind:"收判",title:"收受判決",detail:""});
        if(c.appealDeadline) tl.push({date:c.appealDeadline,time:"",kind:"末日",title:"上訴/抗告期限",detail:""});
        tl.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
        return {
            caseId:c.id, firmCaseNo:c.firmCaseNo||"", clientName:c.clientName||"",
            caseType:c.caseType||"", status:c.status||"", court:c.court||"", currentAgency:c.currentAgency||"",
            opposingParty:c.opposingParty||"", courtCaseNos:(c.courtCaseNos||[]).filter(Boolean),
            attorney:c.attorney||"", timeline:tl, revoked:false, updatedAt:new Date().toISOString(), token,
        };
    };
    const writeShareSnap=async(c,token)=>{
        await window.fbMethods.setDoc(window.fbMethods.doc(window.db,"caseShares",token), buildShareSnapshot(c,token));
    };
    const genCaseShare=async(c)=>{
        try{
            const token=c.shareToken||genShareToken();
            await writeShareSnap(c,token);
            await window.fbMethods.updateDoc(window.fbMethods.doc(window.db,"cases",c.id),{shareToken:token});
            toast("✅ 已產生當事人連結");
        }catch(e){ console.error(e); toast("⚠️ 產生失敗，請檢查網路後重試"); }
    };
    const refreshCaseShare=async(c)=>{
        try{ await writeShareSnap(c,c.shareToken); toast("✅ 已更新當事人可見內容"); }
        catch(e){ console.error(e); toast("⚠️ 更新失敗，請檢查網路後重試"); }
    };
    const revokeCaseShare=async(c)=>{
        try{
            await window.fbMethods.deleteDoc(window.fbMethods.doc(window.db,"caseShares",c.shareToken));
            await window.fbMethods.updateDoc(window.fbMethods.doc(window.db,"cases",c.id),{shareToken:""});
            toast("🗑 已停用當事人連結");
        }catch(e){ console.error(e); toast("⚠️ 停用失敗，請檢查網路後重試"); }
    };
    const copyShareUrl=token=>{ try{ navigator.clipboard.writeText(shareUrl(token)); toast("✅ 已複製連結"); }catch(_){ toast("請長按網址手動複製"); } };

    const toggleTodo = async(c, todoId)=>{
        const todos = (c.todos||[]).map(t=>t.id===todoId?{...t,done:!t.done}:t);
        try{ await window.fbMethods.updateDoc(window.fbMethods.doc(window.db,"cases",c.id),{todos}); }
        catch(e){ console.error(e); toast("⚠️ 更新失敗，請檢查網路後重試"); }
    };

    // ── Form helpers ──
    const sf = (key,val)=>setFormData(f=>({...f,[key]:val}));
    const addHearing=()=>{
        if(!newH.date){ toast("請填開庭日期"); return; }
        sf("hearings",[...(formData.hearings||[]),{...newH,id:uid()}]);
        setNewH({date:"",time:"",agency:"",courtroom:"",note:""});
    };
    const removeHearing=i=>sf("hearings",formData.hearings.filter((_,idx)=>idx!==i));
    const addTodo=()=>{
        if(!newT.text.trim()){ toast("請填待辦內容"); return; }
        sf("todos",[...(formData.todos||[]),{...newT,id:uid(),done:false}]);
        setNewT({text:"",due:""});
    };
    const removeTodo=i=>sf("todos",formData.todos.filter((_,idx)=>idx!==i));
    const addDoc=()=>{
        if(!newDoc.url.trim()){ toast("請填文件連結"); return; }
        sf("docs",[...(formData.docs||[]),{...newDoc,id:uid()}]);
        setNewDoc({label:"",url:"",type:"筆錄"});
    };
    const removeDoc=i=>sf("docs",(formData.docs||[]).filter((_,idx)=>idx!==i));
    const addFiling=()=>{
        if(!newFiling.date){ toast("請選擇遞狀日期"); return; }
        sf("filings",[...(formData.filings||[]),{...newFiling,id:uid()}]);
        setNewFiling({type:newFiling.type,date:today(),summary:""});
    };
    const removeFiling=i=>sf("filings",(formData.filings||[]).filter((_,idx)=>idx!==i));
    const addCaseNo=()=>sf("courtCaseNos",[...(formData.courtCaseNos||[]),""]);
    const updateCaseNo=(i,v)=>{const a=[...(formData.courtCaseNos||[])];a[i]=v;sf("courtCaseNos",a);};
    const removeCaseNo=i=>sf("courtCaseNos",formData.courtCaseNos.filter((_,idx)=>idx!==i));
    // 當事人（可複數，每位含姓名+電話）與對造當事人（可複數）；相容舊版單一字串欄位
    const withParties=(c)=>{
        const cp=(Array.isArray(c.clientParties)&&c.clientParties.length)
            ? c.clientParties.map(p=>({name:p.name||"",phone:p.phone||""}))
            : [{name:c.clientName||"",phone:c.phone||""}];
        const op=(Array.isArray(c.opposingParties)&&c.opposingParties.length)
            ? c.opposingParties.slice()
            : (c.opposingParty?[c.opposingParty]:[""]);
        const oc=Array.isArray(c.opposingCounsel)?c.opposingCounsel.map(L=>({name:L.name||"",mobile:L.mobile||"",office:L.office||"",tel:L.tel||""})):[];
        return {...c, clientParties:cp, opposingParties:op, opposingCounsel:oc};
    };
    const addClientParty=()=>sf("clientParties",[...(formData.clientParties||[]),{name:"",phone:""}]);
    const updateClientParty=(i,key,v)=>sf("clientParties",(formData.clientParties||[]).map((p,idx)=>idx===i?{...p,[key]:v}:p));
    const removeClientParty=i=>sf("clientParties",(formData.clientParties||[]).filter((_,idx)=>idx!==i));
    const addOpposing=()=>sf("opposingParties",[...(formData.opposingParties||[]),""]);
    const updateOpposing=(i,v)=>{const a=[...(formData.opposingParties||[])];a[i]=v;sf("opposingParties",a);};
    const removeOpposing=i=>sf("opposingParties",(formData.opposingParties||[]).filter((_,idx)=>idx!==i));
    // 對造律師（可多位，含行動電話、事務所地址、市話）
    const addOppCounsel=()=>sf("opposingCounsel",[...(formData.opposingCounsel||[]),{name:"",mobile:"",office:"",tel:""}]);
    const updateOppCounsel=(i,key,v)=>sf("opposingCounsel",(formData.opposingCounsel||[]).map((L,idx)=>idx===i?{...L,[key]:v}:L));
    const removeOppCounsel=i=>sf("opposingCounsel",(formData.opposingCounsel||[]).filter((_,idx)=>idx!==i));
    // 判決書連結（多筆；相容舊版單筆 judgementLink 字串）
    const getJudgements=()=>(formData.judgementLinks&&formData.judgementLinks.length)?formData.judgementLinks:(formData.judgementLink?[formData.judgementLink]:[""]);
    const addJudgement=()=>sf("judgementLinks",[...getJudgements(),""]);
    const updateJudgement=(i,v)=>{const a=[...getJudgements()];a[i]=v;sf("judgementLinks",a);};
    const removeJudgement=i=>sf("judgementLinks",getJudgements().filter((_,idx)=>idx!==i));

    // 事務所案件編號自動排序：{民國年}-{類型首字}-{三位流水號}
    const autoCaseNo=(type)=>{
        const y=new Date().getFullYear()-1911;
        const abbr=(type||"民事").charAt(0);
        let max=0;
        const re=new RegExp("^"+y+"-"+abbr+"-(\\d+)$");
        cases.forEach(c=>{
            const m=(c.firmCaseNo||"").trim().match(re);
            if(m) max=Math.max(max,parseInt(m[1],10));
        });
        return `${y}-${abbr}-${String(max+1).padStart(3,"0")}`;
    };
    // 空白或仍是自動編號格式者，切換類型時允許重新編號（手動輸入的特殊編號不覆蓋）
    const isAutoCaseNo=(v)=>!v||!String(v).trim()||/^\d{2,3}-.-\d{3}$/.test(String(v).trim());

    const openAdd=()=>{ setFormData(withParties({...emptyCase,id:"",firmCaseNo:autoCaseNo(emptyCase.caseType)})); setEditId(null); setView("form"); };
    const openEdit=(c)=>{ setFormData(withParties(JSON.parse(JSON.stringify(c)))); setEditId(c.id); setView("form"); };
    const openDetail=(id)=>{ setSelectedId(id); setDetailTab("info"); setView("detail"); };

    // ── Calendar Todos ──
    const saveCalTodos=(updated)=>{
        setCalTodos(updated);
        try{ localStorage.setItem("calTodos",JSON.stringify(updated)); }catch(_){}
        // Also sync to Firebase as a single doc
        window.fbMethods.setDoc(
            window.fbMethods.doc(window.db,"calTodos","shared"),
            {items:updated, updatedAt:new Date().toISOString()}
        ).catch(e=>console.warn("calTodos save failed:",e));
    };
    const addCalTodo=(dateStr)=>{
        if(!calTodoInput.trim()) return;
        const updated=[...calTodos,{id:uid(),date:dateStr,text:calTodoInput.trim(),time:calTodoTime||"",done:false,createdAt:new Date().toISOString()}];
        saveCalTodos(updated);
        setCalTodoInput("");
        setCalTodoTime("");
    };
    const toggleCalTodo=(id)=>{
        const updated=calTodos.map(t=>t.id===id?{...t,done:!t.done}:t);
        saveCalTodos(updated);
    };
    const deleteCalTodo=(id)=>{
        const updated=calTodos.filter(t=>t.id!==id);
        saveCalTodos(updated);
    };
    const startEditCalTodo=(t)=>{ setCalEditTodoId(t.id); setCalEditTodoText(t.text); setCalEditTodoTime(t.time||""); };
    const cancelEditCalTodo=()=>{ setCalEditTodoId(null); setCalEditTodoText(""); setCalEditTodoTime(""); };
    const saveEditCalTodo=()=>{
        if(!calEditTodoText.trim()) return;
        saveCalTodos(calTodos.map(t=>t.id===calEditTodoId?{...t,text:calEditTodoText.trim(),time:calEditTodoTime||""}:t));

    const getCaseMsgs=(caseId)=>aiMessages[caseId]||[];
    const addMsg=(caseId,msg)=>setAiMessages(prev=>({...prev,[caseId]:[...(prev[caseId]||[]),msg]}));
    const clearChat=(caseId)=>setAiMessages(prev=>({...prev,[caseId]:[]}));

    const sendAiMessage=async(c)=>{
        const text=aiInput.trim();
        if(!text||aiLoading) return;
        if(!aiApiKey){ toast("請先設定 Claude API Key"); setAiKeyEditing(true); return; }
        const userMsg={role:"user",content:text};
        addMsg(c.id, userMsg);
        setAiInput("");
        setAiLoading(true);

        const systemPrompt=`你是一位專業的台灣法律助理，正在協助律師處理以下案件。請根據案件背景，以繁體中文回答律師的問題，回答要專業、精準、具有實務參考價值。

【案件資訊】
事務所案件編號：${c.firmCaseNo||""}
當事人：${c.clientName||""}
對造：${c.opposingParty||""}
法院案號：${(c.courtCaseNos||[]).filter(Boolean).join("、")||""}
股別：${c.division||""}
法院/檢察署：${c.court||""} ${c.instance||""}
案件類型：${c.caseType||""}
案件狀態：${c.status||""}
承辦律師：${c.attorney||""}
備註：${c.notes||""}`;

        const history=getCaseMsgs(c.id);
        const messages=history.map(m=>({role:m.role==="ai"?"assistant":"user",content:m.content}));
        messages.push({role:"user",content:text});

        try{
            const res=await fetch("https://api.anthropic.com/v1/messages",{
                method:"POST",
                headers:{
                    "x-api-key":aiApiKey,
                    "anthropic-version":"2023-06-01",
                    "anthropic-dangerous-direct-browser-access":"true",
                    "content-type":"application/json"
                },
                body:JSON.stringify({
                    model:"claude-opus-4-8",
                    max_tokens:1500,
                    system:systemPrompt,
                    messages
                })
            });
            if(!res.ok){
                let err={};try{err=await res.json();}catch(_){}
                const msg=err?.error?.message||"";
                if(res.status===401)throw new Error("API Key 無效，請至 Anthropic Console 確認");
                if(res.status===403)throw new Error("API Key 權限不足或帳號未啟用");
                if(res.status===429)throw new Error("超過使用限制，請稍後再試");
                if(res.status>=500)throw new Error("Claude 伺服器暫時無法回應，請稍後再試");
                throw new Error(msg||`HTTP ${res.status}`);
            }
            const data=await res.json();
            const reply=data.content?.[0]?.text||"（無回應）";
            addMsg(c.id,{role:"ai",content:reply});
        }catch(e){
            console.error("Claude error:",e);
            addMsg(c.id,{role:"ai",content:"⚠️ "+e.message});
            if(/API Key|無效|401|403/.test(e.message)) setAiKeyEditing(true);
        }finally{
            setAiLoading(false);
        }
    };

            return `${L.name||""}${contacts?`（${contacts}）`:""}`;
        }).filter(Boolean).join("；");
        const headers=["事務所案件編號","當事人姓名","連絡電話","對造","對造律師","法院案號","股別","法院/檢察署","審級","案件類型","狀態","承辦律師","委任日期","本件律師費","已收款合計","未收款","代墊款項","案由","標籤","備註"];
        const rows=cases.map(c=>[
            c.firmCaseNo||"", c.clientName||"", c.phone||"", c.opposingParty||"", oppCounselStr(c),

        // 時間格式：09:30 → 093000，無時間則用全天
        const hasTime = !!(h.time);
        let start, end;
        if(hasTime){
            const timeStr = (h.time||"0900").replace(":","")+"00";
            start = `${dateStr}T${timeStr}`;
            // 預設結束時間 = 開始 + 1小時
            const [hh, mm] = (h.time||"09:00").split(":").map(Number);
            const endHH = String(hh+1).padStart(2,"0");
            end = `${dateStr}T${endHH}${String(mm).padStart(2,"0")}00`;
        } else {
            // 全天事件
            const nextDay = new Date(h.date);
            nextDay.setDate(nextDay.getDate()+1);
            start = dateStr;
            end = nextDay.toISOString().split("T")[0].replace(/-/g,"");

        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&location=${location}&details=${detail}`;

                    <span style={{color:"var(--text4)",fontSize:12,whiteSpace:"nowrap"}}>{sortedFiltered.length} 件</span>
                </div>

                {/* Tag filter row */}
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:14}}>
                    <button className="tag-pill" onClick={()=>setFilterTag("全部")}
                        style={{background:filterTag==="全部"?"var(--gold)":"var(--bg4)",color:filterTag==="全部"?"#fff":"var(--text3)"}}>
                        全部
                    </button>
                    {allTags.map(t=>(
                        <button key={t.id} className="tag-pill" onClick={()=>setFilterTag(filterTag===t.name?"全部":t.name)}
                            style={{background:filterTag===t.name?t.color:t.color+"22",color:filterTag===t.name?"#fff":t.color,border:`1px solid ${t.color}44`}}>
                            {t.name}
                        </button>
                    ))}
                    <button className="tag-pill" onClick={()=>setTagModal(true)}
                        style={{background:"transparent",border:"1px dashed var(--border)",color:"var(--text4)"}}>
                        ＋ 新增標籤
                    </button>
                </div>

                {/* Tag modal */}
                {tagModal && (
                    <div className="tool-modal-overlay" onClick={e=>e.target===e.currentTarget&&setTagModal(false)}>
                        <div className="tool-modal">
                            <div style={{fontWeight:700,fontSize:15,marginBottom:16}}>🏷 管理標籤</div>
                            {/* Existing tags */}
                            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
                                {allTags.map(t=>(
                                    <span key={t.id} className="tag-pill" style={{background:t.color+"22",color:t.color,border:`1px solid ${t.color}44`}}>
                                        {t.name}
                                        <span style={{cursor:"pointer",marginLeft:2}} onClick={()=>deleteTag(t.id)}>✕</span>
                                    </span>
                                ))}
                                {allTags.length===0 && <div style={{color:"var(--text4)",fontSize:13}}>尚無標籤</div>}
                            </div>
                            <div className="fg" style={{marginBottom:10}}>
                                <label className="fl">新標籤名稱</label>
                                <input className="fi" value={tagForm.name} onChange={e=>setTagForm(f=>({...f,name:e.target.value}))} placeholder="例如：緊急、等候判決、上訴中"/>
                            </div>
                            <div style={{display:"flex",gap:6,marginBottom:18}}>
                                {["#9E2A24","#A6741C","#3A6B4F","#2A3D4F","#99604F","#3E6B6B","#6B6250","#8A8377"].map(c=>(
                                    <div key={c} className={"tag-color-swatch"+(tagForm.color===c?" sel":"")} style={{background:c}} onClick={()=>setTagForm(f=>({...f,color:c}))}/>
                                ))}
                            </div>
                            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                                <button className="btn btn-outline btn-sm" onClick={()=>setTagModal(false)}>關閉</button>
                                <button className="btn btn-gold" onClick={saveTag}>新增標籤</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* ── CALENDAR VIEW ── */}
                {listTab==="calendar" && (()=>{
                    const y=calDate.getFullYear(), m=calDate.getMonth();
                    const firstDay=new Date(y,m,1).getDay();
                    const daysInMonth=new Date(y,m+1,0).getDate();
                    const todayStr=today();
                    // Build hearing map: date -> [{clientName, caseType, note, caseId}]
                    const hearingMap={};
                    cases.forEach(c=>{
                        (c.hearings||[]).forEach(h=>{
                            if(!hearingMap[h.date]) hearingMap[h.date]=[];
                            hearingMap[h.date].push({clientName:c.clientName,caseType:c.caseType,note:h.note||h.agency||"開庭",caseId:c.id,time:h.time||""});
                        });
                    });
                    // Also include widgetHearings (臨時庭期)
                    (widgetHearings||[]).forEach(h=>{
                        if(!hearingMap[h.date]) hearingMap[h.date]=[];
                        hearingMap[h.date].push({clientName:h.clientName||"臨時庭期",caseType:"臨時庭期",note:h.note||h.agency||"臨時庭期",caseId:null,time:h.time||"",isWidget:true});
                    });
                    // 書狀遞狀 & 期限（上訴/抗告末日、收受判決）
                    const filingMap={}, deadlineMap={};
                    cases.forEach(c=>{
                        (c.filings||[]).forEach(f=>{
                            if(!f.date) return;
                            if(!filingMap[f.date]) filingMap[f.date]=[];
                            filingMap[f.date].push({...f,clientName:c.clientName,caseId:c.id});
                        });
                        if(c.appealDeadline){
                            if(!deadlineMap[c.appealDeadline]) deadlineMap[c.appealDeadline]=[];
                            deadlineMap[c.appealDeadline].push({kind:"末日",clientName:c.clientName,caseId:c.id});
                        }
                        if(c.judgmentReceivedDate){
                            if(!deadlineMap[c.judgmentReceivedDate]) deadlineMap[c.judgmentReceivedDate]=[];
                            deadlineMap[c.judgmentReceivedDate].push({kind:"收判",clientName:c.clientName,caseId:c.id});
                        }
                    });
                    const cells=[];
                    // Previous month padding
                    const prevDays=new Date(y,m,0).getDate();
                    for(let i=firstDay-1;i>=0;i--) cells.push({day:prevDays-i,cur:false});
                    for(let d=1;d<=daysInMonth;d++) cells.push({day:d,cur:true});
                    while(cells.length%7!==0) cells.push({day:cells.length-daysInMonth-firstDay+1,cur:false});
                    const monthStr=`${y}年${m+1}月`;
                    const mm2=String(m+1).padStart(2,"0");
                    const goMonth=(ny,nm,dir)=>{calAnimDir=dir;setCalDate(new Date(ny,nm,1));};
                    // 匯出當月 .ics（庭期＋期限）
                    const icsEsc=s=>String(s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");
                    const exportIcs=()=>{
                        const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//legal-case-system//TW","CALSCALE:GREGORIAN"];
                        Object.keys(hearingMap).filter(ds=>ds.startsWith(`${y}-${mm2}`)).sort().forEach(ds=>{
                            hearingMap[ds].forEach(h=>{
                                const dt=ds.replace(/-/g,"");
                                lines.push("BEGIN:VEVENT",`UID:${uid()}@legal-case-system`);
                                if(h.time) lines.push(`DTSTART;TZID=Asia/Taipei:${dt}T${h.time.replace(":","")}00`);
                                else lines.push(`DTSTART;VALUE=DATE:${dt}`);
                                lines.push(`SUMMARY:${icsEsc(`開庭 ${h.clientName}`)}`,`DESCRIPTION:${icsEsc(h.note||"")}`,"END:VEVENT");
                            });
                        });
                        Object.keys(deadlineMap).filter(ds=>ds.startsWith(`${y}-${mm2}`)).sort().forEach(ds=>{
                            deadlineMap[ds].forEach(dl=>{
                                lines.push("BEGIN:VEVENT",`UID:${uid()}@legal-case-system`,`DTSTART;VALUE=DATE:${ds.replace(/-/g,"")}`,`SUMMARY:${icsEsc(`${dl.kind==="末日"?"上訴/抗告末日":"收受判決"} ${dl.clientName}`)}`,"END:VEVENT");
                            });
                        });
                        lines.push("END:VCALENDAR");
                        const blob=new Blob([lines.join("\r\n")],{type:"text/calendar;charset=utf-8"});
                        const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`庭期_${y}-${mm2}.ics`;a.click();
                        toast("📆 已匯出當月行事曆檔");
                    };
                    const animCls=calAnimDir===1?" slide-l":calAnimDir===-1?" slide-r":"";
                    calAnimDir=0;
                    return(
                        <div className="cal-wrap"
                            onTouchStart={e=>{calSwipeX=e.touches[0].clientX;calSwipeY=e.touches[0].clientY;}}
                            onTouchEnd={e=>{
                                if(calSwipeX==null)return;
                                const dx=e.changedTouches[0].clientX-calSwipeX;
                                const dy=e.changedTouches[0].clientY-calSwipeY;
                                calSwipeX=null;calSwipeY=null;
                                // 需為明顯的水平滑動（避免與上下捲動衝突）
                                if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)*1.5){
                                    const dir=dx<0?1:-1; // 左滑→下個月，右滑→上個月
                                    goMonth(y,m+dir,dir);
                                }
                            }}>
                            <div className="cal-header">
                                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                    <button className="cal-nav" onClick={()=>goMonth(y,m-1,-1)}>‹</button>
                                    <button className="cal-nav" style={{fontSize:12}} onClick={()=>{calAnimDir=0;setCalDate(new Date());}}>今天</button>
                                    <button className="cal-nav" onClick={()=>goMonth(y,m+1,1)}>›</button>
                                </div>
                                <button onClick={()=>setCalPicker(p=>!p)} title="點擊快速選擇年月"
                                    style={{background:"none",border:"none",cursor:"pointer",fontWeight:700,fontSize:16,color:"var(--text)",fontFamily:"var(--font-kai)",letterSpacing:".04em"}}>
                                    {monthStr} ▾
                                </button>
                                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                    <button className="cal-nav" style={{fontSize:12}} onClick={()=>setCalView(v=>v==="grid"?"agenda":"grid")}>{calView==="grid"?"☰ 議程":"▦ 月曆"}</button>
                                    <button className="cal-nav" style={{fontSize:12}} onClick={exportIcs} title="匯出當月庭期與期限為 .ics 行事曆檔">📆</button>
                                </div>
                            </div>
                            {calPicker && (
                                <div className="cal-pick">
                                    <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
                                        {[y-2,y-1,y,y+1,y+2].map(yy=>(
                                            <button key={yy} className={"cal-pick-m"+(yy===y?" on":"")} style={{minWidth:64}}
                                                onClick={()=>goMonth(yy,m,yy>y?1:yy<y?-1:0)}>{yy}</button>
                                        ))}
                                    </div>
                                    <div className="cal-pick-months">
                                        {Array.from({length:12},(_,mi)=>mi).map(mi=>(
                                            <button key={mi} className={"cal-pick-m"+(mi===m?" on":"")}
                                                onClick={()=>{setCalPicker(false);goMonth(y,mi,mi>m?1:mi<m?-1:0);}}>{mi+1}月</button>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {calView==="agenda" ? (()=>{
                                const rows=[];
                                for(let dd=1;dd<=daysInMonth;dd++){
                                    const ds=`${y}-${mm2}-${String(dd).padStart(2,"0")}`;
                                    (deadlineMap[ds]||[]).forEach(dl=>rows.push({date:ds,time:"",icon:"⏰",label:`${dl.kind==="末日"?"上訴/抗告末日":"收受判決"} · ${dl.clientName}`,detail:"",caseId:dl.caseId,color:"var(--seal)",bold:true}));
                                    (hearingMap[ds]||[]).forEach(h=>rows.push({date:ds,time:h.time,icon:h.isWidget?"⚡":"🏛",label:h.clientName,detail:h.note,caseId:h.caseId,color:h.isWidget?"#9E2A24":(TYPE_COLOR[h.caseType]||"#8A8377")}));
                                    (filingMap[ds]||[]).forEach(f=>rows.push({date:ds,time:"",icon:"📄",label:`${f.type} · ${f.clientName}`,detail:f.summary,caseId:f.caseId,color:"var(--navy)"}));
                                    calTodos.filter(t=>t.date===ds).forEach(t=>rows.push({date:ds,time:"",icon:t.done?"✓":"○",label:t.text,detail:t.done?"已完成":"待辦",caseId:null,color:t.done?"var(--positive)":"var(--warning)"}));
                                }
                                rows.sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"99:99").localeCompare(b.time||"99:99"));
                                if(!rows.length) return <div className="empty" style={{padding:"36px 20px"}}><div className="ico">🗓</div>本月無庭期、期限、遞狀或待辦</div>;
                                return <div>{rows.map((r,ri)=>(
                                    <div key={ri} className="agenda-row" style={{cursor:r.caseId?"pointer":"default"}} onClick={()=>r.caseId&&openDetail(r.caseId)}>
                                        <div className="agenda-date">{r.date.slice(5)}{r.time&&` ${r.time}`}</div>
                                        <span style={{flexShrink:0,color:r.color}}>{r.icon}</span>
                                        <div style={{flex:1,minWidth:0}}>
                                            <div style={{fontSize:13,color:r.bold?r.color:"var(--text)",fontWeight:r.bold?700:500}}>{r.label}</div>
                                            {r.detail&&<div style={{fontSize:11,color:"var(--text3)"}}>{r.detail}</div>}
                                        </div>
                                    </div>
                                ))}</div>;
                            })() : (
                            <div className={"cal-grid"+animCls} key={monthStr}>
                                {[["日","sun"],["一",""],["二",""],["三",""],["四",""],["五",""],["六","sat"]].map(([d,cls])=>(
                                    <div key={d} className={`cal-dow${cls?" "+cls:""}`}>{d}</div>
                                ))}
                                {cells.map((cell,i)=>{
                                    const dow=i%7; // 0=日,6=六
                                    const dateStr=cell.cur?`${y}-${String(m+1).padStart(2,"0")}-${String(cell.day).padStart(2,"0")}`:"";
                                    const events=dateStr?hearingMap[dateStr]||[]:[];
                                    const isToday=dateStr===todayStr;
                                    const isSun=dow===0;
                                    const isSat=dow===6;
                                    const holidayName=dateStr?TW_HOLIDAYS[dateStr]:"";
                                    const schoolName=dateStr?SCHOOL_EVENTS[dateStr]:"";
                                    const isHoliday=!!holidayName&&!isSun&&!isSat; // non-weekend public holiday
                                    const cls=[
                                        "cal-day",
                                        !cell.cur?"other-month":"",
                                        isToday?"today-cell":"",
                                        isSun?"is-sun":"",
                                        isSat?"is-sat":"",
                                        isHoliday?"is-holiday":"",
                                    ].filter(Boolean).join(" ");
                                    const dateTodos=dateStr?calTodos.filter(t=>t.date===dateStr):[];
                                    return(
                                        <div key={i} className={cls} style={{cursor:cell.cur?"pointer":"default"}}
                                            onClick={()=>cell.cur&&setCalTodoModal(dateStr)}>
                                            <div className="cal-day-num">{cell.day}</div>
                                            {holidayName && cell.cur && (
                                                <div className="cal-holiday-label" title={holidayName}>
                                                    {holidayName==="彈性放假"?"補假":holidayName}
                                                </div>
                                            )}
                                            {schoolName && cell.cur && (
                                                <div className="cal-school-label" title={`學校：${schoolName}`}>📚{schoolName}</div>
                                            )}
                                            {cell.cur && (deadlineMap[dateStr]||[]).slice(0,2).map((dl,di)=>(
                                                <div key={"dl"+di} className="cal-deadline-label"
                                                    title={`${dl.kind==="末日"?"上訴/抗告末日":"收受判決"}：${dl.clientName}`}
                                                    onClick={e=>{e.stopPropagation();if(dl.caseId)openDetail(dl.caseId);}}>
                                                    ⏰{dl.kind} {dl.clientName}
                                                </div>
                                            ))}
                                            {events.slice(0,2).map((ev,ei)=>(
                                                <div key={ei} className="cal-event"
                                                    style={{background:(ev.isWidget?"#9E2A24":(TYPE_COLOR[ev.caseType]||"#8A8377"))+"33",color:ev.isWidget?"#9E2A24":(TYPE_COLOR[ev.caseType]||"#8A8377")}}
                                                    onClick={e=>{e.stopPropagation();if(!ev.isWidget)openDetail(ev.caseId);}}
                                                    title={`${ev.isWidget?"⚡ ":""}${ev.clientName} ${ev.time} ${ev.note}`}>
                                                    {ev.time&&`${ev.time} `}{ev.isWidget?"⚡":""}{ev.clientName}
                                                </div>
                                            ))}
                                            {dateTodos.slice(0,2).map((t,ti)=>(
                                                <div key={"td"+ti} className={"cal-todo-dot"+(t.done?" done":"")}
                                                    onClick={e=>{e.stopPropagation();setCalTodoModal(dateStr);}}
                                                    title={`待辦：${t.text}`}>
                                                    {t.done?"✓":"○"}{t.time&&` ${t.time}`} {t.text}
                                                </div>
                                            ))}
                                            {(events.length>2||dateTodos.length>2||(dateStr&&(filingMap[dateStr]||[]).length>0)) && (
                                                <div style={{fontSize:8,color:"var(--text4)",paddingLeft:2,lineHeight:1.3}}>
                                                    {[
                                                        events.length>2?`+${events.length-2}庭`:null,
                                                        (dateStr&&(filingMap[dateStr]||[]).length>0)?`📄${filingMap[dateStr].length}狀`:null,
                                                        dateTodos.length>2?`+${dateTodos.length-2}待辦`:null,
                                                    ].filter(Boolean).join(" ")}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                            )}
                            <div className="cal-legend">
                                <div className="cal-legend-item"><div style={{width:10,height:10,borderRadius:50,background:"#9E2A24"}}/><span style={{color:"#9E2A24",fontWeight:700}}>日/假日</span></div>
                                <div className="cal-legend-item"><div style={{width:10,height:10,borderRadius:50,background:"#2A3D4F"}}/><span style={{color:"#2A3D4F",fontWeight:700}}>六</span></div>
                                <div className="cal-legend-item"><div style={{width:10,height:10,borderRadius:4,background:"#A6741C"}}/><span style={{color:"#A6741C",fontWeight:700}}>待辦</span></div>
                                <div style={{width:1,height:14,background:"var(--border)",margin:"0 4px"}}/>
                                {CASE_TYPES.map(t=><div key={t} className="cal-legend-item"><div style={{width:10,height:10,borderRadius:2,background:TYPE_COLOR[t]||"#8A8377"}}/>{t}</div>)}
                                <div className="cal-legend-item"><div style={{width:10,height:10,borderRadius:2,background:"#9E2A24"}}/><span style={{color:"#9E2A24",fontWeight:700}}>⚡ 臨時庭期</span></div>
                                <div className="cal-legend-item"><div style={{width:10,height:10,borderRadius:2,background:"#2A3D4F"}}/><span style={{color:"#2A3D4F",fontWeight:700}}>📚 學校行事</span></div>
                                <div className="cal-legend-item"><span style={{color:"var(--seal)",fontWeight:700}}>⏰ 末日/收判</span></div>
                                <div className="cal-legend-item"><span style={{color:"var(--navy)",fontWeight:700}}>📄 遞狀</span></div>
                            </div>
                            <div style={{fontSize:10,color:"var(--text4)",padding:"6px 18px 0",textAlign:"right"}}>點選日期可新增待辦事項</div>
                        </div>
                    );
                })()}

                {/* Calendar Todo Modal */}
                {calTodoModal && (()=>{
                    const ds=calTodoModal;
                    const d=new Date(ds+"T00:00:00+08:00");
                    const wd=["日","一","二","三","四","五","六"][d.getDay()];
                    const label=`${d.getMonth()+1}月${d.getDate()}日（${wd}）`;
                    const todosForDay=calTodos.filter(t=>t.date===ds).sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
                    const hearingsForDay=(()=>{
                        const hm={};
                        cases.forEach(c=>(c.hearings||[]).forEach(h=>{if(!hm[h.date])hm[h.date]=[];hm[h.date].push({...h,clientName:c.clientName,firmCaseNo:c.firmCaseNo,caseType:c.caseType,caseId:c.id});}));
                        (widgetHearings||[]).forEach(h=>{if(!hm[h.date])hm[h.date]=[];hm[h.date].push({...h,caseType:"臨時庭期",caseId:null,isWidget:true});});
                        return (hm[ds]||[]).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
                    })();
                    return(
                        <div className="cal-todo-modal" onClick={closeCalTodoModal}>
                            <div className="cal-todo-sheet" onClick={e=>e.stopPropagation()}>
                                {/* Header */}
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                                    <div>
                                        <div style={{fontWeight:800,fontSize:17,color:"var(--text)"}}>{label}</div>
                                        {TW_HOLIDAYS[ds] && <div style={{fontSize:12,color:"var(--red)",marginTop:2}}>🎌 {TW_HOLIDAYS[ds]}</div>}
                                        {SCHOOL_EVENTS[ds] && <div style={{fontSize:12,color:"var(--navy)",marginTop:2}}>📚 {SCHOOL_EVENTS[ds]}</div>}
                                        {(()=>{ // 該日期限與遞狀
                                            const items=[];
                                            cases.forEach(c=>{
                                                if(c.appealDeadline===ds) items.push({t:`⏰ 上訴/抗告末日：${c.clientName}`,c:"var(--seal)",b:true,id:c.id});
                                                if(c.judgmentReceivedDate===ds) items.push({t:`📩 收受判決：${c.clientName}`,c:"var(--seal)",b:false,id:c.id});
                                                (c.filings||[]).forEach(f=>{ if(f.date===ds) items.push({t:`📄 ${f.type}：${c.clientName}${f.summary?`（${f.summary}）`:""}`,c:"var(--navy)",b:false,id:c.id}); });
                                            });
                                            return items.map((it,ii)=>(
                                                <div key={ii} onClick={()=>{openDetail(it.id);closeCalTodoModal();}}
                                                    style={{fontSize:12,color:it.c,marginTop:2,fontWeight:it.b?700:400,cursor:"pointer"}}>{it.t}</div>
                                            ));
                                        })()}
                                    </div>
                                    <button onClick={closeCalTodoModal} style={{background:"var(--bg4)",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",color:"var(--text2)",fontSize:16}}>✕</button>
                                </div>

                                {/* Hearings on this day */}
                                {hearingsForDay.length>0 && <>
                                    <div style={{fontSize:10,color:"var(--text4)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>🏛 當日庭期</div>
                                    {hearingsForDay.map((h,i)=>{
                                        const color=h.isWidget?"#9E2A24":(TYPE_COLOR[h.caseType]||"#8A8377");
                                        const label=h.isWidget?"臨時庭期":h.caseType;
                                        const agency=h.agency||h.note||"";
                                        const detail=[h.time,agency,h.courtroom].filter(Boolean).join(" · ");
                                        const fieldStyle={background:"var(--bg)",border:"1px solid var(--border)",borderRadius:7,padding:"7px 10px",color:"var(--text)",fontSize:12,outline:"none",fontFamily:"inherit"};
                                        if(calEditHearing && calEditHearing.id===h.id) return(
                                            <div key={i} style={{background:"var(--bg3)",border:`1px solid ${color}55`,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
                                                {h.isWidget && <input
                                                    style={{...fieldStyle,width:"100%",marginBottom:6}}
                                                    placeholder="當事人姓名"
                                                    value={calEditHearing.clientName||""}
                                                    onChange={e=>setCalEditHearing(s=>({...s,clientName:e.target.value}))}/>}
                                                <div style={{display:"flex",gap:6,marginBottom:6}}>
                                                    <input type="date" style={{...fieldStyle,flex:1}}
                                                        value={calEditHearing.date||""} onChange={e=>setCalEditHearing(s=>({...s,date:e.target.value}))}/>
                                                    <input type="time" style={{...fieldStyle,width:100}}
                                                        value={calEditHearing.time||""} onChange={e=>setCalEditHearing(s=>({...s,time:e.target.value}))}/>
                                                </div>
                                                <div style={{display:"flex",gap:6,marginBottom:6}}>
                                                    <input placeholder="法院／機關" style={{...fieldStyle,flex:1}}
                                                        value={calEditHearing.agency||""} onChange={e=>setCalEditHearing(s=>({...s,agency:e.target.value}))}/>
                                                    <input placeholder="法庭" style={{...fieldStyle,width:100}}
                                                        value={calEditHearing.courtroom||""} onChange={e=>setCalEditHearing(s=>({...s,courtroom:e.target.value}))}/>
                                                </div>
                                                <input placeholder="庭期備註" style={{...fieldStyle,width:"100%",marginBottom:8}}
                                                    value={calEditHearing.note||""} onChange={e=>setCalEditHearing(s=>({...s,note:e.target.value}))}/>
                                                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                                                    <button className="btn btn-sm" onClick={cancelEditHearing}>取消</button>
                                                    <button className="btn btn-gold btn-sm" onClick={saveEditHearing}>💾 儲存</button>
                                                </div>
                                            </div>
                                        );
                                        return(
                                        <div key={i}
                                            style={{background:"var(--bg3)",border:`1px solid ${color}33`,borderRadius:10,padding:"10px 12px",marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
                                            <span onClick={h.isWidget?undefined:()=>{openDetail(h.caseId);closeCalTodoModal();}}

                                            <div style={{flex:1,cursor:h.isWidget?"default":"pointer"}}
                                                onClick={h.isWidget?undefined:()=>{openDetail(h.caseId);closeCalTodoModal();}}>
                                                <div style={{fontWeight:700,color:"var(--text)",fontSize:13}}>{h.clientName}</div>
                                                <div style={{fontSize:11,color:"var(--text3)"}}>{detail}</div>
                                            </div>
                                            <Badge label={label} color={color}/>
