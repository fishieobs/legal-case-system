<style>
:root{
  --bg:#020a04;--bg2:#071008;--bg3:#0c180e;--bg4:#142018;--bg5:#1c2e20;
  --green:#22c55e;--green2:#16a34a;--green3:#4ade80;
  --gold:#f59e0b;--gold2:#d97706;--gold3:#fbbf24;
  --text:#d4f0d8;--text2:#86b890;--text3:#4a7850;--text4:#2a4830;
  --red:#ef4444;--blue:#38bdf8;--purple:#a78bfa;--orange:#f97316;
  --border:#142018;--border2:#1c2e20;
  --shadow:0 4px 20px rgba(0,0,0,.6);
}
:root.light{
  --bg:#f0f8f0;--bg2:#fff;--bg3:#fff;--bg4:#e8f4e8;--bg5:#dceedd;
  --green:#16a34a;--green2:#15803d;--green3:#22c55e;
  --gold:#b45309;--gold2:#92400e;--gold3:#d97706;
  --text:#0a2010;--text2:#1a4020;--text3:#4a7850;--text4:#86b890;
  --border:#d4e8d4;--border2:#c0d8c0;--shadow:0 2px 10px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;line-height:1.6;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px;}

.sys-nav{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(2,10,4,.96);backdrop-filter:blur(10px);border-bottom:1px solid rgba(34,197,94,.2);display:flex;align-items:center;gap:2px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;}
.sys-nav::-webkit-scrollbar{display:none;}
.sys-nav-item{display:inline-flex;align-items:center;padding:6px 13px;border-radius:7px;font-size:12px;font-weight:700;white-space:nowrap;transition:all .15s;text-decoration:none;border:1px solid transparent;}
.sys-nav-item.active{background:rgba(34,197,94,.15);color:#22c55e;border-color:rgba(34,197,94,.3);cursor:default;}
a.sys-nav-item{color:#4a7850;}
a.sys-nav-item:hover{background:rgba(34,197,94,.08);color:#22c55e;}
.sys-nav-logo{font-size:14px;color:rgba(34,197,94,.45);margin-right:6px;flex-shrink:0;border-right:1px solid rgba(34,197,94,.18);padding-right:10px;}

.app{min-height:100vh;padding-top:41px;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:41px;z-index:200;}
.hdr-title{font-family:'Noto Serif TC',serif;font-size:1.05rem;color:var(--green);}
.hdr-sub{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.hdr-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}

.tab-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:93px;z-index:150;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:10px 16px;border:none;background:transparent;color:var(--text3);font-weight:500;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--green);font-weight:700;border-bottom-color:var(--green);}

.btn{padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn:active{opacity:.8;}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-outline:hover{border-color:var(--green);color:var(--green);}
.btn-ghost{background:transparent;color:var(--text3);border:none;}
.btn-ghost:hover{color:var(--text);background:var(--bg4);}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-sm{padding:6px 11px;font-size:11px;}
.btn-xs{padding:4px 8px;font-size:10px;}

.content{padding:16px 18px;max-width:1000px;margin:0 auto;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow);}
.stat-val{font-size:20px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.stat-lbl{font-size:9px;color:var(--text4);margin-top:4px;letter-spacing:.04em;text-transform:uppercase;}

.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:12px;}
.card-hdr{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--border);}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:11px;color:var(--text4);min-width:100px;}
.info-val{font-size:12px;color:var(--text);text-align:right;font-weight:700;}

.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}

.fi{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border-color .2s;width:100%;}
.fi:focus{border-color:var(--green);}
select.fi{width:auto;}
textarea.fi{resize:vertical;font-size:12px;line-height:1.7;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.form-section{font-size:10px;font-weight:700;color:var(--green);border-left:3px solid var(--green);padding-left:10px;margin:18px 0 10px;letter-spacing:.06em;}

/* deadline cards */
.deadline-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow);}
.deadline-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.deadline-urgent{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.04);}
.deadline-soon{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.03);}
.deadline-ok{border-color:rgba(34,197,94,.25);}

/* progress bar */
.prog-bar{height:8px;background:var(--bg5);border-radius:4px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;border-radius:4px;transition:width .6s;}

/* tax rate table */
.tax-table{width:100%;border-collapse:collapse;font-size:12px;}
.tax-table th{background:var(--bg5);color:var(--text3);padding:8px 12px;text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;}
.tax-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2);}
.tax-table tr.active-bracket td{background:rgba(34,197,94,.08);color:var(--text);font-weight:700;}

/* record cards */
.rec-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;box-shadow:var(--shadow);}

.badge{display:inline-flex;align-items:center;gap:3px;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid transparent;}

.overlay{position:fixed;inset:0;background:#00000099;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.dialog{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;}
.dialog-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
const cfg={apiKey:"AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",authDomain:"legalcasemanageer.firebaseapp.com",projectId:"legalcasemanageer",storageBucket:"legalcasemanageer.firebasestorage.app",messagingSenderId:"559838504556",appId:"1:559838504556:web:ba10c071a12650bbd85a49"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const auth=getAuth(app);

// ══════════════════════════════════════════
// 台灣稅務常數
// ══════════════════════════════════════════
// 綜合所得稅稅率級距（2024）
const TAX_BRACKETS=[
  {min:0,      max:590000,  rate:.05,  deduct:0},
  {min:590000, max:1330000, rate:.12,  deduct:41300},
  {min:1330000,max:2660000, rate:.20,  deduct:147700},
  {min:2660000,max:4980000, rate:.30,  deduct:413700},
  {min:4980000,max:Infinity,rate:.40,  deduct:911700},
];
// 執行業務費用率：律師 30%
const LAWYER_EXPENSE_RATE=0.30;
// 二代健保補充保費率
const SUPP_PREMIUM_RATE=0.0211;
const SUPP_PREMIUM_THRESHOLD=20000;
// 免稅額（2024）
const EXEMPTION=97000;
// 標準扣除額（單身）
const STD_DEDUCTION=131000;
// 特別扣除額（薪資）—執行業務者適用「其他扣除」
const SPECIAL_DEDUCTION=0;

const EXPENSE_CATS=["辦公室租金","律師公會費","電話/網路","辦公設備","書籍資料","交通費","訴訟費用代墊","保險費","水電費","其他費用"];
const INCOME_TYPES=["律師費","顧問費","出庭費","文件費","其他收入"];
const VAT_PERIODS=["1-2月","3-4月","5-6月","7-8月","9-10月","11-12月"];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
function twToday(){return new Date(new Date().getTime()+8*3600000).toISOString().split("T")[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmt(n,dec=0){return n===undefined||n===null?"—":"NT$ "+Math.round(n).toLocaleString("zh-TW");}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function toast(msg){const t=document.getElementById("toast");if(!t)return;t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400);}
function applyTheme(m){const eff=m==="auto"?(new Date().getHours()>=6&&new Date().getHours()<20?"light":"dark"):m;document.documentElement.classList.toggle("light",eff==="light");}

let S={
  user:null,authChecked:false,
  incomes:[],expenses:[],loading:true,
  tab:"dashboard",
  year:new Date().getFullYear(),
  month:new Date().getMonth()+1,
  themeMode:localStorage.getItem("taxTheme")||"dark",
  // forms
  showIncomeForm:false,showExpenseForm:false,
  editIncomeId:null,editExpenseId:null,
  incomeForm:{date:twToday(),type:"律師費",amount:"",client:"",note:"",hasSuppPremium:false},
  expenseForm:{date:twToday(),category:"辦公室租金",amount:"",note:"",receipt:false},
  delConfirm:null,
};

applyTheme(S.themeMode);

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
onAuthStateChanged(auth,u=>{
  S.user=u;S.authChecked=true;
  if(u){
    try{const c=localStorage.getItem("tax_income_cache");if(c)S.incomes=JSON.parse(c);}catch(_){}
    try{const c=localStorage.getItem("tax_expense_cache");if(c)S.expenses=JSON.parse(c);}catch(_){}
    S.loading=false;render();
    onSnapshot(collection(db,"taxIncomes"),snap=>{
      S.incomes=snap.docs.map(d=>({...d.data(),id:d.id}));
      try{localStorage.setItem("tax_income_cache",JSON.stringify(S.incomes));}catch(_){}
      render();
    });
    onSnapshot(collection(db,"taxExpenses"),snap=>{
      S.expenses=snap.docs.map(d=>({...d.data(),id:d.id}));
      try{localStorage.setItem("tax_expense_cache",JSON.stringify(S.expenses));}catch(_){}
      render();
    });
  }else{S.loading=false;render();}
});

async function saveIncome(){
  const f=S.incomeForm;
  if(!f.amount||!f.date){toast("⚠️ 請填寫日期和金額");return;}
  const id=S.editIncomeId||uid();
  const amt=parseFloat(f.amount)||0;
  const supp=amt>=SUPP_PREMIUM_THRESHOLD?Math.round(amt*SUPP_PREMIUM_RATE):0;
  await setDoc(doc(db,"taxIncomes",id),{...f,amount:amt,suppPremium:f.hasSuppPremium?supp:0,id,updatedAt:new Date().toISOString()});
  toast("✅ 收入已記錄");S.showIncomeForm=false;S.editIncomeId=null;
  S.incomeForm={date:twToday(),type:"律師費",amount:"",client:"",note:"",hasSuppPremium:false};render();
}
async function saveExpense(){
  const f=S.expenseForm;
  if(!f.amount||!f.date){toast("⚠️ 請填寫日期和金額");return;}
  const id=S.editExpenseId||uid();
  await setDoc(doc(db,"taxExpenses",id),{...f,amount:parseFloat(f.amount)||0,id,updatedAt:new Date().toISOString()});
  toast("✅ 支出已記錄");S.showExpenseForm=false;S.editExpenseId=null;
  S.expenseForm={date:twToday(),category:"辦公室租金",amount:"",note:"",receipt:false};render();
}
async function delRecord(col,id){
  await deleteDoc(doc(db,col,id));
  toast("🗑 已刪除");S.delConfirm=null;render();
}

// ══════════════════════════════════════════
// 稅務計算函數
// ══════════════════════════════════════════
function getYearIncomes(y){return S.incomes.filter(i=>i.date?.startsWith(y));}
function getYearExpenses(y){return S.expenses.filter(e=>e.date?.startsWith(y));}

function calcIncomeTax(y){
  const incomes=getYearIncomes(y);
  const expenses=getYearExpenses(y);
  const grossIncome=incomes.reduce((s,i)=>s+Number(i.amount||0),0);
  const actualExpense=expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const standardExpense=Math.round(grossIncome*LAWYER_EXPENSE_RATE);
  const useActual=actualExpense>standardExpense;
  const netIncome=grossIncome-(useActual?actualExpense:standardExpense);
  const taxableIncome=Math.max(0,netIncome-EXEMPTION-STD_DEDUCTION);
  let tax=0,bracket=null;
  for(const b of TAX_BRACKETS){
    if(taxableIncome>b.min){
      tax=Math.round(taxableIncome*b.rate-b.deduct);
      bracket=b;
    }
  }
  const suppPremiums=incomes.reduce((s,i)=>s+Number(i.suppPremium||0),0);
  return{grossIncome,actualExpense,standardExpense,useActual,netIncome,taxableIncome,tax:Math.max(0,tax),bracket,suppPremiums};
}

function calcVAT(y,period){
  const [m1,m2]=VAT_PERIODS.indexOf(period)>=0?[VAT_PERIODS.indexOf(period)*2+1,VAT_PERIODS.indexOf(period)*2+2]:[1,2];
  const periodIncomes=S.incomes.filter(i=>{
    if(!i.date?.startsWith(y))return false;
    const m=parseInt(i.date.split("-")[1]);
    return m>=m1&&m<=m2;
  });
  const sales=periodIncomes.reduce((s,i)=>s+Number(i.amount||0),0);
  const vatOutput=Math.round(sales*0.05);
  const periodExpenses=S.expenses.filter(e=>{
    if(!e.date?.startsWith(y))return false;
    const m=parseInt(e.date.split("-")[1]);
    return m>=m1&&m<=m2&&e.receipt;
  });
  const vatInput=Math.round(periodExpenses.reduce((s,e)=>s+Number(e.amount||0),0)*0.05);
  return{sales,vatOutput,vatInput,vatPayable:Math.max(0,vatOutput-vatInput),period,m1,m2};
}

function getMonthSummary(y,m){
  const ms=String(m).padStart(2,"0");
  const incomes=S.incomes.filter(i=>i.date?.startsWith(`${y}-${ms}`));
  const expenses=S.expenses.filter(e=>e.date?.startsWith(`${y}-${ms}`));
  return{
    income:incomes.reduce((s,i)=>s+Number(i.amount||0),0),
    expense:expenses.reduce((s,e)=>s+Number(e.amount||0),0),
    suppPremium:incomes.reduce((s,i)=>s+Number(i.suppPremium||0),0),
    count:incomes.length,
  };
}

// 申報期限計算
function getDeadlines(){
  const now=new Date(new Date().getTime()+8*3600000);
  const y=now.getFullYear();const m=now.getMonth()+1;
  const deadlines=[];
  // 營業稅申報（每雙月25日）
  for(let p=0;p<6;p++){
    const m2=p*2+2;const m1=p*2+1;
    const deadline=new Date(y,m2,25);
    const diff=Math.ceil((deadline-now)/(1000*60*60*24));
    if(diff>-10&&diff<60){
      deadlines.push({
        label:`${m1}、${m2}月營業稅（401）`,
        date:`${y}/${m2}/25`,
        days:diff,type:"vat",
        note:"於雙數月25日前申報上兩個月之營業稅"
      });
    }
  }
  // 綜合所得稅（5月31日）
  const itDeadline=new Date(y,4,31);
  const itDiff=Math.ceil((itDeadline-now)/(1000*60*60*24));
  if(itDiff>-30&&itDiff<365){
    deadlines.push({label:`${y}年綜合所得稅申報`,date:`${y}/5/31`,days:itDiff,type:"income",note:`申報${y-1}年度執行業務所得`});
  }
  // 二代健保年度申報（1月31日）
  const nhDeadline=new Date(y,0,31);
  const nhDiff=Math.ceil((nhDeadline-now)/(1000*60*60*24));
  if(nhDiff>-10){
    deadlines.push({label:`${y}年二代健保年度申報`,date:`${y}/1/31`,days:nhDiff,type:"health",note:"申報單次給付超過2萬元之補充保費"});
  }
  return deadlines.sort((a,b)=>a.days-b.days);
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  if(!root)return;
  applyTheme(S.themeMode);
  if(!S.authChecked){root.innerHTML=`<div class="loading"><div class="spinner"></div><div>連線中…</div></div>`;return;}
  if(!S.user){root.innerHTML=renderLogin();bindLogin();return;}
  if(S.loading){root.innerHTML=`<div class="app"><div class="loading"><div class="spinner"></div><div>載入中…</div></div></div>`;return;}
  root.innerHTML=renderApp();
  bindApp();
}

// ══════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════
function renderLogin(){return`
<div class="login-wrap"><div class="login-box">
  <div style="font-size:48px;text-align:center;margin-bottom:8px">💰</div>
  <div style="font-family:'Noto Serif TC',serif;font-size:1.2rem;color:var(--green);text-align:center;margin-bottom:3px">稅務管理系統</div>
  <div style="font-size:10px;color:var(--text3);text-align:center;letter-spacing:.1em;margin-bottom:24px;text-transform:uppercase">Tax Management</div>
  <div id="lerr" style="display:none" class="login-err"></div>
  <div class="fg" style="margin-bottom:12px"><label class="fl">帳號</label><input class="fi" id="lem" type="email" placeholder="office@yourfirm.com" autocomplete="email"></div>
  <div class="fg" style="margin-bottom:22px"><label class="fl">密碼</label>
    <div style="position:relative"><input class="fi" id="lpw" type="password" placeholder="••••••••" style="padding-right:40px">
    <button id="spw" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px">👁</button></div>
  </div>
  <button id="lbtn" class="btn btn-green" style="width:100%;justify-content:center;font-size:14px;padding:12px">🔐 登入</button>
</div></div>`;}
function bindLogin(){
  const go=async()=>{
    const em=document.getElementById("lem")?.value.trim();
    const pw=document.getElementById("lpw")?.value;
    const err=document.getElementById("lerr");
    if(!em||!pw){if(err){err.style.display="block";err.textContent="請輸入帳號密碼";}return;}
    document.getElementById("lbtn").textContent="登入中…";
    try{await signInWithEmailAndPassword(auth,em,pw);}
    catch(e){if(err){err.style.display="block";err.textContent={"auth/invalid-credential":"帳號或密碼錯誤","auth/too-many-requests":"嘗試次數過多","auth/user-disabled":"此帳號已停用","auth/unauthorized-domain":"此網域未獲 Firebase 授權","auth/network-request-failed":"網路連線問題，請確認網路後再試"}[e.code]||("登入失敗（"+e.code+"）");}document.getElementById("lbtn").textContent="🔐 登入";}
  };
  document.getElementById("lbtn")?.addEventListener("click",go);
  document.getElementById("lpw")?.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  document.getElementById("spw")?.addEventListener("click",()=>{const i=document.getElementById("lpw");i.type=i.type==="password"?"text":"password";});
}

// ══════════════════════════════════════════
// APP
// ══════════════════════════════════════════
function renderApp(){
  const thIcon=S.themeMode==="dark"?"🌙":S.themeMode==="light"?"☀️":"🕐";
  const tabs=[["dashboard","🏠 總覽"],["income","💵 收入"],["expense","📤 支出"],["vat","🧾 營業稅"],["incometax","📊 所得稅"],["health","🏥 二代健保"],["deadlines","⏰ 申報期限"]];
  return`
<div class="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:10px">

      <div><div class="hdr-title">稅務管理系統</div><div class="hdr-sub">Tax Management · ${S.year}</div></div>
    </div>
    <div class="hdr-actions">

      <button class="btn btn-ghost" style="padding:7px 10px" id="btn-logout">🚪</button>
    </div>
  </div>
  <div class="tab-bar">${tabs.map(([k,l])=>`<button class="tab${S.tab===k?" active":""}" data-tab="${k}">${l}</button>`).join("")}</div>
  <div class="content">
    ${S.tab==="dashboard"?renderDashboard():""}
    ${S.tab==="income"?renderIncome():""}
    ${S.tab==="expense"?renderExpense():""}
    ${S.tab==="vat"?renderVAT():""}
    ${S.tab==="incometax"?renderIncomeTax():""}
    ${S.tab==="health"?renderHealth():""}
    ${S.tab==="deadlines"?renderDeadlines():""}
  </div>
  <div class="bnav">
    ${[["dashboard","🏠","總覽"],["income","💵","收入"],["expense","📤","支出"],["vat","🧾","稅務"],["deadlines","⏰","期限"]]
      .map(([k,ico,l])=>`<button class="bnav-btn${S.tab===k?" active":""}" data-tab="${k}"><span class="bnav-icon">${ico}</span>${l}</button>`).join("")}
  </div>
  ${S.showIncomeForm?renderIncomeForm():""}
  ${S.showExpenseForm?renderExpenseForm():""}
  ${S.delConfirm?renderDelDialog():""}
</div>`;}

// ── Dashboard ──
function renderDashboard(){
  const y=String(S.year);
  const tax=calcIncomeTax(y);
  const months=[...Array(12)].map((_,i)=>getMonthSummary(y,i+1));
  const totalIncome=months.reduce((s,m)=>s+m.income,0);
  const totalExpense=months.reduce((s,m)=>s+m.expense,0);
  const totalSupp=months.reduce((s,m)=>s+m.suppPremium,0);
  const deadlines=getDeadlines();
  const urgent=deadlines.filter(d=>d.days<=14);

  return`
  <div class="stat-grid">
    ${[
      [totalIncome,"全年收入","var(--green)"],
      [totalExpense,"全年支出","var(--orange)"],
      [tax.taxableIncome,"應稅所得","var(--gold)"],
      [tax.tax,"預估綜合所得稅","var(--red)"],
      [totalSupp,"二代健保補充保費","var(--blue)"],
    ].map(([v,l,c])=>`<div class="stat-card"><div class="stat-val" style="color:${c}">${v?fmt(v):"NT$ 0"}</div><div class="stat-lbl">${l}</div></div>`).join("")}
    <div class="stat-card"><div class="stat-val" style="color:var(--purple)">${S.incomes.filter(i=>i.date?.startsWith(y)).length}筆</div><div class="stat-lbl">收入筆數</div></div>
  </div>

  ${urgent.length?`<div class="card" style="border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.04);margin-bottom:12px">
    <div class="card-hdr" style="color:var(--red)">⚠️ 即將到期申報</div>
    ${urgent.map(d=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(239,68,68,.1)">
      <div><div style="font-size:13px;font-weight:700;color:var(--text)">${d.label}</div><div style="font-size:11px;color:var(--text3)">${d.date}</div></div>
      <div style="font-size:12px;font-weight:700;color:${d.days<=0?"var(--red)":"var(--orange)"};">${d.days<=0?"已逾期":d.days+"天後"}</div>
    </div>`).join("")}
  </div>`:""}

  <div class="detail-grid">
    <div class="card">
      <div class="card-hdr">📅 月度收入</div>
      ${months.map((m,i)=>{
        const max=Math.max(...months.map(x=>x.income),1);
        const pct=Math.round(m.income/max*100);
        return`<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
            <span style="color:var(--text3)">${i+1}月</span>
            <span style="color:${m.income>0?"var(--green)":"var(--text4)"};">${m.income?fmt(m.income):"—"}</span>
          </div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:var(--green);"></div></div>
        </div>`;
      }).join("")}
    </div>
    <div class="card">

    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">應扣補充保費：<strong style="color:var(--blue)">${fmt(supp)}</strong>（${(SUPP_PREMIUM_RATE*100)}%）</div>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--text2)">
      <input type="checkbox" id="if-supp" ${f.hasSuppPremium?"checked":""}>
      委託人已代扣補充保費，記錄此筆
    </label>
  </div>`:`<div style="font-size:11px;color:var(--text4);margin-bottom:12px">金額未達2萬元，無需扣繳二代健保補充保費</div>`}
  <div style="display:flex;gap:10px;justify-content:flex-end">
    <button class="btn btn-outline btn-sm" id="if-cancel">取消</button>
    <button class="btn btn-green btn-sm" id="if-save">💾 儲存</button>
  </div>
</div></div>`;}

// ── Expense Form ──
function renderExpenseForm(){
  const f=S.expenseForm;
  return`<div class="overlay"><div class="dialog">
  <div class="dialog-title">📤 ${S.editExpenseId?"編輯支出":"新增支出"}</div>
  <div class="form-grid">
    <div class="fg"><label class="fl">日期</label><input class="fi" type="date" id="ef-date" value="${f.date}"></div>
    <div class="fg"><label class="fl">類別</label><select class="fi fi-full" id="ef-cat">${EXPENSE_CATS.map(c=>`<option${f.category===c?" selected":""}>${c}</option>`).join("")}</select></div>
    <div class="fg"><label class="fl">金額（元）</label><input class="fi" type="number" min="0" id="ef-amount" value="${f.amount}" placeholder="0"></div>
  </div>
  <div class="fg" style="margin-bottom:12px"><label class="fl">備註</label><input class="fi" id="ef-note" value="${esc(f.note||"")}" placeholder="供應商、說明…"></div>
  <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--text2);margin-bottom:16px">
    <input type="checkbox" id="ef-receipt" ${f.receipt?"checked":""}>
    此筆有統一發票（可作為營業稅進項憑證）
  </label>
  <div style="display:flex;gap:10px;justify-content:flex-end">
    <button class="btn btn-outline btn-sm" id="ef-cancel">取消</button>
    <button class="btn btn-green btn-sm" id="ef-save">💾 儲存</button>
  </div>
</div></div>`;}

function renderDelDialog(){return`<div class="overlay"><div class="dialog">
  <div class="dialog-title">確認刪除此記錄？</div>
  <div style="color:var(--text3);margin-bottom:20px;font-size:13px">此操作無法復原。</div>
  <div style="display:flex;gap:10px;justify-content:flex-end">
    <button class="btn btn-outline btn-sm" id="dc">取消</button>
    <button class="btn btn-sm" style="background:var(--red);color:#fff" id="dd">確認刪除</button>
  </div>
</div></div>`;}

// ══════════════════════════════════════════
// BIND
// ══════════════════════════════════════════
function bindApp(){
  document.getElementById("btn-theme")?.addEventListener("click",()=>{S.themeMode=S.themeMode==="dark"?"light":S.themeMode==="light"?"auto":"dark";localStorage.setItem("taxTheme",S.themeMode);applyTheme(S.themeMode);render();});
  document.getElementById("btn-logout")?.addEventListener("click",async()=>{if(confirm("確認登出？"))await signOut(auth);});
  document.getElementById("sel-year")?.addEventListener("change",e=>{S.year=parseInt(e.target.value);render();});
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.tab;render();}));
  document.getElementById("btn-add-income")?.addEventListener("click",()=>{S.incomeForm={date:twToday(),type:"律師費",amount:"",client:"",note:"",hasSuppPremium:false};S.editIncomeId=null;S.showIncomeForm=true;render();});
  document.getElementById("btn-add-expense")?.addEventListener("click",()=>{S.expenseForm={date:twToday(),category:"辦公室租金",amount:"",note:"",receipt:false};S.editExpenseId=null;S.showExpenseForm=true;render();});

  // Income form
  const ifAmt=document.getElementById("if-amount");
  ifAmt?.addEventListener("input",e=>{S.incomeForm.amount=e.target.value;render();});
  document.getElementById("if-supp")?.addEventListener("change",e=>{S.incomeForm.hasSuppPremium=e.target.checked;});
  document.getElementById("if-cancel")?.addEventListener("click",()=>{S.showIncomeForm=false;S.editIncomeId=null;render();});
  document.getElementById("if-save")?.addEventListener("click",()=>{
    S.incomeForm.date=document.getElementById("if-date")?.value||S.incomeForm.date;
    S.incomeForm.type=document.getElementById("if-type")?.value||S.incomeForm.type;
    S.incomeForm.amount=document.getElementById("if-amount")?.value||S.incomeForm.amount;
    S.incomeForm.client=document.getElementById("if-client")?.value||"";
    S.incomeForm.note=document.getElementById("if-note")?.value||"";
    S.incomeForm.hasSuppPremium=document.getElementById("if-supp")?.checked||false;
    saveIncome();
  });

  // Expense form
  document.getElementById("ef-cancel")?.addEventListener("click",()=>{S.showExpenseForm=false;S.editExpenseId=null;render();});
  document.getElementById("ef-save")?.addEventListener("click",()=>{
    S.expenseForm.date=document.getElementById("ef-date")?.value||S.expenseForm.date;
    S.expenseForm.category=document.getElementById("ef-cat")?.value||S.expenseForm.category;
    S.expenseForm.amount=document.getElementById("ef-amount")?.value||S.expenseForm.amount;
    S.expenseForm.note=document.getElementById("ef-note")?.value||"";
    S.expenseForm.receipt=document.getElementById("ef-receipt")?.checked||false;
    saveExpense();
  });

  // Edit income
  document.querySelectorAll("[data-edit-income]").forEach(b=>b.addEventListener("click",()=>{
    const inc=S.incomes.find(i=>i.id===b.dataset.editIncome);
    if(inc){S.incomeForm={...inc,amount:String(inc.amount)};S.editIncomeId=inc.id;S.showIncomeForm=true;render();}
  }));
  // Edit expense
  document.querySelectorAll("[data-edit-expense]").forEach(b=>b.addEventListener("click",()=>{
    const exp=S.expenses.find(e=>e.id===b.dataset.editExpense);
    if(exp){S.expenseForm={...exp,amount:String(exp.amount)};S.editExpenseId=exp.id;S.showExpenseForm=true;render();}
  }));
  // Delete
  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{S.delConfirm=b.dataset.del;render();}));
  document.getElementById("dc")?.addEventListener("click",()=>{S.delConfirm=null;render();});
  document.getElementById("dd")?.addEventListener("click",()=>{
    const[col,id]=S.delConfirm.split("|");delRecord(col,id);
  });
}

render();
</script>
</body>
</html>
