<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="判決書管理">
<meta name="theme-color" content="#FAF7F0">
<title>⚖ 判決書管理系統</title>
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-judgments.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-judgments.png">
<link rel="manifest" href="manifest-judgments.json">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* ── legal-design-tw 權杖 ── */
  --paper:#FAF7F0;--paper-raised:#FFFFFF;--paper-sunken:#F1ECE1;
  --ink:#211E1A;--ink-soft:#5B554D;--ink-faint:#8A8377;
  --seal:#9E2A24;--seal-bright:#C0392B;--seal-wash:#F3E3DF;
  --positive:#3A6B4F;--negative:#9E2A24;--warning:#A6741C;--navy:#2A3D4F;
  --positive-wash:#E7EFE9;--warning-wash:#F3EBDA;
  --rule:#DDD5C7;--rule-strong:#C4BAA6;
  --font-kai:"BiauKai","DFKai-SB","標楷體","KaiTi","STKaiti","Kaiti TC","Noto Serif TC",serif;
  --font-song:"Noto Serif TC","Source Han Serif TC","PMingLiU","新細明體","Songti TC",serif;
  --shadow-raised:0 2px 10px rgba(33,30,26,.10);
  /* ── 舊變數別名 → 權杖（既有 inline var(--…) 自動換色）── */
  --bg:var(--paper);--bg2:var(--paper-raised);--bg3:var(--paper-raised);--bg4:var(--paper-sunken);--bg5:var(--paper-sunken);
  --gold:var(--seal);--gold2:var(--seal);--gold3:var(--seal-bright);
  --text:var(--ink);--text2:var(--ink-soft);--text3:var(--ink-soft);--text4:var(--ink-faint);
  --green:var(--positive);--red:var(--negative);--yellow:var(--warning);--purple:var(--seal);
  --blue:var(--navy);--orange:var(--warning);--teal:var(--navy);
  --border:var(--rule);--border2:var(--rule-strong);
  --civil:#2A3D4F;--criminal:#9E2A24;--admin:#A6741C;
  --family:#99604F;--labor:#3A6B4F;--ip:#3E6B6B;--other:#8A8377;
  --shadow:none;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--paper);color:var(--ink);font-family:var(--font-song);line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--paper);}
::-webkit-scrollbar-thumb{background:var(--rule-strong);border-radius:2px;}

/* ── LAYOUT ── */
.app{min-height:100vh;padding-top:41px;}
.hdr{background:var(--paper-raised);border-bottom:2px solid var(--seal);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:41px;z-index:200;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-title{font-family:var(--font-kai);font-size:1.05rem;font-weight:700;letter-spacing:.04em;color:var(--ink);}
.hdr-sub{font-size:9px;color:var(--ink-faint);letter-spacing:.12em;text-transform:uppercase;}
.hdr-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}

/* ── TABS ── */
.tab-bar{background:var(--paper-raised);border-bottom:1px solid var(--rule);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:93px;z-index:150;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:10px 18px;border:none;background:transparent;color:var(--ink-soft);font-weight:500;font-size:13px;cursor:pointer;font-family:var(--font-kai);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--seal);font-weight:700;border-bottom-color:var(--seal);}

/* ── BUTTONS ── */
.btn{padding:8px 15px;border-radius:3px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:var(--font-kai);transition:all .15s;white-space:nowrap;}
.btn:active{opacity:.85;transform:translateY(1px);}
.btn-gold{background:var(--seal);color:#fff;}
.btn-gold:hover{background:var(--seal-bright);}
.btn-outline{background:transparent;border:1px solid var(--rule-strong);color:var(--ink-soft);}
.btn-outline:hover{border-color:var(--seal);color:var(--seal);}
.btn-ghost{background:transparent;color:var(--ink-soft);border:none;}
.btn-ghost:hover{color:var(--ink);background:var(--paper-sunken);}
.btn-danger{background:var(--seal-wash);color:var(--seal);border:1px solid var(--seal);}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-xs{padding:4px 8px;font-size:10px;}

/* ── CONTENT ── */
.content{padding:18px 20px;max-width:1100px;margin:0 auto;}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px;}
.stat-card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:4px;padding:12px 16px;}
.stat-val{font-family:var(--font-kai);font-size:22px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.stat-lbl{font-size:9px;color:var(--ink-faint);margin-top:4px;letter-spacing:.05em;text-transform:uppercase;}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.search-wrap{flex:1;min-width:200px;position:relative;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:13px;pointer-events:none;}
.fi{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:8px 11px;color:var(--ink);font-size:12px;outline:none;font-family:var(--font-song);transition:border-color .2s,box-shadow .2s;width:100%;}
.fi:focus{border-color:var(--seal);box-shadow:0 0 0 3px var(--seal-wash);}
.fi-search{padding-left:34px;}
select.fi{width:auto;}
textarea.fi{resize:vertical;font-size:13px;line-height:1.7;}

/* ── JUDGMENT CARDS ── */
.jcard{background:var(--paper-raised);border:1px solid var(--rule);border-radius:4px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,background .2s;}
.jcard:hover{border-color:var(--seal);background:var(--paper-sunken);}
.jcard:active{opacity:.9;}
.jcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.jcard-title{font-family:var(--font-kai);font-size:14px;font-weight:700;color:var(--ink);line-height:1.4;}
.jcard-meta{font-size:11px;color:var(--ink-faint);margin-top:3px;}
.jcard-badges{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.jcard-row{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--ink-soft);margin-top:6px;}
.jcard-result{font-size:12px;font-weight:700;margin-top:8px;padding:6px 10px;border-radius:3px;border-left:4px solid;}
.jcard-result.win{background:var(--positive-wash);border-color:var(--positive);color:var(--positive);}
.jcard-result.lose{background:var(--seal-wash);border-color:var(--negative);color:var(--negative);}
.jcard-result.partial{background:var(--warning-wash);border-color:var(--warning);color:var(--warning);}
.jcard-result.neutral{background:var(--paper-sunken);border-color:var(--ink-faint);color:var(--ink-soft);}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:3px;border-radius:2px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid transparent;font-family:var(--font-kai);}

/* ── DETAIL ── */
.detail-hdr{background:var(--paper-raised);padding:14px 20px;border-bottom:2px solid var(--seal);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:41px;z-index:200;}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:4px;padding:16px 18px;}
.card-title{font-family:var(--font-kai);font-size:9px;font-weight:700;color:var(--ink-soft);letter-spacing:.1em;text-transform:uppercase;padding-bottom:10px;margin-bottom:12px;border-bottom:1px solid var(--rule);}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;gap:10px;border-bottom:1px solid var(--rule);}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:11px;color:var(--ink-faint);white-space:nowrap;min-width:90px;}
.info-val{font-size:12px;color:var(--ink);text-align:right;word-break:break-all;line-height:1.5;}

/* ── FORM ── */
.form-section{font-family:var(--font-kai);font-size:10px;font-weight:700;color:var(--seal);border-left:4px solid var(--seal);padding-left:10px;margin:20px 0 12px;letter-spacing:.06em;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:4px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:9px;color:var(--ink-soft);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}

/* ── QUICK TAGS ── */
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.chip{padding:4px 10px;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--rule);background:var(--paper-sunken);color:var(--ink-soft);transition:all .15s;}
.chip:hover{border-color:var(--seal);color:var(--seal);}
.chip.on{background:var(--seal-wash);border-color:var(--seal);color:var(--seal);}

/* ── KEY POINTS ── */
.kp-item{background:var(--paper-sunken);border:1px solid var(--rule);border-radius:3px;padding:10px 14px;margin-bottom:8px;font-size:13px;color:var(--ink-soft);line-height:1.7;position:relative;}
.kp-del{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:2px;}
.kp-del:hover{color:var(--seal);background:var(--seal-wash);}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:24px;}
.timeline::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--seal);}
.tl-item{position:relative;margin-bottom:16px;}
.tl-dot{position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid var(--seal);background:var(--paper-raised);}
.tl-date{font-family:var(--font-kai);font-size:10px;color:var(--seal);font-weight:700;letter-spacing:.05em;}
.tl-text{font-size:12px;color:var(--ink-soft);margin-top:2px;line-height:1.6;}

/* ── AI PANEL ── */
.ai-panel{background:var(--paper-raised);border:1px solid var(--rule);border-left:4px solid var(--seal);border-radius:4px;padding:16px 18px;margin-bottom:16px;}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--ink-soft);font-size:13px;}
.ai-spinner{width:18px;height:18px;border:2px solid var(--rule);border-top-color:var(--seal);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
.ai-result{font-size:13px;color:var(--ink-soft);line-height:1.8;white-space:pre-wrap;font-family:var(--font-song);}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(33,30,26,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.dialog{background:var(--paper-raised);border:1px solid var(--rule);border-radius:4px;padding:26px;max-width:400px;width:100%;box-shadow:var(--shadow-raised);}

/* ── EMPTY / LOADING / LOGIN ── */
.empty{text-align:center;padding:60px 20px;color:var(--ink-faint);}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.35;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--ink-soft);}
.spinner{width:36px;height:36px;border:3px solid var(--paper-sunken);border-top-color:var(--seal);border-radius:50%;animation:spin .8s linear infinite;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--paper-raised);border:1px solid var(--rule);border-top:3px solid var(--seal);border-radius:4px;padding:40px 36px;width:100%;max-width:380px;box-shadow:var(--shadow-raised);}
.login-err{background:var(--seal-wash);border:1px solid var(--seal);color:var(--seal);border-radius:3px;padding:10px 14px;font-size:13px;margin-bottom:14px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);border:1px solid var(--seal);color:var(--paper);padding:10px 22px;border-radius:3px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-raised);}
#toast.show{opacity:1;}

/* ── BOTTOM NAV ── */
.bnav{display:none;}
@media(max-width:640px){
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:200;}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;font-size:9px;color:var(--text3);cursor:pointer;gap:2px;border:none;background:transparent;font-family:inherit;}
  .bnav-btn.active{color:var(--gold);}
  .bnav-icon{font-size:19px;}
  .app{padding-bottom:72px;}
  .content{padding:12px 14px;}
  .tab-bar{top:93px;}
  .form-grid{grid-template-columns:1fr;}
}
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ios-no-autozoom */@media(max-width:768px){input,select,textarea{font-size:16px!important}}
</style>
</head>
<body>
<script src="shared/sys-nav.js" data-active="judgments"></script>
<div id="root"></div>
<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc,query,orderBy}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
const cfg={apiKey:"AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",authDomain:"legalcasemanageer.firebaseapp.com",projectId:"legalcasemanageer",storageBucket:"legalcasemanageer.firebasestorage.app",messagingSenderId:"559838504556",appId:"1:559838504556:web:ba10c071a12650bbd85a49"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const auth=getAuth(app);

// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const CASE_TYPES=[
  {key:"civil",    label:"民事", color:"#2A3D4F"},
  {key:"criminal", label:"刑事", color:"#9E2A24"},
  {key:"admin",    label:"行政", color:"#A6741C"},
  {key:"family",   label:"家事", color:"#99604F"},
  {key:"labor",    label:"勞動", color:"#3A6B4F"},
  {key:"ip",       label:"智財", color:"#3E6B6B"},
  {key:"other",    label:"其他", color:"#8A8377"},
];
const RESULTS=[
  {key:"win",     label:"勝訴",   color:"#3A6B4F"},
  {key:"partial", label:"部分勝訴",color:"#A6741C"},
  {key:"lose",    label:"敗訴",   color:"#9E2A24"},
  {key:"settle",  label:"和解",   color:"#2A3D4F"},
  {key:"withdraw",label:"撤訴",   color:"#8A8377"},
  {key:"pending", label:"審理中", color:"#3E6B6B"},
];
const COURTS=["臺灣臺北地方法院","臺灣新北地方法院","臺灣桃園地方法院","臺灣臺中地方法院","臺灣臺南地方法院","臺灣高雄地方法院","臺灣高等法院","最高法院","最高行政法院","臺北高等行政法院","其他"];
const INSTANCE_MAP={"地院":"第一審","高院":"第二審","最高":"第三審"};
const CTMAP=Object.fromEntries(CASE_TYPES.map(t=>[t.key,t]));
const RMAP=Object.fromEntries(RESULTS.map(r=>[r.key,r]));

// 司法院裁判書網址「id」參數的法院代碼對照（取前三碼判斷法院）
const COURT_CODES={
  TPS:"最高法院", TPH:"臺灣高等法院", TCH:"臺灣高等法院臺中分院", TNH:"臺灣高等法院臺南分院",
  KSH:"臺灣高等法院高雄分院", HLH:"臺灣高等法院花蓮分院", KMH:"福建高等法院金門分院",
  TPD:"臺灣臺北地方法院", SLD:"臺灣士林地方法院", PCD:"臺灣新北地方法院", ILD:"臺灣宜蘭地方法院",
  KLD:"臺灣基隆地方法院", TYD:"臺灣桃園地方法院", SCD:"臺灣新竹地方法院", MLD:"臺灣苗栗地方法院",
  TCD:"臺灣臺中地方法院", NTD:"臺灣南投地方法院", CHD:"臺灣彰化地方法院", ULD:"臺灣雲林地方法院",
  CYD:"臺灣嘉義地方法院", TND:"臺灣臺南地方法院", KSD:"臺灣高雄地方法院", HLD:"臺灣花蓮地方法院",
  TTD:"臺灣臺東地方法院", PTD:"臺灣屏東地方法院", PHD:"臺灣澎湖地方法院", KMD:"福建金門地方法院",
  LCD:"福建連江地方法院", KSY:"臺灣高雄少年及家事法院", IPC:"智慧財產及商業法院",
  TPA:"最高行政法院", TPB:"臺北高等行政法院", TCB:"臺中高等行政法院", KSB:"高雄高等行政法院",
};
// 依代碼第四碼（案件類別）推斷案件類型
const CAT_TYPE={V:"civil", M:"criminal", A:"admin"};

function inferInstance(court){
  if(/最高行政/.test(court))return"最高行政";
  if(/高等行政/.test(court))return"行政高院";
  if(/最高法院/.test(court))return"最高";
  if(/高等法院/.test(court))return"高院";
  return"地院";
}
function inferCaseType(cat,zi){
  if(/家|婚|親|收養|監護|扶養|繼承/.test(zi))return"family";
  if(/勞/.test(zi))return"labor";
  if(CAT_TYPE[cat])return CAT_TYPE[cat];
  return"";
}

// 解析司法院裁判書網址，回傳可自動填入的欄位（純前端，不需連線）
function parseJudgmentUrl(raw){
  raw=(raw||"").trim();
  if(!raw)return null;
  let idv="";
  try{const u=new URL(raw);idv=u.searchParams.get("id")||"";}catch(_){}
  if(!idv){const m=raw.match(/[?&]id=([^&#]+)/);if(m){try{idv=decodeURIComponent(m[1]);}catch(_){idv=m[1];}}}
  if(!idv){
    // 亦支援直接貼上 id 內容（含逗號）
    if(raw.includes(","))idv=raw; else return null;
  }
  const parts=idv.split(",").map(s=>s.trim()).filter(Boolean);
  if(parts.length<4)return null;
  const code=parts[0], year=parts[1], zi=parts[2], num=parts[3], date=parts[4]||"";
  if(!/^\d+$/.test(year)||!/^\d+$/.test(num))return null;
  const base=code.slice(0,3).toUpperCase();
  const court=COURT_CODES[base]||"";
  const out={};
  if(court)out.court=court;
  out.caseNo=`${year}年度${zi}字第${num}號`;
  if(date&&/^\d{8}$/.test(date))out.judgmentDate=`${date.slice(0,4)}-${date.slice(4,6)}-${date.slice(6,8)}`;
  if(court)out.instance=inferInstance(court);
  const ct=inferCaseType((code[3]||"").toUpperCase(),zi);
  if(ct)out.caseType=ct;
  return out;
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const today=()=>{const d=new Date(new Date().getTime()+8*3600000);return d.toISOString().split("T")[0];};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

let S={
  user:null, authChecked:false,
  judgments:[], loading:true,
  view:"list",   // list|detail|form
  tab:"list",    // list|stats|search
  selectedId:null,
  editId:null,
  search:"", filterType:"全部", filterResult:"全部", filterYear:"全部",
  form:emptyForm(),
  newKp:"",
  newImportUrl:"",
  newLink:{label:"",url:""},
  newTag:"",

function filtered(){
  let list=[...S.judgments];
  if(S.filterType!=="全部")list=list.filter(j=>j.caseType===S.filterType);
  if(S.filterResult!=="全部")list=list.filter(j=>j.result===S.filterResult);
  if(S.filterYear!=="全部")list=list.filter(j=>j.judgmentDate?.startsWith(S.filterYear));
  if(S.search.trim()){
    const q=S.search.toLowerCase();
    list=list.filter(j=>[j.title,j.caseNo,j.court,j.judge,j.parties?.plaintiff,j.parties?.defendant,j.resultNote,j.notes,...(j.keyPoints||[]),...(j.tags||[])].some(x=>(x||"").toLowerCase().includes(q)));
  }
  return list.sort((a,b)=>(b.judgmentDate||"").localeCompare(a.judgmentDate||""));
}

}

async function callClaude(prompt, maxTokens=2000){
  const apiKey=getClaudeApiKey();
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
      "content-type":"application/json"
    },
    body:JSON.stringify({
      model:"claude-opus-4-8",
      max_tokens:maxTokens,
      messages:[{role:"user",content:prompt}]
    })
  });
  if(!res.ok){
    let err={};try{err=await res.json();}catch(_){}
    const msg=err?.error?.message||"";
    if(res.status===401)throw new Error("API Key 無效，請至 Anthropic Console 確認");
    if(res.status===403)throw new Error("API Key 權限不足或帳號未啟用");
    if(res.status===429)throw new Error("超過使用限制，請稍後再試");
    if(res.status>=500)throw new Error("Claude 伺服器暫時無法回應，請稍後再試");
    throw new Error(msg||`HTTP ${res.status}`);
  }
  const data=await res.json();
  return data.content?.[0]?.text||"（無回應）";
}

  S.aiLoading=true; S.aiResult=""; render();
  const ct=CTMAP[judgment.caseType]||CTMAP.other;

  const caseInfo=`案件名稱：${judgment.title}

  let prompt="";
  if(S.aiMode==="analyze"){
    prompt=`你是一位台灣資深法律顧問，精通民事、刑事、行政、家事、勞動及智財訴訟。

---
【案件資料】
${caseInfo}`;
  } else if(S.aiMode==="compare"){
    const similar=S.judgments.filter(j=>j.id!==judgment.id&&j.caseType===judgment.caseType).slice(0,8);
    const simText=similar.length===0
      ?"（資料庫中目前無其他同類型案件可供比對）"
      :similar.map((j,i)=>{
        const r=RMAP[j.result]||RMAP.pending;
        return`${i+1}. ${j.title}｜${r.label}｜${j.court||""}｜${j.judgmentDate||""}
   爭點：${(j.keyPoints||[]).slice(0,2).join("；")||"無"}`;
      }).join("\n");
    prompt=`你是一位台灣資深法律顧問。請就「目前案件」與資料庫中同類型（${ct.label}）案件進行比較分析，以繁體中文回覆：

---
【目前分析案件】
${caseInfo}

---
【資料庫同類型案件（共${similar.length}件）】
${simText}`;
  } else {
    prompt=`你是一位台灣資深訴訟律師。請就以下${ct.label}案件（本方為${judgment.parties?.clientRole||"原告"}，結果：${rr.label}），提供具體訴訟策略建議，以繁體中文回覆：

## 一、關鍵證據清單

---
【案件資料】

  try{

  document.getElementById("btn-edit-ai-key")?.addEventListener("click",()=>{S.aiKeyEditing=true;render();});
  document.getElementById("btn-cancel-ai-key")?.addEventListener("click",()=>{S.aiKeyEditing=false;render();});
}

    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px">
      <div class="fg" style="flex:1 1 150px"><label class="fl">文件名稱</label><input class="fi" id="nl-label" value="${esc(S.newLink.label)}" placeholder="例：一審判決書"></div>
      <div class="fg" style="flex:2 1 200px"><label class="fl">連結網址</label><input class="fi" type="url" id="nl-url" value="${esc(S.newLink.url)}" placeholder="https://…"></div>
      <button class="btn btn-gold btn-sm" id="add-link">＋</button>
    </div>

    <!-- 標籤 -->
    <div class="form-section">🏷 標籤</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
      ${(f.tags||[]).map(t=>`<span style="background:var(--bg5);color:var(--text2);border-radius:20px;padding:3px 10px;font-size:11px;display:flex;align-items:center;gap:5px;border:1px solid var(--border2)">${esc(t)}<span data-del-tag="${esc(t)}" style="cursor:pointer;color:var(--text4)">✕</span></span>`).join("")}
      <input class="fi" id="tag-inp" style="width:140px;padding:4px 10px;font-size:12px" placeholder="新增標籤後按 Enter" value="${esc(S.newTag)}">
    </div>

    <!-- 備註 -->
    <div class="form-section">📝 備註</div>
    <textarea class="fi" id="ff-notes" style="width:100%;min-height:100px" placeholder="案件背景、心得、注意事項…">${esc(f.notes||"")}</textarea>
    <div style="height:24px"></div>
  </div>
</div>`;}

function bindForm(){
  const collect=()=>{
    sfv("title",document.getElementById("ff-title")?.value||"");
    sfv("caseType",document.getElementById("ff-type")?.value||"civil");
    sfv("caseNo",document.getElementById("ff-caseno")?.value||"");
    sfv("court",document.getElementById("ff-court")?.value||"");
    sfv("judge",document.getElementById("ff-judge")?.value||"");
    sfv("judgmentDate",document.getElementById("ff-date")?.value||"");
    sfv("instance",document.getElementById("ff-inst")?.value||"地院");
    sfv("result",document.getElementById("ff-result")?.value||"pending");
    sfv("resultNote",document.getElementById("ff-resultnote")?.value||"");
    sfp("plaintiff",document.getElementById("ff-plaintiff")?.value||"");
    sfp("defendant",document.getElementById("ff-defendant")?.value||"");
    sfp("clientRole",document.getElementById("ff-role")?.value||"原告");
    sfv("notes",document.getElementById("ff-notes")?.value||"");
  };
  document.getElementById("f-back")?.addEventListener("click",()=>{collect();S.view=S.editId?"detail":"list";render();});
  document.getElementById("f-save")?.addEventListener("click",()=>{collect();saveJudgment();});

  // 快速匯入：解析司法院裁判書網址
  const doImport=()=>{
    collect();
    const raw=document.getElementById("imp-url")?.value.trim()||"";
    if(!raw){toast("請先貼上判決書網址");return;}
    const p=parseJudgmentUrl(raw);
    if(!p){toast("⚠️ 無法解析此網址，請確認為司法院裁判書連結");S.newImportUrl=raw;render();return;}
    // 僅覆蓋解析出的欄位，保留其他已填內容
    const filled=[];
    if(p.court){sfv("court",p.court);filled.push("法院");}
    if(p.caseNo){sfv("caseNo",p.caseNo);filled.push("案號");}
    if(p.judgmentDate){sfv("judgmentDate",p.judgmentDate);filled.push("判決日期");}
    if(p.instance){sfv("instance",p.instance);filled.push("審級");}
    if(p.caseType){sfv("caseType",p.caseType);filled.push("案件類型");}
    // 自動加入判決書連結（避免重複）
    if(/^https?:\/\//i.test(raw)&&!(S.form.links||[]).some(l=>l.url===raw)){
      S.form.links=[...(S.form.links||[]),{label:"判決書原文",url:raw,id:uid()}];
    }
    S.newImportUrl="";
    render();
    toast(`✓ 已帶入：${filled.join("、")}`);
  };
  document.getElementById("imp-btn")?.addEventListener("click",doImport);
  document.getElementById("imp-url")?.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();doImport();}});

  // Add key point
  document.getElementById("add-kp")?.addEventListener("click",()=>{
    collect();
    const v=document.getElementById("new-kp")?.value.trim();
    if(!v){toast("請輸入爭點內容");return;}
    S.form.keyPoints=[...(S.form.keyPoints||[]),v];
    S.newKp=""; render();
  });
  document.querySelectorAll("[data-del-kp]").forEach(b=>{
    b.addEventListener("click",()=>{collect();S.form.keyPoints=(S.form.keyPoints||[]).filter((_,i)=>i!==parseInt(b.dataset.delKp));render();});
  });

  // Add link
  document.getElementById("add-link")?.addEventListener("click",()=>{
    collect();
    const url=document.getElementById("nl-url")?.value.trim();
    const label=document.getElementById("nl-label")?.value.trim();
    if(!url){toast("請填寫連結網址");return;}
    S.form.links=[...(S.form.links||[]),{label,url,id:uid()}];
    S.newLink={label:"",url:""}; render();
  });
  document.querySelectorAll("[data-del-link]").forEach(b=>{
    b.addEventListener("click",()=>{collect();S.form.links=(S.form.links||[]).filter((_,i)=>i!==parseInt(b.dataset.delLink));render();});
  });

  // Tags
  document.getElementById("tag-inp")?.addEventListener("keydown",e=>{
    if(e.key==="Enter"||e.key===","){
      e.preventDefault();collect();
      const v=e.target.value.trim().replace(/,$/,"");
      if(v&&!(S.form.tags||[]).includes(v)){S.form.tags=[...(S.form.tags||[]),v];}
      S.newTag=""; render();
    } else {S.newTag=e.target.value;}
  });
  document.querySelectorAll("[data-del-tag]").forEach(b=>{
    b.addEventListener("click",()=>{collect();S.form.tags=(S.form.tags||[]).filter(t=>t!==b.dataset.delTag);render();});
  });
}

render();
</script>
</body>
</html>
