<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <title>開庭小工具</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --line: #334155;
      --gold: #f59e0b;
      --red: #ef4444;
      --green: #22c55e;
      --blue: #38bdf8;
      --shadow: 0 20px 50px rgba(0, 0, 0, .25);
    }

    :root.light {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-2: #edf2f7;
      --text: #111827;
      --muted: #64748b;
      --line: #d9e2ec;
      --shadow: 0 18px 44px rgba(15, 23, 42, .12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(245, 158, 11, .10), transparent);
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
    }

    .clock {
      color: var(--gold);
      font-weight: 800;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
    }

    .segmented {
      display: flex;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .segmented button,
    .btn {
      min-height: 34px;
      border-radius: 7px;
      padding: 0 12px;
      color: var(--text);
      background: transparent;
      white-space: nowrap;
    }

    .segmented button.active {
      background: var(--gold);
      color: #111827;
      font-weight: 800;
    }

    .btn {
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .btn.primary {
      background: var(--gold);
      color: #111827;
      border-color: var(--gold);
      font-weight: 800;
    }

    .btn.danger {
      color: #fecaca;
      border-color: rgba(239, 68, 68, .45);
      background: rgba(239, 68, 68, .12);
    }

    .content {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .notice {
      padding: 10px 12px;
      border: 1px solid rgba(56, 189, 248, .35);
      border-radius: 8px;
      background: rgba(56, 189, 248, .12);
      color: var(--text);
      font-size: 13px;
    }

    .form {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.1fr 160px 120px;
      gap: 10px;
    }

    .form-grid.two {
      grid-template-columns: 1fr 1fr;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    input, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--text);
      background: var(--panel);
      outline: none;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, .16);
    }

    .form-actions,
    .row-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .metric .number {
      font-size: 24px;
      font-weight: 900;
      color: var(--gold);
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
    }

    .day {
      display: grid;
      gap: 8px;
    }

    .day-title {
      display: flex;
      gap: 8px;
      align-items: baseline;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .day-title strong {
      color: var(--text);
      font-size: 14px;
      text-transform: none;
    }

    .hearing {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .hearing.today {
      border-color: rgba(245, 158, 11, .7);
    }

    .time {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #111827;
      background: var(--gold);
      font-size: 15px;
      font-weight: 900;
      white-space: pre-line;
    }

    .matter {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .client {
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .calendar {
      display: grid;
      gap: 10px;
    }

    .cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .cal-title {
      font-weight: 900;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .weekday,
    .date-cell {
      min-width: 0;
      text-align: center;
    }

    .weekday {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .date-cell {
      min-height: 74px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      display: grid;
      align-content: start;
      gap: 4px;
    }

    .date-cell.muted {
      opacity: .42;
    }

    .date-cell.today {
      border-color: var(--gold);
      box-shadow: inset 0 0 0 1px var(--gold);
    }

    .date-num {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      margin: 0 auto;
    }

    .hidden { display: none; }

    @media (max-width: 720px) {
      .app { padding: 10px; }
      .topbar { align-items: flex-start; }
      .controls { align-items: stretch; }
      .form-grid,
      .form-grid.two,
      .summary { grid-template-columns: 1fr; }
      .hearing { grid-template-columns: 56px 1fr; }
      .time { width: 48px; height: 48px; font-size: 13px; }
      .date-cell { min-height: 58px; padding: 5px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <header class="topbar">
        <div class="title">
          <h1>開庭小工具</h1>
          <div class="subtitle" id="todayLabel"></div>
        </div>
        <div class="clock" id="clock"></div>
      </header>

      <div class="controls">
        <div class="segmented" aria-label="檢視模式">
          <button type="button" data-view="list">清單</button>
          <button type="button" data-view="calendar">日曆</button>
        </div>
        <button class="btn primary" type="button" id="toggleForm">新增開庭</button>
        <button class="btn" type="button" id="themeButton">切換色彩</button>
        <label style="display:flex;align-items:center;gap:8px;margin-left:auto">
          提醒
          <input id="reminderTime" type="time" style="width:110px" value="08:00">
        </label>
      </div>

      <div class="content">
        <div class="notice hidden" id="notice"></div>

        <form class="form hidden" id="hearingForm">
          <input type="hidden" id="editingId">
          <div class="form-grid">
            <label>當事人 / 案名
              <input id="clientName" autocomplete="off" required placeholder="例如：王小明">
            </label>
            <label>日期
              <input id="date" type="date" required>
            </label>
            <label>時間
              <input id="time" type="time">
            </label>
          </div>
          <div class="form-grid two">
            <label>法院 / 機關
              <input id="agency" autocomplete="off" placeholder="例如：臺北地方法院">
            </label>
            <label>法庭 / 地點
              <input id="room" autocomplete="off" placeholder="例如：第 5 法庭">
            </label>
          </div>
          <label>備註
            <textarea id="note" placeholder="可填案號、承辦股別或提醒事項"></textarea>
          </label>
          <div class="form-actions">
            <button class="btn" type="button" id="cancelEdit">取消</button>
            <button class="btn primary" type="submit">儲存</button>
          </div>
        </form>

        <section class="summary" id="summary"></section>
        <section id="listView"></section>
        <section class="calendar hidden" id="calendarView"></section>
      </div>
    </section>
  </main>

  <script>
    const storageKey = "widgetHearings";
    const themeKey = "widgetTheme";
    const viewKey = "widgetView";
    const reminderKey = "widgetReminderTime";
    const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
    const state = {
      hearings: readJSON(storageKey, []),
      view: localStorage.getItem(viewKey) || "list",
      month: new Date(),
      showForm: false
    };

    const $ = (id) => document.getElementById(id);

    function readJSON(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : fallback;
      } catch (_) {
        return fallback;
      }
    }

    function save() {
      state.hearings.sort((a, b) => (a.date || "").localeCompare(b.date || "") || (a.time || "").localeCompare(b.time || ""));
      localStorage.setItem(storageKey, JSON.stringify(state.hearings));
    }

    function todayISO() {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 10);
    }

    function toDate(iso) {
      return new Date(`${iso}T00:00:00`);
    }

    function formatDate(iso) {
      const d = toDate(iso);
      return `${d.getMonth() + 1}/${d.getDate()}（${weekdays[d.getDay()]}）`;
    }

    function daysUntil(iso) {
      return Math.round((toDate(iso) - toDate(todayISO())) / 86400000);
    }

    function uid() {
      return `${Date.now().toString(36)}${Math.random().toString(36).slice(2)}`;
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function showNotice(message) {
      const el = $("notice");
      el.textContent = message;
      el.classList.remove("hidden");
      window.clearTimeout(showNotice.timer);
      showNotice.timer = window.setTimeout(() => el.classList.add("hidden"), 2200);
    }

    function applyTheme() {
      const theme = localStorage.getItem(themeKey) || "auto";
      const hour = new Date().getHours();
      const effective = theme === "auto" ? (hour >= 7 && hour < 19 ? "light" : "dark") : theme;
      document.documentElement.classList.toggle("light", effective === "light");
      document.querySelector('meta[name="theme-color"]').setAttribute("content", effective === "light" ? "#f4f7fb" : "#111827");
    }

    function cycleTheme() {
      const theme = localStorage.getItem(themeKey) || "auto";
      const next = theme === "auto" ? "light" : theme === "light" ? "dark" : "auto";
      localStorage.setItem(themeKey, next);
      applyTheme();
      showNotice(next === "auto" ? "已切回自動色彩" : next === "light" ? "已切到淺色" : "已切到深色");
    }

    function renderClock() {
      const now = new Date();
      $("clock").textContent = now.toLocaleTimeString("zh-TW", { hour12: false });
      $("todayLabel").textContent = now.toLocaleDateString("zh-TW", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });
    }

    function upcoming() {
      return state.hearings
        .map((h) => ({ ...h, days: daysUntil(h.date) }))
        .filter((h) => h.days >= 0)
        .sort((a, b) => a.date.localeCompare(b.date) || (a.time || "").localeCompare(b.time || ""));
    }

    function renderSummary(items) {
      const todayCount = items.filter((h) => h.days === 0).length;
      const weekCount = items.filter((h) => h.days <= 7).length;
      $("summary").innerHTML = [
        metric(todayCount, "今日開庭"),
        metric(weekCount, "7 日內"),
        metric(state.hearings.length, "全部紀錄")
      ].join("");
    }

    function metric(number, label) {
      return `<div class="metric"><div class="number">${number}</div><div class="label">${label}</div></div>`;
    }

    function renderList(items) {
      const root = $("listView");
      if (!items.length) {
        root.innerHTML = `<div class="empty">目前沒有未來開庭。按「新增開庭」建立第一筆資料。</div>`;
        return;
      }

      const groups = new Map();
      for (const item of items) {
        if (!groups.has(item.date)) groups.set(item.date, []);
        groups.get(item.date).push(item);
      }

      root.innerHTML = [...groups.entries()].map(([date, rows]) => {
        const delta = daysUntil(date);
        const label = delta === 0 ? "今天" : delta === 1 ? "明天" : `${delta} 天後`;
        return `
          <div class="day">
            <div class="day-title"><strong>${formatDate(date)}</strong><span>${label}</span></div>
            ${rows.map(card).join("")}
          </div>
        `;
      }).join("");
    }

    function card(item) {
      const today = daysUntil(item.date) === 0;
      const place = [item.agency, item.room].filter(Boolean).join(" / ");
      return `
        <article class="hearing ${today ? "today" : ""}">
          <div class="time">${item.time ? item.time.replace(":", "\n") : "未定"}</div>
          <div class="matter">
            <div class="client">${escapeHTML(item.clientName)}</div>
            <div class="meta">
              ${place ? `<span class="badge">${escapeHTML(place)}</span>` : ""}
              ${item.note ? `<span class="badge">${escapeHTML(item.note)}</span>` : ""}
            </div>
            <div class="row-actions">
              <button class="btn" type="button" data-edit="${item.id}">編輯</button>
              <button class="btn danger" type="button" data-delete="${item.id}">刪除</button>
            </div>
          </div>
        </article>
      `;
    }

    function renderCalendar() {
      const root = $("calendarView");
      const base = new Date(state.month.getFullYear(), state.month.getMonth(), 1);
      const start = new Date(base);
      start.setDate(base.getDate() - base.getDay());
      const monthLabel = `${base.getFullYear()} 年 ${base.getMonth() + 1} 月`;
      const counts = state.hearings.reduce((acc, h) => {
        acc[h.date] = (acc[h.date] || 0) + 1;
        return acc;
      }, {});

      const cells = [];
      for (let i = 0; i < 42; i += 1) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const iso = d.toISOString().slice(0, 10);
        const inMonth = d.getMonth() === base.getMonth();
        cells.push(`
          <div class="date-cell ${inMonth ? "" : "muted"} ${iso === todayISO() ? "today" : ""}" title="${formatDate(iso)}">
            <div class="date-num">${d.getDate()}</div>
            ${counts[iso] ? `<div class="dot"></div><div style="font-size:11px;color:var(--gold);font-weight:800">${counts[iso]} 件</div>` : ""}
          </div>
        `);
      }

      root.innerHTML = `
        <div class="cal-head">
          <button class="btn" type="button" id="prevMonth">上一月</button>
          <div class="cal-title">${monthLabel}</div>
          <button class="btn" type="button" id="nextMonth">下一月</button>
        </div>
        <div class="cal-grid">
          ${weekdays.map((w) => `<div class="weekday">${w}</div>`).join("")}
          ${cells.join("")}
        </div>
      `;
    }

    function setView(view) {
      state.view = view;
      localStorage.setItem(viewKey, view);
      render();
    }

    function render() {
      applyTheme();
      renderClock();
      const items = upcoming();
      renderSummary(items);
      renderList(items);
      renderCalendar();
      $("listView").classList.toggle("hidden", state.view !== "list");
      $("calendarView").classList.toggle("hidden", state.view !== "calendar");
      $("hearingForm").classList.toggle("hidden", !state.showForm);
      document.querySelectorAll("[data-view]").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === state.view);
      });
      $("toggleForm").textContent = state.showForm ? "收起表單" : "新增開庭";
      bindDynamicEvents();
    }

    function bindDynamicEvents() {
      document.querySelectorAll("[data-edit]").forEach((button) => {
        button.onclick = () => startEdit(button.dataset.edit);
      });
      document.querySelectorAll("[data-delete]").forEach((button) => {
        button.onclick = () => removeHearing(button.dataset.delete);
      });
      const prev = $("prevMonth");
      const next = $("nextMonth");
      if (prev) prev.onclick = () => {
        state.month = new Date(state.month.getFullYear(), state.month.getMonth() - 1, 1);
        render();
      };
      if (next) next.onclick = () => {
        state.month = new Date(state.month.getFullYear(), state.month.getMonth() + 1, 1);
        render();
      };
    }

    function resetForm() {
      $("editingId").value = "";
      $("clientName").value = "";
      $("date").value = todayISO();
      $("time").value = "";
      $("agency").value = "";
      $("room").value = "";
      $("note").value = "";
    }

    function startEdit(id) {
      const item = state.hearings.find((h) => h.id === id);
      if (!item) return;
      state.showForm = true;
      $("editingId").value = item.id;
      $("clientName").value = item.clientName || "";
      $("date").value = item.date || todayISO();
      $("time").value = item.time || "";
      $("agency").value = item.agency || "";
      $("room").value = item.room || "";
      $("note").value = item.note || "";
      render();
      $("clientName").focus();
    }

    function removeHearing(id) {
      state.hearings = state.hearings.filter((h) => h.id !== id);
      save();
      showNotice("已刪除開庭");
      render();
    }

    $("hearingForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const item = {
        id: $("editingId").value || uid(),
        clientName: $("clientName").value.trim() || "未命名開庭",
        date: $("date").value,
        time: $("time").value,
        agency: $("agency").value.trim(),
        room: $("room").value.trim(),
        note: $("note").value.trim()
      };
      if (!item.date) {
        showNotice("請先選擇日期");
        return;
      }
      const index = state.hearings.findIndex((h) => h.id === item.id);
      if (index >= 0) state.hearings[index] = item;
      else state.hearings.push(item);
      save();
      resetForm();
      state.showForm = false;
      showNotice("已儲存開庭");
      render();
    });

    $("toggleForm").addEventListener("click", () => {
      state.showForm = !state.showForm;
      if (state.showForm) resetForm();
      render();
    });

    $("cancelEdit").addEventListener("click", () => {
      resetForm();
      state.showForm = false;
      render();
    });

    $("themeButton").addEventListener("click", cycleTheme);

    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => setView(button.dataset.view));
    });

    $("reminderTime").value = localStorage.getItem(reminderKey) || "08:00";
    $("reminderTime").addEventListener("change", (event) => {
      localStorage.setItem(reminderKey, event.target.value || "08:00");
      showNotice("提醒時間已更新");
    });

    window.addEventListener("storage", () => {
      state.hearings = readJSON(storageKey, []);
      render();
    });

    resetForm();
    render();
    window.setInterval(renderClock, 1000);
  </script>
</body>
</html>
