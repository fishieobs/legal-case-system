<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0612">
<title>當事人資料填寫 · 禹河法律事務所</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📝%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0612;--bg2:#120b1e;--bg3:#190f29;--bg4:#221536;--bg5:#2c1c45;
  --violet:#8b5cf6;--violet2:#7c3aed;--violet3:#a78bfa;
  --gold:#f59e0b;--text:#e9e0f5;--text2:#b3a0cc;--text3:#7a6699;--text4:#4d3d66;
  --red:#ef4444;--blue:#38bdf8;--green:#22c55e;
  --border:#221536;--border2:#2c1c45;--shadow:0 4px 20px rgba(0,0,0,.6);
}
@media(prefers-color-scheme:light){:root{
  --bg:#f6f3fc;--bg2:#fff;--bg3:#fff;--bg4:#f0eafa;--bg5:#e6dcf5;
  --violet:#7c3aed;--violet2:#6d28d9;--violet3:#8b5cf6;
  --text:#1a0f2e;--text2:#3a2a52;--text3:#7a6699;--text4:#a08cc0;
  --border:#e2d8f0;--border2:#d0c2e8;--shadow:0 2px 10px rgba(0,0,0,.08);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;line-height:1.6;}
.wrap{max-width:560px;margin:0 auto;padding:24px 18px 60px;}
.brand{text-align:center;margin:14px 0 22px;}
.brand-name{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--violet);letter-spacing:.04em;}
.brand-sub{font-size:11px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-top:4px;}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:22px 20px;box-shadow:var(--shadow);}
.title{font-size:17px;font-weight:700;margin-bottom:6px;}
.lead{font-size:13px;color:var(--text2);margin-bottom:4px;}
.sec{font-size:10px;font-weight:700;color:var(--violet);border-left:3px solid var(--violet);padding-left:10px;margin:20px 0 12px;letter-spacing:.06em;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fl{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.04em;}
.fl .req{color:var(--red);}
.fi{background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:11px 13px;color:var(--text);font-size:15px;outline:none;font-family:inherit;width:100%;transition:border-color .2s;}
.fi:focus{border-color:var(--violet);}
textarea.fi{resize:vertical;line-height:1.7;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:440px){.grid2{grid-template-columns:1fr;}}
.btn{width:100%;padding:14px;border-radius:11px;font-weight:700;cursor:pointer;border:none;font-size:15px;font-family:inherit;background:linear-gradient(135deg,var(--violet),var(--violet2));color:#fff;margin-top:8px;transition:opacity .15s;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.note{display:flex;gap:8px;align-items:flex-start;background:var(--bg4);border-radius:10px;padding:11px 13px;font-size:11.5px;color:var(--text3);margin-top:16px;line-height:1.6;}
.state{text-align:center;padding:40px 20px;}
.state-ico{font-size:52px;margin-bottom:16px;}
.state-title{font-size:17px;font-weight:700;margin-bottom:8px;}
.state-msg{font-size:13px;color:var(--text2);}
.spinner{width:34px;height:34px;border:3px solid var(--bg5);border-top-color:var(--violet);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);border-radius:9px;padding:10px 13px;font-size:13px;margin-top:10px;}
.footer{text-align:center;font-size:10px;color:var(--text4);margin-top:24px;letter-spacing:.06em;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">禹河法律事務所</div>
    <div class="brand-sub">Client Intake · 當事人資料填寫</div>
  </div>
  <div id="root"></div>
  <div class="footer">🔒 本頁採加密傳輸，資料僅提供承辦律師使用</div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getFirestore,doc,getDoc,updateDoc}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const cfg={apiKey:"AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",authDomain:"legalcasemanageer.firebaseapp.com",projectId:"legalcasemanageer",storageBucket:"legalcasemanageer.firebasestorage.app",messagingSenderId:"559838504556",appId:"1:559838504556:web:ba10c071a12650bbd85a49"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const auth=getAuth(app);

const root=document.getElementById("root");
const params=new URLSearchParams(location.search);
const token=(params.get("t")||"").trim();

const CLIENT_TYPES=["個人","公司/法人","政府機關","其他"];
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function stateView(ico,title,msg){
  root.innerHTML=`<div class="card"><div class="state"><div class="state-ico">${ico}</div><div class="state-title">${title}</div><div class="state-msg">${msg}</div></div></div>`;
}
function loadingView(msg){
  root.innerHTML=`<div class="card"><div class="state"><div class="spinner"></div><div class="state-msg">${msg||"載入中…"}</div></div></div>`;
}

let intakeDoc=null;

function formView(){
  const name=intakeDoc.clientName||"";
  root.innerHTML=`<div class="card">
    <div class="title">📝 委任資料填寫</div>
    <div class="lead">${name?`${esc(name)} 您好，`:"您好，"}煩請填寫以下基本資料，完成後送出即可，資料將直接傳送給承辦律師。</div>

    <div class="sec">基本資料</div>
    <div class="fg"><label class="fl">姓名 / 名稱 <span class="req">*</span></label><input class="fi" id="i-name" value="${esc(name)}" placeholder="請填寫真實姓名或公司全名"></div>
    <div class="grid2">
      <div class="fg"><label class="fl">類型</label>
        <select class="fi" id="i-type">${CLIENT_TYPES.map(t=>`<option${t===(intakeDoc.clientType||"個人")?" selected":""}>${t}</option>`).join("")}</select></div>
      <div class="fg"><label class="fl">身分證字號 / 統一編號</label><input class="fi" id="i-id" placeholder="選填"></div>
    </div>

    <div class="sec">聯絡方式</div>
    <div class="grid2">
      <div class="fg"><label class="fl">手機 <span class="req">*</span></label><input class="fi" id="i-mobile" type="tel" inputmode="tel" placeholder="0912-345-678"></div>
      <div class="fg"><label class="fl">市話</label><input class="fi" id="i-phone" type="tel" inputmode="tel" placeholder="02-1234-5678"></div>
    </div>
    <div class="fg"><label class="fl">Email</label><input class="fi" id="i-email" type="email" inputmode="email" placeholder="選填"></div>
    <div class="fg"><label class="fl">通訊地址</label><input class="fi" id="i-address" placeholder="選填"></div>
    <div class="fg"><label class="fl">聯絡人（公司 / 法人適用）</label><input class="fi" id="i-contact" placeholder="選填"></div>

    <div class="sec">補充說明</div>
    <div class="fg"><label class="fl">想補充給律師的說明</label><textarea class="fi" id="i-note" rows="3" placeholder="選填，例如案件概況、方便聯絡的時間等"></textarea></div>

    <div id="i-err"></div>
    <button class="btn" id="i-submit">送出資料</button>

    <div class="note">🔒 <div>本連結為您專屬，請勿轉發他人。資料以加密方式傳送，僅承辦律師可於後台檢視；沒有連結者無法存取任何資料。</div></div>
  </div>`;

  document.getElementById("i-submit").addEventListener("click",submit);
}

async function submit(){
  const btn=document.getElementById("i-submit");
  const errEl=document.getElementById("i-err");
  const val=id=>(document.getElementById(id)?.value||"").trim();
  const data={
    name:val("i-name"), type:val("i-type"), idNumber:val("i-id"),
    mobile:val("i-mobile"), phone:val("i-phone"), email:val("i-email"),
    address:val("i-address"), contactPerson:val("i-contact"), note:val("i-note"),
  };
  if(!data.name){ errEl.innerHTML=`<div class="err">請填寫姓名 / 名稱</div>`; return; }
  if(!data.mobile){ errEl.innerHTML=`<div class="err">請填寫手機號碼</div>`; return; }
  errEl.innerHTML="";
  btn.disabled=true; btn.textContent="送出中…";
  try{
    await updateDoc(doc(db,"intakeForms",token),{
      status:"submitted",
      data,
      submittedAt:new Date().toISOString(),
    });
    stateView("✅","已送出，感謝您！","您的資料已安全送達承辦律師，如需修改請與律師聯繫。您可以關閉此頁面。");
  }catch(e){
    console.warn("submit failed:",e.code||e.message);
    btn.disabled=false; btn.textContent="送出資料";
    errEl.innerHTML=`<div class="err">送出失敗，請稍後再試，或與律師聯繫。（${esc(e.code||"error")}）</div>`;
  }
}

async function start(){
  if(!token){ stateView("🔗","連結無效","此填寫連結不完整，請向承辦律師索取正確的連結。"); return; }
  loadingView("驗證連結中…");
  try{
    await signInAnonymously(auth);
  }catch(e){
    stateView("⚠️","暫時無法連線","系統暫時無法驗證，請稍後再試。若持續發生，請與律師聯繫。");
    return;
  }
  try{
    const snap=await getDoc(doc(db,"intakeForms",token));
    if(!snap.exists()){ stateView("❌","連結無效或已失效","找不到對應的填寫表單，請向承辦律師索取新的連結。"); return; }
    intakeDoc=snap.data();
    if(intakeDoc.status==="submitted"){ stateView("✅","已完成填寫","此表單已送出，感謝您的配合。如需修改，請與承辦律師聯繫。"); return; }
    if(intakeDoc.status==="imported"){ stateView("✅","已完成填寫","此表單已由律師處理完成，感謝您的配合。"); return; }
    if(intakeDoc.status!=="pending"){ stateView("❌","連結無效","此連結目前無法使用，請向承辦律師索取新的連結。"); return; }
    formView();
  }catch(e){
    console.warn("load failed:",e.code||e.message);
    stateView("⚠️","無法讀取表單","請確認連結是否正確，或稍後再試。");
  }
}

onAuthStateChanged(auth,()=>{});
start();
</script>
</body>
</html>
