<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="文書範本">
<meta name="theme-color" content="#0a0f1e">
<title>⚖ 法律文書範本庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ══════════════════ ROOT ══════════════════ */
:root{
  --bg:#050a18;--bg2:#0a1020;--bg3:#0f1628;--bg4:#162035;--bg5:#1e2d45;
  --gold:#c8a96e;--gold2:#a07840;--gold3:#e8c98e;
  --text:#dce8f4;--text2:#8ca0b8;--text3:#566880;--text4:#374860;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6;--blue:#38bdf8;
  --border:#162035;--border2:#1e2d45;
  --shadow:0 4px 20px rgba(0,0,0,.5);
  --civil:#38bdf8;--criminal:#ef4444;--admin:#f59e0b;--family:#ec4899;--labor:#22c55e;--nonlit:#8b5cf6;--letter:#c8a96e;
}
:root.light{
  --bg:#f4f6fa;--bg2:#ffffff;--bg3:#ffffff;--bg4:#eef1f8;--bg5:#e4e8f4;
  --gold:#8a5c1a;--gold2:#6a4210;--gold3:#b07c30;
  --text:#162035;--text2:#374860;--text3:#566880;--text4:#8ca0b8;
  --border:#dde3ef;--border2:#c8d0e0;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{padding-top:40px;min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;line-height:1.6;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px;}
/* ══════════════════ HEADER ══════════════════ */
.hdr{position:sticky;top:0;z-index:300;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{font-size:20px;}
.hdr-title{font-family:'Noto Serif TC',serif;font-size:1.1rem;color:var(--gold);letter-spacing:.03em;}
.hdr-sub{font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase;margin-top:1px;}
.hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
/* ══════════════════ LAYOUT ══════════════════ */
.app-wrap{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
@media(max-width:768px){.sidebar{display:none;}.app-wrap{flex-direction:column;}}
.main{flex:1;overflow:hidden;padding-bottom:80px;}
/* ══════════════════ SIDEBAR ══════════════════ */
.sb-section{margin-bottom:20px;}
.sb-title{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;padding:4px 8px 8px;border-bottom:1px solid var(--border);margin-bottom:6px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--text2);border:none;background:transparent;width:100%;text-align:left;font-family:inherit;}
.sb-item:hover{background:var(--bg4);color:var(--text);}
.sb-item.active{background:rgba(200,169,110,.12);color:var(--gold);font-weight:700;}
.sb-item .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-count{margin-left:auto;font-size:10px;color:var(--text4);background:var(--bg4);border-radius:4px;padding:1px 6px;}
/* ══════════════════ BUTTONS ══════════════════ */
.btn{padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn:active{opacity:.85;transform:translateY(1px);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0a;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-ghost{background:transparent;color:var(--text3);border:none;padding:8px 10px;}
.btn-ghost:hover{color:var(--text);background:var(--bg4);}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-xs{padding:4px 8px;font-size:10px;}
.btn-icon{padding:7px;border-radius:7px;}
/* ══════════════════ SEARCH/FILTER BAR ══════════════════ */
.filter-bar{display:flex;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;align-items:center;position:sticky;top:57px;z-index:200;}
.search-wrap{flex:1;min-width:200px;position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}
.fi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:border-color .2s;}
.fi:focus{border-color:var(--gold);}
.search-input{padding-left:36px;}
/* ══════════════════ TEMPLATE GRID ══════════════════ */
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px;padding:20px;}
.tmpl-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:all .2s;cursor:pointer;}
.tmpl-card:hover{transform:translateY(-2px);border-color:var(--gold)44;box-shadow:0 8px 30px rgba(0,0,0,.4);}
.tmpl-card-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--border);}
.tmpl-card-meta{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.tmpl-card-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.4;}
.tmpl-card-body{padding:14px 18px;flex:1;display:flex;flex-direction:column;gap:10px;}
.tmpl-preview{font-size:11px;color:var(--text3);font-family:'Courier Prime',monospace;line-height:1.7;max-height:90px;overflow:hidden;position:relative;}
.tmpl-preview::after{content:"";position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(transparent,var(--bg3));}
.tmpl-card-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.tmpl-tags{display:flex;flex-wrap:wrap;gap:4px;}
/* ══════════════════ BADGES ══════════════════ */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid transparent;}
/* ══════════════════ DETAIL / EDITOR ══════════════════ */
.editor-wrap{height:calc(100vh - 57px);display:flex;flex-direction:column;}
.editor-toolbar{padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.editor-toolbar-left{display:flex;align-items:center;gap:8px;flex:1;}
.editor-body{flex:1;display:flex;overflow:hidden;}
.editor-form{width:320px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:20px;background:var(--bg2);}
@media(max-width:900px){.editor-form{width:100%;border-right:none;border-bottom:1px solid var(--border);}}
.editor-preview{flex:1;overflow-y:auto;padding:40px;background:var(--bg);}
.doc-paper{max-width:680px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:52px 60px;box-shadow:var(--shadow);font-family:'Noto Sans TC',sans-serif;min-height:900px;}
@media(max-width:600px){.doc-paper{padding:28px 24px;}}
.doc-title{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;text-align:center;color:var(--text);margin-bottom:6px;letter-spacing:.04em;}
.doc-subtitle{font-size:12px;text-align:center;color:var(--text3);margin-bottom:30px;letter-spacing:.08em;}
.doc-meta{border:1px solid var(--border);border-radius:6px;padding:14px 18px;margin-bottom:24px;font-size:12px;}
.doc-meta-row{display:grid;grid-template-columns:80px 1fr;gap:4px;padding:3px 0;border-bottom:1px solid var(--border);}
.doc-meta-row:last-child{border-bottom:none;}
.doc-meta-lbl{color:var(--text3);font-weight:700;}
.doc-meta-val{color:var(--text);}
.doc-body{font-size:14px;line-height:2;color:var(--text2);white-space:pre-wrap;font-family:'Noto Sans TC',sans-serif;}
.doc-body .filled{color:var(--gold);font-weight:700;border-bottom:1px dashed var(--gold)55;}
.doc-signature{margin-top:40px;text-align:right;font-size:13px;color:var(--text2);}
/* ══════════════════ FORM ELEMENTS ══════════════════ */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fl{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;}
.fi-full{width:100%;}
textarea.fi{resize:vertical;font-family:'Courier Prime',monospace;font-size:12px;line-height:1.7;}
.section-hdr{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;border-left:3px solid var(--gold);padding-left:10px;margin:18px 0 12px;display:flex;align-items:center;justify-content:space-between;}
/* ══════════════════ OVERLAY ══════════════════ */
.overlay{position:fixed;inset:0;background:#00000088;z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.dialog{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:420px;width:100%;}
.dialog-title{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text);}
.dialog-sub{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.6;}
.dialog-actions{display:flex;gap:8px;justify-content:flex-end;}
/* ══════════════════ TOAST ══════════════════ */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold);color:var(--gold);padding:10px 22px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}
/* ══════════════════ LOADING / LOGIN / EMPTY ══════════════════ */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--text3);}
.spinner{width:36px;height:36px;border:3px solid var(--bg5);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text4);}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.4;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
/* ══════════════════ BOTTOM NAV ══════════════════ */
.bnav{display:none;}
@media(max-width:768px){
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:200;}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;font-size:9px;color:var(--text3);cursor:pointer;gap:2px;border:none;background:transparent;font-family:inherit;}
  .bnav-btn.active{color:var(--gold);}
  .bnav-icon{font-size:18px;}
  .main{padding-bottom:80px;}
  .filter-bar{top:57px;}
  .tmpl-grid{padding:12px;}
}
/* ══════════════════ CHIP ══════════════════ */
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg4);color:var(--text3);transition:all .15s;}
.chip.active{background:rgba(200,169,110,.15);border-color:var(--gold);color:var(--gold);}
/* ══════════════════ AUTOFILL FIELDS ══════════════════ */
.fill-field{background:rgba(200,169,110,.06);border:1px dashed var(--gold)44;border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text);cursor:text;font-family:'Courier Prime',monospace;}
.fill-field-lbl{font-size:9px;color:var(--gold)88;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;}
/* ══════════════════ STATS BAR ══════════════════ */
.stats-bar{display:flex;gap:16px;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.stats-item{display:flex;flex-direction:column;gap:2px;}
.stats-num{font-size:20px;font-weight:800;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums;}
.stats-lbl{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;}
/* tag pill input */
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:text;}
.tag-input-wrap:focus-within{border-color:var(--gold);}
.tag-pill{background:var(--bg5);color:var(--text2);border-radius:4px;padding:2px 8px;font-size:11px;display:flex;align-items:center;gap:4px;}
.tag-pill-del{cursor:pointer;color:var(--text4);font-size:12px;line-height:1;}
.tag-input-wrap input{border:none;background:transparent;color:var(--text);font-size:12px;outline:none;font-family:inherit;min-width:80px;flex:1;}

// STATE
// ══════════════════════════════════════════════════════════
let S={
  user:null, authChecked:false,
  templates:[], loading:true,
  view:"list",           // list | editor
  editId:null,           // null = new
  cat:"全部",
  search:"",
  docType:"全部",
  form:{
    title:"",category:"civil",docType:"",
    content:"",tags:[],fields:[],
    fillValues:{},       // {field_key: filled_value}
  },
  tagInput:"",
  showDeleteConfirm:null,
  showPreview:false,
  themeMode:localStorage.getItem("tmplTheme")||"dark",
};

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function toast(msg){const t=document.getElementById("toast");if(!t)return;t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400);}
function applyTheme(m){if(m==="auto"){const h=new Date().getHours();m=(h>=6&&h<20)?"light":"dark";}document.documentElement.classList.toggle("light",m==="light");}
applyTheme(S.themeMode);

function fillContent(content,values){
  return content.replace(/\{(\w+)\}/g,(_,k)=>{
    const v=values[k]||(FIELDS.find(f=>f.key===k)?.ex||`{${k}}`);
    return values[k]?`<span class="filled">${v}</span>`:`<span style="color:var(--text4)">{${k}}</span>`;
  });
}

function renderBadge(cat){
  const c=CAT_MAP[cat]||CAT_MAP.other;
  return `<span class="badge" style="background:${c.color}22;color:${c.color};border-color:${c.color}44">${c.icon} ${c.label}</span>`;
}

// ══════════════════════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════════════════════
function waitFirebase(cb){
  const t=setInterval(()=>{if(window._firebaseReady){clearInterval(t);cb();}},100);
}

function initFirebase(){
  // Try cache
  try{const c=localStorage.getItem("docTemplates_cache");if(c){S.templates=JSON.parse(c);S.loading=false;render();}}catch(_){}

  window._fb.onSnapshot(window._fb.collection(window._db,"docTemplates"),snap=>{
    S.templates=snap.docs.map(d=>({...d.data(),id:d.id}));
    S.loading=false;
    try{localStorage.setItem("docTemplates_cache",JSON.stringify(S.templates));}catch(_){}
    render();
  },()=>{S.loading=false;render();});
}

async function saveTemplate(){
  const f=S.form;
  if(!f.title.trim()){toast("⚠️ 請填寫範本名稱");return;}
  if(!f.content.trim()){toast("⚠️ 請填寫範本內容");return;}
  const id=S.editId||uid();
  const data={...f,id,updatedAt:new Date().toISOString()};
  delete data.fillValues;
  try{
    await window._fb.setDoc(window._fb.doc(window._db,"docTemplates",id),data);
    toast("✅ 範本已儲存");
    S.view="list";S.editId=null;render();
  }catch(e){toast("❌ 儲存失敗："+e.code);}
}

async function deleteTemplate(id){
  try{
    await window._fb.deleteDoc(window._fb.doc(window._db,"docTemplates",id));
    toast("🗑 範本已刪除");
    S.showDeleteConfirm=null;S.view="list";render();
  }catch(e){toast("❌ 刪除失敗");}
}

async function seedStarters(){
  const existing=S.templates.map(t=>t.id);
  const toAdd=STARTER_TEMPLATES.filter(t=>!existing.includes(t.id));
  for(const t of toAdd){
    await window._fb.setDoc(window._fb.doc(window._db,"docTemplates",t.id),{...t,updatedAt:new Date().toISOString()});
  }
  toast(`✅ 已新增 ${toAdd.length} 個起始範本`);
}

// ══════════════════════════════════════════════════════════
// FORM HELPERS
// ══════════════════════════════════════════════════════════
function sf(k,v){S.form={...S.form,[k]:v};render();}
function sfv(k,v){S.form={...S.form,fillValues:{...S.form.fillValues,[k]:v}};render();}

function openNew(){
  S.form={title:"",category:"civil",docType:"",content:"",tags:[],fields:[],fillValues:{}};
  S.editId=null;S.tagInput="";S.view="editor";render();
}
function openEdit(t){
  S.form={...JSON.parse(JSON.stringify(t)),fillValues:{}};
  S.editId=t.id;S.tagInput="";S.view="editor";render();
}
function openDetail(t){
  // Open editor in preview/fill mode
  S.form={...JSON.parse(JSON.stringify(t)),fillValues:{}};
  S.editId=t.id;S.tagInput="";S.showPreview=true;S.view="editor";render();
}

// Auto-detect fields from content
function detectFields(content){
  const matches=[...content.matchAll(/\{(\w+)\}/g)].map(m=>m[1]);
  return [...new Set(matches)].filter(k=>FIELDS.find(f=>f.key===k));
}

// RENDER ENGINE
// ══════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  if(!root)return;
  if(!S.authChecked){root.innerHTML=`<div class="loading"><div class="spinner"></div><div>連線中…</div></div>`;return;}
  if(!S.user){root.innerHTML=renderLogin();bindLoginEvents();return;}
  if(S.view==="editor"){root.innerHTML=renderEditor();bindEditorEvents();return;}
  root.innerHTML=renderListView();
  bindListEvents();
}

  </div></div>`;

function bindLoginEvents(){
  const doLogin=async()=>{
    const email=document.getElementById("li-email")?.value.trim();
    const pw=document.getElementById("li-pw")?.value;
    const errEl=document.getElementById("login-err");
    if(!email||!pw){if(errEl){errEl.style.display="block";errEl.textContent="請輸入帳號和密碼";}return;}
    document.getElementById("btn-login").textContent="登入中…";
    try{await window._fbAuth.signInWithEmailAndPassword(window._auth,email,pw);}
    catch(e){
      const msgs={"auth/invalid-credential":"帳號或密碼錯誤","auth/too-many-requests":"嘗試次數過多，請稍後再試"};
      if(errEl){errEl.style.display="block";errEl.textContent=msgs[e.code]||"登入失敗："+e.code;}
      document.getElementById("btn-login").textContent="🔐 登入";
    }
  };
  document.getElementById("btn-login")?.addEventListener("click",doLogin);
  document.getElementById("li-pw")?.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
  document.getElementById("btn-showpw")?.addEventListener("click",()=>{
    const inp=document.getElementById("li-pw");
    inp.type=inp.type==="password"?"text":"password";
  });
}

    localStorage.setItem("tmplTheme",S.themeMode);
    applyTheme(S.themeMode);
    render();
  });
  // New
  document.getElementById("btn-new")?.addEventListener("click",openNew);
  document.getElementById("sb-new")?.addEventListener("click",openNew);
  document.getElementById("bnav-new")?.addEventListener("click",openNew);
  // Seed
  document.getElementById("btn-seed")?.addEventListener("click",seedStarters);
  document.getElementById("sb-seed")?.addEventListener("click",seedStarters);
  document.getElementById("bnav-seed")?.addEventListener("click",seedStarters);
  // Logout
  document.getElementById("btn-logout")?.addEventListener("click",async()=>{if(confirm("確認登出？"))await window._fbAuth.signOut(window._auth);});
  // Search
  document.getElementById("search-inp")?.addEventListener("input",e=>{S.search=e.target.value;render();});
  // DocType filter
  document.getElementById("filter-doctype")?.addEventListener("change",e=>{S.docType=e.target.value;render();});
  // Category sidebar
  document.querySelectorAll("[data-cat]").forEach(btn=>{
    btn.addEventListener("click",()=>{S.cat=btn.dataset.cat;render();});
  });
  // Card open
  document.querySelectorAll("[data-open]").forEach(card=>{
    card.addEventListener("click",e=>{
      if(e.target.closest("[data-edit],[data-del],[data-use]"))return;
      const t=S.templates.find(x=>x.id===card.dataset.open);
      if(t)openDetail(t);
    });
  });
  // Edit
  document.querySelectorAll("[data-edit]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      const t=S.templates.find(x=>x.id===btn.dataset.edit);
      if(t)openEdit(t);
    });
  });
  // Use (open in fill mode)
  document.querySelectorAll("[data-use]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      const t=S.templates.find(x=>x.id===btn.dataset.use);
      if(t)openDetail(t);
    });
  });
  // Delete
  document.querySelectorAll("[data-del]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      S.showDeleteConfirm=btn.dataset.del;render();
    });
  });
  document.getElementById("btn-cancel-del")?.addEventListener("click",()=>{S.showDeleteConfirm=null;render();});
  document.getElementById("btn-confirm-del")?.addEventListener("click",()=>deleteTemplate(S.showDeleteConfirm));
}

// ══════════════════════════════════════════════════════════
// EDITOR VIEW
// ══════════════════════════════════════════════════════════
function renderEditor(){
  const f=S.form;
  const detectedFields=detectFields(f.content||"");
  const cat=CAT_MAP[f.category]||CAT_MAP.other;
  const docTypes=DOC_TYPES[f.category]||DOC_TYPES.other;
  const isNew=!S.editId;
  const previewHtml=fillContent(f.content||"",f.fillValues||{});

  return`
  <div class="editor-wrap">
    <!-- Toolbar -->
    <div class="editor-toolbar">
      <div class="editor-toolbar-left">
        <button class="btn btn-outline btn-sm" id="btn-back">← 返回</button>
        <div style="font-size:14px;font-weight:700;color:var(--text)">${isNew?"新增範本":f.title||"編輯範本"}</div>
        ${renderBadge(f.category)}
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <label style="font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px;cursor:pointer">
          <input type="checkbox" id="toggle-preview"${S.showPreview?" checked":""}> 預覽模式
        </label>
        <button class="btn btn-outline btn-sm" id="btn-copy-doc">📋 複製全文</button>
        ${S.editId?`<button class="btn btn-outline btn-sm" id="btn-dup">🔁 複製範本</button>`:""}
        <button class="btn btn-gold" id="btn-save">💾 儲存範本</button>
      </div>
    </div>

    <!-- Body: Form | Preview -->
    <div class="editor-body">
      <!-- Left: form -->
      <div class="editor-form">
        <div class="section-hdr">📋 基本資訊</div>
        <div class="fg">
          <label class="fl">範本名稱</label>
          <input class="fi fi-full" id="f-title" value="${(f.title||"").replace(/"/g,"&quot;")}" placeholder="例：損害賠償起訴狀">
        </div>
        <div class="fg">
          <label class="fl">文書類別</label>
          <select class="fi fi-full" id="f-cat">
            ${CATS.map(c=>`<option value="${c.key}"${f.category===c.key?" selected":""}>${c.icon} ${c.label}</option>`).join("")}
          </select>
        </div>
        <div class="fg">
          <label class="fl">文書類型</label>
          <select class="fi fi-full" id="f-doctype">
            <option value="">─ 選擇類型 ─</option>
            ${docTypes.map(d=>`<option${f.docType===d?" selected":""}>${d}</option>`).join("")}
          </select>
        </div>
        <div class="fg">
          <label class="fl">標籤</label>
          <div class="tag-input-wrap">
            ${(f.tags||[]).map(tag=>`<span class="tag-pill">${tag}<span class="tag-pill-del" data-del-tag="${tag}">✕</span></span>`).join("")}
            <input id="f-tag-input" placeholder="輸入標籤後按 Enter" value="${S.tagInput}">
          </div>
        </div>

        ${S.showPreview&&detectedFields.length>0?`
        <div class="section-hdr">✏️ 填入資料（套用範本）</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:12px">填入後可在右側預覽效果，複製全文即可使用</div>
        ${detectedFields.map(key=>{
          const fd=FIELDS.find(f=>f.key===key);
          if(!fd)return"";
          return`<div class="fg">
            <div class="fill-field-lbl">${fd.label}</div>
            <input class="fi fi-full fill-field" id="fv-${key}" value="${(f.fillValues?.[key]||"").replace(/"/g,"&quot;")}" placeholder="${fd.ex}">
          </div>`;
        }).join("")}`:""}

        <div class="section-hdr" style="margin-top:${S.showPreview?"18":"0"}px">📝 範本內容</div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:8px">使用 {欄位名稱} 插入動態欄位，例如：{court}、{client}、{date}</div>
        <div style="font-size:10px;color:var(--text4);margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px">
          ${FIELDS.map(f=>`<span style="cursor:pointer;padding:2px 7px;background:var(--bg4);border-radius:4px;font-family:monospace" data-ins-field="{${f.key}}" title="${f.label}（點擊插入）">{${f.key}}</span>`).join("")}
        </div>
        <textarea class="fi fi-full" id="f-content" style="min-height:500px">${(f.content||"").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</textarea>
      </div>

      <!-- Right: preview -->
      <div class="editor-preview">
        <div class="doc-paper">
          ${f.title?`<div class="doc-title">${f.title}</div>`:""}
          <div class="doc-subtitle">${cat.icon} ${cat.label}${f.docType?" · "+f.docType:""}</div>
          ${f.tags&&f.tags.length?`<div style="text-align:center;margin-bottom:16px">${f.tags.map(t=>`<span class="badge" style="background:var(--bg4);color:var(--text3);margin:0 3px">${t}</span>`).join("")}</div>`:""}
          <div class="doc-body">${previewHtml}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function bindEditorEvents(){
  document.getElementById("btn-back")?.addEventListener("click",()=>{S.view="list";S.showPreview=false;render();});
  document.getElementById("toggle-preview")?.addEventListener("change",e=>{S.showPreview=e.target.checked;render();});
  document.getElementById("btn-save")?.addEventListener("click",()=>{
    S.form.title=document.getElementById("f-title")?.value||S.form.title;
    S.form.content=document.getElementById("f-content")?.value||S.form.content;
    saveTemplate();
  });

  // Live update fields
  ["f-title","f-content"].forEach(id=>{
    document.getElementById(id)?.addEventListener("input",e=>{
      const key=id.replace("f-","");
      if(key==="title")S.form.title=e.target.value;
      if(key==="content"){S.form.content=e.target.value;S.form.fields=detectFields(e.target.value);}
      render();
    });
  });

  document.getElementById("f-cat")?.addEventListener("change",e=>{S.form.category=e.target.value;S.form.docType="";render();});
  document.getElementById("f-doctype")?.addEventListener("change",e=>{S.form.docType=e.target.value;render();});

  // Tag input
  document.getElementById("f-tag-input")?.addEventListener("keydown",e=>{
    if(e.key==="Enter"||e.key===","){
      e.preventDefault();
      const v=e.target.value.trim().replace(/,$/,"");
      if(v&&!(S.form.tags||[]).includes(v)){S.form.tags=[...(S.form.tags||[]),v];}
      S.tagInput="";render();
    } else {S.tagInput=e.target.value;}
  });
  document.querySelectorAll("[data-del-tag]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      S.form.tags=(S.form.tags||[]).filter(t=>t!==btn.dataset.delTag);render();
    });
  });

  // Fill values
  document.querySelectorAll("[id^='fv-']").forEach(inp=>{
    inp.addEventListener("input",e=>{
      const key=inp.id.replace("fv-","");
      sfv(key,e.target.value);
    });
  });

  // Insert field
  document.querySelectorAll("[data-ins-field]").forEach(span=>{
    span.addEventListener("click",()=>{
      const ta=document.getElementById("f-content");
      if(!ta)return;
      const s=ta.selectionStart,e=ta.selectionEnd;
      const v=span.dataset.insField;
      ta.value=ta.value.slice(0,s)+v+ta.value.slice(e);
      S.form.content=ta.value;
      ta.selectionStart=ta.selectionEnd=s+v.length;
      ta.focus();
      render();
    });
  });

  // Copy full text
  document.getElementById("btn-copy-doc")?.addEventListener("click",()=>{
    const content=(S.form.content||"").replace(/\{(\w+)\}/g,(_,k)=>S.form.fillValues?.[k]||(FIELDS.find(f=>f.key===k)?.ex||`{${k}}`));
    navigator.clipboard.writeText(content).then(()=>toast("📋 全文已複製到剪貼簿！")).catch(()=>toast("⚠️ 請手動複製"));
  });

  // Duplicate
  document.getElementById("btn-dup")?.addEventListener("click",()=>{
    S.form.title=(S.form.title||"")+"（複本）";
    S.editId=null;saveTemplate();
  });
}

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
render(); // Show spinner

waitFirebase(()=>{
  window._fbAuth.onAuthStateChanged(window._auth,user=>{
    S.user=user;S.authChecked=true;
    if(user){initFirebase();}
    else{S.loading=false;render();}
  });
});
</script>
