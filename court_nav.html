<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="開庭助理">
<meta name="theme-color" content="#FAF7F0">
<title>🗺 開庭行程助理</title>
<link rel="apple-touch-icon" href="icons/icon-court.png">
<link rel="icon" type="image/png" href="icons/icon-court.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* ── legal-design-tw 權杖 ── */
  --paper:#FAF7F0;--paper-raised:#FFFFFF;--paper-sunken:#F1ECE1;
  --ink:#211E1A;--ink-soft:#5B554D;--ink-faint:#8A8377;
  --seal:#9E2A24;--seal-bright:#C0392B;--seal-wash:#F3E3DF;
  --positive:#3A6B4F;--negative:#9E2A24;--warning:#A6741C;--navy:#2A3D4F;
  --positive-wash:#E7EFE9;--warning-wash:#F3EBDA;
  --rule:#DDD5C7;--rule-strong:#C4BAA6;
  --font-kai:"BiauKai","DFKai-SB","標楷體","KaiTi","STKaiti","Kaiti TC","Noto Serif TC",serif;
  --font-song:"Noto Serif TC","Source Han Serif TC","PMingLiU","新細明體","Songti TC",serif;
  --shadow-raised:0 2px 10px rgba(33,30,26,.10);
  /* ── 舊變數別名 → 權杖（既有 inline var(--…) 自動換色）── */
  --bg:var(--paper);--bg2:var(--paper-raised);--bg3:var(--paper-raised);--bg4:var(--paper-sunken);--bg5:var(--paper-sunken);
  --blue:var(--navy);--blue2:var(--navy);--blue3:var(--navy);
  --gold:var(--seal);--gold2:var(--seal-bright);
  --text:var(--ink);--text2:var(--ink-soft);--text3:var(--ink-soft);--text4:var(--ink-faint);
  --green:var(--positive);--red:var(--negative);--orange:var(--warning);--purple:var(--seal);
  --border:var(--rule);--border2:var(--rule-strong);
  --shadow:none;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--paper);color:var(--ink);font-family:var(--font-song);line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--paper);}
::-webkit-scrollbar-thumb{background:var(--rule-strong);border-radius:2px;}

/* ── SYS NAV ── */
.sys-nav{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(250,247,240,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:2px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;}
.sys-nav::-webkit-scrollbar{display:none;}
.sys-nav-item{display:inline-flex;align-items:center;padding:6px 12px;border-radius:2px;font-size:11px;font-weight:700;white-space:nowrap;transition:all .15s;text-decoration:none;border:1px solid transparent;font-family:var(--font-kai);}
.sys-nav-item.active{background:var(--seal-wash);color:var(--seal);border-color:var(--seal);cursor:default;}
a.sys-nav-item{color:var(--ink-faint);}
a.sys-nav-item:hover{background:var(--paper-sunken);color:var(--seal);}
.sys-nav-logo{font-size:13px;color:var(--ink-faint);margin-right:6px;flex-shrink:0;border-right:1px solid var(--rule);padding-right:10px;}

/* ── LAYOUT ── */
.app{min-height:100vh;padding-top:41px;}
.hdr{background:var(--paper-raised);border-bottom:2px solid var(--seal);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:41px;z-index:200;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-title{font-family:var(--font-kai);font-size:1.05rem;font-weight:700;letter-spacing:.04em;color:var(--ink);}
.hdr-sub{font-size:9px;color:var(--ink-faint);letter-spacing:.1em;}
.hdr-actions{display:flex;gap:7px;align-items:center;}

/* ── BUTTONS ── */
.btn{padding:8px 14px;border-radius:2px;font-weight:700;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:var(--font-kai);transition:all .15s;white-space:nowrap;}
.btn:active{opacity:.8;}
.btn-blue{background:var(--seal);color:var(--paper-raised);border-color:var(--seal);}
.btn-blue:hover{background:var(--seal-bright);}
.btn-outline{background:transparent;border:1px solid var(--rule-strong);color:var(--ink-soft);}
.btn-outline:hover{border-color:var(--seal);color:var(--seal);}
.btn-ghost{background:transparent;color:var(--ink-faint);border:none;}
.btn-ghost:hover{color:var(--seal);background:var(--paper-sunken);}
.btn-sm{padding:6px 11px;font-size:11px;}
.btn-xs{padding:4px 8px;font-size:10px;}

/* ── CONTENT ── */
.content{padding:16px 18px;max-width:960px;margin:0 auto;}

/* ── TODAY HERO ── */
.hero-card{background:var(--paper-raised);border:1px solid var(--rule);border-left:4px solid var(--seal);border-radius:4px;padding:24px 22px;margin-bottom:16px;box-shadow:var(--shadow-raised);}
.hero-date{font-size:11px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.hero-count{font-family:var(--font-kai);font-size:32px;font-weight:800;color:var(--seal);line-height:1;font-variant-numeric:tabular-nums;}
.hero-label{font-size:13px;color:var(--ink-soft);margin-top:4px;}

/* ── HEARING CARDS ── */
.h-card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:4px;padding:0;overflow:hidden;margin-bottom:12px;transition:border-color .2s;}
.h-card:hover{border-color:var(--seal);}
.h-card-top{padding:16px 18px;border-bottom:1px solid var(--rule);}
.h-card-time{font-family:var(--font-kai);font-size:28px;font-weight:800;color:var(--seal);font-variant-numeric:tabular-nums;line-height:1;}
.h-card-countdown{font-size:12px;font-weight:700;padding:3px 10px;border-radius:2px;display:inline-block;margin-top:6px;border:1px solid transparent;font-variant-numeric:tabular-nums;}
.countdown-urgent{background:var(--seal-wash);color:var(--seal);border-color:var(--seal);}
.countdown-soon{background:var(--warning-wash);color:var(--warning);border-color:var(--warning);}
.countdown-ok{background:var(--positive-wash);color:var(--positive);border-color:var(--positive);}
.countdown-past{background:var(--paper-sunken);color:var(--ink-faint);border-color:var(--rule);}
.h-card-body{padding:14px 18px;}
.h-card-title{font-family:var(--font-kai);font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.h-meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.h-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-soft);}

/* ── DEPART SECTION ── */
.depart-box{background:var(--paper-sunken);border:1px solid var(--rule);border-radius:3px;padding:12px 14px;margin-top:10px;}
.depart-row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.depart-label{font-size:11px;color:var(--ink-soft);margin-bottom:2px;}
.depart-value{font-family:var(--font-kai);font-size:18px;font-weight:800;color:var(--seal);font-variant-numeric:tabular-nums;}
.depart-note{font-size:11px;color:var(--ink-soft);margin-top:2px;}

/* ── TRANSPORT TABS ── */
.transport-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.transport-btn{padding:7px 13px;border-radius:2px;border:1px solid var(--rule);background:var(--paper-raised);color:var(--ink-soft);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-kai);transition:all .15s;display:flex;align-items:center;gap:5px;}
.transport-btn.active{background:var(--seal);border-color:var(--seal);color:var(--paper-raised);}
.transport-btn:hover:not(.active){border-color:var(--seal);color:var(--seal);}

/* ── MAP BUTTON ── */
.map-btn{width:100%;background:var(--paper-raised);border:1px solid var(--rule);border-left:4px solid var(--seal);border-radius:3px;padding:12px 16px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;font-size:13px;font-weight:700;color:var(--seal);font-family:var(--font-kai);transition:all .2s;text-decoration:none;margin-top:10px;}
.map-btn:hover{background:var(--paper-sunken);border-color:var(--seal);}

/* ── ADDRESS SETUP ── */
.setup-card{background:var(--paper-raised);border:1px solid var(--rule);border-left:4px solid var(--seal);border-radius:4px;padding:18px;margin-bottom:16px;}
.setup-title{font-family:var(--font-kai);font-size:13px;font-weight:700;color:var(--seal);margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* ── COURT ADDRESS CHIPS ── */
.court-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.court-chip{padding:5px 12px;border-radius:2px;border:1px solid var(--rule);background:var(--paper-raised);color:var(--ink-soft);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-kai);transition:all .15s;}
.court-chip:hover{border-color:var(--seal);color:var(--seal);}

/* ── TABS ── */
.tab-bar{background:var(--paper-raised);border-bottom:1px solid var(--rule);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:93px;z-index:150;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:10px 16px;border:none;background:transparent;color:var(--ink-soft);font-weight:500;font-size:12px;cursor:pointer;font-family:var(--font-kai);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--seal);font-weight:700;border-bottom-color:var(--seal);}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:3px;border-radius:2px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid currentColor;background:transparent;}

/* ── ALARM BELL ── */
.alarm-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.alarm-btn{padding:5px 12px;border-radius:2px;border:1px solid var(--rule);background:var(--paper-raised);color:var(--ink-soft);font-size:11px;cursor:pointer;font-family:var(--font-kai);transition:all .15s;}
.alarm-btn.set{background:var(--positive-wash);border-color:var(--positive);color:var(--positive);}

/* ── UPCOMING LIST ── */
.upcoming-item{display:flex;gap:12px;padding:12px 16px;background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;margin-bottom:8px;}
.upcoming-date{min-width:52px;text-align:center;background:var(--paper-sunken);border-radius:2px;padding:6px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.upcoming-month{font-size:9px;color:var(--ink-soft);text-transform:uppercase;}
.upcoming-day{font-family:var(--font-kai);font-size:20px;font-weight:800;color:var(--seal);line-height:1;font-variant-numeric:tabular-nums;}
.upcoming-weekday{font-size:9px;color:var(--ink-soft);}

/* ── NOTICE ── */
.notice{background:var(--warning-wash);border:1px solid var(--warning);border-radius:3px;padding:12px 16px;display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;}

/* ── EMPTY / LOADING / LOGIN ── */
.empty{text-align:center;padding:50px 20px;color:var(--ink-faint);}
.empty-ico{font-size:44px;margin-bottom:12px;opacity:.35;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px;color:var(--ink-soft);}
.spinner{width:36px;height:36px;border:3px solid var(--paper-sunken);border-top-color:var(--seal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--paper);}
.login-box{background:var(--paper-raised);border:1px solid var(--rule-strong);border-top:3px solid var(--seal);border-radius:4px;padding:40px 36px;width:100%;max-width:380px;box-shadow:var(--shadow-raised);}
.login-err{background:var(--seal-wash);border:1px solid transparent;color:var(--seal);border-radius:2px;padding:10px 14px;font-size:13px;margin-bottom:14px;}

/* ── FORM ── */
.fi{background:var(--paper-raised);border:1px solid var(--rule);border-radius:2px;padding:8px 11px;color:var(--ink);font-size:12px;outline:none;font-family:var(--font-song);transition:border-color .2s;width:100%;}
.fi:focus{border-color:var(--seal);box-shadow:0 0 0 3px var(--seal-wash);}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:9px;color:var(--ink-soft);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:var(--font-kai);}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);border:1px solid var(--seal);color:var(--paper-raised);padding:10px 22px;border-radius:2px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-raised);}
#toast.show{opacity:1;}

/* ── BNAV ── */
.bnav{display:none;}
@media(max-width:640px){
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--paper-raised);border-top:1px solid var(--rule);z-index:200;}
  .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;font-size:9px;color:var(--ink-soft);cursor:pointer;gap:2px;border:none;background:transparent;font-family:var(--font-kai);}
  .bnav-btn.active{color:var(--seal);}
  .bnav-icon{font-size:18px;}
  .app{padding-bottom:72px;}
  .content{padding:12px 14px;}
}
a{color:var(--seal);text-decoration:none;}

/* ios-no-autozoom */@media(max-width:768px){input,select,textarea{font-size:16px!important}}
</style>
</head>
<body>
<script src="shared/sys-nav.js" data-active="court"></script>
<div id="root"></div>
<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getFirestore,collection,onSnapshot}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
const cfg={apiKey:"AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",authDomain:"legalcasemanageer.firebaseapp.com",projectId:"legalcasemanageer",storageBucket:"legalcasemanageer.firebasestorage.app",messagingSenderId:"559838504556",appId:"1:559838504556:web:ba10c071a12650bbd85a49"};
const app=initializeApp(cfg);
const db=getFirestore(app);
const auth=getAuth(app);

// ══════════════════════════════════════════
// 常數
// ══════════════════════════════════════════
const COURTS = {
  "臺灣臺北地方法院":     {addr:"台北市中正區重慶南路一段126號",   lat:25.0430, lng:121.5127},
  "臺灣士林地方法院":     {addr:"台北市士林區士林法院",             lat:25.0924, lng:121.5267},
  "臺灣新北地方法院":     {addr:"新北市板橋區縣民大道二段95號",    lat:25.0092, lng:121.4581},
  "臺灣桃園地方法院":     {addr:"桃園市桃園區裕農路325號",         lat:24.9956, lng:121.3133},
  "臺灣臺中地方法院":     {addr:"台中市西區民權路380號",            lat:24.1477, lng:120.6730},
  "臺灣臺南地方法院":     {addr:"台南市中西區中山路175號",          lat:22.9917, lng:120.2033},
  "臺灣高雄地方法院":     {addr:"高雄市苓雅區凱旋二路75號",        lat:22.6261, lng:120.3119},
  "臺灣高等法院":         {addr:"台北市中正區博愛路131號",          lat:25.0449, lng:121.5087},
  "臺灣高等法院台中分院": {addr:"台中市西區民生路233號",            lat:24.1501, lng:120.6672},
  "臺灣高等法院台南分院": {addr:"台南市中西區府前路一段307號",      lat:22.9984, lng:120.2073},
  "臺灣高等法院高雄分院": {addr:"高雄市三民區九如一路956號",        lat:22.6502, lng:120.2973},
  "最高法院":             {addr:"台北市中正區重慶南路一段124號",    lat:25.0433, lng:121.5122},
  "最高行政法院":         {addr:"台北市中正區重慶南路一段126號",    lat:25.0430, lng:121.5127},
  "臺北高等行政法院":     {addr:"台北市中正區重慶南路一段126號",    lat:25.0430, lng:121.5127},
};

const TRANSPORT_MODES = [
  {key:"driving",  label:"🚗 開車",  gmaps:"driving",   buffer:20},
  {key:"transit",  label:"🚇 大眾",  gmaps:"transit",   buffer:15},
  {key:"walking",  label:"🚶 步行",  gmaps:"walking",   buffer:10},
  {key:"bicycling",label:"🚲 騎車",  gmaps:"bicycling", buffer:10},
];

// 各法院預設行車時間（分鐘），從台北市中心出發的參考值
const DEFAULT_TRAVEL = {
  "臺灣臺北地方法院":10,"臺灣士林地方法院":25,"臺灣新北地方法院":30,
  "臺灣桃園地方法院":60,"臺灣臺中地方法院":130,"臺灣臺南地方法院":180,
  "臺灣高雄地方法院":200,"臺灣高等法院":10,"最高法院":10,"最高行政法院":10,
  "臺北高等行政法院":10,
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
function twNow(){return new Date(new Date().getTime()+8*3600000);}
function twToday(){return twNow().toISOString().split("T")[0];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function toast(msg){const t=document.getElementById("toast");if(!t)return;t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600);}
function applyTheme(m){const eff=m==="auto"?(twNow().getHours()>=6&&twNow().getHours()<20?"light":"dark"):m;document.documentElement.classList.toggle("light",eff==="light");}

let S={
  user:null,authChecked:false,cases:[],loading:true,
  tab:"today",
  transport:"driving",
  themeMode:localStorage.getItem("navTheme")||"dark",
  homeAddr:localStorage.getItem("homeAddr")||"",
  alarms:{},   // hearingKey → alarm minutes (e.g. "2024-12-01_09:00_台北地院" → 30)
  customTimes:{}, // courtName → custom travel minutes
  showSetup:false,
  filterDate:"",
  notifyPerm: Notification.permission,
};

applyTheme(S.themeMode);

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
onAuthStateChanged(auth,u=>{
  S.user=u;S.authChecked=true;
  if(u){
    try{const c=localStorage.getItem("nav_cases_cache");if(c){S.cases=JSON.parse(c);S.loading=false;render();}}catch(_){}
    onSnapshot(collection(db,"cases"),snap=>{
      S.cases=snap.docs.map(d=>({...d.data(),id:d.id}));
      S.loading=false;
      try{localStorage.setItem("nav_cases_cache",JSON.stringify(S.cases));}catch(_){}
      render();
    },()=>{S.loading=false;render();});
  }else{S.loading=false;render();}
});

// ══════════════════════════════════════════
// 資料處理
// ══════════════════════════════════════════
function getAllHearings(){
  const list=[];
  S.cases.forEach(c=>{
    (c.hearings||[]).forEach(h=>{
      if(h.date){
        list.push({
          ...h,
          caseName:c.clientName||c.caseNo||"",
          caseNo:c.caseNo||"",
          caseType:c.caseType||"civil",
          caseId:c.id,
        });
      }
    });
  });
  return list.sort((a,b)=>(a.date+a.time||"").localeCompare(b.date+b.time||""));
}

function getTodayHearings(){
  const today=twToday();
  return getAllHearings().filter(h=>h.date===today);
}

function getUpcomingHearings(days=30){
  const today=twToday();
  const future=new Date(new Date(today).getTime()+days*86400000).toISOString().split("T")[0];
  return getAllHearings().filter(h=>h.date>today&&h.date<=future);
}

function minutesUntilHearing(h){
  const now=twNow();
  const dateStr=`${h.date}T${h.time||"09:00"}:00+08:00`;
  const hTime=new Date(dateStr);
  return Math.round((hTime-now)/60000);
}

function getTravelMinutes(courtName){
  const custom=S.customTimes[courtName];
  if(custom) return parseInt(custom);
  const base=DEFAULT_TRAVEL[courtName]||20;
  const mode=TRANSPORT_MODES.find(m=>m.key===S.transport);
  const factor={driving:1,transit:1.3,walking:4,bicycling:2}[S.transport]||1;
  return Math.round(base*factor);
}

function getDepartTime(h){
  const now=twNow();
  const dateStr=`${h.date}T${h.time||"09:00"}:00+08:00`;
  const hTime=new Date(dateStr);
  const travel=getTravelMinutes(h.agency||"");
  const mode=TRANSPORT_MODES.find(m=>m.key===S.transport);
  const buffer=mode?.buffer||15;
  const departMs=hTime.getTime()-(travel+buffer)*60000;
  const depart=new Date(departMs);
  const diff=Math.round((departMs-now.getTime())/60000);
  return{departTime:depart,minutesLeft:diff,travel,buffer};
}

function fmtTime(d){
  const h=String(d.getHours()).padStart(2,"0");
  const m=String(d.getMinutes()).padStart(2,"0");
  return `${h}:${m}`;
}

function buildMapsUrl(courtName,mode){
  const court=COURTS[courtName];
  const dest=court?`${court.lat},${court.lng}`:encodeURIComponent(courtName+"法院");
  const origin=S.homeAddr?encodeURIComponent(S.homeAddr):"";
  const base="https://www.google.com/maps/dir/";
  const tMode=TRANSPORT_MODES.find(m=>m.key===mode)?.gmaps||"driving";
  if(origin) return `${base}${origin}/${typeof dest==="string"?dest:dest}?travelmode=${tMode}`;
  return `https://www.google.com/maps/search/?api=1&query=${court?`${court.lat},${court.lng}`:encodeURIComponent(courtName)}`;
}

function getCaseTypeColor(t){
  return{civil:"#2A3D4F",criminal:"#9E2A24",admin:"#A6741C",family:"#99604F",labor:"#3A6B4F",ip:"#6B6250"}[t]||"#8A8377";
}
function getCaseTypeLabel(t){
  return{civil:"民事",criminal:"刑事",admin:"行政",family:"家事",labor:"勞動",ip:"智財"}[t]||"其他";
}

// ══════════════════════════════════════════
// 通知
// ══════════════════════════════════════════
async function requestNotify(){
  if(Notification.permission==="default"){
    const p=await Notification.requestPermission();
    S.notifyPerm=p;
    toast(p==="granted"?"✅ 通知已啟用":"❌ 通知未授權");
    render();
  }
}

function scheduleAlarm(h, minutesBefore){
  const key=`${h.date}_${h.time}_${h.agency}`;
  const dateStr=`${h.date}T${h.time||"09:00"}:00+08:00`;
  const hTime=new Date(dateStr).getTime();
  const alarmTime=hTime-minutesBefore*60000;
  const now=Date.now();
  const delay=alarmTime-now;

  if(delay>0){
    setTimeout(()=>{
      if(Notification.permission==="granted"){
        const n=new Notification("⚖ 開庭提醒",{
          body:`${minutesBefore}分鐘後開庭\n${h.time} ${h.agency||""} ${h.courtroom||""}\n當事人：${h.caseName||""}`,
          icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖</text></svg>",
          requireInteraction:true,
        });
        n.onclick=()=>window.focus();
      }
      toast(`⏰ 提醒：${minutesBefore}分鐘後 ${h.agency||""} 開庭`);
    },delay);
    S.alarms[key]=minutesBefore;
    toast(`✅ 已設定：開庭前 ${minutesBefore} 分鐘提醒`);
  } else {
    toast("⚠️ 開庭時間已過，無法設定提醒");
  }
  render();
}

function bindApp(){
  document.getElementById("btn-theme")?.addEventListener("click",()=>{S.themeMode=S.themeMode==="dark"?"light":S.themeMode==="light"?"auto":"dark";localStorage.setItem("navTheme",S.themeMode);applyTheme(S.themeMode);render();});

  document.getElementById("btn-setup")?.addEventListener("click",()=>{S.showSetup=!S.showSetup;render();});
  document.getElementById("btn-setup-bnav")?.addEventListener("click",()=>{S.showSetup=!S.showSetup;render();});
  document.getElementById("close-setup")?.addEventListener("click",()=>{S.showSetup=false;render();});
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.tab;render();}));
  document.getElementById("btn-notify")?.addEventListener("click",requestNotify);

  // Transport
  document.querySelectorAll("[data-transport]").forEach(b=>{
    b.addEventListener("click",()=>{S.transport=b.dataset.transport;render();});
  });

  // Setup save
  document.getElementById("save-setup")?.addEventListener("click",()=>{
    const addr=document.getElementById("home-addr")?.value.trim();
    if(addr){S.homeAddr=addr;localStorage.setItem("homeAddr",addr);}
    document.querySelectorAll("[data-court-time]").forEach(inp=>{
      const court=inp.dataset.courtTime;
      const val=parseInt(inp.value);
      if(val>0)S.customTimes[court]=val;
    });
    S.showSetup=false;
    toast("✅ 設定已儲存");
    render();
  });

  // Alarms
  document.querySelectorAll("[data-alarm-h]").forEach(b=>{
    b.addEventListener("click",async()=>{
      if(S.notifyPerm!=="granted"){
        await requestNotify();
        if(Notification.permission!=="granted")return;
      }
      const hKey=b.dataset.alarmH;
      const mins=parseInt(b.dataset.alarmM);
      // Find the hearing
      const all=getAllHearings();
      const h=all.find(h=>`${h.date}_${h.time}_${h.agency}`===hKey);
      if(h)scheduleAlarm(h,mins);
    });
  });
}

render();

// 每分鐘更新一次（倒數計時）
setInterval(render, 60000);
</script>
</body>
</html>
