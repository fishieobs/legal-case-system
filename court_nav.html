<style>
:root{
  /* ── legal-design-tw 權杖 ── */
  --paper:#FAF7F0;--paper-raised:#FFFFFF;--paper-sunken:#F1ECE1;
  --ink:#211E1A;--ink-soft:#5B554D;--ink-faint:#8A8377;
  --seal:#9E2A24;--seal-bright:#C0392B;--seal-wash:#F3E3DF;
  --positive:#3A6B4F;--negative:#9E2A24;--warning:#A6741C;--navy:#2A3D4F;
  --positive-wash:#E7EFE9;--warning-wash:#F3EBDA;
  --rule:#DDD5C7;--rule-strong:#C4BAA6;
  --font-kai:"BiauKai","DFKai-SB","標楷體","KaiTi","STKaiti","Kaiti TC","Noto Serif TC",serif;
  --font-song:"Noto Serif TC","Source Han Serif TC","PMingLiU","新細明體","Songti TC",serif;
  --shadow-raised:0 2px 10px rgba(33,30,26,.10);
  /* ── 舊變數別名 → 權杖（既有 inline var(--…) 自動換色）── */
  --bg:var(--paper);--bg2:var(--paper-raised);--bg3:var(--paper-raised);--bg4:var(--paper-sunken);--bg5:var(--paper-sunken);
  --blue:var(--navy);--blue2:var(--navy);--blue3:var(--navy);
  --gold:var(--seal);--gold2:var(--seal-bright);
  --text:var(--ink);--text2:var(--ink-soft);--text3:var(--ink-soft);--text4:var(--ink-faint);
  --green:var(--positive);--red:var(--negative);--orange:var(--warning);--purple:var(--seal);
  --border:var(--rule);--border2:var(--rule-strong);
  --shadow:none;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--paper);color:var(--ink);font-family:var(--font-song);line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--paper);}
::-webkit-scrollbar-thumb{background:var(--rule-strong);border-radius:2px;}

/* ── SYS NAV ── */
.sys-nav{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(250,247,240,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:2px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;}
.sys-nav::-webkit-scrollbar{display:none;}
.sys-nav-item{display:inline-flex;align-items:center;padding:6px 12px;border-radius:2px;font-size:11px;font-weight:700;white-space:nowrap;transition:all .15s;text-decoration:none;border:1px solid transparent;font-family:var(--font-kai);}
.sys-nav-item.active{background:var(--seal-wash);color:var(--seal);border-color:var(--seal);cursor:default;}
a.sys-nav-item{color:var(--ink-faint);}
a.sys-nav-item:hover{background:var(--paper-sunken);color:var(--seal);}
.sys-nav-logo{font-size:13px;color:var(--ink-faint);margin-right:6px;flex-shrink:0;border-right:1px solid var(--rule);padding-right:10px;}

/* ── LAYOUT ── */
.app{min-height:100vh;padding-top:41px;}
.hdr{background:var(--paper-raised);border-bottom:2px solid var(--seal);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:41px;z-index:200;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-title{font-family:var(--font-kai);font-size:1.05rem;font-weight:700;letter-spacing:.04em;color:var(--ink);}
.hdr-sub{font-size:9px;color:var(--ink-faint);letter-spacing:.1em;}
.hdr-actions{display:flex;gap:7px;align-items:center;}

/* ── BUTTONS ── */
.btn{padding:8px 14px;border-radius:2px;font-weight:700;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:var(--font-kai);transition:all .15s;white-space:nowrap;}
.btn:active{opacity:.8;}
.btn-blue{background:var(--seal);color:var(--paper-raised);border-color:var(--seal);}
.btn-blue:hover{background:var(--seal-bright);}
.btn-outline{background:transparent;border:1px solid var(--rule-strong);color:var(--ink-soft);}
.btn-outline:hover{border-color:var(--seal);color:var(--seal);}
.btn-ghost{background:transparent;color:var(--ink-faint);border:none;}
.btn-ghost:hover{color:var(--seal);background:var(--paper-sunken);}

a{color:var(--seal);text-decoration:none;}

  "臺灣高等法院台南分院": {addr:"台南市中西區府前路一段307號",      lat:22.9984, lng:120.2073},
  "臺灣高等法院高雄分院": {addr:"高雄市三民區九如一路956號",        lat:22.6502, lng:120.2973},

const TRANSPORT_MODES = [

// 各法院預設行車時間（分鐘），從台北市中心出發的參考值
const DEFAULT_TRAVEL = {
  "臺灣臺北地方法院":10,"臺灣士林地方法院":25,"臺灣新北地方法院":30,
  "臺灣桃園地方法院":60,"臺灣臺中地方法院":130,"臺灣臺南地方法院":180,
  "臺灣高雄地方法院":200,"臺灣高等法院":10,"最高法院":10,"最高行政法院":10,
  "臺北高等行政法院":10,
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
function twNow(){return new Date(new Date().getTime()+8*3600000);}
function twToday(){return twNow().toISOString().split("T")[0];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
function toast(msg){const t=document.getElementById("toast");if(!t)return;t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600);}
function applyTheme(m){const eff=m==="auto"?(twNow().getHours()>=6&&twNow().getHours()<20?"light":"dark"):m;document.documentElement.classList.toggle("light",eff==="light");}

let S={
  user:null,authChecked:false,cases:[],loading:true,
  tab:"today",
  transport:"driving",
  themeMode:localStorage.getItem("navTheme")||"dark",
  homeAddr:localStorage.getItem("homeAddr")||"",
  alarms:{},   // hearingKey → alarm minutes (e.g. "2024-12-01_09:00_台北地院" → 30)
  customTimes:{}, // courtName → custom travel minutes
  showSetup:false,
  filterDate:"",
  notifyPerm: Notification.permission,
};

applyTheme(S.themeMode);

// ══════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════
onAuthStateChanged(auth,u=>{
  S.user=u;S.authChecked=true;
  if(u){
    try{const c=localStorage.getItem("nav_cases_cache");if(c){S.cases=JSON.parse(c);S.loading=false;render();}}catch(_){}
    onSnapshot(collection(db,"cases"),snap=>{
      S.cases=snap.docs.map(d=>({...d.data(),id:d.id}));
      S.loading=false;
      try{localStorage.setItem("nav_cases_cache",JSON.stringify(S.cases));}catch(_){}
      render();
    },()=>{S.loading=false;render();});
  }else{S.loading=false;render();}
});

// ══════════════════════════════════════════
// 資料處理
// ══════════════════════════════════════════
function getAllHearings(){
  const list=[];
  S.cases.forEach(c=>{
    (c.hearings||[]).forEach(h=>{
      if(h.date){
        list.push({
          ...h,
          caseName:c.clientName||c.caseNo||"",
          caseNo:c.caseNo||"",
          caseType:c.caseType||"civil",
          caseId:c.id,
        });
      }
    });
  });
  return list.sort((a,b)=>(a.date+a.time||"").localeCompare(b.date+b.time||""));
}

function getTodayHearings(){
  const today=twToday();
  return getAllHearings().filter(h=>h.date===today);
}

function getUpcomingHearings(days=30){
  const today=twToday();
  const future=new Date(new Date(today).getTime()+days*86400000).toISOString().split("T")[0];
  return getAllHearings().filter(h=>h.date>today&&h.date<=future);
}

function minutesUntilHearing(h){
  const now=twNow();
  const dateStr=`${h.date}T${h.time||"09:00"}:00+08:00`;
  const hTime=new Date(dateStr);
  return Math.round((hTime-now)/60000);
}

function getTravelMinutes(courtName){
  const custom=S.customTimes[courtName];
  if(custom) return parseInt(custom);
  const base=DEFAULT_TRAVEL[courtName]||20;
  const mode=TRANSPORT_MODES.find(m=>m.key===S.transport);
  const factor={driving:1,transit:1.3,walking:4,bicycling:2}[S.transport]||1;
  return Math.round(base*factor);
}

function getDepartTime(h){
  const now=twNow();
  const dateStr=`${h.date}T${h.time||"09:00"}:00+08:00`;
  const hTime=new Date(dateStr);
  const travel=getTravelMinutes(h.agency||"");
  const mode=TRANSPORT_MODES.find(m=>m.key===S.transport);
  const buffer=mode?.buffer||15;
  const departMs=hTime.getTime()-(travel+buffer)*60000;
  const depart=new Date(departMs);
  const diff=Math.round((departMs-now.getTime())/60000);
  return{departTime:depart,minutesLeft:diff,travel,buffer};
}

function fmtTime(d){
  const h=String(d.getHours()).padStart(2,"0");
  const m=String(d.getMinutes()).padStart(2,"0");
  return `${h}:${m}`;
}

function buildMapsUrl(courtName,mode){
  const court=COURTS[courtName];
  const dest=court?`${court.lat},${court.lng}`:encodeURIComponent(courtName+"法院");
  const origin=S.homeAddr?encodeURIComponent(S.homeAddr):"";
  const base="https://www.google.com/maps/dir/";
  const tMode=TRANSPORT_MODES.find(m=>m.key===mode)?.gmaps||"driving";
  if(origin) return `${base}${origin}/${typeof dest==="string"?dest:dest}?travelmode=${tMode}`;
  return `https://www.google.com/maps/search/?api=1&query=${court?`${court.lat},${court.lng}`:encodeURIComponent(courtName)}`;
}

function getCaseTypeColor(t){
  return{civil:"#2A3D4F",criminal:"#9E2A24",admin:"#A6741C",family:"#99604F",labor:"#3A6B4F",ip:"#6B6250"}[t]||"#8A8377";
}
function getCaseTypeLabel(t){
  return{civil:"民事",criminal:"刑事",admin:"行政",family:"家事",labor:"勞動",ip:"智財"}[t]||"其他";
}

// ══════════════════════════════════════════
// 通知
// ══════════════════════════════════════════
async function requestNotify(){
  if(Notification.permission==="default"){
    const p=await Notification.requestPermission();
    S.notifyPerm=p;
    toast(p==="granted"?"✅ 通知已啟用":"❌ 通知未授權");
    render();
  }
}

function scheduleAlarm(h, minutesBefore){
  const key=`${h.date}_${h.time}_${h.agency}`;
  const dateStr=`${h.date}T${h.time||"09:00"}:00+08:00`;
  const hTime=new Date(dateStr).getTime();
  const alarmTime=hTime-minutesBefore*60000;
  const now=Date.now();
  const delay=alarmTime-now;

  if(delay>0){
    setTimeout(()=>{
      if(Notification.permission==="granted"){
        const n=new Notification("⚖ 開庭提醒",{
          body:`${minutesBefore}分鐘後開庭\n${h.time} ${h.agency||""} ${h.courtroom||""}\n當事人：${h.caseName||""}`,
          icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖</text></svg>",
          requireInteraction:true,
        });
        n.onclick=()=>window.focus();
      }
      toast(`⏰ 提醒：${minutesBefore}分鐘後 ${h.agency||""} 開庭`);
    },delay);
    S.alarms[key]=minutesBefore;
    toast(`✅ 已設定：開庭前 ${minutesBefore} 分鐘提醒`);
  } else {
    toast("⚠️ 開庭時間已過，無法設定提醒");
  }
  render();
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(){
  const root=document.getElementById("root");
  if(!root)return;
  applyTheme(S.themeMode);
  if(!S.authChecked){root.innerHTML=`<div class="loading"><div class="spinner"></div><div>連線中…</div></div>`;return;}
  if(!S.user){root.innerHTML=renderLogin();bindLogin();return;}
  if(S.loading){root.innerHTML=`<div class="app"><div class="loading"><div class="spinner"></div><div>載入案件資料…</div></div></div>`;return;}
  root.innerHTML=renderApp();
  bindApp();
}

function renderLogin(){return`

    <button id="spw" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px">👁</button></div>
  </div>
  <button id="lbtn" class="btn btn-blue" style="width:100%;justify-content:center;font-size:14px;padding:12px">🔐 登入</button>
</div></div>`;}
function bindLogin(){
  const go=async()=>{
    const em=document.getElementById("lem")?.value.trim();
    const pw=document.getElementById("lpw")?.value;
    const err=document.getElementById("lerr");
    if(!em||!pw){if(err){err.style.display="block";err.textContent="請輸入帳號密碼";}return;}
    document.getElementById("lbtn").textContent="登入中…";
    try{await signInWithEmailAndPassword(auth,em,pw);}
    catch(e){if(err){err.style.display="block";err.textContent={"auth/invalid-credential":"帳號或密碼錯誤","auth/too-many-requests":"嘗試次數過多"}[e.code]||"登入失敗";}document.getElementById("lbtn").textContent="🔐 登入";}
  };
  document.getElementById("lbtn")?.addEventListener("click",go);
  document.getElementById("lpw")?.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  document.getElementById("spw")?.addEventListener("click",()=>{const i=document.getElementById("lpw");i.type=i.type==="password"?"text":"password";});
}

// ── APP ──
function renderApp(){
  const thIcon=S.themeMode==="dark"?"🌙":S.themeMode==="light"?"☀️":"🕐";
  const todayHearings=getTodayHearings();
  const upcomingHearings=getUpcomingHearings(30);
  const now=twNow();
  const weekdays=["日","一","二","三","四","五","六"];
  const dateLabel=`${now.getMonth()+1}月${now.getDate()}日（${weekdays[now.getDay()]}）`;

  return`
<div class="app">
  <div class="hdr">
    <div class="hdr-brand">
      <div style="font-size:22px">🗺</div>
      <div><div class="hdr-title">開庭行程助理</div><div class="hdr-sub">${dateLabel} · ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}</div></div>
    </div>
    <div class="hdr-actions">
      <button class="btn btn-ghost" style="padding:7px 10px;font-size:15px" id="btn-theme">${thIcon}</button>
      <button class="btn btn-outline btn-sm" id="btn-setup">⚙️ 設定</button>
      <button class="btn btn-ghost" style="padding:7px 10px" id="btn-logout">🚪</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab${S.tab==="today"?" active":""}" data-tab="today">📅 今日開庭（${todayHearings.length}）</button>
    <button class="tab${S.tab==="upcoming"?" active":""}" data-tab="upcoming">📆 近期庭期（${upcomingHearings.length}）</button>
    <button class="tab${S.tab==="courts"?" active":""}" data-tab="courts">🏛 法院資訊</button>
  </div>

  <div class="content">

  ${S.showSetup?renderSetup():""}

  ${S.notifyPerm==="default"&&!S.showSetup?`
  <div class="notice">
    <span style="font-size:20px">🔔</span>
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--orange);margin-bottom:3px">啟用開庭提醒通知</div>
      <div style="font-size:12px;color:var(--text2)">授權通知後，可在開庭前自動提醒您出發</div>
      <button class="btn btn-blue btn-sm" style="margin-top:8px" id="btn-notify">🔔 啟用通知</button>
    </div>
  </div>`:""}

  ${S.tab==="today"?renderToday(todayHearings):""}
  ${S.tab==="upcoming"?renderUpcoming(upcomingHearings):""}
  ${S.tab==="courts"?renderCourts():""}

  </div>

  <div class="bnav">
    <button class="bnav-btn${S.tab==="today"?" active":""}" data-tab="today"><span class="bnav-icon">📅</span>今日</button>
    <button class="bnav-btn${S.tab==="upcoming"?" active":""}" data-tab="upcoming"><span class="bnav-icon">📆</span>近期</button>
    <button class="bnav-btn${S.tab==="courts"?" active":""}" data-tab="courts"><span class="bnav-icon">🏛</span>法院</button>
    <button class="bnav-btn" id="btn-setup-bnav"><span class="bnav-icon">⚙️</span>設定</button>
  </div>
</div>`;}

// ── SETUP ──
function renderSetup(){return`
<div class="setup-card">
  <div class="setup-title">⚙️ 個人設定
    <button class="btn btn-outline btn-xs" id="close-setup" style="margin-left:auto">✕ 關閉</button>
  </div>
  <div class="fg" style="margin-bottom:12px">
    <label class="fl">出發地址（事務所或住家）</label>
    <input class="fi" id="home-addr" value="${esc(S.homeAddr)}" placeholder="例：台北市中山區中山北路二段100號">
    <div style="font-size:10px;color:var(--text4);margin-top:3px">用於 Google Maps 路線規劃起點</div>
  </div>
  <div class="fg" style="margin-bottom:12px">
    <label class="fl">預設交通方式</label>
    <div class="transport-tabs">
      ${TRANSPORT_MODES.map(m=>`<button class="transport-btn${S.transport===m.key?" active":""}" data-transport="${m.key}">${m.label}</button>`).join("")}
    </div>
  </div>
  <div class="fg" style="margin-bottom:12px">
    <label class="fl">常用法院自訂行車時間（分鐘）</label>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:4px">
      ${Object.keys(COURTS).slice(0,8).map(name=>`
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)">
        <span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${name.replace("臺灣","").replace("地方法院","地院")}</span>
        <input class="fi" type="number" min="1" max="300" style="width:58px;padding:5px 7px;text-align:center" data-court-time="${name}" value="${S.customTimes[name]||DEFAULT_TRAVEL[name]||20}">
      </div>`).join("")}
    </div>
  </div>
  <button class="btn btn-blue btn-sm" id="save-setup">💾 儲存設定</button>
</div>`;}

// ── TODAY ──
function renderToday(hearings){
  const now=twNow();
  if(hearings.length===0) return`
  <div class="hero-card">
    <div class="hero-date">今日 · ${twToday()}</div>
    <div class="hero-count" style="color:var(--green)">今日無庭</div>
    <div class="hero-label">輕鬆休息 ☕</div>
  </div>`;

  const pastCount=hearings.filter(h=>minutesUntilHearing(h)<0).length;
  const remaining=hearings.length-pastCount;
  return`
  <div class="hero-card">
    <div class="hero-date">今日 · ${twToday()}</div>
    <div style="display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap">
      <div>
        <div class="hero-count">${hearings.length}</div>
        <div class="hero-label">場庭期</div>
      </div>
      ${remaining>0?`<div><div class="hero-count" style="font-size:22px;color:var(--orange)">${remaining}</div><div class="hero-label">場尚未開庭</div></div>`:""}
      ${pastCount>0?`<div><div class="hero-count" style="font-size:22px;color:var(--text3)">${pastCount}</div><div class="hero-label">場已結束</div></div>`:""}
    </div>
  </div>

  ${hearings.map(h=>renderHearingCard(h,true)).join("")}`;}

// ── UPCOMING ──
function renderUpcoming(hearings){
  if(hearings.length===0) return`<div class="empty"><div class="empty-ico">📆</div><div>近30天無庭期</div></div>`;

  // 按日期分組
  const byDate={};
  hearings.forEach(h=>{if(!byDate[h.date])byDate[h.date]=[];byDate[h.date].push(h);});
  const weekdays=["日","一","二","三","四","五","六"];

  return Object.entries(byDate).map(([date,hs])=>{
    const d=new Date(date+"T00:00:00+08:00");
    const daysLeft=Math.ceil((d-twNow())/(1000*60*60*24));
    return`
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">
        <div style="background:var(--bg4);border-radius:8px;padding:4px 10px;text-align:center;min-width:56px">
          <div style="font-size:9px;color:var(--text3)">${d.getMonth()+1}月</div>
          <div style="font-size:22px;font-weight:800;color:var(--blue);line-height:1">${d.getDate()}</div>
          <div style="font-size:9px;color:var(--text3)">${weekdays[d.getDay()]}</div>
        </div>
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">${hs.length}場庭期</div>
          <div style="font-size:11px;color:${daysLeft<=3?"var(--orange)":"var(--text3)"}">${daysLeft}天後</div>
        </div>
      </div>
      ${hs.map(h=>renderHearingCard(h,false)).join("")}
    </div>`;
  }).join("");}

function renderHearingCard(h,showDepart){
  const mins=minutesUntilHearing(h);
  const color=getCaseTypeColor(h.caseType);
  const courtInfo=COURTS[h.agency||""];
  const key=`${h.date}_${h.time}_${h.agency}`;
  const alarmSet=S.alarms[key];
  const depart=showDepart&&mins>-120?getDepartTime(h):null;

  let countdownClass="countdown-past",countdownLabel="已結束";
  if(mins>0){
    if(mins<=30){countdownClass="countdown-urgent";countdownLabel=`${mins}分鐘後開庭`;}
    else if(mins<=120){countdownClass="countdown-soon";countdownLabel=`${Math.floor(mins/60)}小時${mins%60}分鐘後`;}
    else{countdownClass="countdown-ok";countdownLabel=`今日 ${h.time} 開庭`;}
  }

  return`
  <div class="h-card" style="border-left:4px solid ${color}">
    <div class="h-card-top">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
        <div>
          <div class="h-card-time">${h.time||"時間未定"}</div>
          <div class="h-card-countdown ${countdownClass}">${countdownLabel}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          <span class="badge" style="background:${color}22;color:${color};border-color:${color}44">${getCaseTypeLabel(h.caseType)}</span>
          ${h.courtroom?`<span style="font-size:11px;color:var(--text3)">🚪 ${h.courtroom}法庭</span>`:""}
        </div>
      </div>
    </div>
    <div class="h-card-body">
      <div class="h-card-title">${esc(h.caseName||"（未填案件名稱）")}
        ${h.caseNo?`<span style="font-size:11px;color:var(--text3);font-weight:400"> · ${esc(h.caseNo)}</span>`:""}
      </div>
      <div class="h-meta-row">
        ${h.agency?`<span class="h-meta-item">🏛 ${esc(h.agency)}</span>`:""}
        ${h.courtroom?`<span class="h-meta-item">🚪 ${h.courtroom}法庭</span>`:""}
        ${h.judge?`<span class="h-meta-item">👨‍⚖️ ${esc(h.judge)}</span>`:""}
      </div>

      ${showDepart&&depart?`
      <div class="depart-box">
        <div class="transport-tabs" style="margin-bottom:10px">
          ${TRANSPORT_MODES.map(m=>`<button class="transport-btn${S.transport===m.key?" active":""}" data-transport="${m.key}">${m.label}</button>`).join("")}
        </div>
        <div class="depart-row">
          <div>
            <div class="depart-label">建議出發時間</div>
            <div class="depart-value" style="color:${depart.minutesLeft<0?"var(--red)":depart.minutesLeft<15?"var(--orange)":"var(--blue)"}">
              ${fmtTime(depart.departTime)}
            </div>
            <div class="depart-note">
              ${depart.minutesLeft>0?`距出發還有 ${depart.minutesLeft} 分鐘`:depart.minutesLeft===0?"現在出發！":"已延遲 "+Math.abs(depart.minutesLeft)+" 分鐘"}
            </div>
          </div>
          <div style="text-align:right">
            <div class="depart-label">行車時間</div>
            <div style="font-size:16px;font-weight:700;color:var(--text2)">${depart.travel} 分鐘</div>
            <div class="depart-note">含 ${depart.buffer} 分鐘緩衝</div>
          </div>
        </div>
        ${h.agency?`<a class="map-btn" href="${buildMapsUrl(h.agency,S.transport)}" target="_blank" rel="noreferrer">
          📍 Google Maps 導航至 ${esc(h.agency)}
        </a>`:""}
        ${mins>0?`
        <div style="margin-top:10px">
          <div style="font-size:10px;color:var(--text3);margin-bottom:6px">⏰ 設定開庭提醒通知</div>
          <div class="alarm-row">
            ${[15,30,60,90].map(m=>`<button class="alarm-btn${alarmSet===m?" set":""}" data-alarm-h="${key}" data-alarm-m="${m}">
              ${alarmSet===m?"✅":""} ${m}分前
            </button>`).join("")}
          </div>
          ${S.notifyPerm!=="granted"?`<div style="font-size:10px;color:var(--orange);margin-top:6px">⚠️ 需先啟用通知權限</div>`:""}
        </div>`:""}
      </div>`:""}

      ${!showDepart&&h.agency?`
      <a class="map-btn" href="${buildMapsUrl(h.agency,S.transport)}" target="_blank" rel="noreferrer">
        📍 Google Maps 導航
      </a>`:""}
    </div>
  </div>`;}

// ── COURTS ──
function renderCourts(){
  return`
  <div style="margin-bottom:14px">
    <div style="font-size:13px;color:var(--text2);margin-bottom:4px">點擊法院可直接開啟 Google Maps 查看位置</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">
    ${Object.entries(COURTS).map(([name,info])=>`
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)">
      <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px">${name}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">📍 ${info.addr}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        ${TRANSPORT_MODES.map(m=>{
          const t=DEFAULT_TRAVEL[name]||20;
          const factor={driving:1,transit:1.3,walking:4,bicycling:2}[m.key]||1;
          return`<span style="font-size:10px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:2px 8px;color:var(--text3)">${m.label} ~${Math.round(t*factor)}分</span>`;
        }).join("")}
      </div>
      <div style="display:flex;gap:6px">
        <a href="https://www.google.com/maps?q=${info.lat},${info.lng}" target="_blank" rel="noreferrer"
           class="btn btn-outline btn-xs" style="flex:1;justify-content:center">
          📍 查看位置
        </a>
        <a href="${buildMapsUrl(name,S.transport)}" target="_blank" rel="noreferrer"
           class="btn btn-blue btn-xs" style="flex:1;justify-content:center">
          🗺 導航前往
        </a>
      </div>
    </div>`).join("")}
  </div>`;}

// ══════════════════════════════════════════
// BIND
// ══════════════════════════════════════════
function bindApp(){
  document.getElementById("btn-theme")?.addEventListener("click",()=>{S.themeMode=S.themeMode==="dark"?"light":S.themeMode==="light"?"auto":"dark";localStorage.setItem("navTheme",S.themeMode);applyTheme(S.themeMode);render();});
  document.getElementById("btn-logout")?.addEventListener("click",async()=>{if(confirm("確認登出？"))await signOut(auth);});
  document.getElementById("btn-setup")?.addEventListener("click",()=>{S.showSetup=!S.showSetup;render();});
  document.getElementById("btn-setup-bnav")?.addEventListener("click",()=>{S.showSetup=!S.showSetup;render();});
  document.getElementById("close-setup")?.addEventListener("click",()=>{S.showSetup=false;render();});
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.tab;render();}));
  document.getElementById("btn-notify")?.addEventListener("click",requestNotify);

  // Transport
  document.querySelectorAll("[data-transport]").forEach(b=>{
    b.addEventListener("click",()=>{S.transport=b.dataset.transport;render();});
  });

  // Setup save
  document.getElementById("save-setup")?.addEventListener("click",()=>{
    const addr=document.getElementById("home-addr")?.value.trim();
    if(addr){S.homeAddr=addr;localStorage.setItem("homeAddr",addr);}
    document.querySelectorAll("[data-court-time]").forEach(inp=>{
      const court=inp.dataset.courtTime;
      const val=parseInt(inp.value);
      if(val>0)S.customTimes[court]=val;
    });
    S.showSetup=false;
    toast("✅ 設定已儲存");
    render();
  });

  // Alarms
  document.querySelectorAll("[data-alarm-h]").forEach(b=>{
    b.addEventListener("click",async()=>{
      if(S.notifyPerm!=="granted"){
        await requestNotify();
        if(Notification.permission!=="granted")return;
      }
      const hKey=b.dataset.alarmH;
      const mins=parseInt(b.dataset.alarmM);
      // Find the hearing
      const all=getAllHearings();
      const h=all.find(h=>`${h.date}_${h.time}_${h.agency}`===hKey);
      if(h)scheduleAlarm(h,mins);
    });
  });
}

render();

// 每分鐘更新一次（倒數計時）
setInterval(render, 60000);
</script>
