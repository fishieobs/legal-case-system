<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="今日庭期">
<meta name="theme-color" content="#0a1628">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-widget.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-widget.png">
<link rel="manifest" href="manifest-widget.json">
<title>⚖ 今日庭期</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
    --bg:#020817;--bg2:#0a1628;--bg3:#0f172a;--bg4:#1e293b;
    --gold:#c8a96e;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;
    --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--border:#1e293b;
    --shadow:0 2px 8px rgba(0,0,0,.35);
}
:root.light{
    --bg:#f0f4f8;--bg2:#ffffff;--bg3:#ffffff;--bg4:#e2e8f0;
    --gold:#9a6f2e;--text:#1a2744;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
    --green:#16a34a;--red:#dc2626;--yellow:#d97706;--blue:#2563eb;--border:#e2e8f0;
    --shadow:0 2px 8px rgba(0,0,0,.08);
}
html,body{transition:background .3s,color .3s;}
html,body{min-height:100vh;padding-top:40px;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',system-ui,sans-serif;}

/* ── HEADER ── */
.header{background:var(--bg2);padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:40px;z-index:10;}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{font-size:22px;color:var(--gold);text-shadow:0 0 14px #c8a96e55;}
.header-title{font-size:15px;font-weight:700;color:var(--text);}
.header-date{font-size:11px;color:var(--text3);margin-top:2px;}
.btn-link{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;font-family:inherit;}
.btn-link:hover{border-color:var(--gold);color:var(--gold);}

/* ── CONTENT ── */
.content{padding:16px;max-width:600px;margin:0 auto;}

/* ── DAY SECTION ── */
.day-section{margin-bottom:20px;}
.day-label{font-size:11px;font-weight:700;color:var(--text4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.day-label::after{content:"";flex:1;height:1px;background:var(--border);}

/* ── HEARING CARD ── */
.hearing-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;display:flex;gap:14px;align-items:stretch;transition:border-color .2s;cursor:pointer;text-decoration:none;}
.hearing-card:hover{border-color:var(--gold)44;}
.hearing-card:active{opacity:.85;}
.hearing-card.today{border-left:4px solid var(--gold);}
.hearing-card.urgent{border-left:4px solid var(--red);}
.time-col{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:52px;flex-shrink:0;}
.time-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;line-height:1.2;text-align:center;flex-direction:column;}
.info-col{flex:1;min-width:0;}
.client-name{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px;}
.case-no{font-size:11px;color:var(--text4);font-family:monospace;margin-bottom:6px;}
.meta-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:4px;}
.badge{display:inline-block;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;}
.detail-row{font-size:12px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:5px;}
.countdown{font-size:11px;font-weight:700;margin-top:6px;}

/* ── EMPTY ── */
.empty-day{background:var(--bg3);border:1px dashed var(--border);border-radius:12px;padding:24px;text-align:center;color:var(--text4);font-size:13px;}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px;color:var(--text3);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SUMMARY BAR ── */
.summary-bar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;gap:0;margin-bottom:20px;overflow:hidden;}
.summary-item{flex:1;text-align:center;padding:4px 8px;}
.summary-item+.summary-item{border-left:1px solid var(--border);}
.summary-num{font-size:22px;font-weight:800;color:var(--gold);line-height:1;}
.summary-lbl{font-size:10px;color:var(--text4);margin-top:3px;letter-spacing:.04em;}

/* ── CLOCK ── */
.clock{font-size:13px;color:var(--text3);font-variant-numeric:tabular-nums;font-family:monospace;}

/* ── REFRESH ── */
.refresh-btn{background:none;border:none;color:var(--text4);cursor:pointer;font-size:16px;padding:4px;border-radius:6px;transition:color .2s;}
.refresh-btn:hover{color:var(--gold);}
.refreshing{animation:spin .6s linear infinite;}
.days-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.days-btn{flex:1;min-width:60px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 6px;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;font-family:inherit;text-align:center;transition:all .2s;}
.days-btn.active{background:linear-gradient(135deg,#1a0f6e,#301e90);border-color:#c8a06088;color:var(--gold);}
.days-btn:hover:not(.active){border-color:var(--gold)44;color:var(--text2);}

.invoice-btn:hover{border-color:#f97316;transform:translateY(-1px);}
.invoice-btn:active{transform:translateY(0);opacity:.9;}

.checkin-btn{width:100%;background:linear-gradient(135deg,#1a0f6e,#301e90);border:1px solid #c8a06088;border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;text-align:left;transition:all .2s;margin-bottom:14px;}
.checkin-btn:hover{border-color:var(--gold);transform:translateY(-1px);}
.checkin-btn:active{transform:translateY(0);opacity:.9;}
.checkin-icon{width:46px;height:46px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid #c8a06055;}
.checkin-text{flex:1;}
.checkin-title{font-size:15px;font-weight:700;color:#c8a96e;letter-spacing:.03em;}
.checkin-sub{font-size:11px;color:#6478a8;margin-top:3px;}
.checkin-arrow{font-size:20px;color:#c8a96e;opacity:.7;}
.qr-overlay{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;}
.qr-img{max-width:min(90vw,90vh);max-height:min(90vw,90vh);border-radius:16px;}
.qr-hint{color:#ffffff88;font-size:13px;margin-top:18px;letter-spacing:.04em;}
.qr-close{margin-top:18px;background:#ffffff14;border:1px solid #ffffff33;color:#fff;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.qr-close:hover{background:#ffffff22;}
.edit-btn{background:none;border:none;color:var(--text4);cursor:pointer;padding:3px 8px;font-size:12px;border-radius:5px;font-family:inherit;transition:background .15s;}
.edit-btn:hover{background:var(--bg4);color:var(--gold);}
.edit-form{background:var(--bg4);border-radius:10px;padding:12px 14px;margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.edit-row-3{display:grid;grid-template-columns:1fr 96px 88px;gap:8px;}
.theme-btn{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text3);font-family:inherit;}
.theme-btn:hover{border-color:var(--gold);color:var(--gold);}
.todo-item{background:var(--bg3);border:1px solid rgba(139,92,246,.3);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.todo-item.done{opacity:.5;}
.todo-check{width:18px;height:18px;border-radius:4px;border:2px solid rgba(139,92,246,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.todo-check.done{background:#8b5cf6;border-color:#8b5cf6;}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 20px 60px #000a;}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:13px;outline:none;font-family:inherit;width:100%;}
.fi:focus{border-color:var(--gold);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#a07840);color:#0a0a0a;border:none;border-radius:8px;padding:11px 20px;font-weight:700;font-size:14px;cursor:pointer;width:100%;font-family:inherit;}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;}

.widget-tools{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;flex-direction:column;gap:10px;}
.tool-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.form-row{display:grid;grid-template-columns:1fr 96px;gap:8px;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
.fi-sm{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;font-family:inherit;min-width:0;}
.fi-sm:focus{border-color:var(--gold);}
.btn-small{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-small.gold{background:linear-gradient(135deg,var(--gold),#a07840);border:none;color:#0a0a0a;}
.btn-small.danger{color:var(--red);border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08);}
.notice{font-size:11px;color:var(--text3);line-height:1.5;}
.delete-hearing{margin-top:8px;width:auto;padding:5px 9px;font-size:11px;}
@media(max-width:480px){.form-row,.form-row.three{grid-template-columns:1fr;}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
@media(max-width:480px){.content{padding:12px;}.client-name{font-size:15px;}}

/* ── WIDGET CALENDAR ── */
.wcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.wcal-dow{background:var(--bg3);text-align:center;font-size:9px;font-weight:700;color:var(--text4);padding:8px 4px;letter-spacing:.04em;}
.wcal-dow.sun{color:#ef4444;}
.wcal-dow.sat{color:#3b82f6;}
.wcal-cell{background:var(--bg2);min-height:65px;padding:4px;cursor:default;position:relative;transition:background .15s;}
.wcal-cell.other-month{opacity:.35;}
.wcal-cell.today{background:rgba(200,169,110,.08);}
.wcal-cell.is-sun{background:rgba(239,68,68,.03);}
.wcal-cell.is-sat{background:rgba(59,130,246,.03);}
.wcal-num{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:2px;}
.wcal-cell.today .wcal-num{color:var(--gold);}
.wcal-cell.is-sun:not(.other-month) .wcal-num{color:#ef4444;}
.wcal-cell.is-sat:not(.other-month) .wcal-num{color:#3b82f6;}
.wcal-dot{width:4px;height:4px;border-radius:50%;margin:1px auto;}
.wcal-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;align-items:center;}
.wcal-todo-dot{width:5px;height:5px;border-radius:1px;background:#8b5cf6;transform:rotate(45deg);}
.wcal-todo-dot.done{background:transparent;border:1px solid #8b5cf6;}
.mode-toggle{display:flex;gap:4px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:12px;}
.mode-btn{flex:1;padding:7px 12px;border-radius:6px;background:transparent;border:none;color:var(--text3);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.mode-btn.active{background:linear-gradient(135deg,#1a0f6e,#301e90);color:var(--gold);}
.day-modal{position:fixed;inset:0;background:#000000dd;z-index:9998;display:flex;align-items:flex-end;justify-content:center;padding:0;}
@media(min-width:600px){.day-modal{align-items:center;padding:20px;}}
.day-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px;max-height:75vh;overflow-y:auto;}
@media(min-width:600px){.day-sheet{border-radius:16px;}}

.invoice-btn{width:100%;background:linear-gradient(135deg,#f97316,#ea580c);border:1px solid rgba(249,115,22,.5);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;transition:all .2s;margin-bottom:14px;}
.invoice-btn:hover{border-color:#f97316;transform:translateY(-1px);}
.invoice-btn:active{transform:translateY(0);opacity:.9;}
.invoice-icon{width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid rgba(249,115,22,.4);}
.invoice-text{flex:1;}
.invoice-title{font-size:14px;font-weight:700;color:#f97316;letter-spacing:.02em;}
.invoice-sub{font-size:10px;color:#fb923c;margin-top:2px;}
.day-modal{position:fixed;inset:0;background:#000000dd;z-index:9998;display:flex;align-items:flex-end;justify-content:center;padding:0;}
@media(min-width:600px){.day-modal{align-items:center;padding:20px;}}
.day-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px;max-height:85vh;overflow-y:auto;}
@media(min-width:600px){.day-sheet{border-radius:16px;}}
.day-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.day-title{font-size:16px;font-weight:800;color:var(--gold);}
.day-close{background:var(--bg4);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;color:var(--text2);font-size:18px;}
.day-section{margin-bottom:16px;}
.day-section-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.day-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.day-item:hover{border-color:var(--gold)44;}
.todo-check-box{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;}
.todo-check-box.done{background:var(--green);border-color:var(--green);}

.todo-collapse-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 14px;border-radius:12px;border:1px solid rgba(139,92,246,.3);background:var(--bg3);margin-top:8px;transition:all .2s;user-select:none;}
.todo-collapse-hdr:hover{border-color:rgba(139,92,246,.6);background:rgba(139,92,246,.06);}
.todo-collapse-hdr.open{border-radius:12px 12px 0 0;border-bottom-color:transparent;}
.todo-collapse-body{border:1px solid rgba(139,92,246,.3);border-top:none;border-radius:0 0 12px 12px;padding:12px 14px;background:var(--bg3);}
.todo-chevron{font-size:12px;color:var(--text3);transition:transform .25s;display:inline-block;}
.todo-chevron.open{transform:rotate(180deg);}
.todo-item.overdue{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.04);}
.todo-edit-btn{background:none;border:none;color:var(--text4);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:12px;flex-shrink:0;transition:all .15s;}
.todo-edit-btn:hover{color:var(--gold);background:rgba(200,169,110,.12);}
.todo-edit-form{display:flex;gap:6px;flex:1;align-items:center;}
.todo-edit-input{flex:1;background:var(--bg);border:1px solid var(--gold);border-radius:6px;padding:5px 9px;color:var(--text);font-size:12px;outline:none;font-family:inherit;}
</style>
</head>
<body>
<script src="shared/sys-nav.js" data-active="widget"></script>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",
    authDomain: "legalcasemanageer.firebaseapp.com",
    projectId: "legalcasemanageer",
    storageBucket: "legalcasemanageer.firebasestorage.app",
    messagingSenderId: "559838504556",
    appId: "1:559838504556:web:ba10c071a12650bbd85a49"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth = getAuth(app);

// ── Constants ──
const TYPE_COLOR = {刑事:"#ef4444",民事:"#3b82f6",行政:"#8b5cf6",家事:"#ec4899",勞動:"#f97316",智財:"#14b8a6",非訟:"#06b6d4"};
const DAYS_OPTIONS = [7, 15, 30, 60];
let DAYS_AHEAD = parseInt(localStorage.getItem("widget_days_ahead")||"7");

// ── Helpers ──
function today(){
    // 使用台灣時區 UTC+8，避免跨日誤差
    const tw = new Date(new Date().getTime() + 8*60*60*1000);
    return tw.toISOString().split("T")[0];
}
function toggleTodo(id){
    const idx=(state.calTodos||[]).findIndex(t=>t.id===id);
    if(idx===-1)return;
    state.calTodos[idx].done=!state.calTodos[idx].done;
    saveCalTodos(state.calTodos);
    render();
}
window.toggleTodo = toggleTodo;

window.deleteTodo = function(id){
    if(!confirm("確認刪除此待辦事項？")) return;
    const updated=(state.calTodos||[]).filter(t=>t.id!==id);
    saveCalTodos(updated);
    render();
};

window.archiveTodo = function(id){
    const updated=(state.calTodos||[]).map(t=>t.id===id?{...t,archived:true,done:true}:t);
    saveCalTodos(updated);
    render();
};

window.unarchiveTodo = function(id){
    const updated=(state.calTodos||[]).map(t=>t.id===id?{...t,archived:false}:t);
    saveCalTodos(updated);
    render();
};

window.toggleArchivedTodos = function(){
    state.showArchivedTodos=!state.showArchivedTodos; render();
};

window.toggleTodosPanel = function(){
    state.showTodos=!state.showTodos; render();
};

window.startEditTodo = function(id, text){
    state.editingTodoId=id; state.editTodoText=text; render();
    setTimeout(()=>document.getElementById("etid-"+id)?.focus(), 50);
};

window.saveEditTodo = function(id){
    const inp=document.getElementById("etid-"+id);
    const newText=inp?inp.value.trim():state.editTodoText;
    if(!newText){ window.cancelEditTodo(); return; }
    const updated=(state.calTodos||[]).map(t=>t.id===id?{...t,text:newText}:t);
    state.editingTodoId=null; state.editTodoText="";
    saveCalTodos(updated); render();
};

window.cancelEditTodo = function(){
    state.editingTodoId=null; state.editTodoText=""; render();
};

function daysUntil(d){
    // 兩端都用台灣時間的「當日零時」比較，避免時區造成的差一天問題
    const todayMs = new Date(today()+"T00:00:00+08:00").getTime();
    const targetMs = new Date(d+"T00:00:00+08:00").getTime();
    return Math.round((targetMs - todayMs) / 86400000);
}
function pad(n){ return String(n).padStart(2,"0"); }
function fmtDate(iso){
    const d=new Date(iso+"T00:00:00");
    const wd=["日","一","二","三","四","五","六"][d.getDay()];
    return `${d.getMonth()+1}/${d.getDate()}（${wd}）`;
}
function nowStr(){
    const n=new Date();
    return `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}

// ── State ──
function readJSON(key,fallback){ try{ return JSON.parse(localStorage.getItem(key)||""); }catch(_){ return fallback; } }
function loadWidgetHearings(){ return readJSON("widgetHearings",[]); }
function loadReminder(){ return {...{enabled:false,time:"08:00"}, ...readJSON("widgetReminder",{})}; }
function saveLocal(key,value){ try{ localStorage.setItem(key,JSON.stringify(value)); }catch(_){} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

// ── Theme ──
function getAutoTheme(){ const h=new Date().getHours(); return (h>=6&&h<20)?"light":"dark"; }
function applyTheme(mode){
    const effective = mode==="auto" ? getAutoTheme() : mode;
    if(effective==="light") document.documentElement.classList.add("light");
    else document.documentElement.classList.remove("light");
    document.querySelector('meta[name="theme-color"]')?.setAttribute("content", effective==="light" ? "#f0f4f8" : "#0a1628");
}
let themeMode = localStorage.getItem("widget_theme")||"auto";
applyTheme(themeMode);
function themeLabel(){
    if(themeMode==="auto") return `自動 (${getAutoTheme()==="light"?"白天淺色":"晚上深色"})`;
    if(themeMode==="light") return "白天 淺色";
    return "晚上 深色";
}
function cycleTheme(){
    themeMode = themeMode==="auto"?"light":themeMode==="light"?"dark":"auto";
    localStorage.setItem("widget_theme",themeMode);
    applyTheme(themeMode);
    render(); // re-render so all components pick up new CSS variables
}
setInterval(()=>{
    if(themeMode!=="auto") return;
    const before = document.documentElement.classList.contains("light") ? "light" : "dark";
    applyTheme("auto");
    const after = document.documentElement.classList.contains("light") ? "light" : "dark";
    if(before!==after) render();
}, 60000);
let clockTimer=null, unsubCases=null, unsubWidgetHearings=null, reminderTimer=null;

function applyCalTodos(items){
    state.calTodos = Array.isArray(items) ? items : [];
    try{
        localStorage.setItem("calTodos", JSON.stringify(state.calTodos));
        localStorage.setItem("calTodos_updatedAt", String(Date.now()));
    }catch(_){}
    render();
}

async function refreshCalTodos(){
    if(!state.user) return;
    try{
        const snap = await getDoc(doc(db,"calTodos","shared"));
        if(snap.exists()) applyCalTodos(snap.data().items||[]);
    }catch(e){
        try{ state.calTodos=JSON.parse(localStorage.getItem("calTodos")||"[]"); }catch(_){}
        render();
    }
}

function syncCalTodosFromCache(){
    try{
        state.calTodos = JSON.parse(localStorage.getItem("calTodos")||"[]");
        render();
    }catch(_){}
}

function wakeSyncCalTodos(){
    if(document.visibilityState && document.visibilityState !== "visible") return;
    refreshCalTodos();
}

// ── Render engine ──
const root = document.getElementById("root");
function render(){ applyTheme(themeMode); root.innerHTML = buildHTML(); bindEvents(); }
function setNotice(msg){ state.notice=msg; render(); }
function saveWidgetHearings(items){
    state.widgetHearings = items.sort((a,b)=>(a.date||"").localeCompare(b.date||"")||(a.time||"").localeCompare(b.time||""));
    saveLocal("widgetHearings",state.widgetHearings);
    if(state.user){
        setDoc(doc(db,"widgetHearings","shared"),{items:state.widgetHearings,updatedAt:new Date().toISOString()})
            .catch(e=>{
                console.warn("widgetHearings 儲存失敗：",e.code);
                if(e.code==="permission-denied"){
                    state.notice="⚠️ 跨裝置同步失敗：請至 Firebase 更新 Firestore 規則（詳見說明）";
                    render();
                }
            });
    }
}
function saveCalTodos(items){
    state.calTodos = (Array.isArray(items)?items:[]).sort((a,b)=>(a.date||"").localeCompare(b.date||"")||(a.createdAt||"").localeCompare(b.createdAt||""));
    saveLocal("calTodos",state.calTodos);
    try{ localStorage.setItem("calTodos_updatedAt", String(Date.now())); }catch(_){}
    if(state.user){
        setDoc(doc(db,"calTodos","shared"),{items:state.calTodos,updatedAt:new Date().toISOString()})
            .catch(e=>{
                console.warn("calTodos 儲存失敗：",e.code);
                if(e.code==="permission-denied"){
                    state.notice="⚠️ 待辦已先存在本機，請確認 Firebase calTodos 寫入權限";
                    render();
                }
            });
    }
    render();
}
function saveReminder(reminder){ state.reminder=reminder; saveLocal("widgetReminder",reminder); startReminderTimer(); render(); }
function notificationAllowed(){ return "Notification" in window && Notification.permission==="granted"; }
async function ensureNotificationPermission(){
    if(!("Notification" in window)){ setNotice("此瀏覽器不支援通知功能"); return false; }
    if(Notification.permission==="granted") return true;
    if(Notification.permission==="denied"){ setNotice("瀏覽器已封鎖通知，請至設定手動開啟"); return false; }
    const permission = await Notification.requestPermission();
    if(permission!=="granted"){ setNotice("通知授權未獲批准"); return false; }
    return true;
}function notifyTodayHearings(force=false){
    const todays = getHearings().filter(h=>h.daysUntil===0);
    const todosToday = (state.calTodos||[]).filter(t=>t.date===today() && !t.done && !t.archived);
    if(!force){
        if(!state.reminder.enabled) return;
        if(nowHHMM() < state.reminder.time) return;
        const sentKey = `widgetReminderSent_${today()}`;
        if(localStorage.getItem(sentKey)==="1") return;
        localStorage.setItem(sentKey,"1");
    }
    if(todays.length===0 && todosToday.length===0){ if(force) setNotice("今日無庭期及待辦事項"); return; }
    const title = todays.length>0 && todosToday.length>0
        ? `今日提醒：庭期${todays.length}場・待辦${todosToday.length}項`
        : todays.length>0
            ? `今日開庭：${todays.length}場`
            : `今日待辦：${todosToday.length}項`;
    const hearingLines = todays.slice(0,5).map(h=>`🏛 ${h.time||"待定"} ${h.clientName||"Hearing"} ${[h.agency,h.courtroom].filter(Boolean).join(" ")}`);
    const todoLines = todosToday.slice(0,5).map(t=>`📝 ${t.time||"待定"} ${t.text}`);
    const body = [...hearingLines,...todoLines].join("\n");
    if(notificationAllowed()) new Notification(title,{body});
    else setNotice(`${title} - ${[...todays.map(h=>`${h.time||"待定"} ${h.clientName}`),...todosToday.map(t=>t.text)].join("、")}`);
}function startReminderTimer(){
    if(reminderTimer) clearInterval(reminderTimer);
    reminderTimer=setInterval(()=>notifyTodayHearings(false),60000);
}

// ── Auth ──
onAuthStateChanged(auth, u=>{
    state.user=u;
    state.authChecked=true;
    if(u && !unsubCases){
        // ── widgetHearings 即時同步 ──
        unsubWidgetHearings = onSnapshot(
            doc(db,"widgetHearings","shared"),
            snap=>{
                if(snap.exists()){
                    state.widgetHearings = snap.data().items||[];
                    saveLocal("widgetHearings",state.widgetHearings);
                    render();
                }
            },
            err=>{
                console.warn("widgetHearings 同步失敗：",err.code, "— 請確認 Firestore 規則已加入 widgetHearings");
                // fallback to localStorage
                try{ state.widgetHearings=JSON.parse(localStorage.getItem("widgetHearings")||"[]"); }catch(_){}
                render();
            }
        );
        // ── calTodos 即時同步 ──
        onSnapshot(
            doc(db,"calTodos","shared"),
            snap=>{
                state.calTodos = snap.exists() ? (snap.data().items||[]) : [];
                try{ localStorage.setItem("calTodos",JSON.stringify(state.calTodos)); }catch(_){}
                render();
            },
            err=>{
                console.warn("calTodos 同步失敗：",err.code);
                try{ state.calTodos=JSON.parse(localStorage.getItem("calTodos")||"[]"); }catch(_){}
                render();
            }
        );
        // ── cases 即時同步 ──
        unsubCases = onSnapshot(collection(db,"cases"), snap=>{
            state.cases = snap.docs.map(d=>({...d.data(),id:d.id}));
            // cache locally
            try{ localStorage.setItem("widget_cases_cache", JSON.stringify(state.cases)); }catch(_){}
            render();
        }, err=>{
            // fallback to cache
            try{
                const c=localStorage.getItem("widget_cases_cache");
                if(c) state.cases=JSON.parse(c);
            }catch(_){}
            render();
        });
    }
    if(!u && unsubWidgetHearings){ unsubWidgetHearings(); unsubWidgetHearings=null; }
    if(!u && unsubCases){ unsubCases(); unsubCases=null; }
    startReminderTimer();
    notifyTodayHearings(false);
    render();
});

// ── Build hearings list ──
function getHearings(){
    const result=[];
    state.cases.forEach(c=>{
        (c.hearings||[]).forEach(h=>{
            const d=daysUntil(h.date);
            if(d>=0 && d<=DAYS_AHEAD){
                result.push({
                    date:h.date, time:h.time||"", agency:h.agency||"",
                    courtroom:h.courtroom||"", note:h.note||"",
                    clientName:c.clientName, firmCaseNo:c.firmCaseNo,
                    courtCaseNos:c.courtCaseNos||[], caseType:c.caseType,
                    status:c.status, opposingParty:c.opposingParty||"",
                    caseId:c.id, daysUntil:d,
                });
            }
        });
    });
    (state.widgetHearings||[]).forEach(h=>{
        const d=daysUntil(h.date);
        if(d>=0 && d<=DAYS_AHEAD){
            result.push({
                ...h,
                source:"widget",
                caseType:h.caseType||"代庭",
                clientName:h.clientName||"代庭",
                firmCaseNo:h.firmCaseNo||"WIDGET",
                agency:h.agency||"",
                courtroom:h.courtroom||"",
                note:h.note||"",
                daysUntil:d,
            });
        }
    });
    return result.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
}

// ── Build calendar view ──
function buildCalendar(){
    const y=state.calDate.getFullYear();
    const m=state.calDate.getMonth();
    const firstDay=new Date(y,m,1).getDay();
    const daysInMonth=new Date(y,m+1,0).getDate();
    const cells=[];
    
    // Prev month padding
    const prevDays=new Date(y,m,0).getDate();
    for(let i=firstDay-1;i>=0;i--) cells.push({day:prevDays-i,cur:false});
    // Current month
    for(let d=1;d<=daysInMonth;d++) cells.push({day:d,cur:true});
    // Next month padding
    while(cells.length%7!==0) cells.push({day:cells.length-firstDay-daysInMonth+1,cur:false});
    
    // Hearing map
    const hmap={};
    [...state.cases.flatMap(c=>(c.hearings||[]).map(h=>({...h,caseType:c.caseType,clientName:c.clientName,firmCaseNo:c.firmCaseNo}))),
     ...state.widgetHearings].forEach(h=>{
        const d=daysUntil(h.date);
        if(d>=-60 && d<=60){
            if(!hmap[h.date]) hmap[h.date]=[];
            hmap[h.date].push(h);
        }
    });

    // Todo map（排除已封存）
    const tmap={};
    (state.calTodos||[]).forEach(t=>{
        if(t.archived) return;
        if(!tmap[t.date]) tmap[t.date]=[];
        tmap[t.date].push(t);
    });

    const todayStr=today();
    
    return cells.map((cell,i)=>{
        const dow=i%7;
        const dateStr=cell.cur?`${y}-${pad(m+1)}-${pad(cell.day)}`:"";
        const events=dateStr?hmap[dateStr]||[]:[];
        const dayTodos=dateStr?tmap[dateStr]||[]:[];
        const isToday=dateStr===todayStr;
        const cls=["wcal-cell",
            !cell.cur?"other-month":"",
            isToday?"today":"",
            dow===0?"is-sun":"",
            dow===6?"is-sat":"",
        ].filter(Boolean).join(" ");
        
        const hasTodo=dayTodos.length>0;
        const todoAllDone=hasTodo && dayTodos.every(t=>t.done);
        return `<div class="${cls}" data-date="${dateStr}" style="cursor:${dateStr?'pointer':'default'}">
            <div class="wcal-num">${cell.day}</div>
            <div class="wcal-dots">
                ${events.slice(0,3).map(e=>{
                    const c=TYPE_COLOR[e.caseType]||"#64748b";
                    return `<div class="wcal-dot" style="background:${c}"></div>`;
                }).join("")}
                ${hasTodo?`<div class="wcal-todo-dot${todoAllDone?" done":""}" title="待辦事項"></div>`:""}
            </div>
            ${events.length>3?`<div style="font-size:8px;color:var(--text4);text-align:center">+${events.length-3}</div>`:""}
        </div>`;
    }).join("");
}

function buildTodoItem(t){
    const isOverdue=!t.done && daysUntil(t.date)<0;
    const isEditing=state.editingTodoId===t.id;
    const checkBox=`<div class="todo-check-box${t.done?" done":""}" onclick="window.toggleTodo('${t.id}')">${t.done?'<span style="color:#fff;font-size:10px;font-weight:900">✓</span>':""}</div>`;
    if(isEditing){
        return `<div class="todo-item${t.done?" done":""}${isOverdue?" overdue":""}">
            ${checkBox}
            <div class="todo-edit-form">
                <input class="todo-edit-input" id="etid-${t.id}" value="${esc(state.editTodoText)}" onkeydown="if(event.key==='Enter')window.saveEditTodo('${t.id}');if(event.key==='Escape')window.cancelEditTodo();">
                <button class="todo-edit-btn" onclick="window.saveEditTodo('${t.id}')" style="color:var(--green)">✓</button>
                <button class="todo-edit-btn" onclick="window.cancelEditTodo()">✕</button>
            </div>
        </div>`;
    }
    return `<div class="todo-item${t.done?" done":""}${isOverdue?" overdue":""}">
        ${checkBox}
        <div style="flex:1">
            ${t.time?`<div style="font-size:11px;color:#8b5cf6;font-weight:700;margin-bottom:2px">⏰ ${t.time}</div>`:""}
            <div style="font-size:13px;color:${t.done?"var(--text4)":"var(--text)"};text-decoration:${t.done?"line-through":"none"}">${esc(t.text)}</div>
        </div>
        ${t.done?`<button class="todo-edit-btn" onclick="window.archiveTodo('${t.id}')" title="封存" style="color:#8b5cf6">📥</button>`:""}
        <button class="todo-edit-btn" onclick="window.startEditTodo('${t.id}',\`${esc(t.text)}\`)" title="編輯">✏️</button>
        <button class="todo-edit-btn" onclick="window.deleteTodo('${t.id}')" title="刪除" style="color:var(--text4)">🗑</button>
    </div>`;
}

function buildArchivedTodoItem(t){
    const dd=new Date(t.date+"T00:00:00+08:00");
    const wd=["日","一","二","三","四","五","六"][dd.getDay()];
    return `<div class="todo-item done" style="opacity:.75">
        <div class="todo-check-box done" style="cursor:default">${'<span style="color:#fff;font-size:10px;font-weight:900">✓</span>'}</div>
        <div style="flex:1">
            <div style="font-size:10px;color:var(--text4);margin-bottom:2px">${dd.getMonth()+1}/${dd.getDate()}（${wd}）${t.time?` ⏰ ${t.time}`:""}</div>
            <div style="font-size:13px;color:var(--text4);text-decoration:line-through">${esc(t.text)}</div>
        </div>
        <button class="todo-edit-btn" onclick="window.unarchiveTodo('${t.id}')" title="取消封存" style="color:var(--green)">↩️</button>
        <button class="todo-edit-btn" onclick="window.deleteTodo('${t.id}')" title="刪除" style="color:var(--text4)">🗑</button>
    </div>`;
}

function buildTodoSection(){
    const sorted=(state.calTodos||[]).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"99:99").localeCompare(b.time||"99:99"));
    const allTodos=sorted.filter(t=>!t.archived);
    const archivedTodos=sorted.filter(t=>t.archived);
    if(allTodos.length===0 && archivedTodos.length===0) return "";
    const pendingCount=allTodos.filter(t=>!t.done).length;
    const overdueCount=allTodos.filter(t=>!t.done&&daysUntil(t.date)<0).length;
    const byDate={};
    allTodos.forEach(t=>{ if(!byDate[t.date])byDate[t.date]=[]; byDate[t.date].push(t); });
    const isOpen=state.showTodos;

    const archivedOpen=state.showArchivedTodos;
    const archivedBlock=archivedTodos.length>0?`
        <div style="margin-top:10px;border-top:1px dashed var(--border);padding-top:10px">
            <div class="todo-collapse-hdr${archivedOpen?" open":""}" onclick="window.toggleArchivedTodos()" style="padding:6px 2px">
                <div style="display:flex;align-items:center;gap:8px">
                    <span style="font-size:14px">📥</span>
                    <span style="font-size:12px;font-weight:700;color:var(--text3)">已封存</span>
                    <span style="background:var(--bg4);color:var(--text3);border-radius:20px;padding:1px 9px;font-size:11px;font-weight:800">${archivedTodos.length}</span>
                </div>
                <span class="todo-chevron${archivedOpen?" open":""}">▼</span>
            </div>
            ${archivedOpen?`<div class="todo-collapse-body">${archivedTodos.slice().reverse().map(t=>buildArchivedTodoItem(t)).join("")}</div>`:""}
        </div>`:"";

    const inner=Object.entries(byDate).map(([date,todos])=>{
        const d=daysUntil(date);
        const isOverdue=d<0;
        const dLabel=d===0?"今天":d===1?"明天":d>0?`${d}天後`:`${Math.abs(d)}天前（逾期）`;
        const dColor=isOverdue?"#f59e0b":d===0?"var(--green)":"#8b5cf6";
        const dd=new Date(date+"T00:00:00+08:00");
        const wd=["日","一","二","三","四","五","六"][dd.getDay()];
        const items=todos.map(t=>buildTodoItem(t)).join("");
        return `<div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text4);margin-bottom:6px;display:flex;gap:8px;align-items:center">
                <span>${dd.getMonth()+1}/${dd.getDate()}（${wd}）</span>
                <span style="color:${dColor};font-weight:700">${dLabel}</span>
            </div>
            ${items}
        </div>`;
    }).join("");

    return `<div class="day-section" style="margin-top:4px">
        <div class="todo-collapse-hdr${isOpen?" open":""}" onclick="window.toggleTodosPanel()">
            <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:15px">✅</span>
                <span style="font-size:13px;font-weight:700;color:${pendingCount>0?"#8b5cf6":"var(--text3)"}">待辦事項</span>
                ${pendingCount>0?`<span style="background:rgba(139,92,246,.18);color:#8b5cf6;border-radius:20px;padding:1px 9px;font-size:11px;font-weight:800">${pendingCount}項未完成</span>`:""}
                ${overdueCount>0?`<span style="background:rgba(245,158,11,.15);color:#f59e0b;border-radius:20px;padding:1px 9px;font-size:11px;font-weight:800">⚠️${overdueCount}逾期</span>`:""}
            </div>
            <span class="todo-chevron${isOpen?" open":""}">▼</span>
        </div>
        ${isOpen?`<div class="todo-collapse-body">${inner||`<div style="text-align:center;padding:16px;color:var(--text4);font-size:12px">目前無待辦事項</div>`}${archivedBlock}</div>`:""}
    </div>`;
}

        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
            <button class="btn-small" id="btn-cancel-edit" type="button">取消</button>
            <button class="btn-small gold" data-confirm-edit="${h.id}" type="button">💾 儲存</button>
        </div>
    </div>`;
}

function buildCard(h){
    const color = TYPE_COLOR[h.caseType]||"#64748b";
    const isToday = h.daysUntil===0;
    const isUrgent = isToday && h.time && h.time < nowHHMM();
    const cardClass = `hearing-card ${isToday?"today":""} ${isUrgent?"urgent":""}`;

    // Time circle
    const timeBg = isToday
        ? `background:${color}22;color:${color};border:2px solid ${color}55;`
        : `background:var(--bg4);color:var(--text3);border:2px solid var(--border);`;
    const timeDisplay = h.time||"—";
    const timeCircle = `<div class="time-circle" style="${timeBg}">${h.time?h.time.replace(":","\n"):"—"}</div>`;

    // Countdown badge
    let countdown = "";
    if(isToday && h.time){
        const [hh,mm]=h.time.split(":").map(Number);
        const nowMin=new Date().getHours()*60+new Date().getMinutes();
        const tMin=hh*60+mm;
        const diff=tMin-nowMin;
        if(diff>0) countdown=`<div class="countdown" style="color:${diff<=30?"var(--red)":"var(--yellow)"}">還有 ${diff>=60?Math.floor(diff/60)+"小時":diff+"分鐘"}</div>`;
        else if(diff>-60) countdown=`<div class="countdown" style="color:var(--text3)">已過 ${-diff}分鐘</div>`;
    }

    const caseNo=(h.courtCaseNos||[]).filter(Boolean)[0]||h.firmCaseNo||"";
    const cardAction = h.caseId ? ` onclick="openCase('${h.caseId}')"` : "";
    const deleteAction = h.source==="widget" ? `
        <button class="btn-small" data-edit-widget-hearing="${h.id}" type="button" style="background:var(--bg3)">✏️ 編輯</button>
        <button class="btn-small danger delete-hearing" data-delete-widget-hearing="${h.id}" type="button">🗑 刪除</button>` : "";
    const editForm = (h.source==="widget" && state.editingHearingId===h.id) ? buildHearingEditForm(h) : "";

    return `
    <div class="${cardClass}"${cardAction}>
        <div class="time-col">${timeCircle}</div>
        <div class="info-col">
            <div class="client-name">${esc(h.clientName)}</div>
            <div class="case-no">${esc(h.firmCaseNo)}${caseNo&&caseNo!==h.firmCaseNo?" · "+esc(caseNo):""}</div>
            <div class="meta-row">
                <span class="badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${h.caseType}</span>
                ${h.note?`<span class="badge" style="background:var(--bg4);color:var(--text3);border:1px solid var(--border)">${esc(h.note)}</span>`:""}
            </div>
            ${h.agency||h.courtroom?`<div class="detail-row">🏛 ${esc([h.agency,h.courtroom].filter(Boolean).join(" · "))}</div>`:""}
            ${h.opposingParty?`<div class="detail-row">⚔ 對造：${esc(h.opposingParty)}</div>`:""}
            ${countdown}
            ${deleteAction}
        </div>
    ${editForm}
    </div>`;
}

function nowHHMM(){
    return pad(new Date().getHours())+":"+pad(new Date().getMinutes());
}
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── Event binding ──
function bindEvents(){
    // View mode toggle
    document.querySelectorAll("[data-mode]").forEach(btn=>{
        btn.addEventListener("click",()=>{
            state.viewMode=btn.dataset.mode;
            localStorage.setItem("widget_view_mode",state.viewMode);
            render();
        });
    });

    // Calendar navigation
    document.getElementById("cal-prev")?.addEventListener("click",()=>{
        state.calDate=new Date(state.calDate.getFullYear(),state.calDate.getMonth()-1,1);
        render();
    });
    document.getElementById("cal-next")?.addEventListener("click",()=>{
        state.calDate=new Date(state.calDate.getFullYear(),state.calDate.getMonth()+1,1);
        render();
    });

    // Days ahead selector
    document.querySelectorAll("[data-days]").forEach(btn=>{
        btn.addEventListener("click",()=>{
            DAYS_AHEAD = parseInt(btn.dataset.days);
            localStorage.setItem("widget_days_ahead", DAYS_AHEAD);
            render();
        });
    });

    // Invoice barcode
    document.getElementById("btn-invoice")?.addEventListener("click",()=>{
        state.showInvoice=true; render();
    });
    document.getElementById("invoice-overlay")?.addEventListener("click",()=>{
        state.showInvoice=false; render();
    });
    document.getElementById("invoice-close")?.addEventListener("click",e=>{
        e.stopPropagation();
        state.showInvoice=false; render();
    });
    document.onkeydown = e=>{
        if(e.key==="Escape" && (state.showInvoice || state.showQR || state.dayDetail || state.selectedDate)){
            state.showInvoice=false;
            state.showQR=false;
            state.dayDetail=null;
            state.selectedDate=null;
            state.editingHearingId=null;
            state.editingTodoId=null;
            render();
        }
    };
    const closeDayModal = ()=>{
        state.selectedDate=null;
        state.dayDetail=null;
        state.editingHearingId=null;
        state.editingTodoId=null;
        render();
    };

    // Calendar cell click
    document.querySelectorAll("[data-date]").forEach(cell=>{
        const date=cell.dataset.date;
        if(date){
            cell.addEventListener("click",()=>{
                state.selectedDate=null;
                state.dayDetail=date;
                render();
            });
        }
    });

    // Day modal close
    document.querySelectorAll(".day-modal").forEach(modal=>{
        modal.addEventListener("click",e=>{
            if(e.target===modal) closeDayModal();
        });
    });
    document.querySelectorAll(".day-close").forEach(btn=>{
        btn.addEventListener("click",e=>{
            e.stopPropagation();
            closeDayModal();
        });
    });

    // QR check-in
    document.getElementById("btn-checkin")?.addEventListener("click",()=>{
        state.showQR=true; render();
    });
    document.getElementById("qr-overlay")?.addEventListener("click",()=>{
        state.showQR=false; render();
    });

    // Invoice barcode
    document.getElementById("btn-invoice")?.addEventListener("click",()=>{
        state.showInvoice=true; render();
    });
    document.getElementById("invoice-overlay")?.addEventListener("click",()=>{
        state.showInvoice=false; render();
    });

    // Calendar day click
    document.querySelectorAll("[data-date]").forEach(cell=>{
        cell.addEventListener("click",()=>{
            if(!cell.dataset.date) return;
            state.selectedDate=null;
            state.dayDetail=cell.dataset.date;
            render();
        });
    });

    // Theme toggle
    document.getElementById("btn-theme")?.addEventListener("click",()=>{
        themeMode = themeMode==="auto"?"light":themeMode==="light"?"dark":"auto";
        localStorage.setItem("widget_theme",themeMode);
        applyTheme(themeMode);
        render();
    });

    // Login
    const btnLogin=document.getElementById("btn-login");
    if(btnLogin){
        const doLogin=async()=>{
            const email=document.getElementById("email")?.value.trim();
            const pw=document.getElementById("password")?.value;
            const errEl=document.getElementById("login-err");
            if(!email||!pw){ showErr(errEl,"請輸入帳號和密碼"); return; }
            btnLogin.textContent="登入中…"; btnLogin.disabled=true;
            try{
                await signInWithEmailAndPassword(auth,email,pw);
            }catch(e){
                const msg={"auth/invalid-credential":"帳號或密碼錯誤","auth/too-many-requests":"嘗試次數過多，請稍後"}[e.code]||"登入失敗："+e.message;
                showErr(errEl,msg);
                btnLogin.textContent="🔐 登入"; btnLogin.disabled=false;
            }
        };
        btnLogin.addEventListener("click",doLogin);
        document.getElementById("password")?.addEventListener("keydown",e=>e.key==="Enter"&&doLogin());
        document.getElementById("email")?.addEventListener("keydown",e=>e.key==="Enter"&&document.getElementById("password")?.focus());
    }

    // Logout
    document.getElementById("btn-logout")?.addEventListener("click",async()=>{
        if(unsubCases){ unsubCases(); unsubCases=null; }
        await signOut(auth);
    });

    // Refresh
    // Hearing inline edit
    document.querySelectorAll("[data-edit-widget-hearing]").forEach(btn=>{
        btn.addEventListener("click",e=>{
            e.stopPropagation();
            const id=btn.dataset.editWidgetHearing;
            state.editingHearingId = state.editingHearingId===id ? null : id;
            render();
        });
    });
    document.getElementById("btn-cancel-edit")?.addEventListener("click",()=>{
        state.editingHearingId=null; render();
    });
    document.querySelectorAll("[data-confirm-edit]").forEach(btn=>{
        btn.addEventListener("click",e=>{
            e.stopPropagation();
            const id=btn.dataset.confirmEdit;
            const updated=state.widgetHearings.map(h=>{
                if(h.id!==id) return h;
                return {
                    ...h,
                    clientName:document.getElementById("ef-client")?.value.trim()||h.clientName,
                    date:document.getElementById("ef-date")?.value||h.date,
                    time:document.getElementById("ef-time")?.value||h.time,
                    agency:document.getElementById("ef-agency")?.value.trim()||h.agency,
                    courtroom:document.getElementById("ef-room")?.value.trim()||h.courtroom,
                    note:document.getElementById("ef-note")?.value.trim()||h.note,
                };
            });
            saveWidgetHearings(updated);
            state.editingHearingId=null;
            state.notice="✅ 庭期已更新";
            render();
            setTimeout(()=>{ state.notice=""; render(); },2000);
        });
    });

    document.getElementById("btn-refresh")?.addEventListener("click",()=>{
        state.refreshing=true; render();
        setTimeout(()=>{ state.refreshing=false; render(); },800);
    });

    // Theme switch: auto -> day/light -> night/dark
    document.getElementById("btn-theme")?.addEventListener("click",cycleTheme);

    document.getElementById("btn-toggle-hearing")?.addEventListener("click",()=>{
        state.showAddHearing=!state.showAddHearing;
        if(state.showAddHearing) state.showAddTodo=false;
        state.notice="";
        render();
    });
    document.getElementById("btn-save-widget-hearing")?.addEventListener("click",addWidgetHearingFromForm);
    document.getElementById("btn-toggle-todo")?.addEventListener("click",()=>{
        state.showAddTodo=!state.showAddTodo;
        if(state.showAddTodo) state.showAddHearing=false;
        state.notice="";
        render();
    });
    document.getElementById("btn-save-todo")?.addEventListener("click",addTodoFromForm);
    document.getElementById("todo-text")?.addEventListener("keydown",e=>{
        if(e.key==="Enter") addTodoFromForm();
    });
    document.querySelectorAll("[data-delete-widget-hearing]").forEach(btn=>{
        btn.addEventListener("click",e=>{
            e.stopPropagation();
            deleteWidgetHearing(btn.getAttribute("data-delete-widget-hearing"));
        });
    });
    document.getElementById("reminder-time")?.addEventListener("change",e=>{
        saveReminder({...state.reminder,time:e.target.value||"08:00"});
    });
    document.getElementById("btn-enable-reminder")?.addEventListener("click",async()=>{
        const ok=await ensureNotificationPermission();
        saveReminder({...state.reminder,enabled:ok});
        state.notice=ok?"通知已啟用，會在設定時間提醒今天庭期與待辦事項":"通知尚未啟用";
        render();
    });
    document.getElementById("btn-test-reminder")?.addEventListener("click",async()=>{
        await ensureNotificationPermission();
        notifyTodayHearings(true);
    });
    // Clock
    if(clockTimer) clearInterval(clockTimer);
    if(state.user){
        clockTimer=setInterval(()=>{
            const el=document.getElementById("clock");
            if(el) el.textContent=nowStr();
        },1000);
    }
}

function showErr(el,msg){ if(el){ el.textContent="⚠️ "+msg; el.style.display="block"; }}
function addWidgetHearingFromForm(){
    const clientName=document.getElementById("wh-client")?.value.trim();
    const date=document.getElementById("wh-date")?.value;
    const time=document.getElementById("wh-time")?.value;
    const agency=document.getElementById("wh-agency")?.value.trim();
    const courtroom=document.getElementById("wh-room")?.value.trim();
    const note=document.getElementById("wh-note")?.value.trim();
    if(!date){ setNotice("請選擇日期"); return; }
    const item={id:uid(),clientName:clientName||"臨時庭期",date,time:time||"",agency,courtroom,note,caseType:"臨時庭期",createdAt:new Date().toISOString()};
    saveWidgetHearings([...(state.widgetHearings||[]),item]);
    state.showAddHearing=false;
    state.notice="✅ 庭期已新增";
    render();
}
function addTodoFromForm(){
    const text=document.getElementById("todo-text")?.value.trim();
    const date=document.getElementById("todo-date")?.value;
    const time=document.getElementById("todo-time")?.value;
    const note=document.getElementById("todo-note")?.value.trim();
    if(!text){ setNotice("請輸入待辦事項內容"); return; }
    if(!date){ setNotice("請選擇待辦日期"); return; }
    const item={id:uid(),text,date,time:time||"",note:note||"",done:false,archived:false,createdAt:new Date().toISOString()};
    saveCalTodos([...(state.calTodos||[]),item]);
    state.showAddTodo=false;
    state.notice="✅ 待辦事項已新增";
    render();
}
function deleteWidgetHearing(id){
    saveWidgetHearings((state.widgetHearings||[]).filter(h=>h.id!==id));
    state.notice="🗑 庭期已刪除";
    render();
}
window.openCase=(id)=>{ window.location.href=`index.html`; };

render();
</script>
