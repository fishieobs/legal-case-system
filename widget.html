<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="今日庭期">
<meta name="theme-color" content="#0a1628">
<title>今日庭期 - 月曆模式</title>
<style>
/* ... (我保留原本的樣式並新增月曆相關 CSS) ... */
:root {
  --bg: #0f172a;
  --bg2: #1e2937;
  --bg3: #334155;
  --bg4: #475569;
  --text: #e2e8f0;
  --text2: #cbd5e1;
  --text3: #94a3b8;
  --text4: #64748b;
  --gold: #c8a96e;
  --red: #f87171;
  --border: #334155;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  padding: 12px;
}
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
.btn-theme, .btn-mode { padding:6px 12px; background:var(--bg3); border:none; border-radius:6px; color:var(--text); font-size:13px; cursor:pointer; }
.calendar {
  background: var(--bg2);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 16px;
}
.calendar-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; font-weight: 700; font-size: 1.1rem;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  text-align: center;
}
.calendar-grid div {
  padding: 8px 4px;
  border-radius: 6px;
  font-size: 13px;
  min-height: 52px;
  position: relative;
}
.calendar-grid .weekday { font-weight: 700; color: var(--text3); font-size: 12px; }
.calendar-grid .day {
  cursor: pointer;
  background: var(--bg3);
}
.calendar-grid .day.has-event { background: #1e40af; font-weight: 700; }
.calendar-grid .day.today { background: var(--gold); color: #000; }
.calendar-grid .day.selected { box-shadow: 0 0 0 2px var(--gold); }
.event-dot { position:absolute; bottom:4px; left:50%; transform:translateX(-50%); width:5px; height:5px; background:#facc15; border-radius:50%; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
// === 你的原本程式碼 + 月曆模式 ===
// (為了避免太長，我先給你重點更新部分)

let viewMode = "list"; // "list" 或 "calendar"

function buildWidget() {
  // ... 保留你原本的 hearings 取得邏輯 ...

  let html = `
  <div class="header">
    <div>⚖ 今日庭期</div>
    <div>
      <button class="btn-mode" id="btn-toggle-mode">${viewMode === "list" ? "🗓 月曆模式" : "📋 列表模式"}</button>
      <button class="btn-theme" id="btn-theme">切換主題</button>
    </div>
  </div>`;

  if (viewMode === "calendar") {
    html += buildCalendarHTML();
  } else {
    html += buildListHTML(); // 你原本的列表
  }

  return html;
}

// 新增月曆 HTML 生成函數
function buildCalendarHTML() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  let daysHTML = '';
  // 星期標題
  const weekdays = ['日','一','二','三','四','五','六'];
  daysHTML += weekdays.map(w => `<div class="weekday">${w}</div>`).join('');

  // 空白格
  for (let i = 0; i < firstDay; i++) {
    daysHTML += '<div></div>';
  }

  // 日期
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasEvent = getHearings().some(h => h.date === dateStr);
    const isToday = d === now.getDate();
    daysHTML += `
      <div class="day ${hasEvent ? 'has-event' : ''} ${isToday ? 'today' : ''}" data-date="${dateStr}">
        ${d}
        ${hasEvent ? '<div class="event-dot"></div>' : ''}
      </div>`;
  }

  return `
    <div class="calendar">
      <div class="calendar-header">
        <button onclick="prevMonth()">‹</button>
        <span>${year} 年 ${month+1} 月</span>
        <button onclick="nextMonth()">›</button>
      </div>
      <div class="calendar-grid">${daysHTML}</div>
    </div>
    <div id="selected-day"></div>`;
}

// 點擊日期事件（需在 bindEvents 加入）
document.addEventListener('click', e => {
  if (e.target.classList.contains('day')) {
    const date = e.target.dataset.date;
    showDayDetail(date);
  }
});

function showDayDetail(date) {
  const hearings = getHearings().filter(h => h.date === date);
  // 產生該日詳細卡片...
  document.getElementById('selected-day').innerHTML = /* 詳細內容 */;
}

// 切換模式
document.getElementById('btn-toggle-mode').addEventListener('click', () => {
  viewMode = viewMode === "list" ? "calendar" : "list";
  render();
});
</script>
</body>
</html>
