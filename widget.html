<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="今日庭期">
<meta name="theme-color" content="#FAF7F0">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-widget.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-widget.png">
<link rel="manifest" href="manifest-widget.json">
<script src="shared/tw-dates.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>⚖ 今日庭期</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  /* ── legal-design-tw 權杖 ── */
  --paper:#FAF7F0;--paper-raised:#FFFFFF;--paper-sunken:#F1ECE1;
  --ink:#211E1A;--ink-soft:#5B554D;--ink-faint:#8A8377;
  --seal:#9E2A24;--seal-bright:#C0392B;--seal-wash:#F3E3DF;
  --positive:#3A6B4F;--negative:#9E2A24;--warning:#A6741C;--navy:#2A3D4F;
  --positive-wash:#E7EFE9;--warning-wash:#F3EBDA;
  --rule:#DDD5C7;--rule-strong:#C4BAA6;
  --font-kai:"BiauKai","DFKai-SB","標楷體","KaiTi","STKaiti","Kaiti TC","Noto Serif TC",serif;
  --font-song:"Noto Serif TC","Source Han Serif TC","PMingLiU","新細明體","Songti TC",serif;
  --shadow-raised:0 2px 10px rgba(33,30,26,.10);
  /* ── 舊變數別名 → 權杖（既有 inline var(--…) 自動換色）── */
  --bg:var(--paper);--bg2:var(--paper-raised);--bg3:var(--paper-raised);--bg4:var(--paper-sunken);
  --gold:var(--seal);--text:var(--ink);--text2:var(--ink-soft);--text3:var(--ink-soft);--text4:var(--ink-faint);
  --green:var(--positive);--red:var(--negative);--yellow:var(--warning);--blue:var(--navy);
  --border:var(--rule);--shadow:none;
}
html,body{min-height:100vh;padding-top:40px;background:var(--paper);color:var(--ink);font-family:var(--font-song);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

/* ── HEADER ── */
.header{background:var(--paper-raised);padding:14px 18px;border-bottom:2px solid var(--seal);display:flex;align-items:center;justify-content:space-between;position:sticky;top:40px;z-index:10;}
.header-left{display:flex;align-items:center;gap:10px;}
.logo{font-size:22px;color:var(--seal);}
.header-title{font-family:var(--font-kai);font-size:16px;font-weight:700;letter-spacing:.06em;color:var(--ink);}
.header-date{font-size:11px;color:var(--ink-faint);margin-top:2px;}
.btn-link{background:transparent;border:1px solid var(--rule-strong);color:var(--ink-soft);border-radius:2px;padding:6px 12px;font-size:11px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;font-family:var(--font-kai);}
.btn-link:hover{border-color:var(--seal);color:var(--seal);}

/* ── CONTENT ── */
.content{padding:16px;max-width:600px;margin:0 auto;}

/* ── DAY SECTION ── */
.day-section{margin-bottom:20px;}
.day-label{font-family:var(--font-kai);font-size:12px;font-weight:700;color:var(--ink-soft);letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.day-label::after{content:"";flex:1;height:1px;background:var(--rule);}

/* ── HEARING CARD ── */
.hearing-card{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:16px 18px;margin-bottom:10px;display:flex;gap:14px;align-items:stretch;transition:border-color .2s,background .2s;cursor:pointer;text-decoration:none;}
.hearing-card:hover{border-color:var(--seal);background:var(--paper-sunken);}
.hearing-card:active{opacity:.9;}
.hearing-card.today{border-left:4px solid var(--seal);}
.hearing-card.urgent{border-left:4px solid var(--seal);}
.time-col{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:52px;flex-shrink:0;}
.time-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-kai);font-size:11px;font-weight:700;line-height:1.2;text-align:center;flex-direction:column;font-variant-numeric:tabular-nums;}
.info-col{flex:1;min-width:0;}
.client-name{font-family:var(--font-kai);font-size:17px;font-weight:700;letter-spacing:.03em;color:var(--ink);margin-bottom:4px;}
.case-no{font-size:11px;color:var(--ink-faint);font-family:var(--font-song);margin-bottom:6px;font-variant-numeric:tabular-nums;}
.meta-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:4px;}
.badge{display:inline-block;border-radius:2px;padding:1px 8px;font-size:11px;font-weight:400;white-space:nowrap;border:1px solid currentColor;background:transparent;}
.detail-row{font-size:12px;color:var(--ink-soft);margin-top:4px;display:flex;align-items:center;gap:5px;}
.countdown{font-size:11px;font-weight:700;margin-top:6px;}

/* ── EMPTY ── */
.empty-day{background:var(--paper-raised);border:1px dashed var(--rule-strong);border-radius:3px;padding:24px;text-align:center;color:var(--ink-faint);font-size:13px;}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:14px;color:var(--ink-soft);}
.spinner{width:32px;height:32px;border:3px solid var(--paper-sunken);border-top-color:var(--seal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SUMMARY BAR ── */
.summary-bar{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:12px 16px;display:flex;gap:0;margin-bottom:20px;overflow:hidden;}
.summary-item{flex:1;text-align:center;padding:4px 8px;}
.summary-item+.summary-item{border-left:1px solid var(--rule);}
.summary-num{font-family:var(--font-kai);font-size:24px;font-weight:700;color:var(--seal);line-height:1;font-variant-numeric:tabular-nums;}
.summary-lbl{font-size:11px;color:var(--ink-soft);margin-top:4px;letter-spacing:.04em;}

/* ── CLOCK ── */
.clock{font-size:13px;color:var(--ink-soft);font-variant-numeric:tabular-nums;font-family:var(--font-song);}

/* ── REFRESH ── */
.refresh-btn{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:16px;padding:4px;border-radius:2px;transition:color .2s;}
.refresh-btn:hover{color:var(--seal);}
.refreshing{animation:spin .6s linear infinite;}
.days-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.days-btn{flex:1;min-width:60px;background:var(--paper-raised);border:1px solid var(--rule);border-radius:2px;padding:8px 6px;font-family:var(--font-kai);font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;text-align:center;transition:all .2s;}
.days-btn.active{background:var(--seal);border-color:var(--seal);color:var(--paper-raised);}
.days-btn:hover:not(.active){border-color:var(--seal);color:var(--seal);}

.checkin-btn{width:100%;background:var(--paper-raised);border:1px solid var(--rule);border-left:4px solid var(--seal);border-radius:3px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;text-align:left;transition:all .2s;margin-bottom:14px;}
.checkin-btn:hover{border-color:var(--seal);background:var(--paper-sunken);}
.checkin-btn:active{opacity:.9;}
.checkin-icon{width:46px;height:46px;border-radius:2px;object-fit:cover;flex-shrink:0;border:1px solid var(--rule);}
.checkin-text{flex:1;}
.checkin-title{font-family:var(--font-kai);font-size:15px;font-weight:700;color:var(--seal);letter-spacing:.04em;}
.checkin-sub{font-size:11px;color:var(--ink-soft);margin-top:3px;}
.checkin-arrow{font-size:20px;color:var(--seal);opacity:.7;}
.qr-overlay{position:fixed;inset:0;background:#111;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;}
.qr-img{max-width:min(90vw,90vh);max-height:min(90vw,90vh);border-radius:4px;background:#fff;}
.qr-hint{color:#ffffff99;font-size:13px;margin-top:18px;letter-spacing:.04em;}
.qr-close{margin-top:18px;background:#ffffff14;border:1px solid #ffffff44;color:#fff;border-radius:2px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-kai);}
.qr-close:hover{background:#ffffff22;}
.edit-btn{background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:3px 8px;font-size:12px;border-radius:2px;font-family:inherit;transition:all .15s;}
.edit-btn:hover{background:var(--paper-sunken);color:var(--seal);}
.edit-form{background:var(--paper-sunken);border:1px solid var(--rule);border-radius:3px;padding:12px 14px;margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.edit-row-3{display:grid;grid-template-columns:1fr 96px 88px;gap:8px;}
.theme-btn{background:var(--paper-raised);border:1px solid var(--rule-strong);border-radius:2px;padding:5px 11px;cursor:pointer;font-size:12px;color:var(--ink-soft);font-family:var(--font-kai);}
.theme-btn:hover{border-color:var(--seal);color:var(--seal);}
.todo-item{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.todo-item.done{opacity:.55;}
.todo-check{width:18px;height:18px;border-radius:2px;border:2px solid var(--seal);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.todo-check.done{background:var(--seal);border-color:var(--seal);}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--paper);}
.login-box{background:var(--paper-raised);border:1px solid var(--rule-strong);border-top:3px solid var(--seal);border-radius:4px;padding:36px 32px;width:100%;max-width:360px;box-shadow:var(--shadow-raised);}
.fi{background:var(--paper-raised);border:1px solid var(--rule);border-radius:2px;padding:10px 13px;color:var(--ink);font-size:14px;outline:none;font-family:var(--font-song);width:100%;}
.fi:focus{border-color:var(--seal);box-shadow:0 0 0 3px var(--seal-wash);}
.btn-gold{background:var(--seal);color:var(--paper-raised);border:1px solid var(--seal);border-radius:2px;padding:11px 20px;font-weight:700;font-size:14px;cursor:pointer;width:100%;font-family:var(--font-kai);letter-spacing:.05em;}
.btn-gold:hover{background:var(--seal-bright);}
.err{background:var(--seal-wash);border:1px solid transparent;color:var(--seal);border-radius:2px;padding:10px 14px;font-size:13px;margin-bottom:14px;}

.widget-tools{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:12px 14px;margin-bottom:16px;display:flex;flex-direction:column;gap:10px;}
.tool-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.form-row{display:grid;grid-template-columns:1fr 96px;gap:8px;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
.fi-sm{background:var(--paper-raised);border:1px solid var(--rule);border-radius:2px;padding:9px 11px;color:var(--ink);font-size:14px;outline:none;font-family:var(--font-song);min-width:0;}
.fi-sm:focus{border-color:var(--seal);box-shadow:0 0 0 3px var(--seal-wash);}
.btn-small{background:var(--paper-raised);border:1px solid var(--rule-strong);color:var(--ink-soft);border-radius:2px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-kai);}
.btn-small:hover{border-color:var(--ink-soft);}
.btn-small.gold{background:var(--seal);border:1px solid var(--seal);color:var(--paper-raised);}
.btn-small.danger{color:var(--seal);border-color:var(--seal);background:transparent;}
.notice{font-size:12px;color:var(--ink-soft);line-height:1.5;}
.delete-hearing{margin-top:8px;width:auto;padding:5px 9px;font-size:11px;}
@media(max-width:480px){.form-row,.form-row.three{grid-template-columns:1fr;}}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--paper);}
::-webkit-scrollbar-thumb{background:var(--rule-strong);border-radius:2px;}
@media(max-width:480px){.content{padding:12px;}.client-name{font-size:15px;}}

/* ── WIDGET CALENDAR ── */
.wcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.wcal-dow{background:var(--paper-sunken);text-align:center;font-family:var(--font-kai);font-size:10px;font-weight:700;color:var(--ink-soft);padding:8px 4px;letter-spacing:.04em;}
.wcal-dow.sun{color:var(--seal);}
.wcal-dow.sat{color:var(--navy);}
.wcal-cell{background:var(--paper-raised);min-height:65px;padding:4px;cursor:default;position:relative;transition:background .15s;}
.wcal-cell.other-month{opacity:.4;}
.wcal-cell.today{background:var(--seal-wash);}
.wcal-cell.is-sun{background:rgba(158,42,36,.03);}
.wcal-cell.is-sat{background:rgba(42,61,79,.03);}
.wcal-num{font-family:var(--font-kai);font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:2px;font-variant-numeric:tabular-nums;}
.wcal-cell.today .wcal-num{color:var(--seal);}
.wcal-cell.is-sun:not(.other-month) .wcal-num{color:var(--seal);}
.wcal-cell.is-sat:not(.other-month) .wcal-num{color:var(--navy);}
.wcal-dot{width:4px;height:4px;border-radius:50%;margin:1px auto;}
.wcal-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;align-items:center;}
.wcal-todo-dot{width:5px;height:5px;border-radius:1px;background:var(--warning);transform:rotate(45deg);}
.wcal-filing-dot{width:5px;height:5px;border-radius:1px;background:var(--navy);}
.wcal-hol{font-size:7px;line-height:1.3;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.wcal-hol.hol{color:var(--seal);}
.wcal-hol.sch{color:var(--navy);}
.wcal-dl{font-size:7px;line-height:1.4;font-weight:700;color:var(--seal);background:var(--seal-wash);border-radius:2px;padding:0 1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
/* 與案件系統一致的月曆（大格＋文字事件） */
.cal-wrap{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--rule);background:var(--paper-sunken);gap:8px;}
.cal-nav{background:var(--paper-raised);border:1px solid var(--rule-strong);border-radius:2px;color:var(--ink-soft);cursor:pointer;padding:6px 12px;font-size:15px;font-family:inherit;}
.cal-nav:hover{background:var(--paper-sunken);border-color:var(--seal);color:var(--seal);}
.cal-title{flex:1;text-align:center;font-family:var(--font-kai);font-weight:700;font-size:16px;color:var(--ink);letter-spacing:.04em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:84px;}
.cal-dow{text-align:center;font-family:var(--font-kai);font-size:11px;font-weight:700;color:var(--ink-soft);padding:9px 4px;letter-spacing:.04em;}
.cal-dow.sun{color:var(--seal);}
.cal-dow.sat{color:var(--navy);}
.cal-day{height:84px;overflow:hidden;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:4px 3px;transition:background .15s;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day.other-month{opacity:.4;}
.cal-day.today-cell{background:var(--seal-wash);}
.cal-day.is-sun{background:rgba(158,42,36,.03);}
.cal-day.is-sat{background:rgba(42,61,79,.03);}
.cal-day.is-holiday{background:rgba(158,42,36,.05);}
.cal-day-num{font-family:var(--font-kai);font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:2px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cal-day.today-cell .cal-day-num{background:var(--seal);color:var(--paper-raised);font-weight:700;}
.cal-day.is-sun:not(.other-month) .cal-day-num{color:var(--seal);}
.cal-day.is-sat:not(.other-month) .cal-day-num{color:var(--navy);}
.cal-day.is-holiday:not(.other-month) .cal-day-num{color:var(--seal);font-weight:800;}
.cal-holiday-label{font-size:8px;color:var(--seal);font-weight:700;margin-bottom:1px;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;}
.cal-school-label{font-size:8px;color:var(--navy);font-weight:700;margin-bottom:1px;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;background:rgba(42,61,79,.08);border-radius:2px;padding:0 2px;}
.cal-deadline-label{font-size:8px;color:var(--seal);background:var(--seal-wash);font-weight:700;border-radius:2px;padding:0 2px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5;}
.cal-event{font-size:9px;border-radius:2px;padding:1px 4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;line-height:1.5;}
.cal-todo-dot{font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;margin-bottom:1px;background:var(--warning-wash);color:var(--warning);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-todo-dot.done{opacity:.45;text-decoration:line-through;}
.cal-legend{display:flex;gap:12px;flex-wrap:wrap;padding:12px 14px;border-top:1px solid var(--rule);}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-soft);}
@media(max-width:480px){
  .cal-grid{grid-auto-rows:70px;}
  .cal-day{height:70px;padding:3px 2px;}
  .cal-event{font-size:8px;}
}
.wcal-todo-dot.done{background:transparent;border:1px solid var(--warning);}
.mode-toggle{display:flex;gap:4px;background:var(--paper-sunken);border:1px solid var(--rule);border-radius:3px;padding:3px;margin-bottom:12px;}
.mode-btn{flex:1;padding:7px 12px;border-radius:2px;background:transparent;border:none;color:var(--ink-soft);font-family:var(--font-kai);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.mode-btn.active{background:var(--seal);color:var(--paper-raised);}
.day-modal{position:fixed;inset:0;background:rgba(33,30,26,.5);z-index:9998;display:flex;align-items:flex-end;justify-content:center;padding:0;}
@media(min-width:600px){.day-modal{align-items:center;padding:20px;}}
.day-sheet{background:var(--paper-raised);border:1px solid var(--rule-strong);border-radius:4px 4px 0 0;width:100%;max-width:520px;padding:20px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-raised);}
@media(min-width:600px){.day-sheet{border-radius:4px;}}
.day-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--seal);}
.day-title{font-family:var(--font-kai);font-size:17px;font-weight:700;letter-spacing:.05em;color:var(--ink);}
.day-close{background:var(--paper-sunken);border:1px solid var(--rule);border-radius:2px;width:32px;height:32px;cursor:pointer;color:var(--ink-soft);font-size:18px;}
.day-section-title{font-family:var(--font-kai);font-size:12px;font-weight:700;color:var(--seal);letter-spacing:.06em;padding-left:8px;border-left:3px solid var(--seal);margin-bottom:8px;}
.day-item{background:var(--paper-raised);border:1px solid var(--rule);border-radius:3px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.day-item:hover{border-color:var(--seal);}
.todo-check-box{width:18px;height:18px;border-radius:2px;border:2px solid var(--rule-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;}
.todo-check-box.done{background:var(--positive);border-color:var(--positive);}

.todo-collapse-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 14px;border-radius:3px;border:1px solid var(--rule);background:var(--paper-raised);margin-top:8px;transition:all .2s;user-select:none;}
.todo-collapse-hdr:hover{border-color:var(--seal);background:var(--paper-sunken);}
.todo-collapse-hdr.open{border-radius:3px 3px 0 0;border-bottom-color:transparent;}
.todo-collapse-body{border:1px solid var(--rule);border-top:none;border-radius:0 0 3px 3px;padding:12px 14px;background:var(--paper-raised);}
.todo-chevron{font-size:12px;color:var(--ink-soft);transition:transform .25s;display:inline-block;}
.todo-chevron.open{transform:rotate(180deg);}
.todo-item.overdue{border-color:var(--warning);background:var(--warning-wash);}

<body>
<script src="shared/sys-nav.js" data-active="widget"></script>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyB2sIWbUmp2TvnDGulat2BQGb7HMYBvfA0",
    authDomain: "legalcasemanageer.firebaseapp.com",
    projectId: "legalcasemanageer",
    storageBucket: "legalcasemanageer.firebasestorage.app",
    messagingSenderId: "559838504556",
    appId: "1:559838504556:web:ba10c071a12650bbd85a49"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth = getAuth(app);

// ── Constants ──
// 低彩土色系，與公文書狀風一致（朱/藏青/赭/青綠/黛…）
const TYPE_COLOR = {刑事:"#9E2A24",民事:"#2A3D4F",行政:"#A6741C",家事:"#99604F",勞動:"#3A6B4F",智財:"#3E6B6B",非訟:"#6B6250"};
const DAYS_OPTIONS = [30, 60, 120];
let DAYS_AHEAD = parseInt(localStorage.getItem("widget_days_ahead")||"30");
// 舊版儲存的 7/15 已不在選項中，一律回歸 30
if(!DAYS_OPTIONS.includes(DAYS_AHEAD)) DAYS_AHEAD = 30;

// ── Helpers ──
function today(){
    // 使用台灣時區 UTC+8，避免跨日誤差
    const tw = new Date(new Date().getTime() + 8*60*60*1000);
    return tw.toISOString().split("T")[0];
}
function toggleTodo(id){
    const idx=(state.calTodos||[]).findIndex(t=>t.id===id);
    if(idx===-1)return;
    state.calTodos[idx].done=!state.calTodos[idx].done;
    saveCalTodos(state.calTodos);
    render();
}
window.toggleTodo = toggleTodo;

window.deleteTodo = function(id){
    if(!confirm("確認刪除此待辦事項？")) return;
    const updated=(state.calTodos||[]).filter(t=>t.id!==id);
    saveCalTodos(updated);
    render();
};

window.archiveTodo = function(id){
    const updated=(state.calTodos||[]).map(t=>t.id===id?{...t,archived:true,done:true}:t);
    saveCalTodos(updated);
    render();
};

window.unarchiveTodo = function(id){
    const updated=(state.calTodos||[]).map(t=>t.id===id?{...t,archived:false}:t);
    saveCalTodos(updated);
    render();
};

window.toggleArchivedTodos = function(){
    state.showArchivedTodos=!state.showArchivedTodos; render();
};

window.toggleTodosPanel = function(){
    state.showTodos=!state.showTodos; render();
};

window.startEditTodo = function(id, text){
    // text 由 state 查得，不經 DOM 傳遞，避免內嵌事件字串注入
    state.editingTodoId=id;
    state.editTodoText = (text!=null) ? text : ((state.calTodos||[]).find(t=>t.id===id)?.text || "");
    render();
    setTimeout(()=>document.getElementById("etid-"+id)?.focus(), 50);
};

window.saveEditTodo = function(id){
    const inp=document.getElementById("etid-"+id);
    const newText=inp?inp.value.trim():state.editTodoText;
    if(!newText){ window.cancelEditTodo(); return; }
    const updated=(state.calTodos||[]).map(t=>t.id===id?{...t,text:newText}:t);
    state.editingTodoId=null; state.editTodoText="";
    saveCalTodos(updated); render();
};

window.cancelEditTodo = function(){
    state.editingTodoId=null; state.editTodoText=""; render();
};

function daysUntil(d){
    // 兩端都用台灣時間的「當日零時」比較，避免時區造成的差一天問題
    const todayMs = new Date(today()+"T00:00:00+08:00").getTime();
    const targetMs = new Date(d+"T00:00:00+08:00").getTime();
    return Math.round((targetMs - todayMs) / 86400000);
}
function pad(n){ return String(n).padStart(2,"0"); }
function fmtDate(iso){
    const d=new Date(iso+"T00:00:00");
    const wd=["日","一","二","三","四","五","六"][d.getDay()];
    return `${d.getMonth()+1}/${d.getDate()}（${wd}）`;
}
function nowStr(){
    const n=new Date();
    return `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}

// ── State ──
function readJSON(key,fallback){ try{ return JSON.parse(localStorage.getItem(key)||""); }catch(_){ return fallback; } }
function loadWidgetHearings(){ return readJSON("widgetHearings",[]); }
function loadReminder(){ return {...{enabled:false,time:"08:00"}, ...readJSON("widgetReminder",{})}; }
function saveLocal(key,value){ try{ localStorage.setItem(key,JSON.stringify(value)); }catch(_){} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
let state = { 
    user:null, authChecked:false, cases:[], calTodos:[], 
    widgetHearings:loadWidgetHearings(), showAddHearing:false, showAddTodo:false, 
    showQR:false, dayDetail:null, editingHearingId:null, editingTodoId:null, editTodoText:"", showTodos:false, showArchivedTodos:false,
    reminder:loadReminder(), refreshing:false, notice:"",
    viewMode:localStorage.getItem("widget_view_mode")||"list",
    calDate:new Date(), selectedDate:null
};

// ── Theme ──
function getAutoTheme(){ const h=new Date().getHours(); return (h>=6&&h<20)?"light":"dark"; }
function applyTheme(mode){
    const effective = mode==="auto" ? getAutoTheme() : mode;
    if(effective==="light") document.documentElement.classList.add("light");
    else document.documentElement.classList.remove("light");
    document.querySelector('meta[name="theme-color"]')?.setAttribute("content", effective==="light" ? "#f0f4f8" : "#0a1628");
}
let themeMode = localStorage.getItem("widget_theme")||"auto";
applyTheme(themeMode);
function themeLabel(){
    if(themeMode==="auto") return `自動 (${getAutoTheme()==="light"?"白天淺色":"晚上深色"})`;
    if(themeMode==="light") return "白天 淺色";
    return "晚上 深色";
}
function cycleTheme(){
    themeMode = themeMode==="auto"?"light":themeMode==="light"?"dark":"auto";
    localStorage.setItem("widget_theme",themeMode);
    applyTheme(themeMode);
    render(); // re-render so all components pick up new CSS variables
}
setInterval(()=>{
    if(themeMode!=="auto") return;
    const before = document.documentElement.classList.contains("light") ? "light" : "dark";
    applyTheme("auto");
    const after = document.documentElement.classList.contains("light") ? "light" : "dark";
    if(before!==after) render();
}, 60000);
let clockTimer=null, unsubCases=null, unsubWidgetHearings=null, reminderTimer=null;

function applyCalTodos(items){
    state.calTodos = Array.isArray(items) ? items : [];
    try{
        localStorage.setItem("calTodos", JSON.stringify(state.calTodos));
        localStorage.setItem("calTodos_updatedAt", String(Date.now()));
    }catch(_){}
    render();
}

async function refreshCalTodos(){
    if(!state.user) return;
    try{
        const snap = await getDoc(doc(db,"calTodos","shared"));
        if(snap.exists()) applyCalTodos(snap.data().items||[]);
    }catch(e){
        try{ state.calTodos=JSON.parse(localStorage.getItem("calTodos")||"[]"); }catch(_){}
        render();
    }
}

function syncCalTodosFromCache(){
    try{
        state.calTodos = JSON.parse(localStorage.getItem("calTodos")||"[]");
        render();
    }catch(_){}
}

function wakeSyncCalTodos(){
    if(document.visibilityState && document.visibilityState !== "visible") return;
    refreshCalTodos();
}

// ── Render engine ──
const root = document.getElementById("root");
function render(){ applyTheme(themeMode); root.innerHTML = buildHTML(); bindEvents(); }
function setNotice(msg){ state.notice=msg; render(); }
function saveWidgetHearings(items){
    state.widgetHearings = items.sort((a,b)=>(a.date||"").localeCompare(b.date||"")||(a.time||"").localeCompare(b.time||""));
    saveLocal("widgetHearings",state.widgetHearings);
    if(state.user){
        setDoc(doc(db,"widgetHearings","shared"),{items:state.widgetHearings,updatedAt:new Date().toISOString()})
            .catch(e=>{
                console.warn("widgetHearings 儲存失敗：",e.code);
                if(e.code==="permission-denied"){
                    state.notice="⚠️ 跨裝置同步失敗：請至 Firebase 更新 Firestore 規則（詳見說明）";
                    render();
                }else{
                    state.notice="⚠️ 儲存失敗，請檢查網路後重試";
                    render();
                }
            });
    }
}
function saveCalTodos(items){
    state.calTodos = (Array.isArray(items)?items:[]).sort((a,b)=>(a.date||"").localeCompare(b.date||"")||(a.createdAt||"").localeCompare(b.createdAt||""));
    saveLocal("calTodos",state.calTodos);
    try{ localStorage.setItem("calTodos_updatedAt", String(Date.now())); }catch(_){}
    if(state.user){
        setDoc(doc(db,"calTodos","shared"),{items:state.calTodos,updatedAt:new Date().toISOString()})
            .catch(e=>{
                console.warn("calTodos 儲存失敗：",e.code);
                if(e.code==="permission-denied"){
                    state.notice="⚠️ 待辦已先存在本機，請確認 Firebase calTodos 寫入權限";
                    render();
                }else{
                    state.notice="⚠️ 儲存失敗，請檢查網路後重試";
                    render();
                }
            });
    }
    render();
}
function saveReminder(reminder){ state.reminder=reminder; saveLocal("widgetReminder",reminder); startReminderTimer(); render(); }
function notificationAllowed(){ return "Notification" in window && Notification.permission==="granted"; }
async function ensureNotificationPermission(){
    if(!("Notification" in window)){ setNotice("此瀏覽器不支援通知功能"); return false; }
    if(Notification.permission==="granted") return true;
    if(Notification.permission==="denied"){ setNotice("瀏覽器已封鎖通知，請至設定手動開啟"); return false; }
    const permission = await Notification.requestPermission();
    if(permission!=="granted"){ setNotice("通知授權未獲批准"); return false; }
    return true;
}function notifyTodayHearings(force=false){
    const todays = getHearings().filter(h=>h.daysUntil===0);
    const todosToday = (state.calTodos||[]).filter(t=>t.date===today() && !t.done && !t.archived);
    if(!force){
        if(!state.reminder.enabled) return;
        if(nowHHMM() < state.reminder.time) return;
        const sentKey = `widgetReminderSent_${today()}`;
        if(localStorage.getItem(sentKey)==="1") return;
        localStorage.setItem(sentKey,"1");
    }
    if(todays.length===0 && todosToday.length===0){ if(force) setNotice("今日無庭期及待辦事項"); return; }
    const title = todays.length>0 && todosToday.length>0
        ? `今日提醒：庭期${todays.length}場・待辦${todosToday.length}項`
        : todays.length>0
            ? `今日開庭：${todays.length}場`
            : `今日待辦：${todosToday.length}項`;
    const hearingLines = todays.slice(0,5).map(h=>`🏛 ${h.time||"待定"} ${h.clientName||"Hearing"} ${[h.agency,h.courtroom].filter(Boolean).join(" ")}`);
    const todoLines = todosToday.slice(0,5).map(t=>`📝 ${t.time||"待定"} ${t.text}`);
    const body = [...hearingLines,...todoLines].join("\n");
    if(notificationAllowed()) new Notification(title,{body});
    else setNotice(`${title} - ${[...todays.map(h=>`${h.time||"待定"} ${h.clientName}`),...todosToday.map(t=>t.text)].join("、")}`);
}function startReminderTimer(){
    if(reminderTimer) clearInterval(reminderTimer);
    reminderTimer=setInterval(()=>notifyTodayHearings(false),60000);
}

// ── Auth ──
onAuthStateChanged(auth, u=>{
    u = (u && !u.isAnonymous) ? u : null; // 忽略匿名登入（僅帳號密碼登入者為管理員）
    state.user=u;
    state.authChecked=true;
    if(u && !unsubCases){
        // ── widgetHearings 即時同步 ──
        unsubWidgetHearings = onSnapshot(
            doc(db,"widgetHearings","shared"),
            snap=>{
                if(snap.exists()){
                    state.widgetHearings = snap.data().items||[];
                    saveLocal("widgetHearings",state.widgetHearings);
                    render();
                }
            },
            err=>{
                console.warn("widgetHearings 同步失敗：",err.code, "— 請確認 Firestore 規則已加入 widgetHearings");
                // fallback to localStorage
                try{ state.widgetHearings=JSON.parse(localStorage.getItem("widgetHearings")||"[]"); }catch(_){}
                render();
            }
        );
        // ── calTodos 即時同步 ──
        onSnapshot(
            doc(db,"calTodos","shared"),
            snap=>{
                state.calTodos = snap.exists() ? (snap.data().items||[]) : [];
                try{ localStorage.setItem("calTodos",JSON.stringify(state.calTodos)); }catch(_){}
                render();
            },
            err=>{
                console.warn("calTodos 同步失敗：",err.code);
                try{ state.calTodos=JSON.parse(localStorage.getItem("calTodos")||"[]"); }catch(_){}
                render();
            }
        );
        // ── cases 即時同步 ──
        unsubCases = onSnapshot(collection(db,"cases"), snap=>{
            state.cases = snap.docs.map(d=>({...d.data(),id:d.id}));
            // cache locally
            try{ localStorage.setItem("widget_cases_cache", JSON.stringify(state.cases)); }catch(_){}
            render();
        }, err=>{
            // fallback to cache
            try{
                const c=localStorage.getItem("widget_cases_cache");
                if(c) state.cases=JSON.parse(c);
            }catch(_){}
            render();
        });
    }
    if(!u && unsubWidgetHearings){ unsubWidgetHearings(); unsubWidgetHearings=null; }
    if(!u && unsubCases){ unsubCases(); unsubCases=null; }
    startReminderTimer();
    notifyTodayHearings(false);
    render();
});

// ── Build hearings list ──
function getHearings(){
    const result=[];
    state.cases.forEach(c=>{
        (c.hearings||[]).forEach(h=>{
            const d=daysUntil(h.date);
            if(d>=0 && d<=DAYS_AHEAD){
                result.push({
                    date:h.date, time:h.time||"", agency:h.agency||"",
                    courtroom:h.courtroom||"", note:h.note||"",
                    clientName:c.clientName, firmCaseNo:c.firmCaseNo,
                    courtCaseNos:c.courtCaseNos||[], caseType:c.caseType,
                    status:c.status, opposingParty:c.opposingParty||"",
                    caseId:c.id, daysUntil:d,
                });
            }
        });
    });
    (state.widgetHearings||[]).forEach(h=>{
        const d=daysUntil(h.date);
        if(d>=0 && d<=DAYS_AHEAD){
            result.push({
                ...h,
                source:"widget",
                caseType:h.caseType||"代庭",
                clientName:h.clientName||"代庭",
                firmCaseNo:h.firmCaseNo||"WIDGET",
                agency:h.agency||"",
                courtroom:h.courtroom||"",
                note:h.note||"",
                daysUntil:d,
            });
        }
    });
    return result.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
}

// ── HTML builders ──
function buildHTML(){
    if(!state.authChecked) return buildLoading("載入中…");
    if(!state.user) return buildLogin();
    return buildWidget();
}

function buildLoading(msg){
    return `<div class="loading"><div class="spinner"></div><div>${msg}</div></div>`;
}

function buildLogin(){
    return `
    <div class="login-wrap">
        <div class="login-box">
            <div style="font-size:42px;text-align:center;margin-bottom:8px">⚖</div>
            <div style="font-size:1.2rem;font-weight:700;color:var(--gold);text-align:center;margin-bottom:4px">今日庭期</div>
            <div style="font-size:11px;color:var(--text4);text-align:center;letter-spacing:.06em;margin-bottom:28px">庭期提醒小工具</div>
            <div id="login-err" style="display:none" class="err"></div>
            <div style="margin-bottom:12px">
                <label style="font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:5px">帳號</label>
                <input class="fi" id="email" type="email" placeholder="office@yourfirm.com" autocomplete="username">
            </div>
            <div style="margin-bottom:22px">
                <label style="font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:5px">密碼</label>
                <input class="fi" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn-gold" id="btn-login">🔐 登入</button>
        </div>
    </div>`;
}


// ── Build calendar view ──
function buildCalendar(){
    const y=state.calDate.getFullYear();
    const m=state.calDate.getMonth();
    const firstDay=new Date(y,m,1).getDay();
    const daysInMonth=new Date(y,m+1,0).getDate();
    const cells=[];
    
    // Prev month padding
    const prevDays=new Date(y,m,0).getDate();
    for(let i=firstDay-1;i>=0;i--) cells.push({day:prevDays-i,cur:false});
    // Current month
    for(let d=1;d<=daysInMonth;d++) cells.push({day:d,cur:true});
    // Next month padding
    while(cells.length%7!==0) cells.push({day:cells.length-firstDay-daysInMonth+1,cur:false});
    
    // Hearing map
    const hmap={};
    [...state.cases.flatMap(c=>(c.hearings||[]).map(h=>({...h,caseType:c.caseType,clientName:c.clientName,firmCaseNo:c.firmCaseNo}))),
     ...state.widgetHearings].forEach(h=>{
        const d=daysUntil(h.date);
        if(d>=-60 && d<=60){
            if(!hmap[h.date]) hmap[h.date]=[];
            hmap[h.date].push(h);
        }
    });

    // Todo map（排除已封存）
    const tmap={};
    (state.calTodos||[]).forEach(t=>{
        if(t.archived) return;
        if(!tmap[t.date]) tmap[t.date]=[];
        tmap[t.date].push(t);
    });

    // 遞狀（書狀）與期限（上訴/抗告末日、收受判決）——與案件系統同步
    const fmap={}, dlmap={};
    state.cases.forEach(c=>{
        (c.filings||[]).forEach(f=>{ if(!f.date)return; (fmap[f.date]=fmap[f.date]||[]).push({...f,clientName:c.clientName}); });
        if(c.appealDeadline) (dlmap[c.appealDeadline]=dlmap[c.appealDeadline]||[]).push({kind:"末日",clientName:c.clientName});
        if(c.judgmentReceivedDate) (dlmap[c.judgmentReceivedDate]=dlmap[c.judgmentReceivedDate]||[]).push({kind:"收判",clientName:c.clientName});
    });
    const HOL=window.TW_HOLIDAYS||{}, SCH=window.SCHOOL_EVENTS||{};

    const todayStr=today();

    return cells.map((cell,i)=>{
        const dow=i%7;
        const dateStr=cell.cur?`${y}-${pad(m+1)}-${pad(cell.day)}`:"";
        const events=dateStr?hmap[dateStr]||[]:[];
        const dayTodos=dateStr?tmap[dateStr]||[]:[];
        const dayFilings=dateStr?fmap[dateStr]||[]:[];
        const dayDl=dateStr?dlmap[dateStr]||[]:[];
        const hol=dateStr?HOL[dateStr]:"";
        const sch=dateStr?SCH[dateStr]:"";
        const isToday=dateStr===todayStr;
        const isHoliday=!!hol && dow!==0 && dow!==6;
        const cls=["wcal-cell",
            !cell.cur?"other-month":"",
            isToday?"today":"",
            dow===0?"is-sun":"",
            dow===6?"is-sat":"",
        ].filter(Boolean).join(" ");

        const cls2=["cal-day",
            !cell.cur?"other-month":"",
            isToday?"today-cell":"",
            dow===0?"is-sun":"",
            dow===6?"is-sat":"",
            isHoliday?"is-holiday":"",
        ].filter(Boolean).join(" ");
        return `<div class="${cls2}" data-date="${dateStr}" style="cursor:${dateStr?'pointer':'default'}">
            <div class="cal-day-num">${cell.day}</div>
            ${hol&&cell.cur?`<div class="cal-holiday-label" title="${esc(hol)}">${hol==="彈性放假"?"補假":esc(hol)}</div>`:""}
            ${sch&&cell.cur?`<div class="cal-school-label" title="學校：${esc(sch)}">📚${esc(sch)}</div>`:""}
            ${cell.cur?dayDl.slice(0,2).map(dl=>`<div class="cal-deadline-label" title="${esc((dl.kind==="末日"?"上訴/抗告末日：":"收受判決：")+dl.clientName)}">⏰${esc(dl.kind)} ${esc(dl.clientName)}</div>`).join(""):""}
            ${events.slice(0,2).map(e=>{
                const isW=e.caseType==="臨時庭期"||e.isWidget;
                const col=isW?"#9E2A24":(TYPE_COLOR[e.caseType]||"#8A8377");
                return `<div class="cal-event" style="background:${col}33;color:${col}" title="${esc((isW?"⚡ ":"")+(e.clientName||"")+" "+(e.time||"")+" "+(e.note||e.agency||""))}">${e.time?esc(e.time)+" ":""}${isW?"⚡":""}${esc(e.clientName||"")}</div>`;
            }).join("")}
            ${dayTodos.slice(0,2).map(t=>`<div class="cal-todo-dot${t.done?" done":""}" title="待辦：${esc(t.text)}">${t.done?"✓":"○"}${t.time?" "+esc(t.time):""} ${esc(t.text)}</div>`).join("")}

}

                            const isWidgetHearing=!h.caseId;
                            const itemClick=h.caseId?` onclick="openCase('${h.caseId}')"`:"";
                            const editForm=(isWidgetHearing && state.editingHearingId===h.id)?buildHearingEditForm(h):"";
                            const actions=isWidgetHearing?`
                                <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">
                                    <button class="btn-small" data-edit-widget-hearing="${h.id}" type="button" style="background:var(--bg4)">✏️ 編輯</button>
                                    <button class="btn-small danger delete-hearing" data-delete-widget-hearing="${h.id}" type="button">🗑 刪除</button>
                                </div>`:"";
                            return `<div class="day-item"${editForm?"":itemClick}>
                                <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
                                    <span style="color:${tc};font-size:16px">${h.time||"—"}</span>
                                    <span style="font-weight:700;color:var(--text);flex:1">${esc(h.clientName||"")}</span>
                                    <span class="badge" style="background:${tc}22;color:${tc};border:1px solid ${tc}44">${esc(h.caseType||"")}</span>
                                </div>
                                <div style="font-size:11px;color:var(--text3)">${esc([h.agency,h.courtroom,h.note].filter(Boolean).join(" · "))}</div>
                                ${actions}
                                ${editForm}
                            </div>`;
                        }).join("")}
                    </div>`:""}
                    ${todos.length>0?`
                    <div class="day-section">
                        <div class="day-section-title">✅ 待辦事項（${todos.length}項）</div>
                        ${todos.sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99")).map(t=>buildTodoItem(t)).join("")}
                    </div>`:""}
                    ${hearings.length===0&&todos.length===0?`
                    <div style="text-align:center;padding:30px 20px;color:var(--text4)">
                        <div style="font-size:32px;margin-bottom:8px">📅</div>
                        <div>本日無庭期或待辦</div>
                    </div>`:""}
                </div>
            </div>`;
        })():""}

        <!-- Calendar Todos section -->
        ${buildTodoSection()}
    </div>`;
}

function buildTodoItem(t){
    const isOverdue=!t.done && daysUntil(t.date)<0;
    const isEditing=state.editingTodoId===t.id;
    const checkBox=`<div class="todo-check-box${t.done?" done":""}" onclick="window.toggleTodo('${t.id}')">${t.done?'<span style="color:#fff;font-size:10px;font-weight:900">✓</span>':""}</div>`;
    if(isEditing){
        return `<div class="todo-item${t.done?" done":""}${isOverdue?" overdue":""}">
            ${checkBox}
            <div class="todo-edit-form">
                <input class="todo-edit-input" id="etid-${t.id}" value="${esc(state.editTodoText)}" onkeydown="if(event.key==='Enter')window.saveEditTodo('${t.id}');if(event.key==='Escape')window.cancelEditTodo();">
                <button class="todo-edit-btn" onclick="window.saveEditTodo('${t.id}')" style="color:var(--green)">✓</button>
                <button class="todo-edit-btn" onclick="window.cancelEditTodo()">✕</button>
            </div>
        </div>`;
    }
    return `<div class="todo-item${t.done?" done":""}${isOverdue?" overdue":""}">
        ${checkBox}
        <div style="flex:1">
            ${t.time?`<div style="font-size:11px;color:var(--warning);font-weight:700;margin-bottom:2px">⏰ ${esc(t.time)}</div>`:""}
            <div style="font-size:13px;color:${t.done?"var(--text4)":"var(--text)"};text-decoration:${t.done?"line-through":"none"}">${esc(t.text)}</div>
        </div>
        ${t.done?`<button class="todo-edit-btn" onclick="window.archiveTodo('${t.id}')" title="封存" style="color:var(--warning)">📥</button>`:""}
        <button class="todo-edit-btn" data-edit-todo="${t.id}" title="編輯">✏️</button>
        <button class="todo-edit-btn" onclick="window.deleteTodo('${t.id}')" title="刪除" style="color:var(--text4)">🗑</button>
    </div>`;
}

function buildArchivedTodoItem(t){
    const dd=new Date(t.date+"T00:00:00+08:00");
    const wd=["日","一","二","三","四","五","六"][dd.getDay()];
    return `<div class="todo-item done" style="opacity:.75">
        <div class="todo-check-box done" style="cursor:default">${'<span style="color:#fff;font-size:10px;font-weight:900">✓</span>'}</div>
        <div style="flex:1">
            <div style="font-size:10px;color:var(--text4);margin-bottom:2px">${dd.getMonth()+1}/${dd.getDate()}（${wd}）${t.time?` ⏰ ${esc(t.time)}`:""}</div>
            <div style="font-size:13px;color:var(--text4);text-decoration:line-through">${esc(t.text)}</div>
        </div>
        <button class="todo-edit-btn" onclick="window.unarchiveTodo('${t.id}')" title="取消封存" style="color:var(--green)">↩️</button>
        <button class="todo-edit-btn" onclick="window.deleteTodo('${t.id}')" title="刪除" style="color:var(--text4)">🗑</button>
    </div>`;
}

function buildTodoSection(){
    const sorted=(state.calTodos||[]).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"99:99").localeCompare(b.time||"99:99"));
    const allTodos=sorted.filter(t=>!t.archived);
    const archivedTodos=sorted.filter(t=>t.archived);
    if(allTodos.length===0 && archivedTodos.length===0) return "";
    const pendingCount=allTodos.filter(t=>!t.done).length;
    const overdueCount=allTodos.filter(t=>!t.done&&daysUntil(t.date)<0).length;
    const byDate={};
    allTodos.forEach(t=>{ if(!byDate[t.date])byDate[t.date]=[]; byDate[t.date].push(t); });
    const isOpen=state.showTodos;

    const archivedOpen=state.showArchivedTodos;
    const archivedBlock=archivedTodos.length>0?`
        <div style="margin-top:10px;border-top:1px dashed var(--border);padding-top:10px">
            <div class="todo-collapse-hdr${archivedOpen?" open":""}" onclick="window.toggleArchivedTodos()" style="padding:6px 2px">
                <div style="display:flex;align-items:center;gap:8px">
                    <span style="font-size:14px">📥</span>
                    <span style="font-size:12px;font-weight:700;color:var(--text3)">已封存</span>
                    <span style="background:var(--bg4);color:var(--text3);border-radius:2px;padding:1px 9px;font-size:11px;font-weight:800">${archivedTodos.length}</span>
                </div>
                <span class="todo-chevron${archivedOpen?" open":""}">▼</span>
            </div>
            ${archivedOpen?`<div class="todo-collapse-body">${archivedTodos.slice().reverse().map(t=>buildArchivedTodoItem(t)).join("")}</div>`:""}
        </div>`:"";

    const inner=Object.entries(byDate).map(([date,todos])=>{
        const d=daysUntil(date);
        const isOverdue=d<0;
        const dLabel=d===0?"今天":d===1?"明天":d>0?`${d}天後`:`${Math.abs(d)}天前（逾期）`;
        const dColor=isOverdue?"var(--warning)":d===0?"var(--green)":"var(--warning)";
        const dd=new Date(date+"T00:00:00+08:00");
        const wd=["日","一","二","三","四","五","六"][dd.getDay()];
        const items=todos.map(t=>buildTodoItem(t)).join("");
        return `<div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text4);margin-bottom:6px;display:flex;gap:8px;align-items:center">
                <span>${dd.getMonth()+1}/${dd.getDate()}（${wd}）</span>
                <span style="color:${dColor};font-weight:700">${dLabel}</span>
            </div>
            ${items}
        </div>`;
    }).join("");

    return `<div class="day-section" style="margin-top:4px">
        <div class="todo-collapse-hdr${isOpen?" open":""}" onclick="window.toggleTodosPanel()">
            <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:15px">✅</span>
                <span style="font-size:13px;font-weight:700;color:${pendingCount>0?"var(--warning)":"var(--text3)"}">待辦事項</span>
                ${pendingCount>0?`<span style="background:var(--warning-wash);color:var(--warning);border-radius:2px;padding:1px 9px;font-size:11px;font-weight:800">${pendingCount}項未完成</span>`:""}
                ${overdueCount>0?`<span style="background:rgba(245,158,11,.15);color:var(--warning);border-radius:2px;padding:1px 9px;font-size:11px;font-weight:800">⚠️${overdueCount}逾期</span>`:""}
            </div>
            <span class="todo-chevron${isOpen?" open":""}">▼</span>
        </div>
        ${isOpen?`<div class="todo-collapse-body">${inner||`<div style="text-align:center;padding:16px;color:var(--text4);font-size:12px">目前無待辦事項</div>`}${archivedBlock}</div>`:""}
    </div>`;
}


function buildHearingEditForm(h){
    return `<div class="edit-form">
        <div class="edit-row-3">
            <input class="fi-sm" id="ef-client" value="${esc(h.clientName||"")}" placeholder="當事人姓名">
            <input class="fi-sm" id="ef-date" type="date" value="${esc(h.date||"")}">
            <input class="fi-sm" id="ef-time" type="time" value="${esc(h.time||"")}">
        </div>

            <input class="fi-sm" id="ef-agency" value="${esc(h.agency||"")}" placeholder="法院 / 機關">

        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
            <button class="btn-small" id="btn-cancel-edit" type="button">取消</button>

function buildCard(h){
    const color = TYPE_COLOR[h.caseType]||"var(--ink-faint)";
    const isToday = h.daysUntil===0;
    const isUrgent = isToday && h.time && h.time < nowHHMM();
    const cardClass = `hearing-card ${isToday?"today":""} ${isUrgent?"urgent":""}`;

    // Time circle
    const timeBg = isToday
        ? `background:${color}22;color:${color};border:2px solid ${color}55;`
        : `background:var(--bg4);color:var(--text3);border:2px solid var(--border);`;
    const timeDisplay = h.time||"—";
    const timeCircle = `<div class="time-circle" style="${timeBg}">${h.time?h.time.replace(":","\n"):"—"}</div>`;

    // Countdown badge
    let countdown = "";
    if(isToday && h.time){
        const [hh,mm]=h.time.split(":").map(Number);
        const nowMin=new Date().getHours()*60+new Date().getMinutes();
        const tMin=hh*60+mm;
        const diff=tMin-nowMin;
        if(diff>0) countdown=`<div class="countdown" style="color:${diff<=30?"var(--red)":"var(--yellow)"}">還有 ${diff>=60?Math.floor(diff/60)+"小時":diff+"分鐘"}</div>`;
        else if(diff>-60) countdown=`<div class="countdown" style="color:var(--text3)">已過 ${-diff}分鐘</div>`;
    }

    const caseNo=(h.courtCaseNos||[]).filter(Boolean)[0]||h.firmCaseNo||"";
    const cardAction = h.caseId ? ` onclick="openCase('${h.caseId}')"` : "";
    const deleteAction = h.source==="widget" ? `
        <button class="btn-small" data-edit-widget-hearing="${h.id}" type="button" style="background:var(--bg3)">✏️ 編輯</button>
        <button class="btn-small danger delete-hearing" data-delete-widget-hearing="${h.id}" type="button">🗑 刪除</button>` : "";
    const editForm = (h.source==="widget" && state.editingHearingId===h.id) ? buildHearingEditForm(h) : "";

    return `
    <div class="${cardClass}"${cardAction}>
        <div class="time-col">${timeCircle}</div>
        <div class="info-col">
            <div class="client-name">${esc(h.clientName)}</div>
            <div class="case-no">${esc(h.firmCaseNo)}${caseNo&&caseNo!==h.firmCaseNo?" · "+esc(caseNo):""}</div>
            <div class="meta-row">
                <span class="badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${esc(h.caseType)}</span>
                ${h.note?`<span class="badge" style="background:var(--bg4);color:var(--text3);border:1px solid var(--border)">${esc(h.note)}</span>`:""}
            </div>
            ${h.agency||h.courtroom?`<div class="detail-row">🏛 ${esc([h.agency,h.courtroom].filter(Boolean).join(" · "))}</div>`:""}
            ${h.opposingParty?`<div class="detail-row">⚔ 對造：${esc(h.opposingParty)}</div>`:""}
            ${countdown}
            ${deleteAction}
        </div>
    ${editForm}
    </div>`;
}

function nowHHMM(){
    return pad(new Date().getHours())+":"+pad(new Date().getMinutes());
}
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── Event binding ──
function bindEvents(){
    // View mode toggle
    document.querySelectorAll("[data-mode]").forEach(btn=>{
        btn.addEventListener("click",()=>{
            state.viewMode=btn.dataset.mode;
            localStorage.setItem("widget_view_mode",state.viewMode);
            render();
        });
    });

    // Calendar navigation
    document.getElementById("cal-prev")?.addEventListener("click",()=>{
        state.calDate=new Date(state.calDate.getFullYear(),state.calDate.getMonth()-1,1);
        render();
    });
    document.getElementById("cal-next")?.addEventListener("click",()=>{
        state.calDate=new Date(state.calDate.getFullYear(),state.calDate.getMonth()+1,1);
        render();
    });
    document.getElementById("cal-today")?.addEventListener("click",()=>{
        state.calDate=new Date();
        render();
    });

    // 月曆左右滑動切換月份（手機）
    const calGrid=document.querySelector(".cal-grid");
    if(calGrid){
        let sx=null, sy=null;
        calGrid.addEventListener("touchstart",e=>{
            const t=e.changedTouches[0]; sx=t.clientX; sy=t.clientY;
        },{passive:true});
        calGrid.addEventListener("touchend",e=>{
            if(sx===null)return;
            const t=e.changedTouches[0];
            const dx=t.clientX-sx, dy=t.clientY-sy;
            sx=sy=null;
            if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)*1.5){
                const delta=dx<0?1:-1; // 左滑→下個月，右滑→上個月
                state.calDate=new Date(state.calDate.getFullYear(),state.calDate.getMonth()+delta,1);
                render();
            }
        },{passive:true});
    }

    // Days ahead selector
    document.querySelectorAll("[data-days]").forEach(btn=>{
        btn.addEventListener("click",()=>{
            DAYS_AHEAD = parseInt(btn.dataset.days);
            localStorage.setItem("widget_days_ahead", DAYS_AHEAD);
            render();
        });
    });

    // 待辦編輯：以 data 屬性 + 監聽器取代內嵌事件（避免字串注入）
    document.querySelectorAll("[data-edit-todo]").forEach(btn=>{
        btn.addEventListener("click",()=>window.startEditTodo(btn.dataset.editTodo));
    });

    document.onkeydown = e=>{
        if(e.key==="Escape" && (state.showQR || state.dayDetail || state.selectedDate)){
            state.showQR=false;
            state.dayDetail=null;
            state.selectedDate=null;
            state.editingHearingId=null;
            state.editingTodoId=null;
            render();
        }
    };
    const closeDayModal = ()=>{
        state.selectedDate=null;
        state.dayDetail=null;
        state.editingHearingId=null;
        state.editingTodoId=null;
        render();
    };

    // Calendar cell click
    document.querySelectorAll("[data-date]").forEach(cell=>{
        const date=cell.dataset.date;
        if(date){
            cell.addEventListener("click",()=>{
                state.selectedDate=null;
                state.dayDetail=date;
                render();
            });
        }
    });

    // Day modal close
    document.querySelectorAll(".day-modal").forEach(modal=>{
        modal.addEventListener("click",e=>{
            if(e.target===modal) closeDayModal();
        });
    });
    document.querySelectorAll(".day-close").forEach(btn=>{
        btn.addEventListener("click",e=>{
            e.stopPropagation();
            closeDayModal();
        });
    });

    // QR check-in
    document.getElementById("btn-checkin")?.addEventListener("click",()=>{
        state.showQR=true; render();
    });
    document.getElementById("qr-overlay")?.addEventListener("click",()=>{
        state.showQR=false; render();
    });

    // Calendar day click
    document.querySelectorAll("[data-date]").forEach(cell=>{
        cell.addEventListener("click",()=>{
            if(!cell.dataset.date) return;
            state.selectedDate=null;
            state.dayDetail=cell.dataset.date;
            render();
        });
    });

    // Theme toggle
    document.getElementById("btn-theme")?.addEventListener("click",()=>{
        themeMode = themeMode==="auto"?"light":themeMode==="light"?"dark":"auto";
        localStorage.setItem("widget_theme",themeMode);
        applyTheme(themeMode);
        render();
    });

    // Login
    const btnLogin=document.getElementById("btn-login");
    if(btnLogin){
        const doLogin=async()=>{
            const email=document.getElementById("email")?.value.trim();
            const pw=document.getElementById("password")?.value;
            const errEl=document.getElementById("login-err");
            if(!email||!pw){ showErr(errEl,"請輸入帳號和密碼"); return; }
            btnLogin.textContent="登入中…"; btnLogin.disabled=true;
            try{
                await signInWithEmailAndPassword(auth,email,pw);
            }catch(e){
                const msg={"auth/invalid-credential":"帳號或密碼錯誤","auth/too-many-requests":"嘗試次數過多，請稍後"}[e.code]||"登入失敗："+e.message;
                showErr(errEl,msg);
                btnLogin.textContent="🔐 登入"; btnLogin.disabled=false;
            }
        };
        btnLogin.addEventListener("click",doLogin);
        document.getElementById("password")?.addEventListener("keydown",e=>e.key==="Enter"&&doLogin());
        document.getElementById("email")?.addEventListener("keydown",e=>e.key==="Enter"&&document.getElementById("password")?.focus());
    }

    // Logout
    document.getElementById("btn-logout")?.addEventListener("click",async()=>{
        if(unsubCases){ unsubCases(); unsubCases=null; }
        await signOut(auth);
    });

    // Refresh
    // Hearing inline edit
    document.querySelectorAll("[data-edit-widget-hearing]").forEach(btn=>{
        btn.addEventListener("click",e=>{
            e.stopPropagation();
            const id=btn.dataset.editWidgetHearing;
            state.editingHearingId = state.editingHearingId===id ? null : id;
            render();
        });
    });
    document.getElementById("btn-cancel-edit")?.addEventListener("click",()=>{
        state.editingHearingId=null; render();
    });
    document.querySelectorAll("[data-confirm-edit]").forEach(btn=>{
        btn.addEventListener("click",e=>{
            e.stopPropagation();
            const id=btn.dataset.confirmEdit;
            const updated=state.widgetHearings.map(h=>{
                if(h.id!==id) return h;
                return {
                    ...h,
                    clientName:document.getElementById("ef-client")?.value.trim()||h.clientName,
                    date:document.getElementById("ef-date")?.value||h.date,
                    time:document.getElementById("ef-time")?.value||h.time,
                    agency:document.getElementById("ef-agency")?.value.trim()||h.agency,
                    courtroom:document.getElementById("ef-room")?.value.trim()||h.courtroom,
                    note:document.getElementById("ef-note")?.value.trim()||h.note,
                };
            });
            saveWidgetHearings(updated);
            state.editingHearingId=null;
            state.notice="✅ 庭期已更新";
            render();
            setTimeout(()=>{ state.notice=""; render(); },2000);
        });
    });

    document.getElementById("btn-refresh")?.addEventListener("click",()=>{
        state.refreshing=true; render();
        setTimeout(()=>{ state.refreshing=false; render(); },800);
    });

    // Theme switch: auto -> day/light -> night/dark
    document.getElementById("btn-theme")?.addEventListener("click",cycleTheme);

    document.getElementById("btn-toggle-hearing")?.addEventListener("click",()=>{
        state.showAddHearing=!state.showAddHearing;
        if(state.showAddHearing) state.showAddTodo=false;
        state.notice="";
        render();
    });
    document.getElementById("btn-save-widget-hearing")?.addEventListener("click",addWidgetHearingFromForm);
    document.getElementById("btn-toggle-todo")?.addEventListener("click",()=>{
        state.showAddTodo=!state.showAddTodo;
        if(state.showAddTodo) state.showAddHearing=false;
        state.notice="";
        render();
    });
    document.getElementById("btn-save-todo")?.addEventListener("click",addTodoFromForm);
    document.getElementById("todo-text")?.addEventListener("keydown",e=>{
        if(e.key==="Enter") addTodoFromForm();
    });
    document.querySelectorAll("[data-delete-widget-hearing]").forEach(btn=>{
        btn.addEventListener("click",e=>{
            e.stopPropagation();
            deleteWidgetHearing(btn.getAttribute("data-delete-widget-hearing"));
        });
    });
    document.getElementById("reminder-time")?.addEventListener("change",e=>{
        saveReminder({...state.reminder,time:e.target.value||"08:00"});
    });
    document.getElementById("btn-enable-reminder")?.addEventListener("click",async()=>{
        const ok=await ensureNotificationPermission();
        saveReminder({...state.reminder,enabled:ok});
        state.notice=ok?"通知已啟用，會在設定時間提醒今天庭期與待辦事項":"通知尚未啟用";
        render();
    });
    document.getElementById("btn-test-reminder")?.addEventListener("click",async()=>{
        await ensureNotificationPermission();
        notifyTodayHearings(true);
    });
    // Clock
    if(clockTimer) clearInterval(clockTimer);
    if(state.user){
        clockTimer=setInterval(()=>{
            const el=document.getElementById("clock");
            if(el) el.textContent=nowStr();
        },1000);
    }
}

function showErr(el,msg){ if(el){ el.textContent="⚠️ "+msg; el.style.display="block"; }}
function addWidgetHearingFromForm(){
    const clientName=document.getElementById("wh-client")?.value.trim();
    const date=document.getElementById("wh-date")?.value;
    const time=document.getElementById("wh-time")?.value;
    const agency=document.getElementById("wh-agency")?.value.trim();
    const courtroom=document.getElementById("wh-room")?.value.trim();
    const note=document.getElementById("wh-note")?.value.trim();
    if(!date){ setNotice("請選擇日期"); return; }
    const item={id:uid(),clientName:clientName||"臨時庭期",date,time:time||"",agency,courtroom,note,caseType:"臨時庭期",createdAt:new Date().toISOString()};
    saveWidgetHearings([...(state.widgetHearings||[]),item]);
    state.showAddHearing=false;
    state.notice="✅ 庭期已新增";
    render();
}
function addTodoFromForm(){
    const text=document.getElementById("todo-text")?.value.trim();
    const date=document.getElementById("todo-date")?.value;
    const time=document.getElementById("todo-time")?.value;
    const note=document.getElementById("todo-note")?.value.trim();
    if(!text){ setNotice("請輸入待辦事項內容"); return; }
    if(!date){ setNotice("請選擇待辦日期"); return; }
    const item={id:uid(),text,date,time:time||"",note:note||"",done:false,archived:false,createdAt:new Date().toISOString()};
    saveCalTodos([...(state.calTodos||[]),item]);
    state.showAddTodo=false;
    state.notice="✅ 待辦事項已新增";
    render();
}
function deleteWidgetHearing(id){
    saveWidgetHearings((state.widgetHearings||[]).filter(h=>h.id!==id));
    state.notice="🗑 庭期已刪除";
    render();
}
window.openCase=(id)=>{ window.location.href=`index.html`; };

render();
</script>
</body>
</html>
