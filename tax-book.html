<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>事務所簡易報稅帳本</title>
<style>
:root{
  --bg:#f6f7f9;
  --panel:#ffffff;
  --panel2:#f1f5f9;
  --text:#162033;
  --muted:#667085;
  --line:#d9e0ea;
  --accent:#0f766e;
  --accent2:#7c3aed;
  --danger:#b42318;
  --warn:#b7791f;
  --ok:#067647;
  --shadow:0 14px 36px rgba(15,23,42,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
  line-height:1.5;
}
button,input,select,textarea{font:inherit}
.app{min-height:100vh}
.topbar{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(255,255,255,.92);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);
}
.top-inner{
  max-width:1180px;
  margin:0 auto;
  padding:16px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}
.brand h1{font-size:20px;margin:0 0 2px}
.brand p{margin:0;color:var(--muted);font-size:13px}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.btn{
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--text);
  border-radius:8px;
  padding:9px 12px;
  cursor:pointer;
  font-weight:700;
  font-size:13px;
}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.purple{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn.danger{background:#fff;border-color:#f3b6b1;color:var(--danger)}
.btn:hover{filter:brightness(.98)}
.wrap{max-width:1180px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:360px 1fr;gap:18px;align-items:start}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
}
.panel-head{
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
.panel-head h2{font-size:15px;margin:0}
.panel-body{padding:16px}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.tab{
  border:1px solid var(--line);
  background:var(--panel2);
  border-radius:8px;
  padding:9px;
  cursor:pointer;
  font-weight:800;
}
.tab.active{background:#e6f4f1;border-color:#88c7bd;color:#0d5f59}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px 11px;
  background:#fff;
  color:var(--text);
  outline:none;
}
.field textarea{min-height:70px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.notice{
  padding:10px 12px;
  background:#fff7e6;
  border:1px solid #f1d196;
  color:#7a4f01;
  border-radius:8px;
  font-size:12px;
  margin-top:12px;
}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  padding:14px;
  box-shadow:var(--shadow);
}
.kpi span{display:block;color:var(--muted);font-size:12px;font-weight:800}
.kpi strong{display:block;font-size:22px;margin-top:6px}
.kpi.income strong{color:var(--ok)}
.kpi.expense strong{color:var(--danger)}
.kpi.net strong{color:var(--accent)}
.kpi.tax strong{color:var(--accent2)}
.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.toolbar select,.toolbar input{
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px 10px;
  background:#fff;
}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mini-table{width:100%;border-collapse:collapse;font-size:13px}
.mini-table th,.mini-table td{padding:9px;border-bottom:1px solid var(--line);text-align:left}
.mini-table th{color:var(--muted);font-size:12px}
.mini-table td:last-child{text-align:right;font-weight:800}
.records{margin-top:18px}
.record{
  display:grid;
  grid-template-columns:92px 86px 1fr 115px 70px;
  gap:10px;
  align-items:center;
  padding:11px 12px;
  border-bottom:1px solid var(--line);
  font-size:13px;
}
.record:last-child{border-bottom:none}
.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:999px;
  padding:3px 9px;
  font-size:12px;
  font-weight:800;
  background:var(--panel2);
}
.badge.income{background:#e8f7f1;color:var(--ok)}
.badge.expense{background:#fff0ee;color:var(--danger)}
.amount{text-align:right;font-weight:900}
.amount.income{color:var(--ok)}
.amount.expense{color:var(--danger)}
.muted{color:var(--muted)}
.empty{padding:28px;text-align:center;color:var(--muted)}
.checklist{display:grid;gap:9px}
.check{
  display:flex;
  gap:9px;
  align-items:flex-start;
  padding:10px;
  background:var(--panel2);
  border-radius:8px;
  font-size:13px;
}
.check input{margin-top:3px}
.footer-note{
  margin:18px 0 4px;
  color:var(--muted);
  font-size:12px;
}
@media(max-width:900px){
  .grid{grid-template-columns:1fr}
  .kpis{grid-template-columns:1fr 1fr}
  .summary-grid{grid-template-columns:1fr}
  .record{grid-template-columns:82px 76px 1fr;align-items:start}
  .record .amount,.record .delete-cell{grid-column:auto;text-align:left}
  .top-inner{align-items:flex-start;flex-direction:column}
  .actions{justify-content:flex-start}
}
@media(max-width:520px){
  .wrap{padding:14px}
  .kpis{grid-template-columns:1fr}
  .row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="top-inner">
      <div class="brand">
        <h1>事務所簡易報稅帳本</h1>
        <p>第一版：收入、支出、憑證、年度彙總與申報前檢查</p>
      </div>
      <div class="actions">
        <button class="btn" id="btn-export-csv" type="button">匯出 CSV</button>
        <button class="btn" id="btn-export-json" type="button">備份資料</button>
        <button class="btn danger" id="btn-clear" type="button">清空資料</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="kpis" id="kpis"></section>
    <div class="grid">
      <aside class="panel">
        <div class="panel-head">
          <h2>新增紀錄</h2>
        </div>
        <div class="panel-body">
          <div class="tabs">
            <button class="tab active" id="tab-income" type="button">收入</button>
            <button class="tab" id="tab-expense" type="button">支出</button>
          </div>
          <form id="entry-form">
            <div class="row">
              <div class="field">
                <label for="date">日期</label>
                <input id="date" type="date" required>
              </div>
              <div class="field">
                <label for="amount">金額</label>
                <input id="amount" type="number" min="0" step="1" placeholder="例如 6000" required>
              </div>
            </div>
            <div class="field">
              <label for="category">分類</label>
              <select id="category"></select>
            </div>
            <div class="field">
              <label for="title">項目說明</label>
              <input id="title" type="text" placeholder="例如：法律諮詢費、影印費、法院規費" required>
            </div>
            <div class="field">
              <label for="client">案件或對象</label>
              <input id="client" type="text" placeholder="可填客戶、案件名或付款對象">
            </div>
            <div class="field">
              <label for="receipt">憑證編號或檔名</label>
              <input id="receipt" type="text" placeholder="例如：收據 001、IMG_20260527.jpg">
            </div>
            <div class="field">
              <label for="note">備註</label>
              <textarea id="note" placeholder="例如：代墊款、已開收據、待補憑證"></textarea>
            </div>
            <button class="btn primary" style="width:100%" type="submit">加入帳本</button>
            <div class="notice">這是整理申報資料用的帳本，不會直接送出稅務申報。正式申報前請依你的事務所型態與當年度法規再次核對。</div>
          </form>
        </div>
      </aside>

      <section>
        <div class="panel">
          <div class="panel-head">
            <h2>年度報表</h2>
            <div class="toolbar">
              <select id="year-filter"></select>
              <input id="search" type="search" placeholder="搜尋項目、案件、憑證">
            </div>
          </div>
          <div class="panel-body">
            <div class="summary-grid">
              <div>
                <h3 style="font-size:14px;margin:0 0 8px">收入分類</h3>
                <table class="mini-table" id="income-table"></table>
              </div>
              <div>
                <h3 style="font-size:14px;margin:0 0 8px">支出分類</h3>
                <table class="mini-table" id="expense-table"></table>
              </div>
            </div>
          </div>
        </div>

        <div class="panel records">
          <div class="panel-head">
            <h2>明細紀錄</h2>
            <span class="muted" id="record-count"></span>
          </div>
          <div id="records"></div>
        </div>

        <div class="panel records">
          <div class="panel-head">
            <h2>申報前檢查</h2>
          </div>
          <div class="panel-body">
            <div class="checklist" id="checklist"></div>
            <p class="footer-note">提醒：若有聘僱人員、扣繳、營業稅、印花稅、合夥、開立發票或大額固定資產，第一版帳本只能協助整理資料，仍建議交由會計師或國稅局服務人員確認。</p>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<script>
const STORAGE_KEY = "law_office_tax_book_v1";
const incomeCategories = ["諮詢費","委任費","顧問費","撰狀費","出庭費","其他收入"];
const expenseCategories = ["租金","文具影印","郵資快遞","交通停車","軟體訂閱","法院規費","代墊款","外包勞務","教育訓練","其他費用"];
const checklistItems = [
  "收入是否都有收據、匯款紀錄或合約可對應",
  "代收代付、法院規費、客戶代墊款是否已標明",
  "每筆費用是否有發票、收據、匯款紀錄或其他憑證",
  "私人支出是否已排除，不列入事務所費用",
  "年度報表金額是否與銀行帳戶收支大致相符",
  "正式申報前是否已確認你的事務所型態適用的申報方式"
];
let mode = "income";
let entries = loadEntries();

function loadEntries(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");}
  catch(_){return [];}
}
function saveEntries(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}
function money(n){
  return "NT$ " + Math.round(Number(n)||0).toLocaleString("zh-TW");
}
function today(){
  return new Date().toISOString().slice(0,10);
}
function uid(){
  return "tx_" + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}
function years(){
  const set = new Set(entries.map(e => (e.date || "").slice(0,4)).filter(Boolean));
  set.add(String(new Date().getFullYear()));
  return Array.from(set).sort((a,b)=>b.localeCompare(a));
}
function selectedYear(){
  return document.getElementById("year-filter").value || String(new Date().getFullYear());
}
function filteredEntries(){
  const q = document.getElementById("search")?.value.trim().toLowerCase() || "";
  const year = selectedYear();
  return entries.filter(e => (e.date || "").startsWith(year)).filter(e => {
    if(!q) return true;
    return [e.title,e.client,e.receipt,e.note,e.category].join(" ").toLowerCase().includes(q);
  }).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
}
function setMode(next){
  mode = next;
  document.getElementById("tab-income").classList.toggle("active", mode === "income");
  document.getElementById("tab-expense").classList.toggle("active", mode === "expense");
  renderCategoryOptions();
}
function renderCategoryOptions(){
  const options = mode === "income" ? incomeCategories : expenseCategories;
  document.getElementById("category").innerHTML = options.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
}
function escapeHtml(text){
  return String(text || "").replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[s]));
}
function groupTotal(list, type){
  const map = {};
  list.filter(e => e.type === type).forEach(e => {
    map[e.category] = (map[e.category] || 0) + Number(e.amount || 0);
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}
function renderTable(id, rows, emptyText){
  const el = document.getElementById(id);
  if(!rows.length){
    el.innerHTML = `<tr><td class="muted">${emptyText}</td><td></td></tr>`;
    return;
  }
  el.innerHTML = `<thead><tr><th>分類</th><th>金額</th></tr></thead><tbody>` +
    rows.map(([name,total])=>`<tr><td>${escapeHtml(name)}</td><td>${money(total)}</td></tr>`).join("") +
    `</tbody>`;
}
function renderYears(){
  const current = document.getElementById("year-filter").value;
  const ys = years();
  document.getElementById("year-filter").innerHTML = ys.map(y=>`<option value="${y}">${y} 年</option>`).join("");
  if(current && ys.includes(current)) document.getElementById("year-filter").value = current;
}
function renderKpis(list){
  const income = list.filter(e=>e.type==="income").reduce((s,e)=>s+Number(e.amount||0),0);
  const expense = list.filter(e=>e.type==="expense").reduce((s,e)=>s+Number(e.amount||0),0);
  const net = income - expense;
  const missing = list.filter(e=>!e.receipt).length;
  document.getElementById("kpis").innerHTML = `
    <div class="kpi income"><span>年度收入</span><strong>${money(income)}</strong></div>
    <div class="kpi expense"><span>年度支出</span><strong>${money(expense)}</strong></div>
    <div class="kpi net"><span>帳面淨額</span><strong>${money(net)}</strong></div>
    <div class="kpi tax"><span>待補憑證</span><strong>${missing} 筆</strong></div>
  `;
}
function renderRecords(list){
  const el = document.getElementById("records");
  document.getElementById("record-count").textContent = `${list.length} 筆`;
  if(!list.length){
    el.innerHTML = `<div class="empty">目前沒有符合條件的紀錄</div>`;
    return;
  }
  el.innerHTML = list.map(e => `
    <div class="record">
      <div>${escapeHtml(e.date)}</div>
      <div><span class="badge ${e.type}">${e.type==="income"?"收入":"支出"}</span></div>
      <div>
        <strong>${escapeHtml(e.title)}</strong>
        <div class="muted">${escapeHtml([e.category,e.client,e.receipt].filter(Boolean).join(" · "))}</div>
        ${e.note ? `<div class="muted">${escapeHtml(e.note)}</div>` : ""}
      </div>
      <div class="amount ${e.type}">${money(e.amount)}</div>
      <div class="delete-cell"><button class="btn danger" data-delete="${e.id}" type="button">刪除</button></div>
    </div>
  `).join("");
  document.querySelectorAll("[data-delete]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const item = entries.find(e=>e.id===btn.dataset.delete);
      if(!item) return;
      if(confirm(`刪除「${item.title}」這筆紀錄？`)){
        entries = entries.filter(e=>e.id!==btn.dataset.delete);
        saveEntries();
        render();
      }
    });
  });
}
function renderChecklist(){
  document.getElementById("checklist").innerHTML = checklistItems.map((text,i)=>`
    <label class="check"><input type="checkbox" data-check="${i}"><span>${escapeHtml(text)}</span></label>
  `).join("");
}
function render(){
  renderYears();
  const list = filteredEntries();
  renderKpis(list);
  renderTable("income-table", groupTotal(list,"income"), "尚無收入資料");
  renderTable("expense-table", groupTotal(list,"expense"), "尚無支出資料");
  renderRecords(list);
}
function download(filename, content, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function exportCsv(){
  const header = ["日期","類型","分類","項目","案件或對象","憑證","金額","備註"];
  const rows = filteredEntries().map(e=>[
    e.date,e.type==="income"?"收入":"支出",e.category,e.title,e.client,e.receipt,e.amount,e.note
  ]);
  const csv = [header,...rows].map(row=>row.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  download(`事務所報稅帳本_${selectedYear()}.csv`, "\uFEFF"+csv, "text/csv;charset=utf-8");
}
function exportJson(){
  download(`事務所報稅帳本備份_${today()}.json`, JSON.stringify(entries,null,2), "application/json;charset=utf-8");
}
document.getElementById("date").value = today();
renderCategoryOptions();
renderChecklist();
document.getElementById("tab-income").addEventListener("click",()=>setMode("income"));
document.getElementById("tab-expense").addEventListener("click",()=>setMode("expense"));
document.getElementById("year-filter").addEventListener("change",render);
document.getElementById("search").addEventListener("input",render);
document.getElementById("btn-export-csv").addEventListener("click",exportCsv);
document.getElementById("btn-export-json").addEventListener("click",exportJson);
document.getElementById("btn-clear").addEventListener("click",()=>{
  if(entries.length && confirm("確定清空全部帳本資料？這個動作不能復原。")){
    entries = [];
    saveEntries();
    render();
  }
});
document.getElementById("entry-form").addEventListener("submit",e=>{
  e.preventDefault();
  const item = {
    id: uid(),
    type: mode,
    date: document.getElementById("date").value,
    amount: Number(document.getElementById("amount").value || 0),
    category: document.getElementById("category").value,
    title: document.getElementById("title").value.trim(),
    client: document.getElementById("client").value.trim(),
    receipt: document.getElementById("receipt").value.trim(),
    note: document.getElementById("note").value.trim(),
    createdAt: new Date().toISOString()
  };
  if(!item.date || !item.amount || !item.title) return;
  entries.push(item);
  saveEntries();
  e.target.reset();
  document.getElementById("date").value = today();
  renderCategoryOptions();
  render();
});
render();
</script>
</body>
</html>
